 ? href : &#39;#&#39;;\r\n      const ext = safe.startsWith(&#39;http&#39;) ? &#39; target=&quot;_blank&quot; rel=&quot;noopener&quot;&#39; : &#39;&#39;;\r\n      return &#39;&lt;a href=&quot;&#39; + safe + &#39;&quot;&#39; + ext + &#39;&gt;&#39; + txt + &#39;&lt;/a&gt;&#39;;\r\n    });\r\n    return s;\r\n  }\r\n\r\n  function flushPara() {\r\n    if (para.length) {\r\n      out += &#39;&lt;p&gt;&#39; + inline(para.join(&#39; &#39;)) + &#39;&lt;/p&gt;\\n&#39;;\r\n      para = [];\r\n    }\r\n  }\r\n  function closeList() {\r\n    if (inList) { out += &#39;&lt;/&#39; + listType + &#39;&gt;\\n&#39;; inList = false; listType = null; }\r\n  }\r\n  function flushTable() {\r\n    if (!table) return;\r\n    out += &#39;&lt;div class=&quot;md-table-wrap&quot;&gt;&lt;table class=&quot;md-table&quot;&gt;&lt;thead&gt;&lt;tr&gt;&#39;;\r\n    for (const h of table.headers) out += &#39;&lt;th&gt;&#39; + inline(h) + &#39;&lt;/th&gt;&#39;;\r\n    out += &#39;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;&#39;;\r\n    for (const row of table.rows) {\r\n      out += &#39;&lt;tr&gt;&#39;;\r\n      for (const cell of row) out += &#39;&lt;td&gt;&#39; + inline(cell) + &#39;&lt;/td&gt;&#39;;\r\n      out += &#39;&lt;/tr&gt;&#39;;\r\n    }\r\n    out += &#39;&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;\\n&#39;;\r\n    table = null;\r\n  }\r\n  function flushBlockquote() {\r\n    if (!blockquote.length) return;\r\n    out += &#39;&lt;blockquote&gt;&#39; + inline(blockquote.join(&#39; &#39;)) + &#39;&lt;/blockquote&gt;\\n&#39;;\r\n    blockquote = [];\r\n  }\r\n\r\n  for (let i = 0; i &lt; lines.length; i++) {\r\n    const line = lines[i];\r\n\r\n    // Fenced code block continuation\r\n    if (inCode) {\r\n      if (line.trim().startsWith(&#39;```&#39;)) {\r\n        out += &#39;&lt;pre&gt;&lt;code&#39; + (codeLang ? &#39; class=&quot;lang-&#39; + escapeHtml(codeLang) + &#39;&quot;&#39; : &#39;&#39;) + &#39;&gt;&#39;\r\n             + escapeHtml(codeBuf.join(&#39;\\n&#39;)) + &#39;&lt;/code&gt;&lt;/pre&gt;\\n&#39;;\r\n        inCode = false; codeBuf = []; codeLang = &#39;&#39;;\r\n      } else {\r\n        codeBuf.push(line);\r\n      }\r\n      continue;\r\n    }\r\n\r\n    // Fenced code block open\r\n    const codeStart = line.match(/^```(\\w*)\\s*$/);\r\n    if (codeStart) {\r\n      flushPara(); closeList(); flushTable(); flushBlockquote();\r\n      inCode = true; codeLang = codeStart[1];\r\n      continue;\r\n    }\r\n\r\n    // Table: current line has | and next line is a separator\r\n    if (\r\n      line.indexOf(&#39;|&#39;) !== -1 &amp;&amp;\r\n      i + 1 &lt; lines.length &amp;&amp;\r\n      /^\\s*\\|?\\s*:?-+:?(\\s*\\|\\s*:?-+:?)+\\s*\\|?\\s*$/.test(lines[i + 1])\r\n    ) {\r\n      flushPara(); closeList(); flushBlockquote();\r\n      const headers = line\r\n        .split(&#39;|&#39;)\r\n        .map(s =&gt; s.trim())\r\n        .filter((_, idx, a) =&gt; !(idx === 0 &amp;&amp; a[0] === &#39;&#39;) &amp;&amp; !(idx === a.length - 1 &amp;&amp; a[a.length - 1] === &#39;&#39;));\r\n      table = { headers, rows: [] };\r\n      i++; // skip separator line\r\n      while (i + 1 &lt; lines.length &amp;&amp; lines[i + 1].indexOf(&#39;|&#39;) !== -1 &amp;&amp; lines[i + 1].trim() !== &#39;&#39;) {\r\n        i++;\r\n        const cells = lines[i]\r\n          .split(&#39;|&#39;)\r\n          .map(s =&gt; s.trim())\r\n          .filter((_, idx, a) =&gt; !(idx === 0 &amp;&amp; a[0] === &#39;&#39;) &amp;&amp; !(idx === a.length - 1 &amp;&amp; a[a.length - 1] === &#39;&#39;));\r\n        table.rows.push(cells);\r\n      }\r\n      flushTable();\r\n      continue;\r\n    }\r\n\r\n    // Horizontal rule\r\n    if (/^---+\\s*$/.test(line)) {\r\n      flushPara(); closeList(); flushBlockquote();\r\n      out += &#39;&lt;hr&gt;\\n&#39;;\r\n      continue;\r\n    }\r\n\r\n    // Headings\r\n    const heading = line.match(/^(#{1,6})\\s+(.+)$/);\r\n    if (heading) {\r\n      flushPara(); closeList(); flushBlockquote();\r\n      const level = heading[1].length;\r\n      // Build an id slug for anchor linking\r\n      const headingId = String(heading[2]).toLowerCase().replace(/[^a-z0-9]+/g, &#39;-&#39;).replace(/^-+|-+$/g, &#39;&#39;);\r\n      out += &#39;&lt;h&#39; + level + &#39; id=&quot;&#39; + headingId + &#39;&quot;&gt;&#39; + inline(heading[2]) + &#39;&lt;/h&#39; + level + &#39;&gt;\\n&#39;;\r\n      continue;\r\n    }\r\n\r\n    // Blockquote\r\n    const bq = line.match(/^&gt;\\s?(.*)$/);\r\n    if (bq) {\r\n      flushPara(); closeList();\r\n      blockquote.push(bq[1]);\r\n      continue;\r\n    }\r\n    if (blockquote.length) flushBlockquote();\r\n\r\n    // Unordered list\r\n    const ul = line.match(/^[-*]\\s+(.+)$/);\r\n    if (ul) {\r\n      flushPara();\r\n      if (!inList || listType !== &#39;ul&#39;) { closeList(); out += &#39;&lt;ul&gt;\\n&#39;; inList = true; listType = &#39;ul&#39;; }\r\n      out += &#39;&lt;li&gt;&#39; + inline(ul[1]) + &#39;&lt;/li&gt;\\n&#39;;\r\n      continue;\r\n    }\r\n\r\n    // Ordered list\r\n    const ol = line.match(/^\\d+\\.\\s+(.+)$/);\r\n    if (ol) {\r\n      flushPara();\r\n      if (!inList || listType !== &#39;ol&#39;) { closeList(); out += &#39;&lt;ol&gt;\\n&#39;; inList = true; listType = &#39;ol&#39;; }\r\n      out += &#39;&lt;li&gt;&#39; + inline(ol[1]) + &#39;&lt;/li&gt;\\n&#39;;\r\n      continue;\r\n    }\r\n\r\n    // Blank line → flush para / close list\r\n    if (line.trim() === &#39;&#39;) {\r\n      flushPara(); closeList();\r\n      continue;\r\n    }\r\n\r\n    // Paragraph accumulation\r\n    para.push(line);\r\n  }\r\n\r\n  // Flush any trailing state\r\n  flushPara(); closeList(); flushBlockquote(); flushTable();\r\n  if (inCode) {\r\n    out += &#39;&lt;pre&gt;&lt;code&gt;&#39; + escapeHtml(codeBuf.join(&#39;\\n&#39;)) + &#39;&lt;/code&gt;&lt;/pre&gt;\\n&#39;;\r\n  }\r\n  return out;\r\n}\r\n\r\n/* ============================================================\r\n * Strip YAML frontmatter and return { title, body }\r\n * =====================================================</code></pre>","href":""},{"id":"generate-monitor","title":"generate-monitor","file":"_00-Project-Management/93-Scripts/generate-monitor.js","ext":"js","bodyHtml":"<pre><code class=\"lang-js\">#!/usr/bin/env node\r\n/**\r\n * generate-monitor.js\r\n *\r\n * Keeps the count-driven rollups in 42-Monitor/MONITOR.md in sync with the live\r\n * artefact corpus. Recomputes and upserts four managed blocks between markers:\r\n *   - pm:monitor:overall  — the overall story-completion bar\r\n *   - pm:monitor:rollup   — the per-epic rollup table\r\n *   - pm:monitor:counts   — the counts snapshot\r\n *   - pm:monitor:wip       — the WIP-by-status block\r\n * Everything outside the markers (header, State, narrative, revision history,\r\n * BACKLOG-resolution table) is hand-written and never touched.\r\n *\r\n * Fixes BUG-20260524-01: MONITOR&#39;s hand-authored counts drifted from disk because\r\n * they were only refreshed on close-out / weekly cadence, never on artefact creation.\r\n * Now `npm run pm:monitor` (folded into `pm:all`) recomputes them from frontmatter.\r\n *\r\n * Dependency-free: Node.js stdlib only (fs, path). Idempotent.\r\n *\r\n * Usage:  node _00-Project-Management/93-Scripts/generate-monitor.js\r\n *         npm run pm:monitor\r\n */\r\n\r\n&#39;use strict&#39;;\r\n\r\nconst fs = require(&#39;fs&#39;);\r\nconst path = require(&#39;path&#39;);\r\n\r\nconst PM_ROOT = path.resolve(__dirname, &#39;..&#39;);\r\n// Resolve logical PM sub-folder names through the layout map (full / flattened /\r\n// custom). PATHS.&lt;logical&gt; → physical folder name for this project. See lib/pm-paths.js.\r\nconst { loadPaths } = require(&#39;./lib/pm-paths&#39;);\r\nconst PATHS = loadPaths(PM_ROOT).map;\r\nconst MONITOR = path.join(PM_ROOT, PATHS.monitor, &#39;MONITOR.md&#39;);\r\nconst CHANGELOG = path.join(PM_ROOT, &#39;..&#39;, &#39;CHANGELOG.md&#39;);\r\n\r\nconst TERMINAL = new Set([&#39;done&#39;, &#39;wontfix&#39;, &#39;duplicate&#39;, &#39;archived&#39;]);\r\n\r\n// ---------- corpus walk (dependency-free; mirrors validate-frontmatter.js) ----------\r\n\r\nfunction walk(dir, list = []) {\r\n  if (!fs.existsSync(dir)) return list;\r\n  for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {\r\n    if (entry.isDirectory() &amp;&amp; entry.name === &#39;__fixtures__&#39;) continue; // never count test fixtures\r\n    const full = path.join(dir, entry.name);\r\n    if (entry.isDirectory()) walk(full, list);\r\n    else if (entry.isFile() &amp;&amp; entry.name.endsWith(&#39;.md&#39;)) list.push(full);\r\n  }\r\n  return list;\r\n}\r\n\r\nfunction stripQuotes(s) {\r\n  if (typeof s !== &#39;string&#39;) return s;\r\n  if ((s.startsWith(&quot;&#39;&quot;) &amp;&amp; s.endsWith(&quot;&#39;&quot;)) || (s.startsWith(&#39;&quot;&#39;) &amp;&amp; s.endsWith(&#39;&quot;&#39;))) return s.slice(1, -1);\r\n  return s;\r\n}\r\n\r\nfunction parseFrontmatter(content) {\r\n  const m = content.match(/^---\\r?\\n([\\s\\S]*?)\\r?\\n---\\r?\\n?/);\r\n  if (!m) return null;\r\n  const fm = {};\r\n  // STORY-13.2.01: surface malformed frontmatter the same way the validator&#39;s R20 does\r\n  // (ADR-0041 flag-not-retain), instead of silently last-writing a duplicate top-level key\r\n  // or dropping a nested mapping while computing rollups — so pm:monitor and pm:lint agree.\r\n  // Ported in place rather than via a shared helper (ADR-0051) to avoid rollup-parser drift.\r\n  // _diagnostics is advisory only: value semantics below are unchanged (last write wins),\r\n  // so on the clean corpus the computed rollups — and MONITOR.md — are byte-identical.\r\n  fm._diagnostics = [];\r\n  const seenKeys = new Set();\r\n  for (const line of m[1].split(/\\r?\\n/)) {\r\n    if (!line.trim() || line.trim().startsWith(&#39;#&#39;)) continue;\r\n    // Nested mapping: 2+ leading spaces + a `key:` that is NOT a `- item` list row. The kit&#39;s\r\n    // frontmatter is deliberately flat; flag the nested key instead of silently swallowing it.\r\n    const nested = line.match(/^\\s{2,}([A-Za-z_][\\w-]*)\\s*:\\s/);\r\n    if (nested &amp;&amp; !line.match(/^\\s+-/)) {\r\n      fm._diagnostics.push({ type: &#39;nested-key&#39;, key: nested[1], line });\r\n      continue;\r\n    }\r\n    const kv = line.match(/^([A-Za-z_][\\w-]*)\\s*:\\s*(.*)$/);\r\n    if (kv) {\r\n      const key = kv[1];\r\n      if (seenKeys.has(key)) fm._diagnostics.push({ type: &#39;duplicate-key&#39;, key });\r\n      seenKeys.add(key);\r\n      fm[key] = stripQuotes(kv[2].trim());\r\n    }\r\n  }\r\n  return fm;\r\n}\r\n\r\nfunction readAll(subdir) {\r\n  const out = [];\r\n  for (const f of walk(path.join(PM_ROOT, subdir))) {\r\n    const fm = parseFrontmatter(fs.readFileSync(f, &#39;utf8&#39;));\r\n    if (fm) out.push({ fm, file: f });\r\n  }\r\n  return out;\r\n}\r\n\r\n// Releases are tracked in the repo-root CHANGELOG.md (Keep-a-Changelog headings),\r\n// NOT as 13-Releases/*.md files — count distinct semver headings (`## [x.y.z]`),\r\n// excluding the `## [Unreleased]` section. Graceful 0 when CHANGELOG.md is absent\r\n// (e.g. a freshly-scaffolded client project that hasn&#39;t started a changelog yet).\r\nfunction countReleases() {\r\n  if (!fs.existsSync(CHANGELOG)) return 0;\r\n  const txt = fs.readFileSync(CHANGELOG, &#39;utf8&#39;);\r\n  const versions = new Set();\r\n  const re = /^##\\s+\\[(\\d+\\.\\d+\\.\\d+)\\]/gm;\r\n  let m;\r\n  while ((m = re.exec(txt)) !== null) versions.add(m[1]);\r\n  return versions.size;\r\n}\r\n\r\nfunction bar(done, total) {\r\n  if (total &lt;= 0) return &#39;[░░░░░░░░░░]&#39;;\r\n  const filled = Math.round((done / total) * 10);\r\n  return &#39;[&#39; + &#39;█&#39;.repeat(filled) + &#39;░&#39;.repeat(10 - filled) + &#39;]&#39;;\r\n}\r\n\r\n// ---------- compute ----------\r\n\r\nfunction compute() {\r\n  const epics = readAll(PATHS.epics);\r\n  const features = readAll(PATHS.features);\r\n  const stories = readAll(PATHS.stories);\r\n  const testplans = readAll(PATHS.testplans);\r\n  const bugs = readAll(PATHS.bugs);\r\n  const adrs = readAll(PATHS.decisions);\r\n  const backlog = readAll(PATHS.backlog);\r\n  const releaseCount = countReleases();\r\n  const prds = walk(path.join(PM_ROOT, PATHS.requirements)).filter(f =&gt; /PRD-/i.test(path.basename(f)));\r\n\r\n  const storyDone = stories.filter(s =&gt; s.fm.status === &#39;done&#39;).length;\r\n  const storyTotal = stories.length;\r\n\r\n  // per-epic rollup\r\n  const byEpic = new Map(); // epicId -&gt; { feat, story, done, inflight }\r\n  for (const e of epics) {\r\n    byEpic.set(e.fm.id, { epic: e, feat: 0, story: 0, done: 0, inflight: 0 });\r\n  }\r\n  for (const f of features) {\r\n    const r = byEpic.get(f.fm.epic);\r\n    if (r) r.feat++;\r\n  }\r\n  for (const s of stories) {\r\n    const r = byEpic.get(s.fm.epic);\r\n    if (!r) continue;\r\n    r.story++;\r\n    if (s.fm.status === &#39;done&#39;) r.done++;\r\n    if (s.fm.status === &#39;in-progress&#39; || s.fm.status === &#39;in-review&#39;) r.inflight++;\r\n  }\r\n\r\n  // WIP across stories\r\n  const wip = { &#39;in-progress&#39;: 0, &#39;in-review&#39;: 0, &#39;blocked&#39;: 0 };\r\n  for (const s of stories) if (wip[s.fm.status] !== undefined) wip[s.fm.status]++;\r\n\r\n  // status tallies\r\n  const tally = (arr) =&gt; arr.reduce((m, x) =&gt; { const st = x.fm.status || &#39;?&#39;; m[st] = (m[st] || 0) + 1; return m; }, {});\r\n\r\n  return {\r\n    epics, features, stories, testplans, bugs, adrs, backlog, releaseCount, prds,\r\n    storyDone, storyTotal, byEpic, wip,\r\n    epicStatus: tally(epics), bugOpen: bugs.filter(b =&gt; !TERMINAL.has(b.fm.status)).length,\r\n  };\r\n}\r\n\r\n// ---------- render blocks ----------\r\n\r\nfunction fmtPct(done, total) { return total &gt; 0 ? ((done / total) * 100).toFixed(1) : &#39;0.0&#39;; }\r\n\r\nfunction renderOverall(c) {\r\n  return &#39;```\\n&#39; +\r\n    `ALL  ${bar(c.storyDone, c.storyTotal)}   ${c.storyDone} / ${c.storyTotal} stories (${fmtPct(c.storyDone, c.storyTotal)}%)\\n` +\r\n    &#39;```&#39;;\r\n}\r\n\r\nfunction epicStatusPill(r) {\r\n  if (r.story &gt; 0 &amp;&amp; r.done === r.story) return &#39;🟢 done&#39;;\r\n  if (r.inflight &gt; 0 || r.done &gt; 0) return &#39;🟧 in progress&#39;;\r\n  return &#39;🟦 planned&#39;;\r\n}\r\n\r\nfunction renderRollup(c) {\r\n  const rows = [&#39;| Epic | Status | Features | Stories | Shipped | Bar |&#39;, &#39;|---|---|---|---|---|---|&#39;];\r\n  const ids = [...c.byEpic.keys()].sort();\r\n  for (const id of ids) {\r\n    const r = c.byEpic.get(id);\r\n    const title = r.epic.fm.title || id;\r\n    const link = `../${PATHS.epics}/${path.basename(r.epic.file)}`;\r\n    rows.push(`| [${id} — ${title}](${link}) | ${epicStatusPill(r)} | ${r.feat} | ${r.story} | ${r.done} / ${r.story} stories | \\`${bar(r.done, r.story)}\\` |`);\r\n  }\r\n  return rows.join(&#39;\\n&#39;);\r\n}\r\n\r\nfunction renderCounts(c) {\r\n  const doneEpics = (c.epicStatus[&#39;done&#39;] || 0);\r\n  const storyOpen = c.storyTotal - c.storyDone;\r\n  return [\r\n    `- Epics: ${c.epics.length}`,\r\n    `- Features: ${c.features.length}`,\r\n    `- Stories: ${c.storyTot</code></pre>","href":""},{"id":"hook","title":"hook","file":"_00-Project-Management/93-Scripts/hook.js","ext":"js","bodyHtml":"<pre><code class=\"lang-js\">#!/usr/bin/env node\r\n/**\r\n * hook.js — canonical, dependency-free Claude Code hook entrypoint for the PM kit.\r\n *\r\n * Single source of truth for hook behaviour (STORY-12.3.01 / ADR-0053). The kit&#39;s\r\n * hook definitions (hooks/hooks.json and the scaffolded .claude/settings.json) call\r\n * `node 93-Scripts/hook.js &lt;event&gt;` so the hooks behave identically on Windows,\r\n * macOS, and Linux — no `jq`/`bash`/`case`/`git -C`/`grep` shell-out, no PATH\r\n * dependency on `node`/`npm`/`jq`.\r\n *\r\n * It reads the hook payload as JSON on stdin and dispatches on argv[2]:\r\n *   post-tool-use  → if the edited file is under _00-Project-Management/, run the\r\n *                    project&#39;s validate-frontmatter.js (frontmatter lint).\r\n *   stop           → if the working tree has changes under _00-Project-Management/,\r\n *                    regenerate the dashboard; if `.claude-pm-config.json` has\r\n *                    &quot;claude_md_nudge&quot;: true, ALSO emit a one-line warn-only nudge\r\n *                    when any CLAUDE.md is incomplete (never blocks).\r\n *\r\n * Child Node scripts are spawned with the SAME node binary (process.execPath) — the\r\n * one documented exception to &quot;pure Node&quot; is this child_process call to a kit pm:*\r\n * script (it never shells out to a POSIX shell). Git is invoked (when present) with\r\n * the `cwd` option rather than the `git -C` flag; any failure is swallowed so a hook\r\n * never blocks the session.\r\n *\r\n * A missing or non-JSON payload is handled gracefully (treated as {}), so a hook\r\n * never hard-fails the session on a malformed stdin.\r\n *\r\n * Exit codes: post-tool-use forwards the linter&#39;s code (non-zero surfaces\r\n * violations to the model); stop always exits 0 (advisory only).\r\n * Dependency-free — Node stdlib only.\r\n */\r\n&#39;use strict&#39;;\r\n\r\nconst fs = require(&#39;fs&#39;);\r\nconst path = require(&#39;path&#39;);\r\nconst cp = require(&#39;child_process&#39;);\r\n\r\nfunction readStdin() {\r\n  try { return fs.readFileSync(0, &#39;utf8&#39;); } catch (_e) { return &#39;&#39;; }\r\n}\r\nfunction parseInput() {\r\n  const raw = readStdin();\r\n  if (!raw) return {};\r\n  try { return JSON.parse(raw); } catch (_e) { return {}; }\r\n}\r\n\r\n// Resolve the project&#39;s 93-Scripts folder. Folder is stable (_00-Project-Management),\r\n// scripts subfolder defaults to 93-Scripts but honours a `paths.scripts` override.\r\nfunction scriptsDir(cwd) {\r\n  let sub = &#39;93-Scripts&#39;;\r\n  try {\r\n    const cfgPath = path.join(cwd, &#39;.claude-pm-config.json&#39;);\r\n    if (fs.existsSync(cfgPath)) {\r\n      const cfg = JSON.parse(fs.readFileSync(cfgPath, &#39;utf8&#39;));\r\n      if (cfg &amp;&amp; cfg.paths &amp;&amp; typeof cfg.paths.scripts === &#39;string&#39; &amp;&amp; cfg.paths.scripts) sub = cfg.paths.scripts;\r\n    }\r\n  } catch (_e) { /* ignore — fall back to default */ }\r\n  return path.join(cwd, &#39;_00-Project-Management&#39;, sub);\r\n}\r\n\r\nfunction runNode(scriptFile, cwd) {\r\n  const full = path.join(scriptsDir(cwd), scriptFile);\r\n  if (!fs.existsSync(full)) return 0; // kit scripts not installed here — nothing to do\r\n  const r = cp.spawnSync(process.execPath, [full], { cwd, encoding: &#39;utf8&#39; });\r\n  if (r.stdout) process.stdout.write(r.stdout);\r\n  if (r.stderr) process.stderr.write(r.stderr);\r\n  return typeof r.status === &#39;number&#39; ? r.status : 0;\r\n}\r\n\r\nfunction gitChangedPM(cwd) {\r\n  const variants = [\r\n    [&#39;diff&#39;, &#39;--name-only&#39;, &#39;HEAD&#39;, &#39;--&#39;, &#39;_00-Project-Management/&#39;],\r\n    [&#39;diff&#39;, &#39;--cached&#39;, &#39;--name-only&#39;, &#39;--&#39;, &#39;_00-Project-Management/&#39;],\r\n  ];\r\n  for (const args of variants) {\r\n    try {\r\n      const r = cp.spawnSync(&#39;git&#39;, args, { cwd, encoding: &#39;utf8&#39; });\r\n      if (r.status === 0 &amp;&amp; r.stdout &amp;&amp; r.stdout.trim()) return true;\r\n    } catch (_e) { /* git absent — skip */ }\r\n  }\r\n  return false;\r\n}\r\n\r\nfunction loadCfg(cwd) {\r\n  try {\r\n    const p = path.join(cwd, &#39;.claude-pm-config.json&#39;);\r\n    return fs.existsSync(p) ? (JSON.parse(fs.readFileSync(p, &#39;utf8&#39;)) || {}) : {};\r\n  } catch (_e) { return {}; }\r\n}\r\n\r\nfunction main() {\r\n  const event = process.argv[2];\r\n  const input = parseInput();\r\n  const cwd = input.cwd || process.cwd();\r\n\r\n  if (event === &#39;post-tool-use&#39;) {\r\n    const fp = (input.tool_input &amp;&amp; input.tool_input.file_path) || &#39;&#39;;\r\n    if (fp.replace(/\\\\/g, &#39;/&#39;).includes(&#39;_00-Project-Management/&#39;)) {\r\n      process.exit(runNode(&#39;validate-frontmatter.js&#39;, cwd));\r\n    }\r\n    process.exit(0);\r\n  }\r\n\r\n  if (event === &#39;stop&#39;) {\r\n    if (gitChangedPM(cwd)) {\r\n      runNode(&#39;generate-dashboard.js&#39;, cwd);\r\n      // Phase-4 nudge — opt-in, warn-only, never blocks.\r\n      const cfg = loadCfg(cwd);\r\n      if (cfg.claude_md_nudge === true) {\r\n        const auditPath = path.join(scriptsDir(cwd), &#39;claude-audit.js&#39;);\r\n        if (fs.existsSync(auditPath)) {\r\n          try {\r\n            const r = cp.spawnSync(process.execPath, [auditPath, &#39;--json&#39;], { cwd, encoding: &#39;utf8&#39; });\r\n            const arr = JSON.parse(r.stdout || &#39;[]&#39;);\r\n            const n = (Array.isArray(arr) ? arr : []).filter(x =&gt; x &amp;&amp; x.state === &#39;incomplete&#39;).length;\r\n            if (n &gt; 0) console.error(`⚠ ${n} CLAUDE.md file(s) look incomplete — run /fill-claude-md (or: npm run pm:claude-audit).`);\r\n          } catch (_e) { /* advisory only — swallow */ }\r\n        }\r\n      }\r\n    }\r\n    process.exit(0);\r\n  }\r\n\r\n  // Unknown event — no-op.\r\n  process.exit(0);\r\n}\r\n\r\nmain();\r\n</code></pre>","href":""},{"id":"install","title":"install","file":"_00-Project-Management/93-Scripts/install.js","ext":"js","bodyHtml":"<pre><code class=\"lang-js\">#!/usr/bin/env node\r\n/**\r\n * install.js — wire the PM kit into a host project (idempotent).\r\n *\r\n * Does the steps that were previously buried in BOOTSTRAP prose and easy to skip:\r\n *   1. merge the `pm:*` scripts into the host root package.json (adds only what&#39;s\r\n *      missing — never overwrites an existing definition),\r\n *   2. write the declared path map `90-Standards/pm-paths.json` for the target,\r\n *      using the detected (or --layout) preset, and pin the layout in\r\n *      `.claude-pm-config.json`,\r\n *   3. register the kit&#39;s Claude Code hooks into the target `.claude/settings.json`\r\n *      — GUARDED: only when the target has no existing hook registration, so a\r\n *      project that already gets hooks from the plugin (or a pasted scaffold\r\n *      settings.json) is not double-registered (the BACKLOG-0055 double-fire risk;\r\n *      ADR-0055).\r\n *\r\n * Run it again any time — every step is additive and idempotent. After it, run\r\n * `npm run pm:doctor` (doctor.js).\r\n *\r\n * Canonical entrypoint (ADR-0054): this file — and doctor.js — supersede the\r\n * v2.4.0 `pm-install.js` / `pm-doctor.js` spike, which used a `--root` seam and\r\n * pinned only `.claude-pm-config.json`. `--root` is still accepted as an alias of\r\n * `--target` so existing muscle memory / docs keep working.\r\n *\r\n * Usage: node _00-Project-Management/93-Scripts/install.js   (npm run pm:install)\r\n *        --target &lt;dir&gt; | --root &lt;dir&gt;   install into a different project root\r\n *        --layout full|flattened         pin a layout instead of auto-detecting\r\n *        --dry-run                        print what would change, write nothing\r\n * Exit codes: 0 = done (or dry-run) · 1 = nothing to write into (no package.json) · 2 = bad args.\r\n * Dependency-free — Node stdlib only.\r\n */\r\n&#39;use strict&#39;;\r\n\r\nconst fs = require(&#39;fs&#39;);\r\nconst path = require(&#39;path&#39;);\r\nconst { detectLayout, PRESETS } = require(&#39;./lib/pm-paths&#39;);\r\n\r\n// pm:* scripts wired into a host package.json. pm:install / pm:doctor point at the\r\n// canonical install.js / doctor.js (ADR-0054), not the retired pm-*.js names.\r\nconst SCRIPTS = {\r\n  &#39;pm:lint&#39;: &#39;validate-frontmatter.js&#39;,\r\n  &#39;pm:dash&#39;: &#39;generate-dashboard.js&#39;,\r\n  &#39;pm:monitor&#39;: &#39;generate-monitor.js&#39;,\r\n  &#39;pm:map&#39;: &#39;generate-codebase-map.js&#39;,\r\n  &#39;pm:doctor&#39;: &#39;doctor.js&#39;,\r\n  &#39;pm:install&#39;: &#39;install.js&#39;,\r\n  &#39;pm:claude-scaffold&#39;: &#39;claude-scaffold.js&#39;,\r\n  &#39;pm:claude-audit&#39;: &#39;claude-audit.js&#39;,\r\n};\r\n\r\n// The kit&#39;s Claude Code hooks, written into a target&#39;s .claude/settings.json ONLY\r\n// when it has none (guarded write — ADR-0055). Cross-platform Node entrypoint per\r\n// ADR-0053; ${CLAUDE_PROJECT_DIR} is resolved by Claude Code at run time.\r\nfunction hooksBlock() {\r\n  const cmd = (event) =&gt; `node &quot;${&#39;${CLAUDE_PROJECT_DIR}&#39;}/_00-Project-Management/93-Scripts/hook.js&quot; ${event}`;\r\n  return {\r\n    PostToolUse: [{ matcher: &#39;Write|Edit&#39;, hooks: [{ type: &#39;command&#39;, command: cmd(&#39;post-tool-use&#39;) }] }],\r\n    Stop: [{ hooks: [{ type: &#39;command&#39;, command: cmd(&#39;stop&#39;) }] }],\r\n  };\r\n}\r\n\r\nfunction parseArgs() {\r\n  const argv = process.argv.slice(2);\r\n  const out = { root: null, layout: null, dryRun: false };\r\n  for (let i = 0; i &lt; argv.length; i++) {\r\n    const a = argv[i];\r\n    if (a === &#39;--target&#39; || a === &#39;--root&#39;) {\r\n      out.root = argv[++i];\r\n      if (!out.root || out.root.startsWith(&#39;--&#39;)) { console.error(`✗ ${a} requires a path`); process.exit(2); }\r\n    } else if (a === &#39;--layout&#39;) {\r\n      out.layout = argv[++i];\r\n      if (!PRESETS[out.layout]) { console.error(`✗ --layout must be one of: ${Object.keys(PRESETS).join(&#39;, &#39;)}`); process.exit(2); }\r\n    } else if (a === &#39;--dry-run&#39;) { out.dryRun = true; }\r\n    else { console.error(`✗ unknown arg: ${a}`); process.exit(2); }\r\n  }\r\n  return out;\r\n}\r\n\r\n// Write `content` to `p` only if it differs from what&#39;s on disk — keeps re-runs a\r\n// true no-op (idempotency, AC-4). Returns true if it wrote.\r\nfunction writeIfChanged(p, content) {\r\n  try { if (fs.existsSync(p) &amp;&amp; fs.readFileSync(p, &#39;utf8&#39;) === content) return false; } catch (_e) { /* fall through to write */ }\r\n  fs.mkdirSync(path.dirname(p), { recursive: true });\r\n  fs.writeFileSync(p, content, &#39;utf8&#39;);\r\n  return true;\r\n}\r\n\r\nfunction readJson(p) { try { return JSON.parse(fs.readFileSync(p, &#39;utf8&#39;)); } catch (_e) { return null; } }\r\n\r\n// Read an existing JSON object strictly: a MISSING file → {} (we&#39;ll create it), but a\r\n// present-but-malformed file is FATAL (exit 1) rather than silently treated as empty.\r\n// Critical for .claude/settings.json — overwriting an unparseable settings.json would\r\n// destroy the user&#39;s permissions.deny (the exact key AC-2 promises to preserve). Same\r\n// guard for .claude-pm-config.json so a corrupt custom `paths` map isn&#39;t clobbered.\r\nfunction readJsonStrict(p, label) {\r\n  if (!fs.existsSync(p)) return {};\r\n  let obj;\r\n  try { obj = JSON.parse(fs.readFileSync(p, &#39;utf8&#39;)); }\r\n  catch (e) { console.error(`✗ Malformed ${label}: ${e.message}. Fix or remove it, then re-run pm:install (refusing to overwrite to preserve its contents).`); process.exit(1); }\r\n  if (!obj || typeof obj !== &#39;object&#39; || Array.isArray(obj)) {\r\n    console.error(`✗ ${label} must be a JSON object. Fix or remove it, then re-run pm:install.`); process.exit(1);\r\n  }\r\n  return obj;\r\n}\r\n\r\nfunction main() {\r\n  const args = parseArgs();\r\n  const REPO_ROOT = args.root ? path.resolve(args.root) : path.resolve(__dirname, &#39;..&#39;, &#39;..&#39;);\r\n  const PM_ROOT = path.join(REPO_ROOT, &#39;_00-Project-Management&#39;);\r\n  const changes = [];\r\n  const skipped = [];\r\n\r\n  // ---- 1. package.json scripts (additive; never overwrite) ----\r\n  const pkgPath = path.join(REPO_ROOT, &#39;package.json&#39;);\r\n  if (!fs.existsSync(pkgPath)) {\r\n    console.error(`✗ No package.json at ${REPO_ROOT}. Run \\`npm init -y\\` first, then re-run pm:install.`);\r\n    process.exit(1);\r\n  }\r\n  let pkg;\r\n  try { pkg = JSON.parse(fs.readFileSync(pkgPath, &#39;utf8&#39;)); } catch (e) { console.error(`✗ Malformed package.json: ${e.message}`); process.exit(1); }\r\n  pkg.scripts = pkg.scripts || {};\r\n  const added = [];\r\n  for (const [name, file] of Object.entries(SCRIPTS)) {\r\n    const cmd = `node _00-Project-Management/93-Scripts/${file}`;\r\n    if (!pkg.scripts[name]) { pkg.scripts[name] = cmd; added.push(name); }\r\n  }\r\n  if (!pkg.scripts[&#39;pm:all&#39;]) { pkg.scripts[&#39;pm:all&#39;] = &#39;npm run pm:lint &amp;&amp; npm run pm:monitor &amp;&amp; npm run pm:dash&#39;; added.push(&#39;pm:all&#39;); }\r\n  const pkgContent = JSON.stringify(pkg, null, 2) + &#39;\\n&#39;;\r\n\r\n  // ---- 2. layout: pin .claude-pm-config.json + write 90-Standards/pm-paths.json ----\r\n  const cfgPath = path.join(REPO_ROOT, &#39;.claude-pm-config.json&#39;);\r\n  const cfg = readJsonStrict(cfgPath, &#39;.claude-pm-config.json&#39;);\r\n  const layout = args.layout || cfg.layout || detectLayout(PM_ROOT) || &#39;full&#39;;\r\n  cfg.layout = layout;\r\n  const cfgContent = JSON.stringify(cfg, null, 2) + &#39;\\n&#39;;\r\n  const pathsCfgPath = path.join(PM_ROOT, &#39;90-Standards&#39;, &#39;pm-paths.json&#39;);\r\n  const pathsContent = JSON.stringify({ layout, paths: { ...PRESETS[layout] } }, null, 2) + &#39;\\n&#39;;\r\n\r\n  // ---- 3. hooks: guarded write into target .claude/settings.json (ADR-0055) ----\r\n  const settingsPath = path.join(REPO_ROOT, &#39;.claude&#39;, &#39;settings.json&#39;);\r\n  const settings = readJsonStrict(settingsPath, &#39;.claude/settings.json&#39;);\r\n  const alreadyHooked = settings.hooks &amp;&amp; typeof settings.hooks === &#39;object&#39; &amp;&amp; Object.keys(settings.hooks).length &gt; 0;\r\n  let settingsContent = null;\r\n  if (!alreadyHooked) {\r\n    settings.hooks = hooksBlock();\r\n    settingsContent = JSON.stringify(settings, null, 2) + &#39;\\n&#39;;\r\n  }\r\n\r\n  // ---- apply (or dry-run) ----\r\n  console.log(`pm:install — wiring ${path.basename(REPO_ROOT)} (layout: ${layout})\\n`);\r\n\r\n  const plan = [\r\n    { path: pkgPath, content: pkgContent, label: added.length ? `package.json → added scripts: ${added.join(&#39;, &#39;)}` : null },\r\n    { path: cfgPath, content: cfgContent, label: cfg.layout !== readJson(cfgPath)?.layout ? `.claude-pm-config.json → layout: &quot;${layout}&quot;` : null },\r\n    { path: pathsCfgPath, content: pathsContent, label: &#39;pm-paths.json&#39; },\r</code></pre>","href":""},{"id":"install-hooks","title":"install-hooks","file":"_00-Project-Management/93-Scripts/install-hooks.js","ext":"js","bodyHtml":"<pre><code class=\"lang-js\">#!/usr/bin/env node\r\n/**\r\n * install-hooks.js\r\n *\r\n * Copy the PM-KIT pre-commit hook into the host repo&#39;s .git/hooks/ and make it\r\n * executable. Graceful no-op when not inside a git repo. Never overwrites a\r\n * pre-existing non-PM-kit hook. Re-runnable (idempotent).\r\n *\r\n * Usage: node install-hooks.js [--root &lt;dir&gt;]\r\n *   --root &lt;dir&gt;   repo root whose .git/hooks/ to install into\r\n *                  (default: two levels above this script)\r\n *\r\n * Dependency-free — Node stdlib only.\r\n */\r\n&#39;use strict&#39;;\r\n\r\nconst fs = require(&#39;fs&#39;);\r\nconst path = require(&#39;path&#39;);\r\nconst { execFileSync } = require(&#39;child_process&#39;);\r\n\r\n// Signature line both the hook and this installer recognise as &quot;PM-kit owns\r\n// this hook&quot; — gate for safe overwrite vs. preserving a foreign hook.\r\nconst HOOK_SIGNATURE = &#39;PM-KIT pre-commit hook&#39;;\r\n\r\nfunction parseArgs(argv) {\r\n  const args = { root: path.resolve(__dirname, &#39;..&#39;, &#39;..&#39;) };\r\n  for (let i = 0; i &lt; argv.length; i++) {\r\n    if (argv[i] === &#39;--root&#39; &amp;&amp; argv[i + 1]) args.root = path.resolve(argv[++i]);\r\n  }\r\n  return args;\r\n}\r\n\r\n// Resolve the actual git dir (honours worktrees / `.git` files). Returns null\r\n// when not a git repo or git is unavailable.\r\nfunction gitDir(root) {\r\n  try {\r\n    const out = execFileSync(&#39;git&#39;, [&#39;rev-parse&#39;, &#39;--git-dir&#39;], { cwd: root, encoding: &#39;utf8&#39; });\r\n    return path.resolve(root, out.trim());\r\n  } catch {\r\n    return null;\r\n  }\r\n}\r\n\r\nfunction main() {\r\n  const args = parseArgs(process.argv.slice(2));\r\n  const gd = gitDir(args.root);\r\n  if (!gd) {\r\n    console.log(&#39;Not a git repo (or git unavailable) — skipping hook install.&#39;);\r\n    process.exit(0);\r\n  }\r\n  const src = path.join(__dirname, &#39;hooks&#39;, &#39;pre-commit&#39;);\r\n  const hooksDir = path.join(gd, &#39;hooks&#39;);\r\n  const dest = path.join(hooksDir, &#39;pre-commit&#39;);\r\n  fs.mkdirSync(hooksDir, { recursive: true });\r\n  if (fs.existsSync(dest)) {\r\n    const existing = fs.readFileSync(dest, &#39;utf8&#39;);\r\n    if (!existing.includes(HOOK_SIGNATURE)) {\r\n      console.log(`A non-PM-kit pre-commit hook already exists at ${dest} — not overwriting.`);\r\n      console.log(&#39;Add this line to it manually: node _00-Project-Management/93-Scripts/install-hooks.js&#39;);\r\n      process.exit(0);\r\n    }\r\n  }\r\n  fs.copyFileSync(src, dest);\r\n  try { fs.chmodSync(dest, 0o755); } catch { /* windows / no-chmod fs — ignore */ }\r\n  console.log(`Installed PM-kit pre-commit hook → ${dest}`);\r\n}\r\n\r\nmain();\r\n</code></pre>","href":""},{"id":"README","title":"93-Scripts","file":"_00-Project-Management/93-Scripts/README.md","ext":"md","bodyHtml":"<h1>93-Scripts</h1>\n<p>Validation and reporting helpers. Dependency-free Node.js (stdlib only).</p>\n<h2>Scripts</h2>\n<h3><code>validate-frontmatter.js</code></h3>\n<p>Lints YAML frontmatter across the PM folder against the rules in <code>90-Standards/SOP.md</code>.</p>\n<p><strong>Run:</strong></p>\n<pre><code class=\"lang-bash\">npm run pm:lint</code></pre>\n<h3><code>generate-dashboard.js</code></h3>\n<p>Builds an interactive single-file HTML dashboard at <code>42-Monitor/DASHBOARD.html</code> from the current artefact state. Embeds CSS + JS + data inline — no external assets, no build step. Open directly in a browser.</p>\n<p><strong>Run:</strong></p>\n<pre><code class=\"lang-bash\">npm run pm:dash</code></pre>\n<p><strong>What it shows:</strong></p>\n<ul>\n<li><strong>Overview tab</strong> — KPI cards (in-progress, in-review, blocked, ready, 30-day velocity, avg cycle time, epics-without-OKR), status-distribution bars per artefact type, attention list (stalled stories, blocked work, missing strategic linkage).</li>\n<li><strong>One tab per artefact type</strong> — Epics, Features, Stories, Testplans, Bugs, Backlog, Decisions, Releases, Retros. Filterable by status pill. Searchable. Click any row to open a side drawer with the full markdown body rendered.</li>\n</ul>\n<p>Regenerate whenever artefact state changes — the close-out and weekly-monitor prompts wire this in automatically.</p>\n<p><strong>Wire into the project&#39;s root <code>package.json</code>:</strong></p>\n<pre><code class=\"lang-json\">{\n  &quot;scripts&quot;: {\n    &quot;pm:lint&quot;: &quot;node _00-Project-Management/93-Scripts/validate-frontmatter.js&quot;,\n    &quot;pm:dash&quot;: &quot;node _00-Project-Management/93-Scripts/generate-dashboard.js&quot;,\n    &quot;pm:all&quot;:  &quot;npm run pm:lint &amp;&amp; npm run pm:dash&quot;\n  }\n}</code></pre>\n<p><strong>Wire into Husky pre-commit (recommended once stable):</strong></p>\n<pre><code class=\"lang-bash\">npx husky add .husky/pre-commit &quot;npm run pm:all&quot;</code></pre>\n<h2>Rules enforced</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>Rule</th><th>Description</th></tr></thead><tbody><tr><td>R0</td><td>Frontmatter present and parseable</td></tr><tr><td>R1</td><td><code>status</code> is one of the 9 enum values</td></tr><tr><td>R2</td><td><code>created_at</code> non-empty and ISO 8601 with offset</td></tr><tr><td>R3</td><td><code>status=in-progress</code> implies <code>started_at</code> set</td></tr><tr><td>R4</td><td>Terminal status (done/wontfix/duplicate/archived) implies <code>completed_at</code> set</td></tr><tr><td>R5</td><td><code>status=not-started</code> implies <code>started_at</code> and <code>completed_at</code> empty</td></tr><tr><td>R6</td><td>Story has a paired TESTPLAN at the mirrored path</td></tr><tr><td>R7</td><td>Testplan&#39;s <code>story:</code> references an existing STORY file</td></tr><tr><td>R8</td><td>Bug&#39;s <code>story:</code> and <code>testplan:</code> reference existing files</td></tr><tr><td>R9</td><td>Epic has <code>okr:</code> or <code>prd_section:</code> (strategy linkage)</td></tr><tr><td>R10</td><td>Frontmatter <code>id:</code> matches filename&#39;s ID portion</td></tr><tr><td>R11</td><td>Story has <code>estimate:</code> in {XS, S, M, L}; XL flagged</td></tr><tr><td>R12</td><td>Feature&#39;s <code>epic:</code> references an existing EPIC file</td></tr></tbody></table></div>\n<h2>Detection library (<code>lib/</code>)</h2>\n<p>Shared by the CLAUDE.md-layer automation (scaffold / audit / git hook in Plan 2).</p>\n<h3><code>lib/detect-boundaries.js</code></h3>\n<p>Scans a repo for directories that should carry a <code>CLAUDE.md</code>, by package manifest (<code>package.json</code>, <code>pyproject.toml</code>, <code>Cargo.toml</code>, <code>go.mod</code>, <code>*.csproj</code>, <code>pom.xml</code>, <code>build.gradle</code>, <code>Gemfile</code>, <code>composer.json</code>) or workspace declaration (<code>pnpm-workspace.yaml</code>, <code>turbo.json</code>, <code>lerna.json</code>, <code>go.work</code>, <code>nx.json</code>). Repo root is always a candidate.</p>\n<pre><code class=\"lang-bash\">node _00-Project-Management/93-Scripts/lib/detect-boundaries.js --root . --json</code></pre>\n<p>Each candidate: <code>{ path, manifest, framework, scripts }</code>. Paths are repo-relative with a leading slash; output is sorted. Skips <code>node_modules</code>, <code>.git</code>, build output, dotdirs, and bare folder names listed in <code>.gitignore</code>.</p>\n<h3><code>lib/claude-config.js</code></h3>\n<p>Reads/writes <code>.claude-pm-config.json</code> (the persisted include/exclude boundary decisions) and exposes <code>decideStatus(cfg, path)</code> → <code>included</code> | <code>excluded</code> | <code>undecided</code>.</p>\n<h2>Exit codes</h2>\n<ul>\n<li><code>0</code> — no violations</li>\n<li><code>1</code> — violations found (numbered report printed)</li>\n<li><code>2</code> — script error (couldn&#39;t read PM folder)</li>\n</ul>\n<h2>Adding new rules</h2>\n<p>Add a check inside <code>checkFile()</code> in <code>validate-frontmatter.js</code>. Use the <code>violate(filepath, ruleId, message)</code> helper. Document the new rule here.</p>\n","href":""},{"id":"validate-frontmatter","title":"validate-frontmatter","file":"_00-Project-Management/93-Scripts/validate-frontmatter.js","ext":"js","bodyHtml":"<pre><code class=\"lang-js\">#!/usr/bin/env node\r\n/**\r\n * validate-frontmatter.js\r\n *\r\n * Lints YAML frontmatter across the PM folder against the rule set\r\n * (R0–R15, R15b, R16, R17, R18, R19) defined in 90-Standards/SOP.md and the\r\n * CLAUDE.md project rules.\r\n *\r\n * Usage: node _00-Project-Management/93-Scripts/validate-frontmatter.js\r\n *        npm run pm:lint    (wired in package.json)\r\n *        node ...validate-frontmatter.js --fixtures-dir &lt;dir&gt;   (scan an isolated\r\n *            fixtures dir instead of the PM folder — used by R15 test fixtures)\r\n *\r\n * Exit codes:\r\n *   0 — no violations\r\n *   1 — violations found (prints numbered report)\r\n *   2 — script error (couldn&#39;t read PM folder, etc.)\r\n *\r\n * Dependency-free — uses only Node.js stdlib (fs, path).\r\n */\r\n\r\n&#39;use strict&#39;;\r\n\r\nconst fs = require(&#39;fs&#39;);\r\nconst path = require(&#39;path&#39;);\r\n\r\n// ---------- Config ----------\r\n\r\nconst STATUS_ENUM = new Set([\r\n  &#39;not-started&#39;, &#39;ready&#39;, &#39;in-progress&#39;, &#39;in-review&#39;,\r\n  &#39;done&#39;, &#39;blocked&#39;, &#39;wontfix&#39;, &#39;duplicate&#39;, &#39;archived&#39;\r\n]);\r\n\r\nconst ESTIMATE_ENUM = new Set([&#39;XS&#39;, &#39;S&#39;, &#39;M&#39;, &#39;L&#39;, &#39;XL&#39;]);\r\n\r\nconst TERMINAL_STATUSES = new Set([&#39;done&#39;, &#39;wontfix&#39;, &#39;duplicate&#39;, &#39;archived&#39;]);\r\n\r\n// WIP limits per SOP §5 — applied across stories only (epics/features have no WIP).\r\nconst WIP_LIMITS = {\r\n  &#39;in-progress&#39;: 2,\r\n  &#39;in-review&#39;: 3,\r\n  &#39;blocked&#39;: 5,\r\n};\r\n\r\n// Valid ai_review values per SOP §7 + STORY template frontmatter contract.\r\n// `pending` is allowed while status != done; only `done` stories must have a\r\n// terminal value here.\r\nconst AI_REVIEW_TERMINAL = new Set([\r\n  &#39;completed&#39;, // matched by prefix: completed-YYYY-MM-DD\r\n  &#39;skipped-trivial&#39;,\r\n  &#39;n-a&#39;,\r\n]);\r\n\r\n// R15b rollout cutoff (ADR-0013). The &quot;completed review must carry an\r\n// ai_review_artefact&quot; presence check only fires for stories whose created_at date is\r\n// on or after this date. Stories created earlier are grandfathered — they closed\r\n// legitimately before AI-CODE-REVIEW.template.html existed and must not retroactively\r\n// fail pm:lint. Do NOT &quot;tidy away&quot; this constant; see ADR-0013 for the rationale and the\r\n// review trigger for when it can be removed.\r\nconst R15B_PRESENCE_CUTOFF = &#39;2026-05-24&#39;;\r\n\r\n// Resolve PM folder relative to this script&#39;s location.\r\nconst PM_ROOT = path.resolve(__dirname, &#39;..&#39;);\r\n\r\n// Resolve logical PM sub-folder names through the layout map (full / flattened /\r\n// custom). PATHS.&lt;logical&gt; → physical folder name for this project. See lib/pm-paths.js.\r\nconst { loadPaths, SCAN_KEYS } = require(&#39;./lib/pm-paths&#39;);\r\nconst PATHS = loadPaths(PM_ROOT).map;\r\n\r\n// Artefact-bearing folders the linter scans. Map the canonical SCAN_KEYS order\r\n// (backlog, epics, features, stories, testplans, bugs, decisions) through the layout\r\n// map so the full layout yields exactly the 7 historical names in the same order,\r\n// while a flattened/custom layout yields its own folder names. We map all 7 keys\r\n// (rather than using scanDirs, which drops non-existent dirs) so behaviour is\r\n// unchanged — walk() already skips folders that don&#39;t exist on disk.\r\nconst SCAN_DIRS = SCAN_KEYS.map(k =&gt; PATHS[k]);\r\n\r\n// ---------- CLI args ----------\r\n// --fixtures-dir &lt;path&gt;  scan a flat fixtures dir instead of PM_ROOT; resolve\r\n//                        R15&#39;s html_artefacts paths relative to that dir\r\n//                        (lets tests stay self-contained, no real repo files).\r\n// --manifest-dir &lt;path&gt;  override the base dir for manifest-parity checks (version-parity gate).\r\n//                        If absent, uses repo root. Allows testing with fixture manifests.\r\nlet FIXTURES_DIR = null;\r\nlet MANIFEST_DIR = null;\r\n{\r\n  const argv = process.argv.slice(2);\r\n  for (let i = 0; i &lt; argv.length; i++) {\r\n    if (argv[i] === &#39;--fixtures-dir&#39;) {\r\n      const val = argv[i + 1];\r\n      // Guard: a present-but-valueless flag must NOT silently fall back to scanning\r\n      // the real PM folder (a typo&#39;d flag would otherwise run against production data).\r\n      if (!val || val.startsWith(&#39;--&#39;)) {\r\n        console.error(&#39;✗ --fixtures-dir requires a directory path argument&#39;);\r\n        process.exit(2);\r\n      }\r\n      FIXTURES_DIR = path.resolve(val);\r\n    } else if (argv[i] === &#39;--manifest-dir&#39;) {\r\n      const val = argv[i + 1];\r\n      if (!val || val.startsWith(&#39;--&#39;)) {\r\n        console.error(&#39;✗ --manifest-dir requires a directory path argument&#39;);\r\n        process.exit(2);\r\n      }\r\n      MANIFEST_DIR = path.resolve(val);\r\n    }\r\n  }\r\n}\r\n\r\n// Base for `rel()` paths in messages.\r\nconst REL_BASE = FIXTURES_DIR || PM_ROOT;\r\n// Repo root used to resolve R15&#39;s html_artefacts entries.\r\nconst REPO_ROOT = FIXTURES_DIR || path.resolve(PM_ROOT, &#39;..&#39;);\r\n\r\n// ------- function groupAdrsBy(list){
  var byStatus = {};
  var statusSeq = [];
  list.forEach(function(r){
    var s = (r.adr_status || r.status || "unknown").toLowerCase().trim();
    if(!byStatus[s]){ byStatus[s] = []; statusSeq.push(s); }
    byStatus[s].push(r);
  });
  // Sort each bucket newest-first (created_at desc); items without a date
  // are pushed to the end, then tiebroken by id (deterministic stable sort).
  function dateSortKey(r){ var d = r.created_at||""; return d ? d : ""; }
  Object.keys(byStatus).forEach(function(s){
    byStatus[s].sort(function(a,b){
      var da = dateSortKey(a), db = dateSortKey(b);
      if(!da && !db) return String(a.id).localeCompare(String(b.id), "en", {numeric:true});
      if(!da) return 1; if(!db) return -1;
      if(db > da) return 1; if(da > db) return -1;
      return String(a.id).localeCompare(String(b.id), "en", {numeric:true});
    });
  });
  // Sort status buckets by ADR_STATUS_ORDER; unknown statuses go last, alpha.
  statusSeq.sort(function(a,b){
    var ia = ADR_STATUS_ORDER.indexOf(a), ib = ADR_STATUS_ORDER.indexOf(b);
    if(ia===-1 && ib===-1) return a.localeCompare(b);
    if(ia===-1) return 1; if(ib===-1) return -1;
    return ia - ib;

    byPri[p].push(r);

  Object.keys(byPri).forEach(function(p){
    byPri[p].sort(function(a,b){ return String(a.id).localeCompare(String(b.id), "en", {numeric:true}); });
  });

  priSeq.sort(function(a,b){
    var ia = BACKLOG_PRIORITY_ORDER.indexOf(a), ib = BACKLOG_PRIORITY_ORDER.indexOf(b);
    if(ia===-1 && ib===-1) return a.localeCompare(b);
    if(ia===-1) return 1; if(ib===-1) return -1;

function tileList(items, typeOrFn, opts){
  opts = opts || {};
  if(!items.length) return '<div class="empty">' + escHtml(opts.emptyMsg||"Nothing here yet.") + '</div>';
  var resolveType = typeof typeOrFn === "function" ? typeOrFn : function(){ return typeOrFn; };
  return '<div class="tile-grid stagger">' + items.map(function(it){
    var t = resolveType(it);
    var extra = "";
    if(it.status) extra += pill(it.status);
    if(opts.showAge && it._ageDays != null){
      var cls = it._ageDays >= 30 ? "danger" : "warn";
      extra += ' <span class="age-ribbon ' + cls + '">' + it._ageDays + 'd</span>';
    }
    if(opts.showExt && it.ext){
      extra += ' <span class="ext-badge ' + escHtml(it.ext) + '">' + escHtml(it.ext) + '</span>';
    }
    var sub = "";
    if(opts.showType && it._type) sub = '<span class="meta">' + escHtml(it._type) + '</span>';
    var idTxt = it.id || it.name || "";
    var titleTxt = it.title || it.name || idTxt;
    var isHtmlRef = opts.useHrefAnchor && it.href && /\.html?$/i.test(it.file || it.name || "");
    if(isHtmlRef){
      return '<a class="tile reveal" href="' + escHtml(it.href) + '" target="_blank" rel="noopener" style="text-decoration:none; color:inherit;"><div class="tile-head"><span class="tile-id">' + escHtml(idTxt) + '</span><span class="tile-extra">' + extra + '</span></div><div class="tile-title">' + escHtml(titleTxt) + sub + '</div></a>';
    }
    return '<div class="tile reveal" data-type="' + escHtml(t) + '" data-id="' + escHtml(idTxt) + '"><div class="tile-head"><span class="tile-id">' + escHtml(idTxt) + '</span><span class="tile-extra">' + extra + '</span></div><div class="tile-title">' + escHtml(titleTxt) + sub + '</div></div>';
  }).join("") + '</div>';
}

  if(!audits.length){ root.innerHTML = '<div class="panel"><h3>Audits</h3><div class="empty">No audits in 41-Reports/ yet.</div></div>'; return; }
  var html = '<div class="tile-grid stagger">';
  html += audits.map(function(a){
    var extMatch = (a.name.match(/\.[^.]+$/) || [""])[0].slice(1).toLowerCase();
    var isHtml = /\.html?$/i.test(a.name);
    if(isHtml){
      return '<a class="tile reveal" href="' + escHtml(a.href) + '" target="_blank" rel="noopener" style="text-decoration:none; color:inherit;"><div class="tile-head"><span class="tile-id">' + escHtml(a.kind) + '</span><span class="tile-extra"><span class="ext-badge ' + escHtml(extMatch) + '">' + escHtml(extMatch) + '</span></span></div><div class="tile-title">' + escHtml(a.name) + '</div></a>';
    }
    return '<div class="tile reveal" data-type="audits" data-id="' + escHtml(a.name) + '"><div class="tile-head"><span class="tile-id">' + escHtml(a.kind) + '</span><span class="tile-extra"><span class="ext-badge ' + escHtml(extMatch) + '">' + escHtml(extMatch) + '</span></span></div><div class="tile-title">' + escHtml(a.name) + '</div></div>';
  }).join("");
  html += '</div>';
  root.innerHTML = html;
  bindRows(root);
};
function refRenderer(key, label){
  return function(root){
    var items = D[key] || [];
    var search = (STATE.search[key]||"").toLowerCase();
    var filtered = items.filter(function(s){ return !search || (s.id+s.title+(s.bodyHtml||"")).toLowerCase().indexOf(search)!==-1; });
    var controls = '<div class="controls reveal"><input class="search" type="search" placeholder="Search ' + escHtml(label) + '…" value="' + escHtml(STATE.search[key]||"") + '" data-scope="' + escHtml(key) + '"></div>';
    root.innerHTML = controls + tileList(filtered, key, { showExt:true, useHrefAnchor:true, emptyMsg:"No " + label + " yet." });
    bindRows(root); bindSearch(root);
  };
}
RENDERERS["toolkit:templates"] = refRenderer("templates", "Templates");
RENDERERS["toolkit:prompts"]   = refRenderer("prompts",   "Prompts");
RENDERERS["toolkit:scripts"]   = refRenderer("scripts",   "Scripts");
function bindSearch(root){
  $$(".search[data-scope]", root).forEach(function(inp){
    inp.addEventListener("input", function(){
      var scope = inp.dataset.scope;
      STATE.search[scope] = inp.value;
      renderActive();
      // Re-focus the new input element after re-render.
      setTimeout(function(){ var nf = $('.search[data-scope="' + scope + '"]', root); if(nf){ nf.focus(); nf.setSelectionRange(inp.value.length, inp.value.length); } }, 0);
    });
  });
}
var SEARCH_INDEX = null;
function buildSearchIndex(){
  if(SEARCH_INDEX) return SEARCH_INDEX;
  var idx = [];
  function add(items, type, kind){ (items||[]).forEach(function(it){ idx.push({ type:type, kind:kind, id:it.id||it.name||"", title:it.title||it.name||"", status:it.status||"", search:((it.id||"")+" "+(it.title||"")+" "+(it.status||"")+" "+(it.bodyHtml||"").replace(/<[^>]+>/g, " ")).toLowerCase() }); }); }
  add(D.epic, "epic", "EPIC");
  add(D.feature, "feature", "FEAT");
  add(D.story, "story", "STORY");
  add(D.testplan, "testplan", "TESTPLAN");
  add(D.bug, "bug", "BUG");
  add(D.adr, "adr", "ADR");
  add(D.backlog, "backlog", "BACKLOG");
  add(D.release, "release", "RELEASE");
  add(D.retro, "retro", "RETRO");
  add(D.strategy, "strategy", "STRATEGY");
  add(D.inbox, "inbox", "INBOX");
  add(D.specs, "spec", "SPEC");
  add(D.templates, "template", "TEMPLATE");
  add(D.prompts, "prompt", "PROMPT");
  add(D.scripts, "script", "SCRIPT");
  SEARCH_INDEX = idx;
  return idx;
}
function searchScore(item, q){
  if(!q) return 0;
  var s = item.search;
  if(s.indexOf(q) === -1) return -1;
  // Prefer matches in id/title over body.
  var idHit = (item.id||"").toLowerCase().indexOf(q) !== -1 ? 100 : 0;
  var titleHit = (item.title||"").toLowerCase().indexOf(q) !== -1 ? 50 : 0;
  return idHit + titleHit + 1;
}
function ensurePalette(){
  var bd = $("#cmdk-backdrop");
  if(bd) return bd;
  bd = el("div", { id:"cmdk-backdrop", class:"cmdk-backdrop" });
  bd.innerHTML = '<div class="cmdk" role="dialog" aria-modal="true" aria-label="Search palette"><input id="cmdk-input" class="cmdk-input" type="search" placeholder="Search every artefact…" autocomplete="off" spellcheck="false"><div id="cmdk-list" class="cmdk-list" role="listbox"></div><div class="cmdk-foot"><span><kbd>↑</kbd><kbd>↓</kbd> navigate</span><span><kbd>Enter</kbd> open</span><span><kbd>Esc</kbd> close</span></div></div>';
  document.body.appendChild(bd);
  bd.addEventListener("click", function(e){ if(e.target === bd) closePalette(); });
  var inp = $("#cmdk-input", bd);
  inp.addEventListener("input", renderPaletteResults);
  inp.addEventListener("keydown", paletteKeydown);
  return bd;
}
function openPalette(){
  STATE.palette = true;
  buildSearchIndex();
  var bd = ensurePalette();
  bd.classList.add("open");
  var inp = $("#cmdk-input", bd);
  inp.value = "";
  renderPaletteResults();
  setTimeout(function(){ inp.focus(); }, 30);
}
function closePalette(){
  STATE.palette = false;
  var bd = $("#cmdk-backdrop");
  if(bd) bd.classList.remove("open");
}
function renderPaletteResults(){
  var inp = $("#cmdk-input"); if(!inp) return;
  var q = (inp.value||"").trim().toLowerCase();
  var list = $("#cmdk-list");
  if(!q){ list.innerHTML = '<div class="cmdk-empty">Type to search across every epic, feature, story, ADR, bug, backlog, release, retro, strategy, inbox, spec, prompt, template, and script.</div>'; return; }
  var scored = buildSearchIndex().map(function(it){ return { item:it, score: searchScore(it, q) }; }).filter(function(x){ return x.score >= 0; }).sort(function(a,b){ return b.score - a.score; }).slice(0, 12);
  if(!scored.length){ list.innerHTML = '<div class="cmdk-empty">No matches for "' + escHtml(q) + '".</div>'; return; }
  list.innerHTML = scored.map(function(x, i){
    return '<div class="cmdk-item' + (i===0?" focused":"") + '" data-type="' + escHtml(x.item.type) + '" data-id="' + escHtml(x.item.id) + '" role="option"><span class="cmdk-kind">' + escHtml(x.item.kind) + '</span><span class="cmdk-id">' + escHtml(x.item.id) + '</span><span class="cmdk-title">' + escHtml(x.item.title) + '</span></div>';
  }).join("");
  $$(".cmdk-item", list).forEach(function(node){ node.addEventListener("click", function(){ activatePaletteItem(node); }); });
}
function activatePaletteItem(node){
  var type = node.getAttribute("data-type");
  var id = node.getAttribute("data-id");
  closePalette();
  openDrawer(type, id);
}
function paletteKeydown(e){
  var focused = $("#cmdk-list .cmdk-item.focused");
  var all = $$("#cmdk-list .cmdk-item");
  if(e.key === "ArrowDown"){ e.preventDefault(); if(!focused && all.length){ all[0].classList.add("focused"); return; } var i = all.indexOf(focused); var n = all[Math.min(i+1, all.length-1)]; if(n && n!==focused){ focused.classList.remove("focused"); n.classList.add("focused"); n.scrollIntoView({ block:"nearest" }); } }
  else if(e.key === "ArrowUp"){ e.preventDefault(); if(!focused) return; var j = all.indexOf(focused); var p = all[Math.max(j-1, 0)]; if(p && p!==focused){ focused.classList.remove("focused"); p.classList.add("focused"); p.scrollIntoView({ block:"nearest" }); } }
  else if(e.key === "Enter"){ e.preventDefault(); if(focused) activatePaletteItem(focused); }
  else if(e.key === "Escape"){ e.preventDefault(); closePalette(); }
}
var DRAWER_STACK = [];
function findArtefact(type, id){
  if(type==="ai-skill")   return (D.ai.skills||[]).find(function(x){ return x.name===id; });
  if(type==="ai-agent")   return (D.ai.agents||[]).find(function(x){ return x.name===id; });
  if(type==="ai-command") return (D.ai.commands||[]).find(function(x){ return x.name===id; });
  if(type==="ai-plugin")  return (D.ai.plugins||[]).find(function(x){ return x.name===id; });
  if(type==="impl"){
    var epics = (D.executionStrategy && D.executionStrategy.epics) || [];
    var scoped = STATE.implEpic ? epics.filter(function(e){ return e.epic === STATE.implEpic; }) : epics;
    var pool = scoped.length ? scoped : epics;
    for(var ei=0; ei<pool.length; ei++){
      var ph = pool[ei].phases || [];
      for(var pi=0; pi<ph.length; pi++){
        var cs = ph[pi].chats || [];
        for(var ci=0; ci<cs.length; ci++){ if(cs[ci].id === id) return cs[ci]; }
      }
    }
    return null;
  }
  if(type==="audits") return (D.audits||[]).find(function(x){ return x.name===id; });
  if(type==="reviews") return (D.reviews||[]).find(function(x){ return x.name===id; });
  var arr = D[type] || [];
  return arr.find(function(x){ return x.id===id; });
}
function showDrawerPanel(){ var d=$("#drawer"), m=$("#mask"); d.classList.add("open"); m.classList.add("open"); document.body.style.overflow="hidden"; $(".drawer-back", d).classList.toggle("show", DRAWER_STACK.length>1); d.scrollTo({top:0, behavior:"instant"}); }
function openDrawer(type, id, opts){
  opts = opts || {};
  var item = findArtefact(type, id);
  if(!item){ console.warn("No artefact for", type, id); return; }
  if(opts.replaceTop && DRAWER_STACK.length) DRAWER_STACK.pop();
  DRAWER_STACK.push({ render: function(){ renderDrawer(item, type); } });
  renderDrawer(item, type);
  showDrawerPanel();
}
function closeDrawer(){ var d=$("#drawer"); var m=$("#mask"); d.classList.remove("open"); m.classList.remove("open"); document.body.style.overflow=""; DRAWER_STACK=[]; }
function popDrawer(){ if(DRAWER_STACK.length>1){ DRAWER_STACK.pop(); DRAWER_STACK[DRAWER_STACK.length-1].render(); $(".drawer-back").classList.toggle("show", DRAWER_STACK.length>1); $("#drawer").scrollTo({top:0, behavior:"instant"}); } else { closeDrawer(); } }
function renderDrawer(item, type){
  var d = $("#drawer .drawer-titles");
  var idText = item.id || item.name || "";
  var titleText = item.title || item.name || "";
  d.querySelector(".drawer-id").textContent = idText;
  d.querySelector(".drawer-title").textContent = titleText;
  var meta = d.querySelector(".drawer-meta"); meta.innerHTML = "";
  if(item.status) meta.innerHTML += pill(item.status);
  if(item.severity) meta.innerHTML += sev(item.severity);
  if(item.source) meta.innerHTML += '<span class="tag source">' + escHtml(item.source) + '</span>';
  if(item.category) meta.innerHTML += '<span class="tag">' + escHtml(item.category) + '</span>';
  if(item.curated) meta.innerHTML += '<span class="tag star">★ curated</span>';
  if(item.mustKnow) meta.innerHTML += '<span class="tag must">must-know</span>';
  if(item.version) meta.innerHTML += '<span class="tag">v' + escHtml(item.version) + '</span>';
  var body = $("#drawer .drawer-body");
  var sections = "";
  if(item.outcome && !/^ai-/.test(type)) sections += '<p class="drawer-outcome"><span class="lab">Outcome</span> ' + escHtml(item.outcome) + '</p>';
  // Implementation chat drawer (execution-strategy chats)
  if(type==="impl"){
    var implSecs = "";
    if(item.outcome) implSecs += '<p class="drawer-outcome"><span class="lab">Outcome</span> ' + escHtml(item.outcome) + '</p>';
    implSecs += '<dl class="kv">';
    if(item.estimate) implSecs += '<dt>Estimate</dt><dd>' + escHtml(item.estimate) + '</dd>';
    if(item.executed != null) implSecs += '<dt>Executed</dt><dd>' + escHtml(String(item.executed)) + '</dd>';
    implSecs += '</dl>';
    if(item.trigger) implSecs += '<h3>Trigger / prompt</h3><pre class="drawer-pre">' + escHtml(item.trigger) + '</pre>';
    if(item.verify)  implSecs += '<h3>Verify</h3><pre class="drawer-pre">' + escHtml(item.verify) + '</pre>';
    if(item.stories && item.stories.length)   implSecs += '<h3>Stories</h3><p>' + item.stories.map(function(s){ var sid=(s&&s.id)?s.id:s; return '<code>' + escHtml(sid) + '</code>'; }).join(" ") + '</p>';
    if(item.sub_agents && item.sub_agents.length) implSecs += '<h3>Sub-agents</h3><p>' + item.sub_agents.map(function(s){ return '<code>' + escHtml(s) + '</code>'; }).join(" ") + '</p>';
    if(item.depends_on && item.depends_on.length) implSecs += '<h3>Depends on</h3><p>' + item.depends_on.map(function(s){ return '<code>' + escHtml(s) + '</code>'; }).join(" ") + '</p>';
    if(item.unlocks && item.unlocks.length)   implSecs += '<h3>Unlocks</h3><p>' + item.unlocks.map(function(s){ return '<code>' + escHtml(s) + '</code>'; }).join(" ") + '</p>';
    body.innerHTML = implSecs;
    wireDrawerLinks(body);
    return;
  }
  // Curated overlay block (AI)
  if(item.overlay){
    var ov = item.overlay;
    sections += '<div class="drawer-overlay"><div class="label">Curated guidance</div>';
    if(ov.when_to_use)    sections += '<p><strong>When to use:</strong> ' + escHtml(ov.when_to_use) + '</p>';
    if(ov.when_not_to_use)sections += '<p><strong>When NOT to use:</strong> ' + escHtml(ov.when_not_to_use) + '</p>';
    if(ov.bodyHtml) sections += ov.bodyHtml;
    sections += '</div>';
  }
  // SOP session-flow timeline (special-case for the kit's own plugin)
  if(type==="ai-plugin" && /Tandem/i.test(item.name||"")){
    sections += renderSessionFlow();
  }
  var isAi = /^ai-/.test(type);
  var aiKind = isAi ? type.slice(3) : "";
  // AI: full / upstream description (the frontmatter trigger text)
  if(isAi){
    var fullD = item.fullDescription || item.description || "";

  }

  if(aiKind==="skill" && item.subItems && item.subItems.length){
    sections += '<h3>Sub-commands · ' + item.subItems.length + '</h3>';
    sections += '<div class="subitems">' + item.subItems.map(function(s){ return '<div class="subitem" tabindex="0" role="button" data-sub-skill="' + escHtml(item.name) + '" data-sub-slug="' + escHtml(s.slug) + '"><div class="subitem-name">' + escHtml(s.slug) + (s.title && s.title!==s.slug ? ' <span class="subitem-title">' + escHtml(s.title) + '</span>' : "") + '</div>' + (s.desc ? '<div class="subitem-desc">' + escHtml(s.desc) + '</div>' : "") + '<div class="subitem-cta">Open reference →</div></div>'; }).join("") + '</div>';

    if(item.examples && item.examples.length){
      sections += '<h3>Trigger examples · ' + item.examples.length + '</h3>';
      sections += item.examples.map(function(ex){ return '<div class="drawer-example">' + (ex.context ? '<div class="ex-label">Context</div><div class="ex-body">' + escHtml(ex.context) + '</div>' : "") + (ex.user ? '<div class="ex-label">User says</div><div class="ex-body ex-user">' + escHtml(ex.user) + '</div>' : "") + (ex.commentary ? '<div class="ex-label">Why it fits</div><div class="ex-body">' + escHtml(ex.commentary) + '</div>' : "") + '</div>'; }).join("");

    if(item.allowedTools) sections += '<h3>Allowed tools</h3><p><code>' + escHtml(item.allowedTools) + '</code></p>';
  }

  if(aiKind==="plugin" && item.bundles){

    if((b.skills&&b.skills.length)||(b.agents&&b.agents.length)||(b.commands&&b.commands.length)||(b.hooks&&b.hooks.length)) sections += '<h3>What this plugin bundles</h3>';
    var bundleGroup = function(label, arr, kind){ if(!arr||!arr.length) return ""; return '<div class="bundle-group"><div class="bundle-title">' + label + ' · ' + arr.length + '</div><div class="subitems">' + arr.map(function(s){ return '<div class="subitem" tabindex="0" role="button" data-bundled-plugin="' + escHtml(item.name) + '" data-bundled-kind="' + kind + '" data-bundled-name="' + escHtml(s.name) + '"><div class="subitem-name">' + escHtml(s.name) + '</div>' + (s.description ? '<div class="subitem-desc">' + escHtml(s.description) + '</div>' : "") + '<div class="subitem-cta">Open detail →</div></div>'; }).join("") + '</div></div>'; };
    sections += bundleGroup("Skills", b.skills, "skill");

    var pkv = "";
    if(item.author) pkv += '<dt>Author</dt><dd>' + escHtml(item.author) + '</dd>';
    if(item.homepage) pkv += '<dt>Homepage</dt><dd><a href="' + escHtml(item.homepage) + '" target="_blank" rel="noopener">' + escHtml(item.homepage) + '</a></dd>';
    if(item.license) pkv += '<dt>License</dt><dd>' + escHtml(item.license) + '</dd>';
    if(item.installPath) pkv += '<dt>Install path</dt><dd><code style="word-break:break-all;">' + escHtml(item.installPath) + '</code></dd>';
    if(pkv) sections += '<dl class="kv" style="margin-top:1rem;">' + pkv + '</dl>';
  }
  // Body / reference
  if(aiKind==="skill" || aiKind==="agent" || aiKind==="command"){ if(item.bodyHtml && item.bodyHtml.trim()){ sections += '<h3>Reference body</h3>' + item.bodyHtml; } }
  else if(item.bodyHtml){ sections += item.bodyHtml; }
  else if(item.readmeHtml){ sections += item.readmeHtml; }
  else if(!isAi){ sections += '<p style="color:var(--ink-faint);">No body content.</p>'; }
  // Cross-references
  var xref = [];

  if(item.feature && type!=="feature") xref.push({type:"feature", id:item.feature, label:item.feature});
  if(item.story && type!=="story") xref.push({type:"story", id:item.story, label:item.story});
  if(item.testplan && type!=="testplan") xref.push({type:"testplan", id:item.testplan, label:item.testplan});
  if(item.decisions && item.decisions.length) item.decisions.forEach(function(a){ if(a) xref.push({type:"adr", id:a, label:a}); });
  if(item.context_story) xref.push({type: /^STORY-/.test(item.context_story)?"story":/^BACKLOG-/.test(item.context_story)?"backlog":"feature", id:item.context_story, label:item.context_story});

function wireDrawerLinks(body){

  $$("[data-bundled-plugin]", body).forEach(function(elm){ var go=function(){ openBundledItem(elm.dataset.bundledPlugin, elm.dataset.bundledKind, elm.dataset.bundledName); }; elm.addEventListener("click", go); elm.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(); } }); });
}
function openSkillSubItem(skillName, slug){
  var skill = (D.ai.skills||[]).find(function(s){return s.name===skillName;});
  if(!skill) return;
  var sub = (skill.subItems||[]).find(function(s){return s.slug===slug;});
  if(!sub) return;
  DRAWER_STACK.push({ render: function(){ renderSubItemDrawer(skill, sub); } });
  renderSubItemDrawer(skill, sub);
  showDrawerPanel();
}
function renderSubItemDrawer(skill, sub){

  if(skill.file) sec += '<div class="drawer-section"><h3>Source</h3><code style="font-size:0.78rem; word-break:break-all;">' + escHtml(skill.file + "/reference/" + sub.slug + ".md") + '</code></div>';

function openBundledItem(pluginName, kind, name){
  var listKey = kind + "s";
  var list = (D.ai && D.ai[listKey]) || [];
  var found = list.filter(function(x){ return x.pluginName===pluginName; }).find(function(x){ return x.name===name || x.name===pluginName+":"+name; });
  if(!found) found = list.find(function(x){ return x.name===name; });
  if(found){ openDrawer("ai-"+kind, found.name); return; }
  var plugin = (D.ai.plugins||[]).find(function(p){return p.name===pluginName;});
  var arr = plugin && plugin.bundles ? (plugin.bundles[listKey]||[]) : [];
  var stub = arr.find(function(s){return s.name===name;});
  if(!stub) return;
  DRAWER_STACK.push({ render: function(){ renderBundleStub(pluginName, kind, stub); } });
  renderBundleStub(pluginName, kind, stub);
  showDrawerPanel();
}
function renderBundleStub(pluginName, kind, stub){
  var t = $("#drawer .drawer-titles");
  t.querySelector(".drawer-id").textContent = pluginName + " · bundled " + kind;
  t.querySelector(".drawer-title").textContent = stub.name;
  t.querySelector(".drawer-meta").innerHTML = '<span class="tag source">plugin:' + escHtml(pluginName) + '</span><span class="tag">' + escHtml(kind) + '</span>';
  $("#drawer .drawer-body").innerHTML = stub.description ? '<p class="drawer-ai-desc">' + escHtml(stub.description) + '</p>' : '<p style="color:var(--ink-faint);">No description.</p>';
}
function renderSessionFlow(){
  var sf = D.sessionFlow;
  if(!sf) return "";
  var rows = sf.spine.map(function(s){ return '<div class="flow-row ' + escHtml(s.kind) + '"><span class="flow-label">' + escHtml(s.label) + '</span><span class="flow-detail">' + s.detail + '</span></div>'; }).join("");
  var aside = sf.aside ? '<div class="flow-aside"><div class="head">' + escHtml(sf.aside.label) + '</div>' + sf.aside.items.map(function(s){ return '<div class="flow-row ' + escHtml(s.kind) + '"><span class="flow-label">' + escHtml(s.label) + '</span><span class="flow-detail">' + s.detail + '</span></div>'; }).join("") + '</div>' : "";
  return '<h3>Session flow</h3><div class="flow">' + rows + '</div>' + aside;
}
function renderCommandFlow(opts){
  opts = opts || {};
  var scope  = opts.scope  || "sop";
  var prefix = opts.prefix || "";
  var title  = opts.title  || "Tandem · command process flow";
  var sub    = opts.sub    || "click any /command to open its skill reference";
  var cf = D.commandFlow;
  if(!cf || !cf.phases) return "";
  var view = (STATE.cmdFlowView && STATE.cmdFlowView[scope]) || "e2e";
  var members = CMD_FLOW_VIEW_MEMBERS[view] || null; // null means show all
  function inView(c){ return !members || members.indexOf(c.name) !== -1; }
  function pillHtml(c){
    var note = c.note ? '<span class="cmd-pill-note">' + escHtml(c.note) + '</span>' : "";
    var when = c.when ? '<span class="cmd-pill-when">' + escHtml(c.when) + '</span>' : "";
    var adv  = c.advisory ? ' data-advisory="1"' : "";
    var amb  = c.ambient  ? ' data-ambient="1"'  : "";
    return '<button type="button" class="cmd-pill" data-cmd-skill="' + escHtml(c.name) + '"' + adv + amb + '><span class="cmd-pill-name">/' + escHtml(prefix) + escHtml(c.name) + '</span>' + when + note + '</button>';
  }
  // Per-view command counts for the tab badges.
  function countForView(v){
    var mem = CMD_FLOW_VIEW_MEMBERS[v];
    var n = 0;
    (cf.phases||[]).forEach(function(p){ (p.commands||[]).forEach(function(c){ if(!mem || mem.indexOf(c.name)!==-1) n++; }); });
    if(cf.cadence) (cf.cadence.commands||[]).forEach(function(c){ if(!mem || mem.indexOf(c.name)!==-1) n++; });
    return n;
  }
  var tabsHtml = '<div class="cmd-view-tabs" role="tablist">' + CMD_FLOW_VIEWS.map(function(v){
    var active = (view === v[0]);
    return '<button type="button" class="cmd-view-tab' + (active?" active":"") + '" role="tab" aria-selected="' + (active?"true":"false") + '" data-cmd-view-scope="' + scope + '" data-cmd-view-key="' + v[0] + '">' + escHtml(v[1]) + ' Session' + '<span class="cmd-view-tab-count">' + countForView(v[0]) + '</span></button>';
  }).join("") + '</div>';
  var phaseHtml = cf.phases.map(function(p){
    var visible = (p.commands||[]).filter(inView);
    if(!visible.length) return ""; // hide empty phases for the active view
    var gate = p.gate ? '<span class="cmd-phase-gate">' + escHtml(p.gate) + ' gate</span>' : "";
    var pills = visible.map(pillHtml).join("");
    return '<div class="cmd-phase" data-phase="' + escHtml(p.key) + '">' +
      '<div class="cmd-phase-head">' +
        '<div class="cmd-phase-top"><span class="cmd-phase-label">' + escHtml(p.label) + '</span><span class="cmd-phase-hat">' + escHtml(p.hat||"") + '</span>' + gate + '</div>' +
        '<div class="cmd-phase-desc">' + escHtml(p.desc||"") + '</div>' +
      '</div>' +
      '<div class="cmd-phase-pills">' + pills + '</div>' +
    '</div>';
  }).filter(function(s){ return !!s; });
  // Inject arrows between visible phases only.
  var phasesWithArrows = phaseHtml.length ? phaseHtml.join('<div class="cmd-phase-arrow">→</div>') : '<div class="empty">No commands in this view.</div>';
  var rail = "";
  if(cf.cadence){
    var railVisible = (cf.cadence.commands||[]).filter(inView);
    if(railVisible.length){
      var railPills = railVisible.map(pillHtml).join("");
      rail = '<div class="cmd-rail">' +
        '<div class="cmd-rail-head">' +
          '<span class="cmd-rail-label">↻ ' + escHtml(cf.cadence.label) + '</span>' +
          '<span class="cmd-rail-desc">' + escHtml(cf.cadence.desc||"") + '</span>' +
        '</div>' +
        '<div class="cmd-rail-pills">' + railPills + '</div>' +
      '</div>';
    }
  }
  return '<div class="cmd-flow-panel reveal" data-cmd-flow-scope="' + scope + '">' +
    '<div class="cmd-flow-head">' +
      '<span class="cmd-flow-title">' + escHtml(title) + '</span>' +
      '<span class="cmd-flow-sub">' + escHtml(sub) + '</span>' +
    '</div>' +
    tabsHtml +
    '<div class="cmd-flow-phases">' + phasesWithArrows + '</div>' +
    rail +
  '</div>';
}
function bindRows(root){
  $$(".row, .story-row, .tile, .stream-line", root).forEach(function(r){ if(r.__bound) return; r.__bound=true; r.addEventListener("click", function(){ openDrawer(r.dataset.type, r.dataset.id); }); });
}
function bindControls(root){
  $$(".search", root).forEach(function(inp){ if(inp.__bound) return; inp.__bound=true; inp.addEventListener("input", function(){ var s = inp.dataset.scope; STATE.search[s] = inp.value; renderActive(); inp.focus(); }); });
  $$(".pill.filterable", root).forEach(function(p){ if(p.__bound) return; p.__bound=true; p.addEventListener("click", function(){ var s = (STATE.group==="work"?"work:":STATE.group==="decisions"?"decisions:":STATE.group+":") + STATE.sub; STATE.statusFilter[s] = STATE.statusFilter[s] || {}; var st = p.dataset.status; STATE.statusFilter[s][st] = !STATE.statusFilter[s][st]; renderActive(); }); });
}
function bindCmdFlowTabs(root){
  $$(".cmd-view-tab[data-cmd-view-scope]", root).forEach(function(b){
    if(b.__bound) return; b.__bound = true;
    b.addEventListener("click", function(){
      var scope = b.dataset.cmdViewScope;
      var key   = b.dataset.cmdViewKey;
      STATE.cmdFlowView = STATE.cmdFlowView || {};
      STATE.cmdFlowView[scope] = key;
      renderActive();
    });
  });
}
function setupRevealObserver(){
  if(!("IntersectionObserver" in window)) { $$(".reveal").forEach(function(e){ e.classList.add("visible"); }); return; }
  var ob = new IntersectionObserver(function(entries){ entries.forEach(function(en){ if(en.isIntersecting){ en.target.classList.add("visible"); ob.unobserve(en.target); } }); }, { rootMargin:"-30px 0px -20px 0px" });
  var watcher = new MutationObserver(function(){ $$(".reveal:not(.visible)").forEach(function(e){ ob.observe(e); }); });
  watcher.observe(document.body, { childList:true, subtree:true });
  $$(".reveal").forEach(function(e){ ob.observe(e); });
}
function init(){
  renderGroupNav();
  // Hash routing
  var h = readHash();
  var r = applyLegacy(h.group, h.sub);
  if(r.group && SUB_TABS[r.group] != null){ setGroup(r.group, { sub: r.sub }); } else { setGroup("now"); }
  // Mask + close
  $("#mask").addEventListener("click", closeDrawer);
  $(".drawer-close").addEventListener("click", closeDrawer);
  $(".drawer-back").addEventListener("click", popDrawer);
  document.addEventListener("keydown", function(e){
    if((e.metaKey || e.ctrlKey) && (e.key === "k" || e.key === "K")){ e.preventDefault(); openPalette(); return; }
    if(e.key === "Escape"){ if(STATE.palette){ closePalette(); return; } if($("#drawer").classList.contains("open")) closeDrawer(); return; }
    if(e.key === "/" && !/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName)){ e.preventDefault(); openPalette(); }
  });
  $("#theme-toggle").addEventListener("click", function(){ applyTheme(document.documentElement.getAttribute("data-theme")==="dark" ? "light" : "dark"); });
  window.addEventListener("hashchange", function(){ var h=readHash(); var r=applyLegacy(h.group, h.sub); if(r.group && r.group!==STATE.group){ setGroup(r.group, { sub:r.sub }); } else if(r.sub && r.sub!==STATE.sub){ setSub(r.sub); } });
  setupRevealObserver();
  // Diagnostics link clicks
  $$("#diag a[data-path]").forEach(function(a){ a.addEventListener("click", function(e){ e.preventDefault(); /* read-only — show path */ }); });
}
if(document.readyState==="loading"){ document.addEventListener("DOMContentLoaded", init); } else { init(); }
})();
</script>
