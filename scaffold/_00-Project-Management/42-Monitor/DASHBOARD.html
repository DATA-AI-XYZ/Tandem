<style>
:root {
  /* Foundation */

  /* Semantic */

  --warn:var(--yellow); --warn-soft:var(--yellow-soft);
  --danger:var(--red); --danger-soft:var(--red-soft);

  /* Motion */
  --ease:cubic-bezier(0.16, 1, 0.3, 1);

  /* Focus */

  /* Always-light token for dark-surface code blocks */

html[data-theme="dark"] {

  --blue:#5B8DE8; --blue-soft:rgba(91,141,232,0.18);

  --shadow:0 6px 18px rgba(0,0,0,0.45);
  --shadow-lg:0 26px 50px rgba(0,0,0,0.55);
  --focus-ring:rgba(226,85,88,0.5);

}

* { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }

/* Header */
header.app-header { background:var(--surface); border-bottom:1px solid var(--border); padding:1.5rem 0 1.25rem; position:relative; z-index:50; }

.app-title em { color:var(--red); font-style:italic; }
.app-sub { display:block; font-family:var(--sans); font-size:0.72rem; font-weight:500; color:var(--ink-3); margin-top:0.3rem; letter-spacing:0.14em; text-transform:uppercase; }
.app-tools { display:flex; align-items:center; gap:0.75rem; }
.icon-btn { background:transparent; border:1px solid var(--border); color:var(--ink-2); width:38px; height:38px; border-radius:50%; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:all var(--dur-fast) var(--ease); }
.icon-btn:hover { background:var(--surface-2); color:var(--ink); border-color:var(--ink-faint); }
.icon-btn svg { width:18px; height:18px; }

/* Diagnostics banner */
.diag { max-width:1500px; margin:0 auto; padding:0.65rem 1.75rem; }
.diag-inner { background:var(--red-soft); border:1px solid var(--red); border-radius:var(--r); padding:0.75rem 1rem; color:var(--ink); font-size:0.85rem; display:flex; gap:0.85rem; align-items:flex-start; }
.diag-inner strong { color:var(--red); }
.diag-inner ul { margin:0.35rem 0 0 1.1rem; padding:0; }
.diag-inner code { font-family:var(--mono); font-size:0.78rem; }

/* Two-row navigation */
nav.group-nav { background:var(--cream); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:40; }
.group-inner { max-width:1500px; margin:0 auto; padding:0 1.75rem; display:flex; gap:0; overflow-x:auto; }
.gtab { background:transparent; border:none; padding:1.05rem 1.25rem 0.95rem; cursor:pointer; font-family:var(--sans); font-size:0.95rem; color:var(--ink-2); border-bottom:2px solid transparent; white-space:nowrap; font-weight:500; transition:color var(--dur-fast) var(--ease), border-color var(--dur) var(--ease); position:relative; }
.gtab:hover { color:var(--ink); }
.gtab.active { color:var(--red); border-bottom-color:var(--red); }
.gtab-count { display:inline-block; background:var(--surface-2); color:var(--ink-2); font-size:0.66rem; padding:0.08rem 0.45rem; border-radius:var(--r-pill); margin-left:0.4rem; font-family:var(--mono); font-weight:500; vertical-align:1px; }
.gtab.active .gtab-count { background:var(--red); color:#fff; }

nav.sub-nav { background:var(--surface); border-bottom:1px solid var(--border); }
.sub-inner { max-width:1500px; margin:0 auto; padding:0 1.75rem; display:flex; gap:0; overflow-x:auto; align-items:center; min-height:42px; }

.stab-count { display:inline-block; font-size:0.65rem; padding:0 0.4rem; color:var(--ink-faint); font-family:var(--mono); margin-left:0.25rem; }
.sub-inner:empty { display:none; }
nav.sub-nav:has(.sub-inner:empty), nav.sub-nav.hidden { display:none; }

/* Main */
main { max-width:1500px; margin:0 auto; padding:1.5rem 1.75rem 4rem; }
section.tab-section { display:none; }
section.tab-section.active { display:block; }

.controls { display:flex; gap:0.75rem; margin-bottom:1.25rem; align-items:center; flex-wrap:wrap; padding:0.85rem 1rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); }
.search { flex:1; min-width:220px; padding:0.55rem 0.9rem; border:1px solid var(--border); border-radius:var(--r-sm); background:var(--cream); font-family:var(--sans); font-size:0.9rem; color:var(--ink); transition:all var(--dur-fast) var(--ease); }
.search:focus { outline:none; border-color:var(--red); background:var(--surface); }
.filter-group { display:flex; gap:0.35rem; flex-wrap:wrap; align-items:center; }
.filter-label { font-size:0.66rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink-faint); margin-right:0.25rem; font-weight:600; }

/* Pills */
.pill { display:inline-block; padding:0.18rem 0.65rem; border-radius:var(--r-pill); font-size:0.7rem; font-family:var(--mono); font-weight:500; letter-spacing:0.02em; white-space:nowrap; user-select:none; line-height:1.55; }
.pill.filterable { cursor:pointer; transition:all var(--dur-fast) var(--ease); }
.pill.filterable.off { opacity:0.32; }
.pill.filterable:hover { transform:translateY(-1px); }
.pill[data-status="not-started"] { background:var(--surface-2); color:var(--ink-2); }
.pill[data-status="ready"]       { background:var(--info-soft);    color:var(--info); }
.pill[data-status="in-progress"] { background:var(--warn-soft);    color:var(--ink); border:1px solid var(--yellow); }
.pill[data-status="in-review"]   { background:var(--blue-soft);    color:var(--blue); }

.pill[data-status="active"]      { background:var(--success-soft); color:var(--success); }
.pill[data-status="wontfix"]     { background:var(--surface-2);    color:var(--ink-faint); text-decoration:line-through; }
.pill[data-status="duplicate"]   { background:var(--surface-2);    color:var(--ink-faint); }
.pill[data-status="archived"]    { background:var(--surface-2);    color:var(--ink-faint); opacity:0.7; }

.sev { display:inline-block; padding:0.1rem 0.55rem; border-radius:var(--r-sm); font-size:0.68rem; font-family:var(--mono); font-weight:600; letter-spacing:0.04em; text-transform:uppercase; }

.tag { display:inline-block; padding:0.1rem 0.55rem; border-radius:var(--r-pill); font-size:0.66rem; font-family:var(--mono); background:var(--surface-2); color:var(--ink-2); white-space:nowrap; }
.tag.star { background:var(--yellow-soft); color:#7a5a00; border:1px solid var(--yellow); }

.tag.source { background:transparent; border:1px solid var(--border); color:var(--ink-3); }
.tag.cat.exclusive { cursor:pointer; transition:all var(--dur-fast) var(--ease); }
.tag.cat.exclusive:hover { background:var(--ink); color:var(--cream); }

/* Cards */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:1.2rem 1.3rem; box-shadow:var(--shadow-sm); transition:box-shadow var(--dur) var(--ease), transform var(--dur) var(--ease), border-color var(--dur) var(--ease); }

.card.hover:hover { box-shadow:var(--shadow); transform:translateY(-1px); border-color:var(--ink-faint); }

.card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:1rem; }

.tile-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:0.7rem; }
.tile { display:flex; flex-direction:column; gap:0.4rem; padding:0.85rem 1rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); cursor:pointer; transition:all var(--dur-fast) var(--ease); }
.tile:hover { border-color:var(--ink-faint); background:var(--surface-2); transform:translateY(-1px); box-shadow:var(--shadow-sm); }

@media (max-width:560px) { .tile-grid { grid-template-columns:1fr; } }
/* Implementation view: fixed 3-up, wider chat cards (user request — was auto-fill minmax(320px)). */
.impl-tiles { grid-template-columns:repeat(3, minmax(0, 1fr)); }
@media (max-width:1100px) { .impl-tiles { grid-template-columns:repeat(2, minmax(0, 1fr)); } }

.plan-stories { grid-template-columns:repeat(auto-fill, minmax(360px, 1fr)); }
/* Work view hierarchical grouping (STORY-04.6.01): nested Epic→Feature→Story→(Testplan/Bug) section headers above each tile-grid */
.work-group { margin-bottom:1.1rem; }
.work-group .group-head { display:flex; align-items:baseline; gap:0.5rem; flex-wrap:wrap; padding:0.35rem 0 0.5rem; border-bottom:1px solid var(--border); margin-bottom:0.65rem; }
.work-group .group-path { font-family:var(--mono); font-size:0.78rem; color:var(--ink-2); }
.work-group .group-path .crumb-sep { color:var(--ink-faint); margin:0 0.15rem; }
.work-group .group-path .crumb-unassigned { color:var(--ink-3); font-style:italic; }
.work-group .group-count { font-family:var(--mono); font-size:0.72rem; color:var(--ink-3); }
.metric { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:1.1rem 1.2rem; box-shadow:var(--shadow-sm); }
.metric-val { font-family:var(--serif); font-size:2.4rem; font-weight:400; color:var(--ink); line-height:1; letter-spacing:-0.02em; }
.metric-lab { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.14em; color:var(--ink-faint); margin-top:0.5rem; font-weight:600; }

.progress { height:6px; background:var(--surface-2); border-radius:var(--r-pill); overflow:hidden; margin-top:0.6rem; }

.rows { display:flex; flex-direction:column; gap:0.45rem; }
.row { display:grid; grid-template-columns:130px 1fr auto; gap:0.85rem; align-items:center; padding:0.75rem 1rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); cursor:pointer; transition:all var(--dur-fast) var(--ease); }

.epic-head:hover { background:var(--surface-2); }
.disclose { width:22px; height:22px; display:inline-flex; align-items:center; justify-content:center; color:var(--ink-3); transition:transform var(--dur) var(--ease); }

.epic-body { display:none; padding:0.4rem 1.2rem 1.2rem; border-top:1px solid var(--border); }
.epic-card.open .epic-body { display:block; }
.feat-card { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r-sm); margin:0.65rem 0; }

.empty { color:var(--ink-faint); font-size:0.85rem; padding:0.5rem 0; font-style:italic; }
.view-intro { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:0.9rem 1.1rem; margin-bottom:1.1rem; }

.view-intro .vi-source { font-size:0.82rem; color:var(--ink-2); line-height:1.55; margin-bottom:0.25rem; }
.view-intro .vi-source code { font-family:var(--mono); font-size:0.78rem; color:var(--ink); background:var(--surface-2); padding:0.05rem 0.3rem; border-radius:var(--r-sm); }
.view-intro .vi-why { font-size:0.82rem; color:var(--ink-3); line-height:1.55; font-style:italic; }

/* Overview */
.overview-hero { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:1rem; margin-bottom:1.5rem; }

.panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:1.15rem 1.25rem; }
.panel h3 { font-family:var(--serif); font-size:1.3rem; font-weight:400; margin-bottom:0.85rem; color:var(--ink); letter-spacing:-0.01em; }
.panel h3 .count-bubble { font-family:var(--mono); font-size:0.72rem; background:var(--surface-2); color:var(--ink-3); padding:0.1rem 0.55rem; border-radius:var(--r-pill); margin-left:0.5rem; vertical-align:2px; }
.kv { display:grid; grid-template-columns:auto 1fr; gap:0.3rem 0.85rem; font-size:0.86rem; color:var(--ink-2); }

/* AI catalogue cards */
.ai-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:1rem 1.1rem; cursor:pointer; transition:all var(--dur-fast) var(--ease); display:flex; flex-direction:column; gap:0.55rem; }
.ai-card:hover { border-color:var(--ink-faint); box-shadow:var(--shadow); transform:translateY(-2px); }
.ai-card .name { font-family:var(--serif); font-size:1.15rem; color:var(--ink); letter-spacing:-0.01em; line-height:1.2; }
.ai-card .desc { font-size:0.82rem; color:var(--ink-2); line-height:1.5; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.ai-card .footer { display:flex; gap:0.35rem; flex-wrap:wrap; align-items:center; margin-top:auto; }
.ai-card.curated { border-color:var(--yellow); }

/* Fit badges (ADR-0029 relevance overlays — HIGH/MED/LOW) */
.fit-badge { display:inline-block; padding:0.1rem 0.5rem; border-radius:var(--r-sm); font-size:0.66rem; font-family:var(--mono); font-weight:700; letter-spacing:0.06em; text-transform:uppercase; line-height:1.55; }
.fit-badge.HIGH { background:var(--teal-soft); color:var(--teal); border:1px solid var(--teal); }
.fit-badge.MED  { background:var(--blue-soft);  color:var(--blue);  border:1px solid var(--blue); }
.fit-badge.LOW  { background:var(--surface-2);  color:var(--ink-3); border:1px solid var(--border); }
/* AI fit grouping (recommendedVsOther — ADR-0033) */
.ai-fit-group { margin-bottom:1.25rem; }
.ai-fit-group-head { display:flex; align-items:baseline; gap:0.5rem; flex-wrap:wrap; padding:0.3rem 0 0.5rem; border-bottom:1px solid var(--border); margin-bottom:0.75rem; }
.ai-fit-group-label { font-family:var(--mono); font-size:0.78rem; font-weight:600; color:var(--ink-2); text-transform:uppercase; letter-spacing:0.08em; }
.ai-fit-group-count { font-family:var(--mono); font-size:0.72rem; color:var(--ink-3); }

/* Drawer */
.mask { display:none; position:fixed; inset:0; background:rgba(26,23,20,0.5); z-index:80; backdrop-filter:blur(4px); }
.mask.open { display:block; animation:fade var(--dur) var(--ease); }
aside.drawer { position:fixed; top:0; right:0; bottom:0; width:clamp(360px, 60vw, 96vw); background:var(--cream); border-left:1px solid var(--border); box-shadow:var(--shadow-lg); z-index:90; transform:translateX(105%); transition:transform var(--dur) var(--ease); overflow-y:auto; display:flex; flex-direction:column; }
aside.drawer.open { transform:translateX(0); }
.drawer-head { padding:1.25rem 1.5rem 0.95rem; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:0; z-index:2; display:flex; gap:1rem; align-items:flex-start; }
.drawer-head .titles { flex:1; min-width:0; }
.drawer-back { background:transparent; border:1px solid var(--border); width:34px; height:34px; border-radius:50%; cursor:pointer; color:var(--ink-2); display:none; align-items:center; justify-content:center; }
.drawer-back.show { display:inline-flex; }
.drawer-close { background:transparent; border:1px solid var(--border); width:34px; height:34px; border-radius:50%; cursor:pointer; color:var(--ink-2); display:inline-flex; align-items:center; justify-content:center; }
.drawer-close:hover, .drawer-back:hover { background:var(--surface-2); }
.drawer-id { font-family:var(--mono); font-size:0.78rem; color:var(--ink-3); }
.drawer-title { font-family:var(--serif); font-size:1.6rem; color:var(--ink); margin-top:0.3rem; font-weight:400; letter-spacing:-0.01em; line-height:1.2; }
.drawer-meta { display:flex; gap:0.4rem; flex-wrap:wrap; margin-top:0.75rem; }
.drawer-body { padding:1.25rem 1.5rem 2.5rem; flex:1; }
.drawer-body h1 { font-family:var(--serif); font-size:1.6rem; margin:1.4rem 0 0.7rem; font-weight:400; letter-spacing:-0.01em; }
.drawer-body h2 { font-family:var(--serif); font-size:1.35rem; margin:1.25rem 0 0.55rem; font-weight:400; }
.drawer-body h3 { font-family:var(--sans); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink-faint); margin:1.2rem 0 0.45rem; font-weight:600; }
.drawer-body h4 { font-size:0.95rem; margin:0.85rem 0 0.35rem; color:var(--ink); }
.drawer-body p { margin:0.65rem 0; color:var(--ink-2); line-height:1.7; }
.drawer-body ul, .drawer-body ol { margin:0.55rem 0 0.65rem 1.4rem; color:var(--ink-2); }
.drawer-body li { margin:0.25rem 0; line-height:1.65; }
.drawer-body blockquote { border-left:3px solid var(--red); padding:0.5rem 0.9rem; background:var(--surface-2); border-radius:var(--r-sm); margin:0.8rem 0; color:var(--ink-2); font-style:italic; }
.drawer-body code { font-family:var(--mono); font-size:0.85em; background:var(--surface-2); padding:0.1rem 0.35rem; border-radius:4px; }
.drawer-body pre { background:var(--surface-2); padding:0.85rem 1rem; border-radius:var(--r-sm); overflow-x:auto; white-space:pre-wrap; word-break:break-word; overflow-wrap:anywhere; font-family:var(--mono); font-size:0.82rem; margin:0.7rem 0; border:1px solid var(--border); }
.drawer-body pre code { background:transparent; padding:0; font-size:inherit; }
.drawer-body a { color:var(--blue); text-decoration:underline; text-decoration-thickness:1px; text-underline-offset:3px; }
.drawer-body a:hover { color:var(--red); }
.drawer-body hr { border:none; border-top:1px solid var(--border); margin:1.2rem 0; }
.drawer-body .md-table-wrap { overflow-x:auto; margin:0.8rem 0; }
.drawer-body table { border-collapse:collapse; width:100%; font-size:0.84rem; }
.drawer-body th, .drawer-body td { padding:0.5rem 0.7rem; border:1px solid var(--border); text-align:left; vertical-align:top; }
.drawer-body th { background:var(--surface-2); font-weight:600; }

.drawer-section { padding:1rem 1.5rem; border-top:1px solid var(--border); background:var(--surface); }
.drawer-section h3 { font-size:0.74rem; text-transform:uppercase; letter-spacing:0.14em; color:var(--ink-faint); margin-bottom:0.55rem; font-weight:600; }

.xref { display:flex; gap:0.4rem; flex-wrap:wrap; }
.xref-pill { background:transparent; border:1px solid var(--border); padding:0.25rem 0.7rem; border-radius:var(--r-pill); font-family:var(--mono); font-size:0.74rem; color:var(--ink-2); cursor:pointer; text-decoration:none; }
.xref-pill:hover { background:var(--surface-2); border-color:var(--ink-faint); }

/* Drawer AI detail: descriptions, sub-commands, bundles, examples */
.drawer-ai-desc { color:var(--ink-2); line-height:1.7; margin:0.4rem 0 0.9rem; }
.subitems { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:0.6rem; margin:0.5rem 0 1.1rem; }
.subitem { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); padding:0.7rem 0.85rem; cursor:pointer; transition:border-color var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease), box-shadow var(--dur-fast) var(--ease); display:flex; flex-direction:column; gap:0.3rem; }
.subitem:hover, .subitem:focus-visible { border-color:var(--ink-faint); transform:translateY(-1px); box-shadow:var(--shadow-sm); outline:none; }
.subitem-name { font-family:var(--mono); font-size:0.82rem; font-weight:600; color:var(--ink); word-break:break-word; }
.subitem-title { font-family:var(--sans); font-weight:500; color:var(--ink-3); font-size:0.78rem; }
.subitem-desc { font-size:0.78rem; color:var(--ink-2); line-height:1.5; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; }
.subitem-cta { font-size:0.68rem; font-weight:600; letter-spacing:0.02em; color:var(--red); margin-top:auto; opacity:0; transition:opacity var(--dur-fast) var(--ease); }
.subitem:hover .subitem-cta, .subitem:focus-visible .subitem-cta { opacity:1; }
.bundle-group { margin:0.4rem 0 1.1rem; }
.bundle-title { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink-faint); font-weight:700; margin:0.6rem 0 0.45rem; }
.drawer-example { border:1px solid var(--border); border-radius:var(--r-sm); padding:0.85rem 1rem; margin:0.6rem 0; background:var(--surface); }
.ex-label { font-size:0.64rem; text-transform:uppercase; letter-spacing:0.14em; color:var(--ink-faint); font-weight:700; margin:0.55rem 0 0.2rem; }
.ex-label:first-child { margin-top:0; }
.ex-body { font-size:0.84rem; color:var(--ink-2); line-height:1.6; }
.ex-body.ex-user { font-family:var(--mono); font-size:0.8rem; color:var(--ink); background:var(--surface-2); border-radius:var(--r-sm); padding:0.4rem 0.6rem; }

/* Session flow timeline (SOP plugin drawer) */
.flow { display:grid; grid-template-columns:1fr; gap:0; margin:0.5rem 0 1rem; }
.flow-row { display:grid; grid-template-columns:170px 1fr; gap:1rem; padding:0.6rem 0; border-left:2px solid var(--border); padding-left:1rem; position:relative; }
.flow-row::before { content:''; position:absolute; left:-7px; top:1rem; width:12px; height:12px; border-radius:50%; background:var(--surface); border:2px solid var(--ink-faint); }
.flow-row.skill::before { border-color:var(--blue); background:var(--blue-soft); }
.flow-row.lifecycle::before { border-color:var(--ink); background:var(--ink); }
.flow-label { font-family:var(--mono); font-size:0.78rem; color:var(--ink); font-weight:600; }
.flow-detail { font-size:0.84rem; color:var(--ink-2); line-height:1.55; }
.flow-aside { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r); padding:0.85rem 1rem; margin-top:0.85rem; }
.flow-aside .head { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.14em; color:var(--ink-faint); font-weight:700; margin-bottom:0.45rem; }

/* Reveal-on-scroll */
@media (prefers-reduced-motion: no-preference) {
  .reveal { opacity:0; transform:translateY(8px); transition:opacity var(--dur-slow) var(--ease), transform var(--dur-slow) var(--ease); }
  .reveal.visible { opacity:1; transform:translateY(0); }
  .stagger > * { opacity:0; transform:translateY(6px); animation:brand-fade-up var(--dur-slow) var(--ease) forwards; }
  .stagger > *:nth-child(1) { animation-delay:0ms; }
  .stagger > *:nth-child(2) { animation-delay:50ms; }
  .stagger > *:nth-child(3) { animation-delay:100ms; }
  .stagger > *:nth-child(4) { animation-delay:150ms; }
  .stagger > *:nth-child(5) { animation-delay:200ms; }
}
@keyframes brand-fade-up { to { opacity:1; transform:translateY(0); } }
@keyframes fade { from { opacity:0; } to { opacity:1; } }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition:none !important; animation:none !important; }
}

/* About */
.about-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; }
@media (max-width:760px) { .about-grid { grid-template-columns:1fr; } .epic-head { grid-template-columns:36px 1fr; } .epic-head .epic-progress, .epic-head .epic-badges { display:none; } .feat-head { grid-template-columns:24px 1fr; } .story-row { grid-template-columns:1fr; } }
.about-grid pre { white-space:pre-wrap; word-break:break-word; }
.kbd { font-family:var(--mono); font-size:0.78rem; background:var(--surface-2); padding:0.15rem 0.5rem; border-radius:var(--r-sm); border:1px solid var(--border); }

/* Reports view (STORY-04.6.04) */
.report-kind-group { margin-bottom:1.25rem; }
.report-kind-head { display:flex; align-items:baseline; gap:0.5rem; flex-wrap:wrap; padding:0.35rem 0 0.5rem; border-bottom:1px solid var(--border); margin-bottom:0.65rem; }

.report-tile { display:flex; flex-direction:column; gap:0.35rem; padding:0.75rem 0.9rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); text-decoration:none; color:inherit; transition:all var(--dur-fast) var(--ease); }
.report-tile:hover { border-color:var(--blue); background:var(--surface-2); transform:translateY(-1px); box-shadow:var(--shadow-sm); }
.report-tile:hover .report-name { color:var(--blue); }

.report-ext { font-family:var(--mono); font-size:0.68rem; color:var(--ink-3); text-transform:uppercase; letter-spacing:0.05em; }
.report-open { font-size:0.68rem; font-weight:600; letter-spacing:0.02em; color:var(--blue); margin-top:auto; opacity:0; transition:opacity var(--dur-fast) var(--ease); }
.report-tile:hover .report-open { opacity:1; }

/* Implementation Strategy (FEAT-03.3) */

.impl-meta { font-family:var(--mono); font-size:0.76rem; color:var(--ink-3); margin-top:0.3rem; }
.impl-note { font-size:0.82rem; color:var(--ink-2); margin-top:0.55rem; background:var(--surface-2); border-radius:var(--r-sm); padding:0.6rem 0.85rem; }

.chat-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(440px, 1fr)); gap:1rem; }

/* v1.1 — ADR-0048 additions: Now-page widgets, age ribbons, Cmd-K palette */

.now-widget h3 .count-bubble { background:var(--surface-2); color:var(--ink-2); font-family:var(--mono); font-size:0.66rem; font-weight:700; padding:0.08rem 0.45rem; border-radius:var(--r-pill); }

/* Story lifecycle flow (Now hero — live counts + clickable stages) */
.flow-panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:1.1rem 1.25rem; box-shadow:var(--shadow-sm); margin-bottom:1.5rem; }
.flow-panel > h3 { font-family:var(--sans); font-size:0.74rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink-faint); margin-bottom:0.75rem; font-weight:600; display:flex; align-items:baseline; gap:0.55rem; flex-wrap:wrap; }

.flow-row { display:flex; align-items:stretch; gap:0; flex-wrap:wrap; }
.flow-stage { flex:1 1 0; min-width:88px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.22rem; padding:0.65rem 0.55rem; background:var(--cream); border:1px solid var(--border); border-radius:var(--r-sm); text-align:center; transition:background var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease), box-shadow var(--dur-fast) var(--ease); }

counts:begin (generated by pm:monitor — do not edit by hand) --&gt;</p>\n<ul>\n<li>Epics: 0</li>\n<li>Features: 0</li>\n<li>Stories: 0 (0 done · 0 open)</li>\n<li>Testplans: 0 (paired 1:1 with stories)</li>\n<li>PRDs: 0 (<code>20-Requirements/</code>, not linted)</li>\n<li>BACKLOG: 0</li>\n<li>Bugs filed: 0 (0 open)</li>\n<li>ADRs: 0</li>\n<li>Releases: 0 (see CHANGELOG.md)</li>\n<p>&lt;!-- pm:monitor:counts:end --&gt;</p>\n</ul>\n<hr>\n<h2>WIP</h2>\n<p>&lt;!-- pm:monitor:wip:begin (generated by pm:monitor — do not edit by hand) --&gt;</p>\n<ul>\n<li><strong>in-progress:</strong> 0 / 2 (limit per SOP §5)</li>\n<li><strong>in-review:</strong> 0 / 3 (limit)</li>\n<li><strong>blocked:</strong> 0 / 5 (limit)</li>\n<p>&lt;!-- pm:monitor:wip:end --&gt;</p>\n</ul>\n<hr>\n<h2>Revision history</h2>\n<p><em>Prepend a one-line entry on every weekly update and every story close-out.</em></p>\n<p>&lt;!-- Example format: <strong>2026-05-23 — week 1 of project.</strong> Bootstrap complete: SOP + templates + prompts + linter wired. First Epic drafted (EPIC-01). 5 stories under FEAT-01.1 derived with paired testplans.</p>\n<p><strong>2026-05-20 — project initialised.</strong> PM kit deployed from . PROJECT-CONTEXT.md filled in. North Star + Q2 OKRs drafted. --&gt;</p>\n","file":"_00-Project-Management/42-Monitor/MONITOR.md"},"counts":{"strategy":{"total":0,"byStatus":{}},"inbox":{"total":0,"byStatus":{}},"backlog":{"total":0,"byStatus":{}},"release":{"total":0,"byStatus":{}},"retro":{"total":0,"byStatus":{}},"epic":{"total":0,"byStatus":{}},"feature":{"total":0,"byStatus":{}},"story":{"total":0,"byStatus":{}},"testplan":{"total":0,"byStatus":{}},"bug":{"total":0,"byStatus":{}},"adr":{"total":0,"byStatus":{}}},"ai":{"skills":[],"agents":[],"commands":[],"plugins":[],"marketplaces":[],"overlayCounts":{"skills":0,"agents":0,"commands":0,"plugins":0},"costByKind":{"skills":0,"agents":0,"commands":0,"plugins":0},"pluginTotal":0,"totalCost":0,"scanRoots":{"user":"~/.claude","project":"./.claude"},"counts":{"skills":0,"agents":0,"commands":0,"plugins":0}},"plan":{"byEpic":[],"orphanFeats":[],"tpByStory":{}},"executionStrategy":{"epics":[]},"reports":[{"name":"DASHBOARD.html","kind":"Boards","href":"DASHBOARD.html","file":"_00-Project-Management/42-Monitor/DASHBOARD.html"}],"docs":[],"specs":[],"templates":[{"id":"ADR.template","title":"ADR-NNNN · <title>","file":"_00-Project-Management/91-Templates/ADR.template.md","ext":"md","bodyHtml":"<h1>ADR-NNNN · &lt;title&gt;</h1>\n<h2>Context</h2>\n<p>&lt;what situation forced this decision. What you knew, what you didn&#39;t, why now. 2–4 sentences.&gt;</p>\n<h2>Diagram</h2>\n<p>&lt;!-- Optional. Delete this section if no diagram adds value. Reach for one when the decision      hinges on a flow, topology, or state machine that&#39;s clearer drawn than described.      Markdown → Mermaid (per ADR-0005); see 91-Templates/DIAGRAM-CHEATSHEET.md. --&gt;</p>\n<pre><code class=\"lang-mermaid\">flowchart LR\n    A[Option considered] --&gt; B[trade-off]</code></pre>\n<h2>Decision</h2>\n<p>&lt;the choice, stated as a present-tense imperative. Brief and unambiguous.&gt;</p>\n<blockquote>Example: &quot;Use Postgres <code>jsonb</code> for the <code>order.metadata</code> column rather than a separate normalised table.&quot;</blockquote>\n<h2>Alternatives considered</h2>\n<p>&lt;!-- If ≥3 viable approaches were compared, prefer building the sibling HTML first      (91-Templates/EXPLORATION.template.html → 41-Reports/EXPLORATION-YYYY-MM-DD-&lt;slug&gt;.html),      radio-select the winner, and paste its &quot;Export → ADR options block&quot; output below.      Reference the artefact via the <code>exploration_html:</code> frontmatter field above, or with a      markdown link in this section body — e.g.      <a href=\"../41-Reports/EXPLORATION-YYYY-MM-DD-&lt;slug&gt;.html\">side-by-side exploration</a>. --&gt;</p>\n<ol>\n<li><strong>&lt;option&gt;</strong> — &lt;why not chosen&gt;</li>\n<li><strong>&lt;option&gt;</strong> — &lt;why not chosen&gt;</li>\n<li><strong>&lt;option&gt;</strong> — &lt;why not chosen&gt;</li>\n</ol>\n<h2>Consequences</h2>\n<p><strong>Positive:</strong></p>\n<ul>\n<li>&lt;bullet&gt;</li>\n<li>&lt;bullet&gt;</li>\n</ul>\n<p><strong>Negative / trade-offs:</strong></p>\n<ul>\n<li>&lt;bullet&gt;</li>\n<li>&lt;bullet&gt;</li>\n</ul>\n<p><strong>Neutral:</strong></p>\n<ul>\n<li>&lt;bullet — things that change but aren&#39;t a win or loss&gt;</li>\n</ul>\n<h2>Review trigger</h2>\n<p>&lt;when to revisit this decision. A date, a metric threshold, an event. Examples:&gt;</p>\n<ul>\n<li><em>Revisit if query volume on <code>metadata</code> field exceeds 1k/sec</em></li>\n<li><em>Revisit after 6 months in production</em></li>\n<li><em>Revisit if we add a second tenant with different schema needs</em></li>\n</ul>\n<h2>Links</h2>\n<ul>\n<li><strong>Originating story:</strong> STORY-NN.M.PP</li>\n<li><strong>Related ADRs:</strong> &lt;or &quot;—&quot;&gt;</li>\n<li><strong>External references:</strong> &lt;docs, blog posts, RFCs&gt;</li>\n</ul>\n","href":""},{"id":"AI-CODE-REVIEW.template","title":"AI-CODE-REVIEW.template","file":"_00-Project-Management/91-Templates/AI-CODE-REVIEW.template.html","ext":"html","bodyHtml":"","href":"../91-Templates/AI-CODE-REVIEW.template.html"},{"id":"BACKLOG.template","title":"rice_score: <int>   # OPTIONAL. RICE = reach × impact × confidence ÷ effort, rounded.","file":"_00-Project-Management/91-Templates/BACKLOG.template.md","ext":"md","bodyHtml":"<h1>BACKLOG-NNNN · &lt;title&gt;</h1>\n<h2>Why this exists</h2>\n<p>&lt;2–3 sentences. The pain or opportunity. What surfaced this. Today&#39;s behaviour vs the better behaviour.&gt;</p>\n<h2>Why backlog (not blocker)</h2>\n<p>&lt;why this isn&#39;t a P0 right now. Workaround in place? Stable as-is? Risk acceptable?&gt;</p>\n<h2>Work tranches</h2>\n<p>&lt;break larger backlog items into stages. Each tranche can become a story when promoted.&gt;</p>\n<h3>Tranche A — &lt;name&gt; (estimate: &lt;S|M|L&gt;)</h3>\n<ul>\n<li>[ ] &lt;bullet&gt;</li>\n<li>[ ] &lt;bullet&gt;</li>\n</ul>\n<h3>Tranche B — &lt;name&gt; (estimate: &lt;S|M|L&gt;)</h3>\n<ul>\n<li>[ ] &lt;bullet&gt;</li>\n</ul>\n<h2>Acceptance — when this can be marked done</h2>\n<ul>\n<li>&lt;bullet — what &quot;fixed&quot; looks like&gt;</li>\n<li>&lt;bullet&gt;</li>\n</ul>\n<h2>Promotion criteria</h2>\n<p>&lt;what would cause this to be pulled into a real story?&gt;</p>\n<ul>\n<li>&lt;e.g. &quot;when we hit 100 active users&quot;, or &quot;before public launch&quot;, or &quot;next time someone touches this file&quot;&gt;</li>\n</ul>\n<h2>Related</h2>\n<ul>\n<li>&lt;stories / bugs / ADRs&gt;</li>\n</ul>\n","href":""},{"id":"BUG.template","title":"BUG-YYYYMMDD-NN · <symptom>","file":"_00-Project-Management/91-Templates/BUG.template.md","ext":"md","bodyHtml":"<h1>BUG-YYYYMMDD-NN · &lt;symptom&gt;</h1>\n<h2>Summary</h2>\n<p>&lt;one sentence, plain English, from the user&#39;s perspective. What&#39;s broken.&gt;</p>\n<h2>Source</h2>\n<ul>\n<li><strong>Failing testplan:</strong> <code>&lt;path to TESTPLAN-*.md&gt;</code></li>\n<li><strong>Failing test case:</strong> TC-NN</li>\n<li><strong>Originating story:</strong> <code>&lt;path to STORY-*.md&gt;</code></li>\n</ul>\n<h2>Environment</h2>\n<ul>\n<li><strong>Branch:</strong> &lt;git branch&gt;</li>\n<li><strong>Commit SHA:</strong> &lt;full sha&gt;</li>\n<li><strong>Runtime:</strong> &lt;node / python / etc. + version&gt;</li>\n<li><strong>Browser / project:</strong> &lt;e.g. chromium headless, or &quot;n/a&quot;&gt;</li>\n<li><strong>OS:</strong> &lt;e.g. Windows 11&gt;</li>\n<li><strong>URL hit:</strong> &lt;or &quot;n/a&quot;&gt;</li>\n<li><strong>Auth state:</strong> &lt;e.g. admin user, anonymous, n/a&gt;</li>\n</ul>\n<h2>Steps to reproduce</h2>\n<ol>\n<li>&lt;numbered, copy-pasteable&gt;</li>\n<li>&lt;…&gt;</li>\n<li>Observe: &lt;what happens&gt;</li>\n</ol>\n<p>A junior dev should be able to follow these and reproduce in under 5 minutes.</p>\n<h2>Expected behaviour</h2>\n<blockquote>&lt;quote the relevant AC verbatim from the source story&gt;</blockquote>\n<h2>Actual behaviour</h2>\n<p>&lt;what happened instead. Include exact error message, HTTP status, stack trace, console error, screenshot path if applicable.&gt;</p>\n<h2>Evidence</h2>\n<pre><code class=\"lang-\">&lt;pasted log output, trimmed to ≤30 lines, key frames preserved&gt;</code></pre>\n<ul>\n<li><strong>Error tracker URL:</strong> &lt;e.g. Sentry event, or &quot;—&quot;&gt;</li>\n<li><strong>Screenshot / video path:</strong> &lt;or &quot;—&quot;&gt;</li>\n<li><strong>Network HAR:</strong> &lt;or &quot;—&quot;&gt;</li>\n</ul>\n<h2>First analysis</h2>\n<p><strong>Hypothesis — not yet verified end-to-end:</strong></p>\n<p>&lt;your best initial guess at root cause. Which file/function is suspect, why (line refs welcome). Mark uncertainty clearly.&gt;</p>\n<p>Supporting evidence:</p>\n<ul>\n<li>&lt;bullet&gt;</li>\n<li>&lt;bullet&gt;</li>\n</ul>\n<h2>Suggested fix direction</h2>\n<p>&lt;one or two concrete options the junior could pursue, plus risks/trade-offs. Not a full solution — a starting line.&gt;</p>\n<p><strong>Option A:</strong> &lt;approach&gt; — risk: &lt;one line&gt; <strong>Option B:</strong> &lt;approach&gt; — risk: &lt;one line&gt;</p>\n<h2>Acceptance criteria for the fix</h2>\n<ul>\n<li>[ ] TC-NN passes</li>\n<li>[ ] No regression in &lt;other TCs to spot-check&gt;</li>\n<li>[ ] No new errors in &lt;error tracker&gt; for &lt;component&gt;</li>\n<li>[ ] &lt;project-specific gate per <code>PROJECT-CONTEXT.md</code>&gt;</li>\n</ul>\n<h2>Related</h2>\n<ul>\n<li>&lt;duplicate or sibling BUG-* files&gt;</li>\n<li>&lt;related stories&gt;</li>\n<li>&lt;related PRs&gt;</li>\n</ul>\n","href":""},{"id":"DIAGRAM-CHEATSHEET","title":"Diagram Cheatsheet — Mermaid & SVG","file":"_00-Project-Management/91-Templates/DIAGRAM-CHEATSHEET.md","ext":"md","bodyHtml":"<h1>Diagram Cheatsheet — Mermaid &amp; SVG</h1>\n<p>Copy-paste worked examples for the kit&#39;s diagram convention. <strong>The rule (ADR-0005):</strong></p>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>Where the diagram lives</th><th>Use</th><th>Why</th></tr></thead><tbody><tr><td>A markdown artefact (<code>.md</code>) — Epic, Feature, ADR, Standard, PRD</td><td><strong>Mermaid</strong> fenced block</td><td>Renders natively on GitHub + VS Code preview; stays text-diffable; no external asset</td></tr><tr><td>An HTML artefact (<code>.html</code>) — exploration, report, dashboard</td><td><strong>Inline SVG</strong> in the template&#39;s SVG slot</td><td>Reflows with the page, inherits light/dark theme tokens, keeps HTML artefacts CDN-free</td></tr></tbody></table></div>\n<p>Reach for a diagram whenever a multi-step async flow, system topology, or state-machine transition would be clearer than prose. See SOP §11.1 and ADR-0005.</p>\n<blockquote><strong>Version note:</strong> all Mermaid below uses syntax that has rendered on GitHub and in VS Code since 2022 (<code>flowchart</code>, <code>sequenceDiagram</code>, <code>stateDiagram-v2</code>, <code>erDiagram</code>). If a viewer with an older Mermaid build fails to render <code>stateDiagram-v2</code>, fall back to the v1 <code>stateDiagram</code> keyword (same body syntax).</blockquote>\n<hr>\n<h2>1. Flowchart — <code>flowchart</code></h2>\n<p>Use for processes, decision trees, branching logic, &quot;how does a request flow through the system&quot;.</p>\n<p>````markdown</p>\n<pre><code class=\"lang-mermaid\">flowchart TD\n    A[New requirement] --&gt; B{Sized?}\n    B -- &quot;one-line idea&quot; --&gt; C[Inbox]\n    B -- &quot;1–2 day&quot; --&gt; D[Story under Feature]\n    B -- &quot;1–2 week&quot; --&gt; E[New Feature]\n    B -- &quot;strategic bet&quot; --&gt; F[New Epic]\n    C --&gt; G[Friday refinement]\n    D --&gt; G\n    E --&gt; G\n    F --&gt; G\n    G --&gt; H{Passes DoR?}\n    H -- yes --&gt; I[ready]\n    H -- no --&gt; G</code></pre>\n<p>````</p>\n<p>Renders as:</p>\n<pre><code class=\"lang-mermaid\">flowchart TD\n    A[New requirement] --&gt; B{Sized?}\n    B -- &quot;one-line idea&quot; --&gt; C[Inbox]\n    B -- &quot;1–2 day&quot; --&gt; D[Story under Feature]\n    B -- &quot;1–2 week&quot; --&gt; E[New Feature]\n    B -- &quot;strategic bet&quot; --&gt; F[New Epic]\n    C --&gt; G[Friday refinement]\n    D --&gt; G\n    E --&gt; G\n    F --&gt; G\n    G --&gt; H{Passes DoR?}\n    H -- yes --&gt; I[ready]\n    H -- no --&gt; G</code></pre>\n<p><strong>Tips:</strong> <code>TD</code> = top-down, <code>LR</code> = left-right. <code>[box]</code> = process, <code>{diamond}</code> = decision, <code>([stadium])</code> = start/end. Quote edge labels containing punctuation.</p>\n<hr>\n<h2>2. Sequence diagram — <code>sequenceDiagram</code></h2>\n<p>Use for request/response ordering, async message flows, &quot;who calls whom and in what order&quot;.</p>\n<p>````markdown</p>\n<pre><code class=\"lang-mermaid\">sequenceDiagram\n    actor Op as Operator\n    participant CC as Claude Code\n    participant FS as PM folder\n    participant Lint as pm:lint\n    Op-&gt;&gt;CC: paste prompt 06 (execute story)\n    CC-&gt;&gt;FS: read story + testplan + PROJECT-CONTEXT\n    CC-&gt;&gt;FS: flip status → in-progress, set started_at\n    CC-&gt;&gt;CC: implement ACs\n    CC-&gt;&gt;Lint: npm run pm:lint\n    Lint--&gt;&gt;CC: 0 violations\n    CC-&gt;&gt;FS: flip status → in-review\n    CC--&gt;&gt;Op: report ACs done, ready for QA</code></pre>\n<p>````</p>\n<p>Renders as:</p>\n<pre><code class=\"lang-mermaid\">sequenceDiagram\n    actor Op as Operator\n    participant CC as Claude Code\n    participant FS as PM folder\n    participant Lint as pm:lint\n    Op-&gt;&gt;CC: paste prompt 06 (execute story)\n    CC-&gt;&gt;FS: read story + testplan + PROJECT-CONTEXT\n    CC-&gt;&gt;FS: flip status → in-progress, set started_at\n    CC-&gt;&gt;CC: implement ACs\n    CC-&gt;&gt;Lint: npm run pm:lint\n    Lint--&gt;&gt;CC: 0 violations\n    CC-&gt;&gt;FS: flip status → in-review\n    CC--&gt;&gt;Op: report ACs done, ready for QA</code></pre>\n<p><strong>Tips:</strong> <code>-&gt;&gt;</code> = solid call, <code>--&gt;&gt;</code> = dashed return. <code>actor</code> draws a stick figure; <code>participant</code> draws a box. Declare participants up front to control left-right order.</p>\n<hr>\n<h2>3. State machine — <code>stateDiagram-v2</code></h2>\n<p>Use for lifecycle / status enums and any &quot;this thing moves between a closed set of states&quot;.</p>\n<p>````markdown</p>\n<pre><code class=\"lang-mermaid\">stateDiagram-v2\n    [*] --&gt; not_started\n    not_started --&gt; ready : passes DoR\n    ready --&gt; in_progress : pulled to Active\n    in_progress --&gt; in_review : code done\n    in_review --&gt; done : passes DoD\n    in_review --&gt; ready : bug found (loops back)\n    in_progress --&gt; blocked : external dependency\n    blocked --&gt; ready : unblocked\n    done --&gt; [*]</code></pre>\n<p>````</p>\n<p>Renders as:</p>\n<pre><code class=\"lang-mermaid\">stateDiagram-v2\n    [*] --&gt; not_started\n    not_started --&gt; ready : passes DoR\n    ready --&gt; in_progress : pulled to Active\n    in_progress --&gt; in_review : code done\n    in_review --&gt; done : passes DoD\n    in_review --&gt; ready : bug found (loops back)\n    in_progress --&gt; blocked : external dependency\n    blocked --&gt; ready : unblocked\n    done --&gt; [*]</code></pre>\n<p><strong>Tips:</strong> <code>[*]</code> = start/end pseudo-state. State names can&#39;t contain hyphens — use underscores (<code>in_progress</code>) and a friendly <code>: label</code> if needed. Falls back to <code>stateDiagram</code> (v1) on older renderers.</p>\n<hr>\n<h2>4. ERD-light — <code>erDiagram</code></h2>\n<p>Use for data-model sketches: entities, relationships, cardinality. &quot;Light&quot; = enough to communicate shape, not a full schema dump.</p>\n<p>````markdown</p>\n<pre><code class=\"lang-mermaid\">erDiagram\n    EPIC ||--o{ FEATURE : contains\n    FEATURE ||--o{ STORY : contains\n    STORY ||--|| TESTPLAN : &quot;paired with&quot;\n    STORY ||--o{ BUG : &quot;may raise&quot;\n    STORY }o--o{ ADR : &quot;may reference&quot;\n    EPIC {\n        string id\n        string okr\n        enum status\n    }\n    STORY {\n        string id\n        enum estimate\n        enum status\n    }</code></pre>\n<p>````</p>\n<p>Renders as:</p>\n<pre><code class=\"lang-mermaid\">erDiagram\n    EPIC ||--o{ FEATURE : contains\n    FEATURE ||--o{ STORY : contains\n    STORY ||--|| TESTPLAN : &quot;paired with&quot;\n    STORY ||--o{ BUG : &quot;may raise&quot;\n    STORY }o--o{ ADR : &quot;may reference&quot;\n    EPIC {\n        string id\n        string okr\n        enum status\n    }\n    STORY {\n        string id\n        enum estimate\n        enum status\n    }</code></pre>\n<p><strong>Cardinality crow&#39;s-foot legend:</strong> <code>||</code> = exactly one, <code>o{</code> = zero-or-many, <code>|{</code> = one-or-many, <code>o|</code> = zero-or-one. Read left-to-right: <code>EPIC ||--o{ FEATURE</code> = &quot;one Epic contains zero-or-many Features&quot;.</p>\n<hr>\n<h2>5. SVG in HTML artefacts</h2>\n<p>For HTML artefacts, don&#39;t use Mermaid — author inline SVG inside the template&#39;s named SVG slot so it inherits theme tokens and needs no runtime. The slot lives in <a href=\"#\"><code>HTML-ARTEFACT.template.html</code></a>, marked <code>data-slot=&quot;svg&quot;</code> on the <code>.svg-wrap</code> container inside the Diagram panel. Copy the template, then replace the placeholder <code>&lt;svg&gt;</code> with your diagram. Use <code>var(--…)</code> CSS variables (e.g. <code>fill=&quot;var(--blue-soft)&quot;</code>, <code>stroke=&quot;var(--blue)&quot;</code>) so the diagram adapts to light/dark mode automatically.</p>\n<pre><code class=\"lang-html\">&lt;div class=&quot;svg-wrap&quot; data-slot=&quot;svg&quot;&gt;\n  &lt;svg viewBox=&quot;0 0 600 220&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; role=&quot;img&quot; aria-labelledby=&quot;diag-title&quot;&gt;\n    &lt;title id=&quot;diag-title&quot;&gt;Describe the diagram for screen readers&lt;/title&gt;\n    &lt;!-- shapes using var(--blue), var(--teal), etc. so dark mode just works --&gt;\n  &lt;/svg&gt;\n&lt;/div&gt;</code></pre>\n<p><strong>Tips:</strong> always include a <code>&lt;title&gt;</code> for accessibility, give the <code>&lt;svg&gt;</code> a <code>viewBox</code> (not fixed width/height) so it scales, and colour with theme variables rather than hard-coded hex.</p>\n<hr>\n<h2>Quick reference</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>Need</th><th>Diagram type</th><th>Keyword</th></tr></thead><tbody><tr><td>Process / branching / decisions</td><td>Flowchart</td><td><code>flowchart TD</code> / <code>flowchart LR</code></td></tr><tr><td>Ordered message exchange</td><td>Sequence</td><td><code>sequenceDiagram</code></td></tr><tr><td>Lifecycle / status enum</td><td>State machine</td><td><code>stateDiagram-v2</code></td></tr><tr><td>Data model shape</td><td>ERD-light</td><td><code>erDiagram</code></td></tr><tr><td>Diagram inside an HTML artefact</td><td>Inline SVG</td><td><code>&lt;svg&gt;</code> in the <code>data-slot=&quot;svg&quot;</code> region</td></tr></tbody></table></div>\n","href":""},{"id":"EPIC.template","title":"EPIC-NN · <title>","file":"_00-Project-Management/91-Templates/EPIC.template.md","ext":"md","bodyHtml":"<h1>EPIC-NN · &lt;title&gt;</h1>\n<h2>Goal</h2>\n<p>&lt;2–4 sentences. The user-visible outcome. Plain English.&gt;</p>\n<h2>Diagram</h2>\n<p>&lt;!-- Optional. Delete this section if no diagram adds value. Reach for one when topology,      a multi-step flow, or a state machine would be clearer than prose. Markdown → Mermaid      (per ADR-0005); see 91-Templates/DIAGRAM-CHEATSHEET.md for worked examples. --&gt;</p>\n<pre><code class=\"lang-mermaid\">flowchart LR\n    A[Replace with the epic&#39;s flow / topology] --&gt; B[next]</code></pre>\n<h2>Strategic linkage</h2>\n<ul>\n<li><strong>OKR:</strong> &lt;link or text — which Objective and Key Result this moves&gt;</li>\n<li><strong>Why now:</strong> &lt;why this quarter, not next&gt;</li>\n<li><strong>Business outcome:</strong> &lt;metric this should move and by how much&gt;</li>\n</ul>\n<h2>In scope</h2>\n<ul>\n<li>&lt;bullet&gt;</li>\n<li>&lt;bullet&gt;</li>\n</ul>\n<h2>Out of scope</h2>\n<ul>\n<li>&lt;bullet — explicit deferrals&gt;</li>\n<li>&lt;bullet&gt;</li>\n</ul>\n<h2>Success criteria</h2>\n<ul>\n<li>&lt;measurable bullet — a number, a state, or a binary outcome&gt;</li>\n<li>&lt;measurable bullet&gt;</li>\n</ul>\n<h2>Features</h2>\n<ul>\n<li><a href=\"../31-Features/EPIC-NN/FEAT-NN.M-&lt;slug&gt;.md\">FEAT-NN.M — &lt;title&gt;</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li><strong>Other epics:</strong> &lt;or &quot;none&quot;&gt;</li>\n<li><strong>Infrastructure:</strong> &lt;or &quot;none&quot;&gt;</li>\n<li><strong>External:</strong> &lt;vendors, approvals, data — or &quot;none&quot;&gt;</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> &lt;collections / tables / services&gt;</li>\n<li><strong>Writes:</strong> &lt;collections / tables / services&gt;</li>\n<li><strong>New schema:</strong> &lt;or &quot;none&quot;&gt;</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li><strong>&lt;risk&gt;</strong> — mitigation: &lt;one line&gt;</li>\n<li><strong>&lt;risk&gt;</strong> — mitigation: &lt;one line&gt;</li>\n</ul>\n<h2>Decisions</h2>\n<p>&lt;populated as ADRs are created during execution&gt; &lt;!-- - <a href=\"../40-Decisions/ADR-NNNN-&lt;slug&gt;.md\">ADR-NNNN — &lt;title&gt;</a> --&gt;</p>\n","href":""},{"id":"EXPLORATION.template","title":"EXPLORATION.template","file":"_00-Project-Management/91-Templates/EXPLORATION.template.html","ext":"html","bodyHtml":"","href":"../91-Templates/EXPLORATION.template.html"},{"id":"FEATURE.template","title":"ships — one plain sentence about the capability, not the build.","file":"_00-Project-Management/91-Templates/FEATURE.template.md","ext":"md","bodyHtml":"<h1>FEAT-NN.M · &lt;title&gt;</h1>\n<h2>Goal</h2>\n<p>&lt;one paragraph. The slice of the epic this delivers.&gt;</p>\n<h2>User value</h2>\n<p>&lt;the operator/customer experience that improves. One sentence.&gt;</p>\n<h2>Diagram</h2>\n<p>&lt;!-- Optional. Delete this section if no diagram adds value. Reach for one when a flow,      interaction, or state transition would be clearer than prose. Markdown → Mermaid      (per ADR-0005); see 91-Templates/DIAGRAM-CHEATSHEET.md for worked examples. --&gt;</p>\n<pre><code class=\"lang-mermaid\">flowchart LR\n    A[Replace with the feature&#39;s flow] --&gt; B[next]</code></pre>\n<h2>Scope</h2>\n<ul>\n<li>&lt;bullet — what this feature includes&gt;</li>\n<li>&lt;bullet&gt;</li>\n</ul>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] &lt;testable AC — what must be true when the feature is shipped&gt;</li>\n<li>[ ] &lt;testable AC&gt;</li>\n<li>[ ] &lt;testable AC&gt;</li>\n</ul>\n<h2>Stories</h2>\n<ul>\n<li><a href=\"../../32-Stories/EPIC-NN/FEAT-NN.M/STORY-NN.M.PP-&lt;slug&gt;.md\">STORY-NN.M.PP — &lt;title&gt;</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>&lt;other features / stories / infra&gt;</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> &lt;…&gt;</li>\n<li><strong>Writes:</strong> &lt;…&gt;</li>\n<li><strong>New schema / migration:</strong> &lt;or &quot;none&quot;&gt;</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li>&lt;bullet&gt;</li>\n</ul>\n<h2>Decisions</h2>\n<p>&lt;list ADRs created during this feature&#39;s execution&gt; &lt;!-- - <a href=\"../../40-Decisions/ADR-NNNN-&lt;slug&gt;.md\">ADR-NNNN — &lt;title&gt;</a> --&gt;</p>\n","href":""},{"id":"HTML-ARTEFACT.template","title":"HTML-ARTEFACT.template","file":"_00-Project-Management/91-Templates/HTML-ARTEFACT.template.html","ext":"html","bodyHtml":"","href":"../91-Templates/HTML-ARTEFACT.template.html"},{"id":"PRD.template","title":"PRD-<slug> · <human-readable title>","file":"_00-Project-Management/91-Templates/PRD.template.md","ext":"md","bodyHtml":"<h1>PRD-&lt;slug&gt; · &lt;human-readable title&gt;</h1>\n<p><strong>Status:</strong> draft | reviewed | approved | superseded <strong>Date:</strong> YYYY-MM-DD <strong>Author:</strong> &lt;name / hat&gt; <strong>Owner:</strong> &lt;name / hat&gt; <strong>Source:</strong> &lt;which OKR KR, North Star section, or BACKLOG entry triggered this&gt; <strong>Related Epic(s):</strong> &lt;EPIC-NN if known, else &quot;TBD via /Tandem:draft-epic&quot;&gt;</p>\n<blockquote>PRDs in this kit are <strong>lightweight, markdown-only documents</strong>. They have no frontmatter (the validator doesn&#39;t scan <code>20-Requirements/</code>) and no closed-set status enum — they sit upstream of the Epic/Feature/Story graph and feed it. A PRD describes the problem and the desired end state; the Epic encodes the work commitment.  The 8 H2 sections below are mandatory. Add appendices below as needed; do <strong>not</strong> remove or rename the 8 mandatory headings, since downstream skills and the <code>draft-prd</code> testplan grep for them by exact string.</blockquote>\n<hr>\n<h2>Problem</h2>\n<p>&lt;What&#39;s broken, missing, or painful today. 2–5 sentences. Plain English — describe the user&#39;s lived experience, not the technical symptom. If you can&#39;t write this without naming a solution, you don&#39;t understand the problem yet.&gt;</p>\n<h2>Audience</h2>\n<p>&lt;Who hits this problem. Be specific: roles, contexts, frequency. &quot;Everyone&quot; is not an audience.&gt;</p>\n<ul>\n<li><strong>Primary:</strong> &lt;role + context — the user this PRD optimises for&gt;</li>\n<li><strong>Secondary:</strong> &lt;other roles affected, with one line on how&gt;</li>\n<li><strong>Out of audience:</strong> &lt;roles explicitly NOT in scope, and why&gt;</li>\n</ul>\n<h2>Goals</h2>\n<p>&lt;The user-visible outcomes this PRD commits to delivering. 3–5 bullets. Each phrased as a state the world is in once shipped, not a feature to build.&gt;</p>\n<ul>\n<li>&lt;goal — measurable or directly observable end-state&gt;</li>\n<li>&lt;goal&gt;</li>\n<li>&lt;goal&gt;</li>\n</ul>\n<h2>Non-goals</h2>\n<p>&lt;Explicit deferrals. The &quot;we&#39;re NOT solving X&quot; list is how mid-spec creep is resisted. 3–5 bullets minimum.&gt;</p>\n<ul>\n<li>&lt;non-goal — something stakeholders might assume is in scope but isn&#39;t&gt;</li>\n<li>&lt;non-goal&gt;</li>\n<li>&lt;non-goal&gt;</li>\n</ul>\n<h2>Success metrics</h2>\n<p>&lt;How we&#39;ll know this PRD succeeded after shipping. Quantitative where possible; binary state otherwise. Tie back to the source OKR KR if applicable.&gt;</p>\n<ul>\n<li><strong>&lt;metric&gt;</strong> — current: &lt;baseline&gt;, target: &lt;number + deadline&gt;</li>\n<li><strong>&lt;metric&gt;</strong> — current: &lt;baseline&gt;, target: &lt;number + deadline&gt;</li>\n<li><strong>&lt;qualitative check&gt;</strong> — binary state observable by &lt;date&gt;</li>\n</ul>\n<h2>Key requirements</h2>\n<p>&lt;The &quot;what must be true&quot; list. Not implementation. Each requirement should be testable. Number them so downstream Epics + Stories can reference them.&gt;</p>\n<ol>\n<li><strong>R1 — &lt;requirement&gt;</strong> — &lt;one sentence on what it means in practice&gt;</li>\n<li><strong>R2 — &lt;requirement&gt;</strong> — &lt;one sentence&gt;</li>\n<li><strong>R3 — &lt;requirement&gt;</strong> — &lt;one sentence&gt;</li>\n<li><strong>R4 — &lt;requirement&gt;</strong> — &lt;one sentence&gt;</li>\n</ol>\n<h2>Constraints</h2>\n<p>&lt;Hard limits the solution must respect. Technical (stack, infra), business (cost, timeline, regulatory), and operational (team capacity, dependencies). Be explicit — assumed constraints rot fast.&gt;</p>\n<ul>\n<li><strong>Technical:</strong> &lt;stack / infra / compatibility limits&gt;</li>\n<li><strong>Business:</strong> &lt;timeline, budget, regulatory&gt;</li>\n<li><strong>Operational:</strong> &lt;team size, dependencies, on-call capacity&gt;</li>\n</ul>\n<h2>Open questions</h2>\n<p>&lt;Things we don&#39;t know yet but need to answer before (or during) Epic drafting. Better to list these honestly than fake certainty.&gt;</p>\n<ul>\n<li>[ ] &lt;question — who needs to answer / how&gt;</li>\n<li>[ ] &lt;question&gt;</li>\n<li>[ ] &lt;question&gt;</li>\n</ul>\n<hr>\n<h2>Appendices (optional)</h2>\n<p>Use appendices for material that supports the 8 mandatory sections but doesn&#39;t belong inside them — e.g. user research summaries, competitor scans, glossaries, frontmatter contracts for any new artefact types introduced.</p>\n","href":""},{"id":"RELEASE.template","title":"RELEASE-vX.Y · <title>","file":"_00-Project-Management/91-Templates/RELEASE.template.md","ext":"md","bodyHtml":"<h1>RELEASE-vX.Y · &lt;title&gt;</h1>\n<h2>Summary</h2>\n<p>&lt;one paragraph. What ships, who it&#39;s for, what it unlocks.&gt;</p>\n<h2>Stories included</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>Story</th><th>Title</th><th>Status</th></tr></thead><tbody><tr><td>STORY-NN.M.PP</td><td>&lt;title&gt;</td><td>done</td></tr><tr><td>STORY-NN.M.PP</td><td>&lt;title&gt;</td><td>done</td></tr></tbody></table></div>\n<h2>Bugs fixed</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>Bug</th><th>Summary</th></tr></thead><tbody><tr><td>BUG-YYYYMMDD-NN</td><td>&lt;…&gt;</td></tr></tbody></table></div>\n<h2>Decisions ratified</h2>\n<ul>\n<li>ADR-NNNN — &lt;title&gt;</li>\n</ul>\n<h2>Migration / breaking changes</h2>\n<p>&lt;does anything need to be migrated? Schema changes? Env var renames? Config?&gt;</p>\n<ul>\n<li>&lt;bullet — or &quot;none&quot;&gt;</li>\n</ul>\n<h2>Smoke-test checklist</h2>\n<p>Run these after deploy to confirm the release works in production.</p>\n<ul>\n<li>[ ] &lt;user-facing path / smoke test&gt;</li>\n<li>[ ] &lt;admin path / smoke test&gt;</li>\n<li>[ ] &lt;integration / webhook smoke test&gt;</li>\n<li>[ ] Error tracker shows no new errors after 15 minutes</li>\n<li>[ ] Performance metrics within budget</li>\n</ul>\n<h2>Rollback plan</h2>\n<p>&lt;how to revert if smoke fails. Be specific about commands and conditions.&gt;</p>\n<ol>\n<li>&lt;command&gt;</li>\n<li>&lt;command&gt;</li>\n</ol>\n<p><strong>Time budget for rollback:</strong> &lt;e.g. &quot;must be able to revert within 10 minutes&quot;&gt;</p>\n<h2>Communication</h2>\n<ul>\n<li>[ ] Internal notes posted (where: &lt;…&gt;)</li>\n<li>[ ] External release notes drafted (if customer-facing)</li>\n<li>[ ] Stakeholders notified</li>\n</ul>\n<h2>Metrics to watch (post-deploy)</h2>\n<ul>\n<li>&lt;metric and target&gt;</li>\n<li>&lt;metric and target&gt;</li>\n</ul>\n<h2>Retro hook</h2>\n<p>This release will be discussed in <code>RETRO-YYYY-MM.md</code>. Items to surface there:</p>\n<ul>\n<li>&lt;what went well&gt;</li>\n<li>&lt;what hurt&gt;</li>\n</ul>\n","href":""},{"id":"RETRO.template","title":"RETRO-YYYY-MM · <month> <year>","file":"_00-Project-Management/91-Templates/RETRO.template.md","ext":"md","bodyHtml":"<h1>RETRO-YYYY-MM · &lt;month&gt; &lt;year&gt;</h1>\n<h2>Period</h2>\n<ul>\n<li>From: YYYY-MM-DD</li>\n<li>To: YYYY-MM-DD</li>\n</ul>\n<h2>Metrics</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>Metric</th><th>This period</th><th>Last period</th><th>Δ</th></tr></thead><tbody><tr><td>Stories shipped</td><td><em>&lt;count&gt;</em></td><td><em>&lt;count&gt;</em></td><td><em>&lt;±&gt;</em></td></tr><tr><td>Bugs filed</td><td><em>&lt;count&gt;</em></td><td><em>&lt;count&gt;</em></td><td><em>&lt;±&gt;</em></td></tr><tr><td>Bugs fixed</td><td><em>&lt;count&gt;</em></td><td><em>&lt;count&gt;</em></td><td><em>&lt;±&gt;</em></td></tr><tr><td>ADRs created</td><td><em>&lt;count&gt;</em></td><td><em>&lt;count&gt;</em></td><td><em>&lt;±&gt;</em></td></tr><tr><td>Average story cycle time</td><td><em>&lt;days&gt;</em></td><td><em>&lt;days&gt;</em></td><td><em>&lt;±&gt;</em></td></tr><tr><td>Time in <code>blocked</code></td><td><em>&lt;days&gt;</em></td><td><em>&lt;days&gt;</em></td><td><em>&lt;±&gt;</em></td></tr></tbody></table></div>\n<h2>What worked</h2>\n<p>&lt;what to keep doing. Be specific — not &quot;communication&quot;, but &quot;the Friday 30-min refinement caught 3 stories that would have been pulled with missing dependencies&quot;.&gt;</p>\n<ul>\n<li>&lt;bullet&gt;</li>\n<li>&lt;bullet&gt;</li>\n<li>&lt;bullet&gt;</li>\n</ul>\n<h2>What hurt</h2>\n<p>&lt;what to stop or change. Be specific — not &quot;speed&quot;, but &quot;I shipped 4 stories without ADRs and now can&#39;t reconstruct two decisions&quot;.&gt;</p>\n<ul>\n<li>&lt;bullet&gt;</li>\n<li>&lt;bullet&gt;</li>\n<li>&lt;bullet&gt;</li>\n</ul>\n<h2>Surprises</h2>\n<p>&lt;things that happened you didn&#39;t predict. Discoveries about users, stack, self. These often turn into ADRs or strategy updates.&gt;</p>\n<ul>\n<li>&lt;bullet&gt;</li>\n<li>&lt;bullet&gt;</li>\n</ul>\n<h2>Action from last retro — did it happen?</h2>\n<p>&lt;carry-forward the One Change from <code>RETRO-&lt;previous&gt;.md</code>. Did it work? Yes / partially / no — and why.&gt;</p>\n<ul>\n<li><strong>Last retro&#39;s change:</strong> &lt;…&gt;</li>\n<li><strong>Outcome:</strong> &lt;…&gt;</li>\n</ul>\n<h2>One change for next period</h2>\n<p>&lt;a single, concrete, owned action. Not a list. Not a hope. One thing.&gt;</p>\n<blockquote>Example: &quot;Run <code>npm run pm:lint</code> as a Husky pre-commit hook by week 2 of next month.&quot;</blockquote>\n<ul>\n<li><strong>The change:</strong> &lt;…&gt;</li>\n<li><strong>Owner:</strong> &lt;hat — Founder / PM / Dev / QA&gt;</li>\n<li><strong>Done when:</strong> &lt;observable condition&gt;</li>\n<li><strong>Review:</strong> in next month&#39;s retro</li>\n</ul>\n<h2>Strategic check</h2>\n<p>&lt;does the work this period still ladder into the current OKRs? If not, raise to Founder hat next session.&gt;</p>\n<ul>\n<li><strong>Drift detected?</strong> Yes | No</li>\n<li><strong>If yes — what&#39;s drifting:</strong> &lt;…&gt;</li>\n</ul>\n","href":""},{"id":"STORY.template","title":"story is done — one plain sentence about the capability,","file":"_00-Project-Management/91-Templates/STORY.template.md","ext":"md","bodyHtml":"<h1>STORY-NN.M.PP · &lt;title&gt;</h1>\n<h2>As</h2>\n<p>&lt;the role / persona — e.g. &quot;the operator&quot;, &quot;the customer&quot;, &quot;the engineering team&quot;&gt;</p>\n<h2>I want</h2>\n<p>&lt;the capability — what the user can do&gt;</p>\n<h2>So that</h2>\n<p>&lt;the value — why this matters&gt;</p>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] &lt;testable AC — a machine can verify this&gt;</li>\n<li>[ ] &lt;testable AC&gt;</li>\n<li>[ ] &lt;testable AC&gt;</li>\n</ul>\n<h2>Technical notes</h2>\n<ul>\n<li><strong>Files touched:</strong> &lt;paths&gt;</li>\n<li><strong>Libraries:</strong> &lt;new deps, or &quot;none&quot;&gt;</li>\n<li><strong>Pattern:</strong> &lt;reuse from / new pattern&gt;</li>\n<li><strong>Gotchas:</strong> &lt;or &quot;none&quot;&gt;</li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>&lt;other stories / infra / decisions — or &quot;none&quot;&gt;</li>\n</ul>\n<h2>References</h2>\n<ul>\n<li><strong>Feature:</strong> FEAT-NN.M</li>\n<li><strong>PRD:</strong> &lt;section or &quot;—&quot;&gt;</li>\n<li><strong>Mockup:</strong> &lt;path or Figma URL or &quot;—&quot;&gt;</li>\n<li><strong>Related ADRs:</strong> &lt;or &quot;—&quot;&gt;</li>\n</ul>\n<h2>DoR checklist</h2>\n<ul>\n<li>[ ] Paired TESTPLAN exists with every AC mapped to a TC</li>\n<li>[ ] Every TC has a runnable <code>Command:</code> Claude can execute unattended</li>\n<li>[ ] Dependencies done or scheduled</li>\n<li>[ ] Estimate set</li>\n<li>[ ] Risks section populated below</li>\n</ul>\n<h2>Risks / unknowns</h2>\n<ul>\n<li>&lt;bullet — or &quot;none; reviewed YYYY-MM-DD&quot;&gt;</li>\n</ul>\n<h2>DoD checklist</h2>\n<ul>\n<li>[ ] All AC ticked above</li>\n<li>[ ] Paired TESTPLAN run; all TCs PASS (or FAIL linked to BUG)</li>\n<li>[ ] Project quality gates pass (lint / typecheck / tests / build — see <code>PROJECT-CONTEXT.md</code>)</li>\n<li>[ ] No new runtime errors on smoke</li>\n<li>[ ] If UI: visual contract tests green</li>\n<li>[ ] <strong>AI-code review</strong> complete: <code>ai_review</code> frontmatter flipped to <code>completed-YYYY-MM-DD</code>, <code>skipped-trivial</code> (with <code>ai_review_skip_reason</code>), or <code>n-a</code> (no AI authorship). See SOP §7 for the &gt;50-lines / &gt;2-files trigger.</li>\n<li>[ ] Frontmatter updated: <code>status: done</code>, <code>completed_at: &lt;ISO 8601 now&gt;</code></li>\n<li>[ ] <code>42-Monitor/MONITOR.md</code> updated (bar + count + revision history line)</li>\n<li>[ ] ADRs created for any non-obvious decisions</li>\n<li>[ ] BACKLOG entry created for any new tech debt</li>\n</ul>\n","href":""},{"id":"TESTPLAN.template","title":"the run-testplan agent must read before executing TCs (mirrors","file":"_00-Project-Management/91-Templates/TESTPLAN.template.md","ext":"md","bodyHtml":"<h1>TESTPLAN-NN.M.PP · &lt;title&gt;</h1>\n<h2>Source story</h2>\n<p><code>_00-Project-Management/32-Stories/EPIC-NN/FEAT-NN.M/STORY-NN.M.PP-&lt;slug&gt;.md</code></p>\n<h2>Scope</h2>\n<p>&lt;one paragraph — what this plan verifies and what it deliberately doesn&#39;t&gt;</p>\n<h2>Preconditions</h2>\n<ul>\n<li>Repo at &lt;path&gt;, branch &lt;branch&gt;</li>\n<li>Runtime: &lt;node / python / etc. + version&gt;</li>\n<li>Dev URL / port: see <code>PROJECT-CONTEXT.md</code></li>\n<li>Required services running: &lt;list&gt;</li>\n<li>Required env vars: &lt;list&gt;</li>\n<li>Test data / fixtures: &lt;or &quot;none&quot;&gt;</li>\n</ul>\n<h2>Acceptance criteria → Test case map</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>#</th><th>Acceptance criterion (verbatim from story)</th><th>Test case</th></tr></thead><tbody><tr><td>AC-1</td><td>&lt;…&gt;</td><td>TC-01</td></tr><tr><td>AC-2</td><td>&lt;…&gt;</td><td>TC-02</td></tr><tr><td>AC-3</td><td>&lt;…&gt;</td><td>TC-03</td></tr></tbody></table></div>\n<h2>Test cases</h2>\n<h3>TC-01 · &lt;name&gt;</h3>\n<ul>\n<li><strong>Type:</strong> unit | integration | e2e | static-analysis | manual-review-by-claude</li>\n<li><strong>Priority:</strong> P0 | P1 | P2</li>\n<li><strong>Maps to:</strong> AC-1</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   # exact command Claude can run unattended   </code>``</p>\n<li><strong>Expected:</strong> &lt;pass condition — exit code, stdout substring, file presence, snapshot match, etc.&gt;</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-02 · &lt;name&gt;</h3>\n<ul>\n<li><strong>Type:</strong> &lt;…&gt;</li>\n<li><strong>Priority:</strong> &lt;…&gt;</li>\n<li><strong>Maps to:</strong> AC-2</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   </code>``</p>\n<li><strong>Expected:</strong> &lt;…&gt;</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-03 · &lt;name&gt;</h3>\n<ul>\n<li><strong>Type:</strong> &lt;…&gt;</li>\n<li><strong>Priority:</strong> &lt;…&gt;</li>\n<li><strong>Maps to:</strong> AC-3</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   </code>``</p>\n<li><strong>Expected:</strong> &lt;…&gt;</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h2>Code review checklist</h2>\n<ul>\n<li>[ ] Every story AC implemented</li>\n<li>[ ] No security regressions (auth / input validation / injection / authz)</li>\n<li>[ ] No performance regressions (bundle size, query count, render perf)</li>\n<li>[ ] Lint clean (see <code>PROJECT-CONTEXT.md</code> for command)</li>\n<li>[ ] Build clean</li>\n<li>[ ] Tests green</li>\n<li>[ ] No suppressed lint rules without justification</li>\n<li>[ ] Error paths covered (not just happy path)</li>\n<li>[ ] Logging / observability hooks added where exceptions can fire</li>\n<li>[ ] Documentation updated if behaviour contract changed</li>\n</ul>\n<h2>Risks / edge cases</h2>\n<ul>\n<li>&lt;edge case the TCs may not fully cover&gt;</li>\n<li>&lt;known flakiness or environment sensitivity&gt;</li>\n</ul>\n<h2>Sign-off</h2>\n<ul>\n<li>Code review: <em>pending</em></li>\n<li>All tests passed: <em>pending</em></li>\n<li>Date completed: &#39;&#39;</li>\n</ul>\n","href":""}],"prompts":[{"id":"01-draft-okrs-from-northstar","title":"Prompt 01 · Draft OKRs from North Star","file":"_00-Project-Management/92-Prompts/01-draft-okrs-from-northstar.md","ext":"md","bodyHtml":"<h1>Prompt 01 · Draft OKRs from North Star</h1>\n<p><strong>Trigger:</strong> Start of a quarter, or whenever the existing OKRs feel disconnected from the work.</p>\n<p><strong>Hat:</strong> Founder</p>\n<hr>\n<h2>Paste this into Claude</h2>\n<pre><code class=\"lang-\">You are operating as **Founder hat**.\n\nLoad these files into context:\n- 00-Strategy/NORTH-STAR.md\n- 00-Strategy/OKRS-YYYY-Qx.md (the previous quarter&#39;s, if it exists)\n- 00-Strategy/CUSTOMER-JOURNEY.md (if it exists)\n- 14-Retros/* (the most recent 1-2 retros, if they exist)\n- 90-Standards/SOP.md (for OKR rules)\n\nTask:\n1. Re-read the North Star. Has it shifted? If so, ask me before drafting new OKRs.\n2. Review the previous quarter&#39;s OKRs:\n   - Which Key Results were hit (≥70%)? Which missed?\n   - For each missed KR, was it the wrong target, the wrong action, or the wrong quarter?\n3. Draft a new OKRS-YYYY-Qx.md with:\n   - **Three Objectives max.** Each is a qualitative, ambitious shift this quarter.\n   - **Two-to-three Key Results per Objective.** Each is a measurable, time-boxed number.\n   - **Confidence column** (0-100%) for each KR — your honest probability of hitting it.\n   - A &quot;What we are deliberately NOT doing this quarter&quot; section.\n4. For each new Objective, explicitly link to the North Star section it serves.\n\nOutput rules:\n- Three Objectives is the ceiling, not the floor. Two is fine. One is fine if the focus warrants it.\n- KRs must be numbers or binary states. &quot;Improve X&quot; is not a KR. &quot;X reaches 100 by Sept 30&quot; is.\n- If a KR has confidence &gt; 90%, it&#39;s not ambitious. If &lt; 30%, it&#39;s not realistic. Aim 50-70%.\n- Show me the draft BEFORE writing the file. Wait for my edits before saving.\n- Set frontmatter: status=not-started, created_at=ISO 8601 with offset.\n\nHonour from CLAUDE.md:\n- Frontmatter timestamps\n- Status enum\n- Templates from 91-Templates/OKRS.template.md (or scaffold if it doesn&#39;t exist)\n\nFinal question to me before saving: &quot;Which of these will hurt to drop in 4 weeks?&quot; If I can&#39;t answer, the OKR set isn&#39;t focused enough.</code></pre>\n","href":""},{"id":"02-draft-epic-from-okr-or-prd","title":"Prompt 02 · Draft Epic from OKR or PRD","file":"_00-Project-Management/92-Prompts/02-draft-epic-from-okr-or-prd.md","ext":"md","bodyHtml":"<h1>Prompt 02 · Draft Epic from OKR or PRD</h1>\n<p><strong>Trigger:</strong> A new strategic bet is approved and needs to enter the work graph.</p>\n<p><strong>Hat:</strong> PM</p>\n<hr>\n<h2>Paste this into Claude</h2>\n<pre><code class=\"lang-\">You are operating as **PM hat**.\n\nLoad these files into context:\n- 00-Strategy/OKRS-YYYY-Qx.md (or the PRD at 20-Requirements/PRD-*.md)\n- 90-Standards/SOP.md (DoR, estimation, status enum)\n- 90-Standards/PROJECT-CONTEXT.md\n- 91-Templates/EPIC.template.md\n- Project root CLAUDE.md\n\nThe source I&#39;m drafting from:\n&lt;PASTE: OKR key result OR PRD section OR strategic bet description&gt;\n\nTask:\n1. Find the next free EPIC-NN by globbing 30-Epics/.\n2. Draft the Epic file at 30-Epics/EPIC-NN-&lt;slug&gt;.md using EPIC.template.md verbatim.\n3. Fill in every section, especially:\n   - **Strategic linkage** — must link to the OKR or PRD section above.\n   - **In scope / Out of scope** — be explicit. Out-of-scope items are how we resist mid-epic creep.\n   - **Success criteria** — measurable, not vibes.\n   - **Dependencies** — other epics, infra, third parties.\n   - **Risks** — top 3 max, with one-line mitigations.\n4. Outline 3-7 Features at a high level (titles + one-line goal each), but DO NOT create\n   the FEAT files yet — that&#39;s prompt 03.\n5. **If ≥3 viable approaches exist for a high-stakes architectural choice in this Epic**\n   (e.g. storage model, framework, integration pattern), DO NOT narrow to one in this pass.\n   First render an exploration artefact: copy 91-Templates/EXPLORATION.template.html to\n   41-Reports/EXPLORATION-YYYY-MM-DD-&lt;slug&gt;.html, fill the option slots (6 provided), and\n   link it from the Epic body and the Epic&#39;s `html_artefacts:` frontmatter array. Defer the\n   decision to an ADR (radio-select + &quot;Export → ADR&quot; in the artefact) rather than committing\n   to one approach in the same pass that you draft the Epic.\n6. Set frontmatter: status=not-started, created_at=now (ISO 8601 with offset).\n\nOutput rules:\n- Show me the file tree of what you&#39;ll create BEFORE writing.\n- If the strategic linkage feels weak — if you can&#39;t write the Business Outcome line —\n  STOP and ask: &quot;What business outcome does this move?&quot; Don&#39;t proceed without a clear answer.\n- If the Epic feels &gt; 4 weeks of solo work, propose splitting into two Epics.\n\nHonour from CLAUDE.md:\n- Frontmatter timestamps\n- Status enum\n- Strategy linkage rule (okr or prd_section is MANDATORY)\n- Templates rule (use EPIC.template.md verbatim)\n\nAfter saving, propose: &quot;Run prompt 03 (split-epic-into-features) next?&quot;</code></pre>\n","href":""},{"id":"03-split-epic-into-features","title":"Prompt 03 · Split Epic into Features","file":"_00-Project-Management/92-Prompts/03-split-epic-into-features.md","ext":"md","bodyHtml":"<h1>Prompt 03 · Split Epic into Features</h1>\n<p><strong>Trigger:</strong> An Epic file exists and has been reviewed; ready to break down.</p>\n<p><strong>Hat:</strong> PM</p>\n<hr>\n<h2>Paste this into Claude</h2>\n<pre><code class=\"lang-\">You are operating as **PM hat**.\n\nLoad these files into context:\n- The Epic: &lt;PATH TO 30-Epics/EPIC-NN-*.md&gt;\n- 90-Standards/SOP.md\n- 90-Standards/PROJECT-CONTEXT.md\n- 91-Templates/FEATURE.template.md\n- Project root CLAUDE.md\n\nTask:\n1. Read the Epic&#39;s &quot;## Features&quot; outline (high-level titles).\n2. For each, create a FEAT file at 31-Features/EPIC-NN/FEAT-NN.M-&lt;slug&gt;.md using\n   FEATURE.template.md verbatim. Number sequentially within the Epic (.1, .2, .3 …).\n3. For each Feature, fill in:\n   - **Goal** — the slice of the Epic this delivers.\n   - **User value** — one sentence on UX improvement.\n   - **Scope** — bulleted breakdown.\n   - **Acceptance criteria** — testable checkboxes. Each AC should map to ≥1 story later.\n   - **Dependencies** — between features, on infra, on decisions.\n   - **Data touched** — reads/writes/new schema.\n4. Update the Epic&#39;s &quot;## Features&quot; section with proper relative links to the new FEAT files.\n5. Do NOT create STORY files — that&#39;s prompt 04.\n\nOutput rules:\n- Show me the file tree of what you&#39;ll create BEFORE writing. Wait for approval.\n- If a Feature feels &gt; L estimate (1-2 weeks), propose splitting into two Features.\n- If two Features overlap heavily, propose merging.\n- Set status=not-started, created_at=now for every file.\n\nHonour from CLAUDE.md:\n- Frontmatter timestamps\n- Status enum\n- Templates rule\n\nAfter saving all FEAT files, summarise:\n- Total features: N\n- Estimated total: &lt;weeks&gt;\n- Suggested execution order: &lt;which to start with and why&gt;\n\nThen propose: &quot;Run prompt 04 (split-feature-into-stories) on FEAT-NN.M next?&quot;</code></pre>\n","href":""},{"id":"04-split-feature-into-stories","title":"Prompt 04 · Split Feature into Stories (+ paired Testplans)","file":"_00-Project-Management/92-Prompts/04-split-feature-into-stories.md","ext":"md","bodyHtml":"<h1>Prompt 04 · Split Feature into Stories (+ paired Testplans)</h1>\n<p><strong>Trigger:</strong> A Feature exists and is ready to be decomposed into work.</p>\n<p><strong>Hat:</strong> PM</p>\n<hr>\n<h2>Paste this into Claude</h2>\n<pre><code class=\"lang-\">You are operating as **PM hat**.\n\nLoad these files into context:\n- The Feature: &lt;PATH TO FEAT-NN.M-*.md&gt;\n- Its Epic: &lt;PATH TO EPIC-NN-*.md&gt;\n- 90-Standards/SOP.md (DoR, estimation, status enum)\n- 90-Standards/PROJECT-CONTEXT.md (for runnable test command conventions)\n- 91-Templates/STORY.template.md\n- 91-Templates/TESTPLAN.template.md\n- Project root CLAUDE.md\n\nTask:\n1. Read the Feature&#39;s &quot;## Acceptance criteria&quot;. Each criterion ~ 1 story.\n   If an AC implies &gt; L work, split into multiple stories.\n2. For each derived story, create TWO files in the same response:\n   a. STORY file at 32-Stories/EPIC-NN/FEAT-NN.M/STORY-NN.M.PP-&lt;slug&gt;.md\n      — using STORY.template.md verbatim. Fill As/I want/So that, AC checkboxes,\n        technical notes, dependencies, references.\n   b. Paired TESTPLAN at 33-Testplans/EPIC-NN/FEAT-NN.M/TESTPLAN-NN.M.PP-&lt;slug&gt;.md\n      — using TESTPLAN.template.md verbatim. Map every AC -&gt; &gt;= 1 TC with a runnable\n        Command. Use commands appropriate to the stack (see PROJECT-CONTEXT.md).\n3. Number stories sequentially within the feature (.01, .02, .03 …).\n4. Update the Feature&#39;s &quot;## Stories&quot; section with relative links to the new stories.\n5. Set status=not-started, created_at=now for every new file.\n\nOutput rules:\n- Show me the file tree of what you&#39;ll create BEFORE writing. Wait for approval.\n- If any AC is not testable by a machine, flag it: &quot;AC-3 &#39;looks good&#39; is not testable.\n  Suggest rewriting as &#39;matches mockup screenshot within 5% pixel delta&#39; or similar.&quot;\n  Don&#39;t write a TC for it; ask me first.\n- If a story estimates to XL, propose splitting before creating.\n- Do NOT mark any story `ready` — that requires the DoR gate via prompt 05.\n\nHonour from CLAUDE.md:\n- Frontmatter timestamps\n- Status enum\n- Story-Testplan pairing (MANDATORY — both files in the same response)\n- Templates rule\n- Project-specific test conventions from PROJECT-CONTEXT.md (ports, commands, etc.)\n\nAfter saving, summarise:\n- Stories created: N\n- Estimated total: &lt;days/weeks&gt;\n- ACs that I flagged as not-machine-testable: &lt;list, or &quot;none&quot;&gt;\n- Suggested first story to pull: STORY-NN.M.PP (lowest dependency, smallest)</code></pre>\n","href":""},{"id":"05-refine-backlog-to-ready","title":"Prompt 05 · Refine Backlog → Ready (DoR gate)","file":"_00-Project-Management/92-Prompts/05-refine-backlog-to-ready.md","ext":"md","bodyHtml":"<h1>Prompt 05 · Refine Backlog → Ready (DoR gate)</h1>\n<p><strong>Trigger:</strong> Friday 30-min review, or any time before pulling a story to in-progress.</p>\n<p><strong>Hat:</strong> PM</p>\n<hr>\n<h2>Paste this into Claude</h2>\n<pre><code class=\"lang-\">You are operating as **PM hat**.\n\nLoad these files into context:\n- 90-Standards/SOP.md (specifically §6 Definition of Ready)\n- 90-Standards/PROJECT-CONTEXT.md\n- 42-Monitor/MONITOR.md (for current WIP and counts)\n- The top 5 candidate stories (by priority + urgency):\n  &lt;LIST PATHS OR ASK CLAUDE TO PICK FROM not-started STORIES&gt;\n\nTask — for EACH candidate story:\n1. Read the story file.\n2. Run the DoR checklist verbatim. For each item, mark PASS / FAIL with a one-line reason.\n   - [ ] Linked to a Feature → Epic → OKR or PRD\n   - [ ] AC written as testable checkboxes\n   - [ ] Paired TESTPLAN exists at mirrored path\n   - [ ] Every AC maps to &gt;= 1 TC in the TESTPLAN\n   - [ ] Every TC has a runnable Command\n   - [ ] Dependencies listed and either done or scheduled\n   - [ ] Estimate set (XS/S/M/L — XL means split first)\n   - [ ] Risks section non-empty\n3. If ALL pass → flip status to `ready`. Update frontmatter atomically. Do not set started_at yet.\n4. If ANY fail → list the gap. Propose the smallest fix. Ask me before patching.\n\nOutput rules:\n- One story at a time. Process serially so I can review each pass/fail decision.\n- Show me a summary table at the end:\n    | Story | DoR result | Notes |\n- Do NOT pull anything to `in-progress` here — that&#39;s prompt 06.\n- If a story has been `not-started` &gt; 90 days, propose `wontfix` or `archived`\n  per the sunset rule (SOP §15).\n\nHonour from CLAUDE.md:\n- Status enum\n- DoR gate (MANDATORY — no shortcuts)\n- Frontmatter timestamps (do not touch started_at / completed_at when flipping to ready)\n\nAfter processing, suggest: &quot;WIP is currently &lt;N&gt; in-progress + &lt;M&gt; in-review.\nYou have capacity to pull &lt;K&gt; more. Top Ready candidate: STORY-NN.M.PP.&quot;</code></pre>\n","href":""},{"id":"06-execute-story","title":"Prompt 06 · Execute Story (Dev hat)","file":"_00-Project-Management/92-Prompts/06-execute-story.md","ext":"md","bodyHtml":"<h1>Prompt 06 · Execute Story (Dev hat)</h1>\n<p><strong>Trigger:</strong> Daily check-in. A Ready story is being pulled into active work.</p>\n<p><strong>Hat:</strong> Dev</p>\n<hr>\n<h2>Paste this into Claude</h2>\n<pre><code class=\"lang-\">You are operating as **Dev hat**.\n\nLoad these files into context:\n- The story: &lt;PATH TO STORY-NN.M.PP-*.md&gt;\n- Its paired testplan: &lt;PATH TO TESTPLAN-NN.M.PP-*.md&gt;\n- Its feature and epic (for context)\n- 90-Standards/SOP.md (§7 DoD checklist)\n- 90-Standards/PROJECT-CONTEXT.md (stack, lint commands, port conventions)\n- 91-Templates/ADR.template.md (in case a decision needs recording)\n- 91-Templates/BUG.template.md (in case a defect is observed)\n- Project root CLAUDE.md\n\nTask:\n0. **Launch location check (before anything else).** If the story&#39;s `files_touched:` all live under one path X, consider launching Claude in `&lt;repo-root&gt;/X/` so its subdir CLAUDE.md (from SUBDIR-CLAUDE.template.md) sets test/lint scope. Skip for cross-cutting work (refactors, dependency bumps, codebase-map-spanning changes). See DAILY-WORKFLOW.md §5 + CLAUDE-CODE-CONFIG.md §2.1.5.\n1. **Verify the DoR is satisfied.** If not — STOP, list
