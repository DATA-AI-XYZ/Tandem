the gap, ask. Don&#39;t proceed.\n2. Flip story status: `ready` → `in-progress`. Set `started_at` to now (ISO 8601 + offset).\n   Atomic edit. Update `12-Active/ACTIVE.md` index to include this story.\n3. Implement the story:\n   - Work the acceptance criteria one at a time.\n   - For each AC, write the code AND wire the corresponding TC&#39;s setup.\n   - Tests should run via the commands documented in the TESTPLAN.\n4. **Whenever you make a non-obvious decision** (library choice, threshold, schema field name,\n   deferred sub-feature), STOP coding and:\n   a. Find the next free ADR-NNNN.\n   b. Create 40-Decisions/ADR-NNNN-&lt;slug&gt;.md using ADR.template.md.\n   c. Add the ADR ID to the story&#39;s `decisions:` frontmatter array.\n   d. Resume coding.\n5. **Whenever you observe a defect** (yours or pre-existing), STOP and:\n   a. File a BUG at 34-Bugs/EPIC-NN/FEAT-NN.M/BUG-YYYYMMDD-NN-&lt;slug&gt;.md.\n   b. Decide: fix-now (block this story) or fix-later (link from BACKLOG).\n6. When all ACs implemented and self-review done, flip status to `in-review`.\n   Do NOT set completed_at yet (that&#39;s the DoD gate via prompt 08).\n\nOutput rules:\n- Tick AC checkboxes in the story file as you complete them.\n- Update TC `Result:` lines in the TESTPLAN as you run them.\n- Commit messages reference the story ID: &quot;STORY-NN.M.PP — &lt;imperative&gt;&quot;.\n- If you hit a `blocked` situation, flip to `blocked`, note the reason, return to me.\n\nHonour from CLAUDE.md:\n- Frontmatter timestamps (started_at on in-progress; NOT completed_at yet)\n- Status enum\n- ADR on the spot (MANDATORY for non-obvious decisions)\n- Bug auto-raise (MANDATORY for any defect)\n- Templates rule\n\nEnd-of-session summary:\n- ACs ticked: X / Y\n- TCs run: X / Y (PASS / FAIL counts)\n- ADRs created: &lt;list&gt;\n- BUGs filed: &lt;list&gt;\n- Status now: &lt;in-progress / in-review / blocked&gt;\n- Next step: &lt;prompt 07 if in-review, fix block if blocked&gt;</code></pre>\n","href":""},{"id":"07-run-testplan","title":"Prompt 07 · Run Testplan (QA hat)","file":"_00-Project-Management/92-Prompts/07-run-testplan.md","ext":"md","bodyHtml":"<h1>Prompt 07 · Run Testplan (QA hat)</h1>\n<p><strong>Trigger:</strong> Story flipped to <code>in-review</code>. Time to verify with the paired TESTPLAN.</p>\n<p><strong>Hat:</strong> QA</p>\n<hr>\n<h2>Paste this into Claude</h2>\n<pre><code class=\"lang-\">You are operating as **QA hat**.\n\nLoad these files into context:\n- The testplan: &lt;PATH TO TESTPLAN-NN.M.PP-*.md&gt;\n- Its paired story: &lt;PATH TO STORY-NN.M.PP-*.md&gt;\n- 90-Standards/SOP.md\n- 90-Standards/PROJECT-CONTEXT.md (test runner, ports, env vars)\n- 91-Templates/BUG.template.md (you will use this if a TC fails)\n- Project root CLAUDE.md\n\nTask:\n1. Flip the testplan&#39;s status: `not-started` → `in-progress`. Set `started_at` to now.\n2. Verify all Preconditions in the testplan are met. If not, stop and report.\n3. Run every TC in order:\n   a. Execute the `Command:` exactly as written. No improvisation.\n   b. Compare actual output to `Expected:`.\n   c. Update the TC&#39;s `Result:` line:\n      - `PASS — YYYY-MM-DD` on success.\n      - `FAIL — see BUG-YYYYMMDD-NN` on failure (link the bug you&#39;ll file).\n4. **If a TC fails — IMMEDIATELY:**\n   a. STOP further TC execution if the failure is critical / blocks the rest.\n   b. Otherwise continue to the next TC (you can complete the run, just file bugs).\n   c. File a BUG at 34-Bugs/EPIC-NN/FEAT-NN.M/BUG-YYYYMMDD-NN-&lt;slug&gt;.md.\n      Use BUG.template.md verbatim. Include full repro, first analysis, fix direction.\n      A junior dev should be able to act on the bug without asking questions.\n   d. Update the failed TC&#39;s `Result:` line to reference the bug.\n5. After all TCs run, update the testplan&#39;s &quot;Sign-off&quot; section.\n6. If ALL TCs PASS — flip testplan status to `done`. Set `completed_at` to now.\n   Recommend prompt 08 (close-out-story) next.\n7. If ANY TC FAILed — leave testplan as `in-progress`. Story stays `in-review`.\n   The dev needs to fix the bugs and re-run the failed TCs.\n\nOutput rules:\n- Run TCs serially, not in parallel — easier to attribute failures.\n- For UI test commands: capture screenshot artifacts to 41-Reports/ if helpful.\n- Trim log output in BUG evidence sections to ≤30 lines, key frames preserved.\n- A bug filed in chat-only is a process violation — the BUG file must exist before\n  you report the failure in your summary.\n\nHonour from CLAUDE.md:\n- Frontmatter timestamps\n- Status enum\n- Bug auto-raise on failure (MANDATORY)\n- Templates rule\n\nEnd-of-run summary:\n- TCs PASSED: X / Y\n- TCs FAILED: Y - X\n- BUGs filed: &lt;list of paths&gt;\n- Testplan status: &lt;done | in-progress&gt;\n- Recommended next step:\n  - All PASS → prompt 08 (close-out-story)\n  - Any FAIL → assign bugs to dev hat; re-run testplan after fixes</code></pre>\n","href":""},{"id":"08-close-out-story","title":"Prompt 08 · Close-out Story (DoD gate)","file":"_00-Project-Management/92-Prompts/08-close-out-story.md","ext":"md","bodyHtml":"<h1>Prompt 08 · Close-out Story (DoD gate)</h1>\n<p><strong>Trigger:</strong> Testplan is <code>done</code> (all TCs PASS). Time to gate the story through DoD.</p>\n<p><strong>Hat:</strong> QA → handing back to PM for MONITOR update</p>\n<hr>\n<h2>Paste this into Claude</h2>\n<pre><code class=\"lang-\">You are operating as **QA hat** transitioning to **PM hat** for the MONITOR update.\n\nLoad these files into context:\n- The story: &lt;PATH TO STORY-NN.M.PP-*.md&gt;\n- Its testplan: &lt;PATH TO TESTPLAN-NN.M.PP-*.md&gt;\n- 90-Standards/SOP.md (§7 Definition of Done)\n- 90-Standards/PROJECT-CONTEXT.md (quality gate commands)\n- 42-Monitor/MONITOR.md (for update)\n- 12-Active/ACTIVE.md (to remove this story from WIP)\n- Project root CLAUDE.md\n\nTask — run the DoD checklist verbatim. For each item, mark PASS / FAIL with evidence.\n\nDoD checklist:\n1. [ ] All AC checkboxes in the story file are ticked.\n2. [ ] All TCs in the testplan have `Result: PASS — YYYY-MM-DD` (or FAIL linked to a `wontfix`/accepted BUG).\n3. [ ] Project quality commands pass (from PROJECT-CONTEXT.md):\n   - [ ] Lint\n   - [ ] Type check\n   - [ ] Unit tests\n   - [ ] Build\n4. [ ] No new errors in the error tracker after smoke run (if applicable).\n5. [ ] If UI: visual contract tests green (per PROJECT-CONTEXT.md).\n6. [ ] All ADRs created during execution are present in 40-Decisions/ and linked from\n      the story&#39;s `decisions:` array.\n7. [ ] Any tech debt observed during this work has a corresponding BACKLOG-NNNN file.\n\nIf ANY item FAILs:\n- STOP. Do not flip status to `done`.\n- List the gap clearly in chat.\n- For each gap, propose the smallest fix to address it.\n- Ask me before continuing.\n\nIf ALL items PASS:\n- Flip story status `in-review` → `done`. Set `completed_at` to now (ISO 8601 + offset).\n  Atomic edit — status + timestamp in the same write.\n- Remove the story from 12-Active/ACTIVE.md.\n- Update 42-Monitor/MONITOR.md in the SAME response:\n  - Increment the shipped count (and any per-epic/per-feature counts).\n  - Tick the bar character (░ → █) if your MONITOR uses progress bars.\n  - Prepend a one-line entry to the revision history with today&#39;s ISO date and the\n    story ID + short outcome.\n- Regenerate the interactive dashboard:\n  - Run `npm run pm:dash` (or `npm run pm:all` to lint + dash together).\n  - Confirm `42-Monitor/DASHBOARD.html` is updated.\n\nOutput rules:\n- DoD is non-negotiable. &quot;Tests are flaky so I&#39;ll skip&quot; is not allowed — file a BUG\n  or BACKLOG entry instead, and don&#39;t close the story until that&#39;s addressed.\n- Show the DoD result table BEFORE flipping status, so I can override if needed.\n- If a TC failed earlier but the bug was accepted as `wontfix` or pushed to BACKLOG,\n  link the decision explicitly in the close-out note on MONITOR.\n\nHonour from CLAUDE.md:\n- Frontmatter timestamps (completed_at set in the SAME edit as status=done)\n- Status enum\n- DoD gate (MANDATORY)\n- Monitor on completion (MANDATORY — same response)\n- Dashboard regen (MANDATORY — `npm run pm:dash` after status flip)\n\nEnd-of-close-out summary:\n- DoD result: PASS / FAIL with gaps\n- Story status now: &lt;done | still in-review&gt;\n- MONITOR updated: yes / no\n- Decisions captured: &lt;list of ADRs&gt;\n- Tech debt captured: &lt;list of BACKLOG entries&gt;\n- Next Ready story to pull: &lt;suggestion&gt;</code></pre>\n","href":""},{"id":"09-weekly-monitor-update","title":"Prompt 09 · Weekly MONITOR update","file":"_00-Project-Management/92-Prompts/09-weekly-monitor-update.md","ext":"md","bodyHtml":"<h1>Prompt 09 · Weekly MONITOR update</h1>\n<p><strong>Trigger:</strong> Friday 30-min review.</p>\n<p><strong>Hat:</strong> PM</p>\n<hr>\n<h2>Paste this into Claude</h2>\n<pre><code class=\"lang-\">You are operating as **PM hat**.\n\nLoad these files into context:\n- 42-Monitor/MONITOR.md (current state)\n- 12-Active/ACTIVE.md\n- Last 7 days of activity:\n  - Run a quick scan: which files under 30-Epics/, 31-Features/, 32-Stories/, 34-Bugs/\n    have `completed_at` within the last 7 days? Which `started_at` within 7 days?\n- 14-Retros/ (most recent retro&#39;s &quot;One change&quot; — did it happen this week?)\n- 90-Standards/SOP.md\n\nTask:\n1. Compute the weekly delta:\n   - Stories shipped (status went to `done` in the last 7 days)\n   - Stories started (status went to `in-progress` in the last 7 days)\n   - Stories blocked (currently in `blocked` status)\n   - Bugs filed\n   - Bugs fixed\n   - ADRs created\n2. Update 42-Monitor/MONITOR.md:\n   - Per-epic and per-feature counts (shipped / total).\n   - Progress bars (if used).\n   - &quot;Last updated&quot; date.\n   - Prepend a revision history entry dated today, summarising the week in 3-5 lines.\n3. Audit currents:\n   - Any story in `in-progress` for &gt; 5 days? Flag as a stall risk.\n   - Any story in `blocked` for &gt; 5 days? Escalate — Founder hat decision needed?\n   - Any story in `in-review` for &gt; 3 days? Push to close-out (prompt 08).\n4. Backlog hygiene:\n   - Anything in `not-started` for &gt; 90 days? Propose `wontfix` or `archived` (SOP §15).\n   - Inbox count? If &gt; 20, propose a quick triage pass.\n5. Regenerate the interactive dashboard:\n   - Run `npm run pm:all` (validator + dashboard together).\n   - Confirm `42-Monitor/DASHBOARD.html` reflects the week&#39;s changes.\n   - If validator fails, fix the violations BEFORE the dashboard run.\n6. CLAUDE.md coverage audit:\n   - Run `npm run pm:claude-audit -- --report _00-Project-Management/41-Reports/CLAUDE-AUDIT-$(date +%Y-%m-%d).md`.\n   - Triage the report:\n     - **gap** or **undecided** boundaries — decide include vs exclude, then run\n       `npm run pm:claude-scaffold` to address.\n     - **incomplete** stubs (still carry `[auto — verify]` / `&lt;fill in&gt;`) — queue\n       the `fill-claude-md` skill.\n   - The audit is report-only; it never blocks. Note any new boundaries in the\n     week summary.\n\nOutput rules:\n- Single revision-history entry per week, prepended to MONITOR.\n- Format: `**YYYY-MM-DD — week summary.** &lt;3-5 lines&gt;.`\n- Be specific: not &quot;shipped some stories&quot;, but &quot;shipped STORY-01.2.07 + STORY-01.3.01,\n  closing FEAT-01.2 except for the sortable-headers AC&quot;.\n- Flag carry-forwards: &quot;carrying STORY-02.1.04 into next week — blocked on ADR-0012.&quot;\n\nHonour from CLAUDE.md:\n- Frontmatter timestamps (do not modify any file&#39;s timestamps as part of this — only MONITOR)\n- Status enum (use the canonical statuses in your summary, not synonyms)\n- Dashboard regen (MANDATORY at end of weekly update)\n\nEnd-of-update summary:\n- Shipped this week: N\n- Stalled: &lt;list of stories in-progress &gt; 5 days&gt;\n- Blocked: &lt;list with reasons&gt;\n- Carry-forward to next week: &lt;list&gt;\n- Suggestion for Founder hat: &lt;if any strategic drift detected&gt;</code></pre>\n","href":""},{"id":"10-monthly-retro","title":"Prompt 10 · Monthly Retrospective","file":"_00-Project-Management/92-Prompts/10-monthly-retro.md","ext":"md","bodyHtml":"<h1>Prompt 10 · Monthly Retrospective</h1>\n<p><strong>Trigger:</strong> First Monday of the month.</p>\n<p><strong>Hat:</strong> Founder + PM (jointly)</p>\n<hr>\n<h2>Paste this into Claude</h2>\n<pre><code class=\"lang-\">You are operating as **Founder + PM hats jointly** for a solo retro.\n\nLoad these files into context:\n- 42-Monitor/MONITOR.md (last 4 weeks of revision history)\n- 14-Retros/RETRO-YYYY-MM.md (the previous month&#39;s retro — to check carry-forward)\n- 00-Strategy/OKRS-YYYY-Qx.md (current quarter)\n- 40-Decisions/ (any ADRs created this month)\n- 34-Bugs/ (bugs filed this month)\n- 91-Templates/RETRO.template.md\n- 90-Standards/SOP.md\n\nTask:\n1. Create 14-Retros/RETRO-YYYY-MM.md using RETRO.template.md verbatim.\n2. Compute metrics for the period:\n   - Stories shipped\n   - Bugs filed / fixed (delta)\n   - ADRs created\n   - Average story cycle time (`completed_at` - `started_at` across done stories)\n   - Time stories spent in `blocked` (rough estimate)\n3. Auto-draft each section based on what you observe in the data:\n   - **What worked** — patterns in shipped stories. Smooth flow, good test coverage,\n     clean ADRs, no surprises. Be specific.\n   - **What hurt** — patterns in bugs, blocked stories, surprises, missed estimates,\n     skipped gates. Be specific. Not &quot;speed&quot; — &quot;I skipped DoR on STORY-01.2.04 to ship\n     fast, and we lost 2 days to the missing testplan.&quot;\n   - **Surprises** — discoveries you wouldn&#39;t have predicted at month-start.\n   - **Action from last retro** — quote last month&#39;s &quot;One change&quot;. Did it happen?\n     Yes / partial / no — and why.\n4. Propose 2-3 candidate &quot;One change&quot; actions for next month. Just propose — don&#39;t pick.\n5. Compute strategic check:\n   - Did this month&#39;s work ladder into the current OKRs? Yes / partial / no.\n   - If drift detected — flag for the next quarterly review.\n\nOutput rules:\n- DRAFT the retro file with sections populated. Show me before saving.\n- I will edit &quot;What worked / What hurt / Surprises&quot; to my voice — those are subjective.\n- The metrics, last-retro carry-forward, and strategic check are objective — Claude can write those.\n- The &quot;One change&quot; — I pick. You propose 2-3 candidates, I commit to one.\n\nHonour from CLAUDE.md:\n- Frontmatter timestamps\n- Status enum\n- Templates rule (use RETRO.template.md)\n\nEnd-of-retro:\n- Save 14-Retros/RETRO-YYYY-MM.md.\n- Update 42-Monitor/MONITOR.md with a one-line entry: &quot;Retro for &lt;month&gt; filed; one change: &lt;X&gt;.&quot;\n- Set retro frontmatter status=done, completed_at=now.\n- Remind me: the &quot;One change&quot; is tracked in next month&#39;s retro under &quot;Action from last retro&quot;.</code></pre>\n","href":""}],"scripts":[{"id":"check-mirror","title":"check-mirror","file":"_00-Project-Management/93-Scripts/check-mirror.js","ext":"js","bodyHtml":"<pre><code class=\"lang-js\">#!/usr/bin/env node\r\n/**\r\n * check-mirror.js — drift validator for the kit&#39;s duplicated surfaces.\r\n *\r\n * Closes BACKLOG-0021 (root &lt;-&gt; scaffold mirror drift) and BACKLOG-0022\r\n * (ROOT-CLAUDE PM-KIT-BLOCK vs BOOTSTRAP-PROMPT.md single-source).\r\n *\r\n * Part A — every file under scaffold/_00-Project-Management/ that has a root\r\n *   counterpart under _00-Project-Management/ must be byte-identical (line endings\r\n *   normalised), EXCEPT an allow-list of files that legitimately diverge.\r\n * Part B — BOOTSTRAP-PROMPT.md must single-source the root CLAUDE.md block by\r\n *   referencing scaffold/91-Templates/ROOT-CLAUDE.template.md (so the\r\n *   &lt;!-- PM-KIT-BLOCK --&gt; body can&#39;t drift between the two).\r\n *\r\n * Usage: node _00-Project-Management/93-Scripts/check-mirror.js   (npm run pm:mirror)\r\n * Exit codes: 0 = no unexpected drift · 1 = drift found · 2 = script error.\r\n * Dependency-free — Node stdlib only (fs, path).\r\n */\r\n&#39;use strict&#39;;\r\n\r\nconst fs = require(&#39;fs&#39;);\r\nconst path = require(&#39;path&#39;);\r\n\r\nconst REPO_ROOT = path.resolve(__dirname, &#39;..&#39;, &#39;..&#39;);\r\nconst SCAFFOLD_PM = path.join(REPO_ROOT, &#39;scaffold&#39;, &#39;_00-Project-Management&#39;);\r\nconst ROOT_PM = path.join(REPO_ROOT, &#39;_00-Project-Management&#39;);\r\n\r\n// The set of mirror-class folders in _00-Project-Management/ that check-mirror\r\n// tracks for parity in BOTH directions (scaffold→root AND root→scaffold).\r\nconst MIRROR_DIRS = [&#39;90-Standards&#39;, &#39;91-Templates&#39;, &#39;92-Prompts&#39;, &#39;93-Scripts&#39;];\r\n\r\n// Files (path relative to _00-Project-Management/) that legitimately differ between\r\n// the root copy and the scaffold copy. Each MUST carry a reason — an allow-list entry\r\n// without a documented why is how silent drift sneaks back in.\r\nconst ALLOW = {\r\n  &#39;12-Active/ACTIVE.md&#39;:\r\n    &#39;root is this repo\\&#39;s LIVE WIP index; scaffold ships an empty template ACTIVE board (BUG-20260601-01)&#39;,\r\n  &#39;90-Standards/PROJECT-CONTEXT.md&#39;:\r\n    &#39;root is this repo\\&#39;s filled-in stack/gotchas (dogfood); scaffold ships the placeholder template projects fill in (BUG-20260601-01)&#39;,\r\n  &#39;42-Monitor/MONITOR.md&#39;:\r\n    &#39;root is this repo\\&#39;s LIVE board; scaffold ships an empty template board&#39;,\r\n  &#39;42-Monitor/DASHBOARD.html&#39;:\r\n    &#39;generated artefact — root reflects this repo\\&#39;s live data; scaffold ships a placeholder, regenerated by pm:dash on install&#39;,\r\n  &#39;90-Standards/CLAUDE-CODE-CONFIG.md&#39;:\r\n    &#39;root links repo-local ADRs (e.g. ADR-0007) that do not ship in scaffold; scaffold inlines the equivalent note&#39;,\r\n  &#39;93-Scripts/package.json&#39;:\r\n    &#39;root is the kit itself; scaffold is a reference document for the PM folder that projects integrate; served from different package.json contexts&#39;,\r\n  &#39;93-Scripts/smoke-dashboard.js&#39;:\r\n    &#39;root-only; dev smoke test for the live dashboard generator (scaffold ships the lean portable generator)&#39;,\r\n  &#39;93-Scripts/test-monitor-parser.js&#39;:\r\n    &#39;root-only; dev self-test for the monitor parser R20 detection (STORY-13.2.01) — scaffold ships the parser, not the test&#39;,\r\n  &#39;93-Scripts/test-pm-paths.js&#39;:\r\n    &#39;root-only; dev self-test for the pm-paths resolver (FEAT-12.1) — scaffold ships the resolver, not the test&#39;,\r\n  &#39;93-Scripts/__fixtures__&#39;:\r\n    &#39;root-only; dev test fixtures for CLI validators, not shipped to deployed projects&#39;,\r\n  &#39;93-Scripts/generate-dashboard.js&#39;:\r\n    &#39;root runs an enhanced dev dashboard (scans ~/.claude/ + 97-AI-Reference overlays); scaffold ships the lean portable generator — review if they should converge&#39;,\r\n};\r\n\r\nfunction normalise(s) { return s.replace(/\\r\\n/g, &#39;\\n&#39;); }\r\n\r\nfunction walk(dir, list = []) {\r\n  if (!fs.existsSync(dir)) return list;\r\n  for (const e of fs.readdirSync(dir, { withFileTypes: true })) {\r\n    const full = path.join(dir, e.name);\r\n    if (e.isDirectory()) walk(full, list);\r\n    else if (e.isFile()) list.push(full);\r\n  }\r\n  return list;\r\n}\r\n\r\nfunction rel(p) { return path.relative(REPO_ROOT, p).replace(/\\\\/g, &#39;/&#39;); }\r\n\r\nfunction main() {\r\n  if (!fs.existsSync(SCAFFOLD_PM)) {\r\n    console.error(`✗ scaffold PM folder not found: ${SCAFFOLD_PM}`);\r\n    process.exit(2);\r\n  }\r\n\r\n  const drift = [];\r\n  const known = [];\r\n  let pairs = 0;\r\n\r\n  // ---- Part A: root &lt;-&gt; scaffold parity (scaffold→root: scaffold files must have a root counterpart or be scaffold-only) ----\r\n  for (const sf of walk(SCAFFOLD_PM)) {\r\n    const relUnderPm = path.relative(SCAFFOLD_PM, sf).replace(/\\\\/g, &#39;/&#39;);\r\n    const rf = path.join(ROOT_PM, relUnderPm);\r\n    if (!fs.existsSync(rf)) continue; // scaffold-only file — no mirror obligation\r\n    pairs += 1;\r\n    const same = normalise(fs.readFileSync(rf, &#39;utf8&#39;)) === normalise(fs.readFileSync(sf, &#39;utf8&#39;));\r\n    if (same) continue;\r\n    if (relUnderPm in ALLOW) known.push({ file: relUnderPm, reason: ALLOW[relUnderPm] });\r\n    else drift.push(relUnderPm);\r\n  }\r\n\r\n  // ---- Part A (reverse): root→scaffold parity (for mirror-class folders only) ----\r\n  // Walk only the mirror-class folders (90-Standards/, 91-Templates/, etc.) under ROOT_PM\r\n  // to detect root-only files that should ship to scaffold. Work-artefact folders\r\n  // (10-Inbox, 12-Active, 32-Stories, etc.) are deliberately out of scope.\r\n  function isAllowed(relPath) {\r\n    // Check exact match first\r\n    if (relPath in ALLOW) return true;\r\n    // Check if it&#39;s under an allowed directory (e.g. __fixtures__)\r\n    for (const key of Object.keys(ALLOW)) {\r\n      if (relPath.startsWith(key + &#39;/&#39;) || relPath === key) return true;\r\n    }\r\n    return false;\r\n  }\r\n  for (const mirrorDir of MIRROR_DIRS) {\r\n    const rootMirrorPath = path.join(ROOT_PM, mirrorDir);\r\n    if (!fs.existsSync(rootMirrorPath)) continue;\r\n    for (const rf of walk(rootMirrorPath)) {\r\n      const relUnderMirrorDir = path.relative(rootMirrorPath, rf).replace(/\\\\/g, &#39;/&#39;);\r\n      const relUnderPm = mirrorDir + &#39;/&#39; + relUnderMirrorDir;\r\n      const sf = path.join(SCAFFOLD_PM, relUnderPm);\r\n      if (fs.existsSync(sf)) continue; // scaffold counterpart exists — no drift\r\n      // root-only file in a mirror-class folder with no scaffold counterpart\r\n      if (isAllowed(relUnderPm)) known.push({ file: relUnderPm, reason: ALLOW[Object.keys(ALLOW).find(k =&gt; relUnderPm === k || relUnderPm.startsWith(k + &#39;/&#39;))] || &#39;(parent allowed)&#39; });\r\n      else drift.push(&#39;(root-only) &#39; + relUnderPm);\r\n    }\r\n  }\r\n\r\n  // ---- Part B: BOOTSTRAP single-sources the ROOT-CLAUDE block (BACKLOG-0022) ----\r\n  const bootstrap = path.join(REPO_ROOT, &#39;BOOTSTRAP-PROMPT.md&#39;);\r\n  const tmpl = path.join(REPO_ROOT, &#39;scaffold&#39;, &#39;91-Templates&#39;, &#39;ROOT-CLAUDE.template.md&#39;);\r\n  let bootstrapNote = &#39;&#39;;\r\n  if (!fs.existsSync(bootstrap)) {\r\n    drift.push(&#39;BOOTSTRAP-PROMPT.md (missing — paste-prompt installer expected at repo root)&#39;);\r\n  } else {\r\n    const b = fs.readFileSync(bootstrap, &#39;utf8&#39;);\r\n    if (!/ROOT-CLAUDE\\.template\\.md/.test(b)) {\r\n      drift.push(&#39;BOOTSTRAP-PROMPT.md does not reference ROOT-CLAUDE.template.md — PM-KIT-BLOCK is no longer single-sourced (BACKLOG-0022 drift risk)&#39;);\r\n    } else if (fs.existsSync(tmpl) &amp;&amp; !/&lt;!--\\s*PM-KIT-BLOCK\\s*--&gt;/.test(fs.readFileSync(tmpl, &#39;utf8&#39;))) {\r\n      drift.push(&#39;ROOT-CLAUDE.template.md is missing the &lt;!-- PM-KIT-BLOCK --&gt; marker BOOTSTRAP relies on&#39;);\r\n    } else {\r\n      bootstrapNote = &#39;BOOTSTRAP-PROMPT.md single-sources the PM-KIT-BLOCK from ROOT-CLAUDE.template.md ✓&#39;;\r\n    }\r\n  }\r\n\r\n  // ---- Report ----\r\n  for (const k of known) console.log(`  known divergence (allow-listed): ${k.file} — ${k.reason}`);\r\n  if (bootstrapNote) console.log(`  ${bootstrapNote}`);\r\n\r\n  if (drift.length === 0) {\r\n    console.log(`✓ pm:mirror — ${pairs} mirrored pair(s) checked, ${known.length} known divergence(s), 0 unexpected drift.`);\r\n    process.exit(0);\r\n  }\r\n  console.log(`\\n✗ pm:mirror — ${drift.length} unexpected drift(s):`);\r\n  for (const d of drift) console.log(`    - ${d}`);\r\n  console.log(`\\nFix: sync the root and scaffold copies, or (if the divergence is intentional) add the file to the ALLOW list in check-mirror.js with a reason.`);\r\n  process.exit(1);\r\n}\r\n\r\nmain();\r\n</code></pre>","href":""},{"id":"claude-audit","title":"claude-audit","file":"_00-Project-Management/93-Scripts/claude-audit.js","ext":"js","bodyHtml":"<pre><code class=\"lang-js\">#!/usr/bin/env node\r\n/**\r\n * claude-audit.js\r\n *\r\n * Report CLAUDE.md coverage for a host repo. For each detected boundary,\r\n * classify it: covered / incomplete / gap / undecided / excluded.\r\n *\r\n *   - excluded   — recorded in config&#39;s exclude list (intentionally no CLAUDE.md)\r\n *   - covered    — included/discovered, CLAUDE.md present and fully filled\r\n *   - incomplete — CLAUDE.md present but still carrying `&lt;fill in&gt;` or\r\n *                  `[auto — verify]` stub markers (needs the fill-claude-md skill)\r\n *   - gap        — explicitly included in config but the CLAUDE.md is missing\r\n *   - undecided  — neither included nor excluded, and no CLAUDE.md yet\r\n *\r\n * Usage:\r\n *   node claude-audit.js [--root &lt;dir&gt;] [--templates &lt;dir&gt;] [--report &lt;file&gt;]\r\n *                        [--strict] [--json] [--nudge]\r\n *\r\n *   --root &lt;dir&gt;      repo root to audit (default: two levels above this script)\r\n *   --templates &lt;dir&gt; templates dir for template-inline detection (default: a\r\n *                     91-Templates/ under --root if present)\r\n *   --strict          exit 1 if any boundary is a real gap (included-but-missing)\r\n *   --json            emit machine-readable JSON instead of markdown\r\n *   --report          also write the markdown report to &lt;file&gt;\r\n *   --nudge           opt-in, warn-only staleness reminder (STORY-12.6.01). OFF by\r\n *                     default: prints a one-line nudge (and always exits 0, never\r\n *                     blocks) ONLY when the env flag PM_CLAUDE_NUDGE is set. To\r\n *                     enable, set PM_CLAUDE_NUDGE=1 in the environment / a git\r\n *                     pre-commit or session-start hook; unset it to silence.\r\n *\r\n * Dependency-free — Node stdlib only.\r\n *\r\n * Tiered-layout enforcement (STORY-12.4.03): beyond the coverage report, the\r\n * audit walks EVERY CLAUDE.md in the tree and reports a per-file line count.\r\n * It raises a *finding* when a file exceeds its line budget (a Tier-1 always-on\r\n * root earns a tighter budget than a Tier-2 folder file) or when a subdir file\r\n * duplicates the root (overlap above the threshold). Findings make the default\r\n * invocation exit non-zero — the tiered model is enforced, not just recommended.\r\n * (`--strict` additionally gates on a real `gap`.) See ADR-0056 for the chosen\r\n * budget + overlap-threshold defaults.\r\n */\r\n&#39;use strict&#39;;\r\n\r\nconst fs = require(&#39;fs&#39;);\r\nconst path = require(&#39;path&#39;);\r\nconst { detectBoundaries } = require(&#39;./lib/detect-boundaries&#39;);\r\nconst cfgLib = require(&#39;./lib/claude-config&#39;);\r\n\r\n// Line budgets (cost-of-a-miss / content-economics, CLAUDE-CODE-CONFIG §2.1.4).\r\n// Root is the always-loaded Tier-1 file → leaner; subdir files are Tier-2 and\r\n// additive. Exceeding a budget is a finding (gates the default exit). See ADR-0056.\r\nconst ROOT_BUDGET = 200;\r\nconst SUBDIR_BUDGET = 120;\r\n\r\n// Root-duplication detection (STORY-12.4.03). A subdir CLAUDE.md is flagged when\r\n// it restates the root rather than being additive. We require BOTH a minimum\r\n// number of matching non-trivial lines AND a high overlap ratio, so short shared\r\n// phrases (a benign one-liner) never false-flag. See ADR-0056.\r\nconst DUP_OVERLAP_THRESHOLD = 0.6;\r\nconst DUP_MIN_MATCHED = 2;\r\n\r\n// Directories never walked when scanning for CLAUDE.md files.\r\nconst IGNORE_DIRS = new Set([\r\n  &#39;node_modules&#39;, &#39;.git&#39;, &#39;dist&#39;, &#39;build&#39;, &#39;.next&#39;, &#39;out&#39;,\r\n  &#39;coverage&#39;, &#39;vendor&#39;, &#39;__pycache__&#39;, &#39;target&#39;, &#39;.venv&#39;, &#39;venv&#39;,\r\n]);\r\n\r\nfunction parseArgs(argv) {\r\n  const args = { root: path.resolve(__dirname, &#39;..&#39;, &#39;..&#39;), report: null, strict: false, json: false, templates: null, nudge: false };\r\n  for (let i = 0; i &lt; argv.length; i++) {\r\n    const a = argv[i];\r\n    if (a === &#39;--root&#39; &amp;&amp; argv[i + 1]) args.root = path.resolve(argv[++i]);\r\n    else if (a === &#39;--report&#39; &amp;&amp; argv[i + 1]) args.report = argv[++i];\r\n    else if (a === &#39;--templates&#39; &amp;&amp; argv[i + 1]) args.templates = path.resolve(argv[++i]);\r\n    else if (a === &#39;--strict&#39;) args.strict = true;\r\n    else if (a === &#39;--json&#39;) args.json = true;\r\n    else if (a === &#39;--nudge&#39;) args.nudge = true;\r\n    else if (a === &#39;--help&#39;) args.help = true;\r\n  }\r\n  return args;\r\n}\r\n\r\nfunction claudeFileFor(root, relPath) {\r\n  const dir = relPath === &#39;/&#39;\r\n    ? root\r\n    : path.join(root, relPath.replace(/^\\//, &#39;&#39;).split(&#39;/&#39;).join(path.sep));\r\n  return path.join(dir, &#39;CLAUDE.md&#39;);\r\n}\r\n\r\n// A scaffolded-but-unfilled CLAUDE.md still carries the auto-generated stub\r\n// markers. `[auto — verify]` is emitted by buildCommandsBlock; `&lt;fill in&gt;` is\r\n// the placeholder the fill-claude-md skill replaces.\r\nfunction isIncomplete(file) {\r\n  if (!fs.existsSync(file)) return false;\r\n  const txt = fs.readFileSync(file, &#39;utf8&#39;);\r\n  return /\\[auto — verify\\]/.test(txt) || /&lt;fill in&gt;/.test(txt);\r\n}\r\n\r\nfunction audit(root) {\r\n  const candidates = detectBoundaries(root);\r\n  const cfg = cfgLib.readConfig(root);\r\n  return candidates.map((c) =&gt; {\r\n    const file = claudeFileFor(root, c.path);\r\n    const exists = fs.existsSync(file);\r\n    const status = cfgLib.decideStatus(cfg, c.path);\r\n    let state;\r\n    if (status === &#39;excluded&#39;) state = &#39;excluded&#39;;\r\n    else if (exists) state = isIncomplete(file) ? &#39;incomplete&#39; : &#39;covered&#39;;\r\n    else state = (status === &#39;included&#39;) ? &#39;gap&#39; : &#39;undecided&#39;;\r\n    return { path: c.path, manifest: c.manifest, state };\r\n  });\r\n}\r\n\r\n// Walk the whole tree (not just detected boundaries) for every CLAUDE.md file.\r\n// The tiered checks must see folder-scoped files in plain source dirs that carry\r\n// no package manifest, which detectBoundaries deliberately skips.\r\nfunction findClaudeFiles(root) {\r\n  const out = [];\r\n  (function walk(dir) {\r\n    let entries;\r\n    try { entries = fs.readdirSync(dir, { withFileTypes: true }); }\r\n    catch { return; }\r\n    for (const e of entries) {\r\n      if (e.isDirectory()) {\r\n        if (IGNORE_DIRS.has(e.name) || e.name.startsWith(&#39;.&#39;)) continue;\r\n        walk(path.join(dir, e.name));\r\n      } else if (e.isFile() &amp;&amp; e.name === &#39;CLAUDE.md&#39;) {\r\n        out.push(path.join(dir, e.name));\r\n      }\r\n    }\r\n  })(root);\r\n  return out;\r\n}\r\n\r\nfunction relClaudePath(root, file) {\r\n  const r = path.relative(root, file).split(path.sep).join(&#39;/&#39;);\r\n  return &#39;/&#39; + r;\r\n}\r\n\r\nfunction lineCountOf(txt) {\r\n  return txt.replace(/\\r\\n/g, &#39;\\n&#39;).split(&#39;\\n&#39;).length;\r\n}\r\n\r\n// Non-trivial content lines for overlap comparison: trimmed, non-empty, skipping\r\n// markdown headings and PM-KIT managed-block markers (structural, not content).\r\nfunction contentLines(txt) {\r\n  return txt.replace(/\\r\\n/g, &#39;\\n&#39;).split(&#39;\\n&#39;)\r\n    .map((l) =&gt; l.trim())\r\n    .filter((l) =&gt; l.length &gt; 0)\r\n    .filter((l) =&gt; !l.startsWith(&#39;#&#39;))\r\n    .filter((l) =&gt; !/^&lt;!--.*--&gt;$/.test(l));\r\n}\r\n\r\n// ---------------------------------------------------------------------------\r\n// Template-inline detection (STORY-12.5.01)\r\n//\r\n// A CLAUDE.md should *point to* a 91-Templates/ file, not re-paste its frontmatter\r\n// block. We fingerprint each template by its leading-frontmatter key set, then\r\n// flag a CLAUDE.md that re-states enough of those template-specific keys to be a\r\n// copy rather than a reference. Keyed on the template&#39;s own frontmatter keys (not\r\n// generic headings) so a benign pointer that merely names the template file — but\r\n// carries none of its keys — passes clean. See ADR-0057.\r\n// ---------------------------------------------------------------------------\r\nconst TEMPLATE_INLINE_MIN_KEYS = 3;      // an absolute floor: ≥3 template keys present\r\nconst TEMPLATE_INLINE_RATIO = 0.75;      // …or ≥75% of a smaller template&#39;s keys\r\n\r\nfunction frontmatterKeys(txt) {\r\n  const norm = txt.replace(/\\r\\n/g, &#39;\\n&#39;);\r\n  const m = norm.match(/^---\\n([\\s\\S]*?)\\n---/);\r\n  if (!m) return [];\r\n  const keys = [];\r\n  for (const line of m[1].split(&#39;\\n&#39;)) {\r\n    const km = line.match(/^([A-Za-z0-9_]+):/);\r\n    if (km) keys.push(km[1]);\r\n  }\r\n  return keys;\r\n}\r\n\r\n// Load { file, keys } fingerprints for every *.md template that carries a\r\n// frontmatter block with ≥2 keys. Returns [] for a missing/unreadable di</code></pre>","href":""},{"id":"claude-scaffold","title":"claude-scaffold","file":"_00-Project-Management/93-Scripts/claude-scaffold.js","ext":"js","bodyHtml":"<pre><code class=\"lang-js\">#!/usr/bin/env node\r\n/**\r\n * claude-scaffold.js\r\n *\r\n * Create/merge the CLAUDE.md context layer in a host repo from detected\r\n * boundaries. Non-destructive: only PM-KIT managed blocks are (re)written;\r\n * human content is preserved. settings.json deny list is union-merged.\r\n *\r\n * Usage:\r\n *   node claude-scaffold.js [--root &lt;dir&gt;] [--include /a,/b | --all] [--yes]\r\n *\r\n *   --root &lt;dir&gt;       repo root to scaffold (default: two levels above this script)\r\n *   --include a,b      comma-separated candidate paths to include (non-interactive)\r\n *   --all              include every detected candidate (non-interactive)\r\n *   --yes              skip the confirm prompt when --include/--all is absent and\r\n *                      a config already exists (use config include list)\r\n *   (no flags + TTY)   interactive confirm: tick which candidates to include\r\n *\r\n * Writes: &lt;root&gt;/CLAUDE.md, &lt;root&gt;/&lt;sub&gt;/CLAUDE.md, &lt;root&gt;/codebase-map.md,\r\n *         &lt;root&gt;/.claude/settings.json, &lt;root&gt;/.claude-pm-config.json\r\n *\r\n * Template resolution (see ADR-0012): each template is looked up across an\r\n * ordered set of candidate locations so the command works both in a deployed\r\n * host repo (templates under &lt;repo&gt;/91-Templates and the settings baseline at\r\n * &lt;repo&gt;/.claude/settings.json) and inside this kit (where the CLAUDE-layer\r\n * templates live under scaffold/91-Templates and scaffold/.claude). Missing\r\n * optional templates (e.g. SUBDIR-CLAUDE — owned by a parallel lane) fall back\r\n * to a minimal in-code stub rather than failing.\r\n *\r\n * Dependency-free — Node stdlib only.\r\n */\r\n&#39;use strict&#39;;\r\n\r\nconst fs = require(&#39;fs&#39;);\r\nconst path = require(&#39;path&#39;);\r\nconst readline = require(&#39;readline&#39;);\r\n\r\nconst { detectBoundaries } = require(&#39;./lib/detect-boundaries&#39;);\r\nconst cfgLib = require(&#39;./lib/claude-config&#39;);\r\nconst { upsertManagedBlock, mergeSettingsDeny, buildCommandsBlock } =\r\n  require(&#39;./lib/claude-md-writer&#39;);\r\n\r\n// Ordered template search roots. First hit wins. Covers both the deployed\r\n// host-repo layout and this kit&#39;s scaffold/ staging layout.\r\nconst PM_ROOT = path.resolve(__dirname, &#39;..&#39;);           // _00-Project-Management\r\nconst REPO_ROOT = path.resolve(PM_ROOT, &#39;..&#39;);           // kit repo root (or host repo root once deployed)\r\nconst TEMPLATE_ROOTS = [\r\n  path.join(PM_ROOT, &#39;91-Templates&#39;),                    // host-repo layout\r\n  path.join(REPO_ROOT, &#39;91-Templates&#39;),                  // deploy root layout\r\n  path.join(REPO_ROOT, &#39;scaffold&#39;, &#39;91-Templates&#39;),      // kit staging layout\r\n];\r\nconst SETTINGS_BASELINE_PATHS = [\r\n  path.join(REPO_ROOT, &#39;.claude&#39;, &#39;settings.json&#39;),      // deployed host repo\r\n  path.join(REPO_ROOT, &#39;scaffold&#39;, &#39;.claude&#39;, &#39;settings.json&#39;), // kit staging\r\n];\r\n\r\nfunction findTemplate(name) {\r\n  for (const root of TEMPLATE_ROOTS) {\r\n    const p = path.join(root, name);\r\n    if (fs.existsSync(p)) return p;\r\n  }\r\n  return null;\r\n}\r\n\r\nfunction readTemplateOptional(name) {\r\n  const p = findTemplate(name);\r\n  return p ? fs.readFileSync(p, &#39;utf8&#39;) : null;\r\n}\r\n\r\n// Minimal in-code stubs used when an optional template is absent (e.g. the\r\n// SUBDIR-CLAUDE template, which a parallel lane owns). The scaffold owns the\r\n// managed:commands block inside; human prose is added later by the fill skill.\r\nfunction rootClaudeFallback() {\r\n  return &#39;# CLAUDE.md\\n\\n## Commands\\n&#39; +\r\n    &#39;&lt;!-- PM-KIT:BEGIN managed:commands --&gt;\\n&lt;!-- PM-KIT:END managed:commands --&gt;\\n&#39;;\r\n}\r\nfunction subdirClaudeFallback(relPath) {\r\n  return `# CLAUDE.md — ${relPath}\\n\\n## Commands\\n` +\r\n    &#39;&lt;!-- PM-KIT:BEGIN managed:commands --&gt;\\n&lt;!-- PM-KIT:END managed:commands --&gt;\\n&#39;;\r\n}\r\nfunction codebaseMapFallback() {\r\n  return &#39;# Codebase Map\\n\\n&#39; +\r\n    &#39;&lt;!-- PM-KIT:BEGIN managed --&gt;\\n&lt;!-- PM-KIT:END managed --&gt;\\n&#39;;\r\n}\r\n\r\nfunction baselineDeny() {\r\n  for (const p of SETTINGS_BASELINE_PATHS) {\r\n    if (!fs.existsSync(p)) continue;\r\n    try {\r\n      const j = JSON.parse(fs.readFileSync(p, &#39;utf8&#39;));\r\n      if (j &amp;&amp; j.permissions &amp;&amp; Array.isArray(j.permissions.deny)) return j.permissions.deny;\r\n    } catch { /* fall through */ }\r\n  }\r\n  // Conservative destructive-only floor (matches ADR-0007) if no baseline found.\r\n  return [\r\n    &#39;Bash(rm -rf:*)&#39;, &#39;Bash(git push --force*)&#39;, &#39;Bash(git push --force-with-lease*)&#39;,\r\n    &#39;Bash(npm publish*)&#39;, &#39;Write(.env*)&#39;, &#39;Write(node_modules/**)&#39;,\r\n    &#39;Edit(.env*)&#39;, &#39;Edit(node_modules/**)&#39;,\r\n  ];\r\n}\r\n\r\nfunction parseArgs(argv) {\r\n  const args = { root: path.resolve(__dirname, &#39;..&#39;, &#39;..&#39;), include: null, all: false, yes: false, tiered: false };\r\n  for (let i = 0; i &lt; argv.length; i++) {\r\n    const a = argv[i];\r\n    // --target is an alias of --root: a fixture seam for the tiered mode so a temp\r\n    // tree can be scaffolded without touching the real repo root.\r\n    if ((a === &#39;--root&#39; || a === &#39;--target&#39;) &amp;&amp; argv[i + 1]) args.root = path.resolve(argv[++i]);\r\n    else if (a === &#39;--include&#39; &amp;&amp; argv[i + 1]) args.include = argv[++i].split(&#39;,&#39;).map((s) =&gt; s.trim()).filter(Boolean);\r\n    else if (a === &#39;--all&#39;) args.all = true;\r\n    else if (a === &#39;--yes&#39;) args.yes = true;\r\n    else if (a === &#39;--tiered&#39;) args.tiered = true;\r\n    else if (a === &#39;--help&#39;) args.help = true;\r\n  }\r\n  return args;\r\n}\r\n\r\nfunction relToFsDir(root, relPath) {\r\n  if (relPath === &#39;/&#39;) return root;\r\n  return path.join(root, relPath.replace(/^\\//, &#39;&#39;).split(&#39;/&#39;).join(path.sep));\r\n}\r\n\r\nfunction writeFileEnsuringDir(file, content) {\r\n  fs.mkdirSync(path.dirname(file), { recursive: true });\r\n  fs.writeFileSync(file, content, &#39;utf8&#39;);\r\n}\r\n\r\nfunction scaffoldRootClaude(root, rootCandidate) {\r\n  const file = path.join(root, &#39;CLAUDE.md&#39;);\r\n  let base;\r\n  if (fs.existsSync(file)) base = fs.readFileSync(file, &#39;utf8&#39;);\r\n  else base = readTemplateOptional(&#39;ROOT-CLAUDE.template.md&#39;) || rootClaudeFallback();\r\n  const commands = buildCommandsBlock(rootCandidate ? rootCandidate.scripts : {});\r\n  const out = upsertManagedBlock(base, &#39;managed:commands&#39;, commands);\r\n  writeFileEnsuringDir(file, out);\r\n  return &#39;/CLAUDE.md&#39;;\r\n}\r\n\r\nfunction scaffoldSubdirClaude(root, candidate) {\r\n  const dir = relToFsDir(root, candidate.path);\r\n  const file = path.join(dir, &#39;CLAUDE.md&#39;);\r\n  let base;\r\n  if (fs.existsSync(file)) base = fs.readFileSync(file, &#39;utf8&#39;);\r\n  else base = readTemplateOptional(&#39;SUBDIR-CLAUDE.template.md&#39;) || subdirClaudeFallback(candidate.path);\r\n  const commands = buildCommandsBlock(candidate.scripts);\r\n  const out = upsertManagedBlock(base, &#39;managed:commands&#39;, commands);\r\n  writeFileEnsuringDir(file, out);\r\n  return candidate.path + &#39;/CLAUDE.md&#39;;\r\n}\r\n\r\n// ---------------------------------------------------------------------------\r\n// Tiered layout (STORY-12.4.01)\r\n//\r\n// The tiered mode emits a three-tier CLAUDE.md layout instead of a single flat\r\n// file, so a host repo&#39;s always-loaded context stays small:\r\n//   • Tier 1 — an always-on root CLAUDE.md (loaded every session).\r\n//   • Tier 2 — a folder-scoped CLAUDE.md per primary source area (additive:\r\n//              area-specific rules only; never a copy of root).\r\n//   • Tier 3 — a thin pointer CLAUDE.md in occasional-use folders that just\r\n//              defers to root rather than carrying its own rules.\r\n// Folders are classified by name: occasional-use tooling/asset folders get a\r\n// pointer; everything else gets a folder-scoped file. The classifier is a\r\n// sensible default — projects extend it via `.claude-pm-config.json` include\r\n// lists in the normal (non-tiered) flow.\r\n// ---------------------------------------------------------------------------\r\nconst OCCASIONAL_FOLDERS = new Set([\r\n  &#39;scripts&#39;, &#39;script&#39;, &#39;tools&#39;, &#39;tool&#39;, &#39;docs&#39;, &#39;doc&#39;, &#39;config&#39;, &#39;configs&#39;,\r\n  &#39;infra&#39;, &#39;infrastructure&#39;, &#39;examples&#39;, &#39;example&#39;, &#39;assets&#39;, &#39;public&#39;,\r\n  &#39;vendor&#39;, &#39;bin&#39;, &#39;fixtures&#39;, &#39;__fixtures__&#39;,\r\n]);\r\n\r\nconst TIERED_IGNORE = new Set([\r\n  &#39;node_modules&#39;, &#39;.git&#39;, &#39;dist&#39;, &#39;build&#39;, &#39;.next&#39;, &#39;out&#39;,\r\n  &#39;coverage&#39;, &#39;vendor&#39;, &#39;__pycache__&#39;, &#39;target&#39;, &#39;.venv&#39;, &#39;venv&#39;,\r\n]);\r\n\r\nfunction immediateSubdirs(root) {\r\n  let entries;\r\n  try { entries = fs.readdirS</code></pre>","href":""},{"id":"doctor","title":"doctor","file":"_00-Project-Management/93-Scripts/doctor.js","ext":"js","bodyHtml":"<pre><code class=\"lang-js\">#!/usr/bin/env node\r\n/**\r\n * doctor.js — read-only wiring pre-flight for a project&#39;s PM-kit wiring.\r\n *\r\n * Reports, as discrete ✓/✗/⚠ lines, the things that silently break when the kit\r\n * is half-installed:\r\n *   - the `pm:*` scripts are wired into the host package.json,\r\n *   - the path map (90-Standards/pm-paths.json or .claude-pm-config.json) is present + valid,\r\n *   - the mapped artefact folders that exist,\r\n *   - Node is available.\r\n *\r\n * Exits non-zero if any CORE check fails (no path map, or core pm:* scripts not\r\n * wired), zero when the core wiring is healthy. Strictly READ-ONLY — running it\r\n * leaves the target tree byte-for-byte unchanged (the value is a safe diagnostic).\r\n *\r\n * Canonical entrypoint (ADR-0054): this file supersedes the v2.4.0 `pm-doctor.js`\r\n * spike. `--root` is accepted as an alias of `--target`.\r\n *\r\n * Usage: node _00-Project-Management/93-Scripts/doctor.js   (npm run pm:doctor)\r\n *        --target &lt;dir&gt; | --root &lt;dir&gt;   audit a different project root\r\n *        --gate                          terse skill pre-flight: on unwired, print\r\n *                                        ONE canonical &quot;kit not wired&quot; line + exit 1;\r\n *                                        silent + exit 0 when healthy.\r\n * Exit codes: 0 = healthy · 1 = core wiring broken · 2 = bad args.\r\n * Dependency-free — Node stdlib only.\r\n */\r\n&#39;use strict&#39;;\r\n\r\nconst fs = require(&#39;fs&#39;);\r\nconst path = require(&#39;path&#39;);\r\nconst { loadPaths, SCAN_KEYS } = require(&#39;./lib/pm-paths&#39;);\r\n\r\n// The ONE canonical &quot;not wired&quot; line (STORY-12.2.03). Lives here so the skills can\r\n// surface it verbatim and there is a single source of truth for the wording + fix.\r\nconst NOT_WIRED_MSG = &#39;kit not wired — run `npm run pm:install`&#39;;\r\n\r\n// --target / --root override lets you point doctor at another project (default = this\r\n// kit&#39;s repo). --gate selects the terse skill pre-flight mode.\r\nfunction parseArgs() {\r\n  const argv = process.argv.slice(2);\r\n  let target = path.resolve(__dirname, &#39;..&#39;, &#39;..&#39;); // repo root (two up from 93-Scripts)\r\n  let gate = false;\r\n  for (let i = 0; i &lt; argv.length; i++) {\r\n    if (argv[i] === &#39;--target&#39; || argv[i] === &#39;--root&#39;) {\r\n      const v = argv[i + 1];\r\n      if (!v || v.startsWith(&#39;--&#39;)) { console.error(`✗ ${argv[i]} requires a directory path`); process.exit(2); }\r\n      target = path.resolve(v); i++;\r\n    } else if (argv[i] === &#39;--gate&#39;) { gate = true; }\r\n    else if (argv[i].startsWith(&#39;--&#39;)) { console.error(`✗ unknown arg: ${argv[i]}`); process.exit(2); }\r\n  }\r\n  return { target, gate };\r\n}\r\n\r\n// pm:* scripts, split by how badly a project breaks without them.\r\nconst CORE_SCRIPTS = { &#39;pm:lint&#39;: &#39;validate-frontmatter.js&#39;, &#39;pm:dash&#39;: &#39;generate-dashboard.js&#39; };\r\nconst RECOMMENDED_SCRIPTS = { &#39;pm:monitor&#39;: &#39;generate-monitor.js&#39;, &#39;pm:map&#39;: &#39;generate-codebase-map.js&#39;, &#39;pm:doctor&#39;: &#39;doctor.js&#39;, &#39;pm:install&#39;: &#39;install.js&#39; };\r\nconst OPTIONAL_SCRIPTS = { &#39;pm:claude-scaffold&#39;: &#39;claude-scaffold.js&#39;, &#39;pm:claude-audit&#39;: &#39;claude-audit.js&#39; };\r\n\r\nfunction readJson(p) { try { return JSON.parse(fs.readFileSync(p, &#39;utf8&#39;)); } catch (_e) { return null; } }\r\n\r\n// Run every check and return { lines, coreBroken } — pure (no writes), so the gate\r\n// wrapper (STORY-12.2.03) can reuse the verdict without re-implementing the checks.\r\nfunction diagnose(REPO_ROOT) {\r\n  const PM_ROOT = path.join(REPO_ROOT, &#39;_00-Project-Management&#39;);\r\n  const lines = [];\r\n  let coreBroken = false;\r\n  const ok = (label, detail) =&gt; lines.push(`  ✓ ${label}${detail ? ` — ${detail}` : &#39;&#39;}`);\r\n  const warn = (label, detail) =&gt; lines.push(`  ⚠ ${label}${detail ? ` — ${detail}` : &#39;&#39;}`);\r\n  const bad = (label, detail) =&gt; { lines.push(`  ✗ ${label}${detail ? ` — ${detail}` : &#39;&#39;}`); coreBroken = true; };\r\n\r\n  // 1. Node available\r\n  ok(&#39;Node runtime&#39;, process.version);\r\n\r\n  // 2. pm:* scripts wired into host package.json (CORE = pm:lint + pm:dash)\r\n  const pkg = readJson(path.join(REPO_ROOT, &#39;package.json&#39;));\r\n  const scripts = (pkg &amp;&amp; pkg.scripts) || {};\r\n  if (!pkg) bad(&#39;package.json not found&#39;, `${REPO_ROOT} — pm:* scripts cannot be wired (run pm:install)`);\r\n  else {\r\n    const coreMissing = Object.keys(CORE_SCRIPTS).filter(n =&gt; !scripts[n]);\r\n    if (coreMissing.length) bad(&#39;Core pm:* scripts not wired&#39;, `missing: ${coreMissing.join(&#39;, &#39;)} (run pm:install)`);\r\n    else ok(&#39;Core pm:* scripts wired&#39;, &#39;pm:lint, pm:dash&#39;);\r\n    const recMissing = Object.keys(RECOMMENDED_SCRIPTS).filter(n =&gt; !scripts[n]);\r\n    if (recMissing.length) warn(&#39;Recommended scripts not wired&#39;, recMissing.join(&#39;, &#39;));\r\n    const optMissing = Object.keys(OPTIONAL_SCRIPTS).filter(n =&gt; !scripts[n]);\r\n    if (optMissing.length) lines.push(`  · optional Claude-layer scripts not wired: ${optMissing.join(&#39;, &#39;)}`);\r\n  }\r\n\r\n  // 3. path map present + valid (CORE) — pm-paths.json or .claude-pm-config.json\r\n  const pmPaths = path.join(PM_ROOT, &#39;90-Standards&#39;, &#39;pm-paths.json&#39;);\r\n  const cfgPath = path.join(REPO_ROOT, &#39;.claude-pm-config.json&#39;);\r\n  const pmPathsExists = fs.existsSync(pmPaths);\r\n  const cfgExists = fs.existsSync(cfgPath);\r\n  if (!pmPathsExists &amp;&amp; !cfgExists) {\r\n    bad(&#39;Path map missing&#39;, &#39;no 90-Standards/pm-paths.json or .claude-pm-config.json (run pm:install)&#39;);\r\n  } else {\r\n    let valid = true, which = [];\r\n    if (pmPathsExists) { if (readJson(pmPaths)) which.push(&#39;pm-paths.json&#39;); else { valid = false; } }\r\n    if (cfgExists) { if (readJson(cfgPath)) which.push(&#39;.claude-pm-config.json&#39;); else { valid = false; } }\r\n    if (!valid) bad(&#39;Path map invalid&#39;, &#39;present but not valid JSON — fix or re-run pm:install&#39;);\r\n    else ok(&#39;Path map present + valid&#39;, which.join(&#39; + &#39;));\r\n  }\r\n\r\n  // 4. layout resolves + which mapped folders exist (report; not core)\r\n  const { map, layout, source } = loadPaths(PM_ROOT);\r\n  ok(`Folder layout: ${layout}`, `resolved via ${source}`);\r\n  if (fs.existsSync(PM_ROOT)) {\r\n    const present = [], missing = [];\r\n    for (const k of SCAN_KEYS) { const f = map[k]; (fs.existsSync(path.join(PM_ROOT, f)) ? present : missing).push(`${k}→${f}`); }\r\n    if (present.length) ok(&#39;Mapped folders found&#39;, present.join(&#39;, &#39;));\r\n    else warn(&#39;No artefact folders found yet&#39;, &#39;create epics/stories/… or check the layout preset&#39;);\r\n    if (missing.length) lines.push(`  · not present (ok if unused): ${missing.join(&#39;, &#39;)}`);\r\n  } else {\r\n    lines.push(&#39;  · no _00-Project-Management/ folder yet (copy the scaffold or run BOOTSTRAP)&#39;);\r\n  }\r\n\r\n  return { lines, coreBroken };\r\n}\r\n\r\nfunction main() {\r\n  const { target: REPO_ROOT, gate } = parseArgs();\r\n  const { lines, coreBroken } = diagnose(REPO_ROOT);\r\n\r\n  // --gate: the cheap skill pre-flight. ONE line on failure, silence on success — so\r\n  // a skill can refuse loudly and surface the canonical message verbatim, with no\r\n  // friction in a correctly-wired repo.\r\n  if (gate) {\r\n    if (coreBroken) { console.log(NOT_WIRED_MSG); process.exit(1); }\r\n    process.exit(0);\r\n  }\r\n\r\n  console.log(&#39;pm:doctor — PM-kit wiring health\\n&#39;);\r\n  for (const l of lines) console.log(l);\r\n  if (coreBroken) {\r\n    console.log(`\\n→ ${NOT_WIRED_MSG}   (or: node _00-Project-Management/93-Scripts/install.js)`);\r\n    console.error(&#39;\\n✗ pm:doctor — core wiring problems found.&#39;);\r\n    process.exit(1);\r\n  }\r\n  console.log(&#39;\\n✓ pm:doctor — wiring is healthy.&#39;);\r\n  process.exit(0);\r\n}\r\n\r\nmodule.exports = { diagnose, NOT_WIRED_MSG };\r\n\r\nif (require.main === module) { main(); }\r\n</code></pre>","href":""},{"id":"generate-backlog-board","title":"generate-backlog-board","file":"_00-Project-Management/93-Scripts/generate-backlog-board.js","ext":"js","bodyHtml":"<pre><code class=\"lang-js\">#!/usr/bin/env node\r\n/**\r\n * generate-backlog-board.js\r\n *\r\n * Builds a single self-contained interactive HTML backlog-prioritization board\r\n * at _00-Project-Management/41-Reports/BACKLOG-BOARD.html from the BACKLOG-*.md\r\n * files in _00-Project-Management/11-Backlog/.\r\n *\r\n * The board is a THROWAWAY single-purpose tool (per CLAUDE-CODE-CONFIG §4 and\r\n * the Anthropic &quot;unreasonable effectiveness of HTML&quot; blog): one card per backlog\r\n * item, drag-to-reorder, RICE sliders, filter by priority / type-of-work, and an\r\n * &quot;Export → markdown patch&quot; button that emits a unified diff of the frontmatter\r\n * (priority + rice_score) so changes can be applied with `git apply` or by hand.\r\n * Markdown-in-git stays the source of truth; the HTML never persists anything.\r\n *\r\n * Design tokens + the export/clipboard pattern mirror DASHBOARD.html,\r\n * HTML-ARTEFACT.template.html and EXPLORATION.template.html (no CDN, no fonts off\r\n * the web, light + dark, fully offline / file://).\r\n *\r\n * Dependency-free: Node.js stdlib only (fs, path).\r\n * Idempotent except for the generated-at timestamp.\r\n *\r\n * Usage:\r\n *   node _00-Project-Management/93-Scripts/generate-backlog-board.js\r\n *   npm run pm:board\r\n *\r\n * Exit codes:\r\n *   0 — board written\r\n *   2 — script error (couldn&#39;t read the backlog folder, etc.)\r\n */\r\n\r\n&#39;use strict&#39;;\r\n\r\nconst fs = require(&#39;fs&#39;);\r\nconst path = require(&#39;path&#39;);\r\n\r\n/* ============================================================\r\n * Config\r\n * ============================================================ */\r\n\r\nconst PM_ROOT = path.resolve(__dirname, &#39;..&#39;);\r\n// Resolve logical PM sub-folder names through the layout map (full / flattened /\r\n// custom). PATHS.&lt;logical&gt; → physical folder name for this project. See lib/pm-paths.js.\r\nconst { loadPaths } = require(&#39;./lib/pm-paths&#39;);\r\nconst PATHS = loadPaths(PM_ROOT).map;\r\nconst BACKLOG_DIR = path.join(PM_ROOT, PATHS.backlog);\r\nconst OUT_FILE = path.join(PM_ROOT, PATHS.reports, &#39;BACKLOG-BOARD.html&#39;);\r\n\r\n// Priority enum used for the filter pills + colour mapping.\r\nconst PRIORITY_ORDER = [&#39;P0&#39;, &#39;P1&#39;, &#39;P2&#39;, &#39;P3&#39;];\r\n\r\n/* ============================================================\r\n * Frontmatter parsing\r\n * Mirrors validate-frontmatter.js&#39;s flat-YAML approach. We keep the\r\n * raw line text around so the exporter can build a byte-faithful diff.\r\n * ============================================================ */\r\n\r\nfunction stripQuotes(s) {\r\n  if (typeof s !== &#39;string&#39;) return s;\r\n  if ((s.startsWith(&quot;&#39;&quot;) &amp;&amp; s.endsWith(&quot;&#39;&quot;)) ||\r\n      (s.startsWith(&#39;&quot;&#39;) &amp;&amp; s.endsWith(&#39;&quot;&#39;))) {\r\n    return s.slice(1, -1);\r\n  }\r\n  return s;\r\n}\r\n\r\n// Split a file into { fmLines, fmText } where fmLines are the raw lines BETWEEN\r\n// the opening and closing `---` (no delimiters), preserving exact text. Returns\r\n// null if there&#39;s no frontmatter block.\r\nfunction splitFrontmatter(content) {\r\n  const m = content.match(/^---\\r?\\n([\\s\\S]*?)\\r?\\n---\\r?\\n?/);\r\n  if (!m) return null;\r\n  return { fmText: m[1], fmLines: m[1].split(/\\r?\\n/) };\r\n}\r\n\r\n// Parse the flat key:value fields we care about from the raw frontmatter lines.\r\nfunction parseFields(fmLines) {\r\n  const fm = {};\r\n  for (const line of fmLines) {\r\n    if (!line.trim() || line.trim().startsWith(&#39;#&#39;)) continue;\r\n    const kv = line.match(/^([A-Za-z_][\\w-]*)\\s*:\\s*(.*)$/);\r\n    if (kv) fm[kv[1]] = stripQuotes(kv[2].trim());\r\n  }\r\n  return fm;\r\n}\r\n\r\n// Find the 0-based index of a top-level `key:` line in the frontmatter lines,\r\n// or -1 if absent. Only matches unindented keys (frontmatter here is flat).\r\nfunction indexOfKey(fmLines, key) {\r\n  for (let i = 0; i &lt; fmLines.length; i++) {\r\n    if (new RegExp(&#39;^&#39; + key + &#39;\\\\s*:&#39;).test(fmLines[i])) return i;\r\n  }\r\n  return -1;\r\n}\r\n\r\n/* ============================================================\r\n * RICE\r\n * rice_score = reach * impact * confidence / effort  (round to int)\r\n * confidence is a 0..1 fraction; effort never zero. We surface the four\r\n * components when present, otherwise default to a neutral starting point\r\n * so the slider has something to move. The score field itself is what the\r\n * patch writes back.\r\n * ============================================================ */\r\n\r\nfunction num(v, fallback) {\r\n  const n = Number(v);\r\n  return Number.isFinite(n) ? n : fallback;\r\n}\r\n\r\nfunction computeRice(reach, impact, confidence, effort) {\r\n  const e = effort &gt; 0 ? effort : 1;\r\n  return Math.round((reach * impact * confidence) / e);\r\n}\r\n\r\n/* ============================================================\r\n * Collect backlog items\r\n * ============================================================ */\r\n\r\nfunction collect() {\r\n  if (!fs.existsSync(BACKLOG_DIR)) {\r\n    console.error(&#39;✗ backlog folder not found: &#39; + BACKLOG_DIR);\r\n    process.exit(2);\r\n  }\r\n  const files = fs.readdirSync(BACKLOG_DIR)\r\n    .filter(f =&gt; /^BACKLOG-\\d+.*\\.md$/.test(f))\r\n    .sort();\r\n\r\n  const items = [];\r\n  for (const file of files) {\r\n    const abs = path.join(BACKLOG_DIR, file);\r\n    let content;\r\n    try {\r\n      content = fs.readFileSync(abs, &#39;utf8&#39;);\r\n    } catch (e) {\r\n      console.error(&#39;  ! skipped unreadable file: &#39; + file);\r\n      continue;\r\n    }\r\n    const split = splitFrontmatter(content);\r\n    if (!split) {\r\n      // Malformed frontmatter — don&#39;t crash, just note and skip (per testplan\r\n      // &quot;generator handles malformed BACKLOG frontmatter without crashing&quot;).\r\n      console.error(&#39;  ! skipped (no frontmatter): &#39; + file);\r\n      continue;\r\n    }\r\n    const fm = parseFields(split.fmLines);\r\n\r\n    const reach = num(fm.rice_reach, 100);\r\n    const impact = num(fm.rice_impact, 2);\r\n    const confidence = num(fm.rice_confidence, 0.8);\r\n    const effort = num(fm.rice_effort, 3);\r\n    const existingScore = fm.rice_score !== undefined\r\n      ? num(fm.rice_score, 0)\r\n      : 0;\r\n\r\n    items.push({\r\n      file,\r\n      id: fm.id || file.replace(/\\.md$/, &#39;&#39;),\r\n      title: fm.title || fm.id || file,\r\n      priority: fm.priority || &#39;P3&#39;,\r\n      typeOfWork: fm.type_of_work || &#39;unknown&#39;,\r\n      estimate: fm.estimate || &#39;?&#39;,\r\n      status: fm.status || &#39;not-started&#39;,\r\n      riceScore: existingScore,\r\n      reach, impact, confidence, effort,\r\n      hasRiceScore: fm.rice_score !== undefined,\r\n      // Raw line context for byte-faithful patch generation:\r\n      priorityLineIdx: indexOfKey(split.fmLines, &#39;priority&#39;),\r\n      riceLineIdx: indexOfKey(split.fmLines, &#39;rice_score&#39;),\r\n      fmLines: split.fmLines,\r\n    });\r\n  }\r\n  return items;\r\n}\r\n\r\n/* ============================================================\r\n * Patch context\r\n * For each item we precompute the data the in-browser exporter needs to\r\n * build a unified diff hunk: the original `priority:` line, the original\r\n * `rice_score:` line (or null if absent), and a stable surrounding context\r\n * line so `git apply` can anchor the hunk. We hand the browser the raw\r\n * frontmatter lines + indices and let it splice — keeping the diff math in\r\n * one place (the script computes nothing about the *new* values; the user&#39;s\r\n * slider/filter edits do).\r\n * ============================================================ */\r\n\r\nfunction patchContextFor(item) {\r\n  // Offset: frontmatter lines start at file line 2 (line 1 is the opening `---`).\r\n  const FM_LINE_OFFSET = 2;\r\n  return {\r\n    file: &#39;_00-Project-Management/&#39; + PATHS.backlog + &#39;/&#39; + item.file,\r\n    fmLines: item.fmLines,\r\n    fmLineOffset: FM_LINE_OFFSET,\r\n    priorityLineIdx: item.priorityLineIdx,\r\n    riceLineIdx: item.riceLineIdx,\r\n  };\r\n}\r\n\r\n/* ============================================================\r\n * HTML helpers\r\n * ============================================================ */\r\n\r\nfunction esc(s) {\r\n  return String(s)\r\n    .replace(/&amp;/g, &#39;&amp;amp;&#39;)\r\n    .replace(/&lt;/g, &#39;&amp;lt;&#39;)\r\n    .replace(/&gt;/g, &#39;&amp;gt;&#39;)\r\n    .replace(/&quot;/g, &#39;&amp;quot;&#39;)\r\n    .replace(/&#39;/g, &#39;&amp;#39;&#39;);\r\n}\r\n\r\nfunction priorityClass(p) {\r\n  switch (p) {\r\n    case &#39;P0&#39;: return &#39;danger&#39;;\r\n    case &#39;P1&#39;: return &#39;warn&#39;;\r\n    case &#39;P2&#39;: return &#39;info&#39;;\r\n    default:   return &#39;ok&#39;;\r\n  }\r\n}\r\n\r\n/* =======</code></pre>","href":""},{"id":"generate-codebase-map","title":"generate-codebase-map","file":"_00-Project-Management/93-Scripts/generate-codebase-map.js","ext":"js","bodyHtml":"<pre><code class=\"lang-js\">#!/usr/bin/env node\r\n/**\r\n * generate-codebase-map.js\r\n *\r\n * Generates / refreshes a repo-root `CODEBASE-MAP.md` — a lightweight markdown\r\n * table listing the repository&#39;s top-level directories with a one-line purpose\r\n * and an owner. Per Anthropic&#39;s large-codebases guidance, a codebase map gives\r\n * Claude a fast orientation without walking the whole tree.\r\n *\r\n * Behaviour:\r\n *   - Globs top-level DIRECTORIES at the repo root (one level deep only).\r\n *   - Skips transient / dependency / build directories (DENY_DIRS) and `.git`.\r\n *     Other dot-prefixed directories that carry project meaning (e.g.\r\n *     `.claude-plugin`, `.github`) are KEPT — see ADR-0008.\r\n *   - Does NOT follow symlinks (uses lstat; symlinked dirs are skipped).\r\n *   - Idempotent + non-destructive: if CODEBASE-MAP.md already exists, rows whose\r\n *     Purpose/Owner have been filled in (i.e. are not the TODO placeholder) are\r\n *     preserved; only newly-appeared directories are added with TODO placeholders.\r\n *     Rows for directories that no longer exist are dropped.\r\n *\r\n * Usage:\r\n *   node _00-Project-Management/93-Scripts/generate-codebase-map.js\r\n *   npm run pm:map\r\n *\r\n * Exit codes:\r\n *   0 — wrote CODEBASE-MAP.md (even if zero mappable dirs — emits an empty table)\r\n *   2 — script error (couldn&#39;t read repo root or write the file)\r\n *\r\n * Dependency-free — uses only Node.js stdlib (fs, path).\r\n */\r\n\r\n&#39;use strict&#39;;\r\n\r\nconst fs = require(&#39;fs&#39;);\r\nconst path = require(&#39;path&#39;);\r\n\r\n// ---------- Config ----------\r\n\r\n// Script lives at &lt;repo&gt;/_00-Project-Management/93-Scripts/ — repo root is two up.\r\nconst PM_ROOT = path.resolve(__dirname, &#39;..&#39;);\r\nconst REPO_ROOT = path.resolve(PM_ROOT, &#39;..&#39;);\r\nconst OUT_FILE = path.join(REPO_ROOT, &#39;CODEBASE-MAP.md&#39;);\r\n\r\nconst TODO = &#39;TODO&#39;;\r\n\r\n// Directories never worth mapping: dependencies, build outputs, caches, VCS.\r\n// Mirrors the spirit of the scaffold `.claudeignore`. Dot-dirs NOT listed here\r\n// (e.g. `.claude-plugin`, `.github`) are intentionally kept (ADR-0008).\r\nconst DENY_DIRS = new Set([\r\n  &#39;.git&#39;, &#39;node_modules&#39;, &#39;.venv&#39;, &#39;venv&#39;, &#39;vendor&#39;, &#39;.pnp&#39;,\r\n  &#39;dist&#39;, &#39;build&#39;, &#39;out&#39;, &#39;.next&#39;, &#39;.nuxt&#39;, &#39;.svelte-kit&#39;, &#39;.turbo&#39;,\r\n  &#39;.parcel-cache&#39;, &#39;coverage&#39;, &#39;.nyc_output&#39;, &#39;test-results&#39;,\r\n  &#39;playwright-report&#39;, &#39;.cache&#39;, &#39;.idea&#39;, &#39;.vscode&#39;, &#39;__pycache__&#39;,\r\n]);\r\n\r\n// ---------- Helpers ----------\r\n\r\n/**\r\n * Return the sorted list of mappable top-level directory names.\r\n * One level deep; skips DENY_DIRS and symlinks.\r\n */\r\nfunction listTopLevelDirs(root) {\r\n  let entries;\r\n  try {\r\n    entries = fs.readdirSync(root, { withFileTypes: true });\r\n  } catch (err) {\r\n    console.error(`✗ cannot read repo root: ${root}\\n  ${err.message}`);\r\n    process.exit(2);\r\n  }\r\n  const dirs = [];\r\n  for (const entry of entries) {\r\n    const name = entry.name;\r\n    if (DENY_DIRS.has(name)) continue;\r\n    // Resolve real type with lstat so we never follow a symlink into another tree.\r\n    let st;\r\n    try {\r\n      st = fs.lstatSync(path.join(root, name));\r\n    } catch {\r\n      continue;\r\n    }\r\n    if (st.isSymbolicLink()) continue;\r\n    if (!st.isDirectory()) continue;\r\n    dirs.push(name);\r\n  }\r\n  return dirs.sort((a, b) =&gt; a.localeCompare(b));\r\n}\r\n\r\n/**\r\n * Parse an existing CODEBASE-MAP.md table into { &#39;&lt;path&gt;&#39;: {purpose, owner} }.\r\n * Tolerant of hand edits: only reads pipe-table rows under the header.\r\n */\r\nfunction parseExistingRows(content) {\r\n  const rows = {};\r\n  if (!content) return rows;\r\n  const lines = content.split(/\\r?\\n/);\r\n  for (const line of lines) {\r\n    // A data row: | &lt;path&gt; | &lt;purpose&gt; | &lt;owner&gt; |\r\n    const m = line.match(/^\\|\\s*([^|]+?)\\s*\\|\\s*([^|]*?)\\s*\\|\\s*([^|]*?)\\s*\\|\\s*$/);\r\n    if (!m) continue;\r\n    const pathCell = m[1].trim();\r\n    // Skip the header row and the separator row.\r\n    if (pathCell === &#39;Path&#39; || /^-+$/.test(pathCell)) continue;\r\n    // Normalise: strip surrounding backticks if a human added them.\r\n    const key = pathCell.replace(/^`+|`+$/g, &#39;&#39;);\r\n    rows[key] = { purpose: m[2].trim(), owner: m[3].trim() };\r\n  }\r\n  return rows;\r\n}\r\n\r\nfunction buildMarkdown(dirs, existing) {\r\n  const header =\r\n    &#39;# Codebase Map\\n&#39; +\r\n    &#39;\\n&#39; +\r\n    &#39;Lightweight map of the repository\\&#39;s top-level directories. Auto-generated by\\n&#39; +\r\n    &#39;`npm run pm:map` (`_00-Project-Management/93-Scripts/generate-codebase-map.js`).\\n&#39; +\r\n    &#39;Re-running adds any new directories with `TODO` placeholders and preserves rows\\n&#39; +\r\n    &#39;you have already filled in. Replace each `TODO`.\\n&#39; +\r\n    &#39;\\n&#39; +\r\n    &#39;| Path | Purpose | Owner |\\n&#39; +\r\n    &#39;|---|---|---|\\n&#39;;\r\n\r\n  const rows = dirs.map((name) =&gt; {\r\n    const key = name + &#39;/&#39;;\r\n    const prev = existing[key] || existing[name] || {};\r\n    const purpose = prev.purpose &amp;&amp; prev.purpose !== &#39;&#39; ? prev.purpose : TODO;\r\n    const owner = prev.owner &amp;&amp; prev.owner !== &#39;&#39; ? prev.owner : TODO;\r\n    return `| ${key} | ${purpose} | ${owner} |`;\r\n  });\r\n\r\n  return header + rows.join(&#39;\\n&#39;) + &#39;\\n&#39;;\r\n}\r\n\r\n// ---------- Main ----------\r\n\r\nfunction main() {\r\n  const dirs = listTopLevelDirs(REPO_ROOT);\r\n\r\n  let existing = {};\r\n  if (fs.existsSync(OUT_FILE)) {\r\n    try {\r\n      existing = parseExistingRows(fs.readFileSync(OUT_FILE, &#39;utf8&#39;));\r\n    } catch {\r\n      existing = {};\r\n    }\r\n  }\r\n\r\n  const md = buildMarkdown(dirs, existing);\r\n\r\n  try {\r\n    fs.writeFileSync(OUT_FILE, md, &#39;utf8&#39;);\r\n  } catch (err) {\r\n    console.error(`✗ cannot write ${OUT_FILE}\\n  ${err.message}`);\r\n    process.exit(2);\r\n  }\r\n\r\n  const rel = path.relative(REPO_ROOT, OUT_FILE).replace(/\\\\/g, &#39;/&#39;);\r\n  console.log(`✓ wrote ${rel} (${dirs.length} row${dirs.length === 1 ? &#39;&#39; : &#39;s&#39;})`);\r\n  process.exit(0);\r\n}\r\n\r\nmain();\r\n</code></pre>","href":""},{"id":"generate-dashboard","title":"generate-dashboard","file":"_00-Project-Management/93-Scripts/generate-dashboard.js","ext":"js","bodyHtml":"<pre><code class=\"lang-js\">#!/usr/bin/env node\r\n/**\r\n * generate-dashboard.js\r\n *\r\n * Builds a single self-contained interactive HTML dashboard at\r\n * _00-Project-Management/42-Monitor/DASHBOARD.html.\r\n *\r\n * Contract: PRD-PM-Dashboard.md v1.0 (Live).\r\n *   - Walks 10 SCAN_DIRS under _00-Project-Management/ (strategy, epics,\r\n *     features, stories, testplans, bugs, ADRs, backlog, releases, retros)\r\n *   - Scans the AI catalogue from ~/.claude/ and project .claude/\r\n *     (skills, sub-agents, slash commands, installed plugins)\r\n *   - Merges curated overlays from _00-Project-Management/97-AI-Reference/\r\n *   - Emits a single HTML file: brand tokens inlined, dark mode, drawer,\r\n *     hash routing, group+sub tabs, diagnostics, motion, SOP session flow,\r\n *     glossary, three-dot brand mark.\r\n *\r\n * Dependency-free: Node.js stdlib only (fs, path, os).\r\n * Idempotent except for the generated-at timestamp.\r\n *\r\n * Usage:\r\n *   node _00-Project-Management/93-Scripts/generate-dashboard.js\r\n *   npm run pm:dash\r\n */\r\n\r\n&#39;use strict&#39;;\r\n\r\nconst fs = require(&#39;fs&#39;);\r\nconst path = require(&#39;path&#39;);\r\nconst os = require(&#39;os&#39;);\r\n\r\n/* ============================================================\r\n * Config\r\n * ============================================================ */\r\n\r\nconst PM_ROOT = path.resolve(__dirname, &#39;..&#39;);\r\nconst REPO_ROOT = path.resolve(PM_ROOT, &#39;..&#39;);\r\n// Resolve logical PM sub-folder names through the layout map (full / flattened /\r\n// custom). PATHS.&lt;logical&gt; → physical folder name for this project. See lib/pm-paths.js.\r\nconst { loadPaths } = require(&#39;./lib/pm-paths&#39;);\r\nconst PATHS = loadPaths(PM_ROOT).map;\r\nconst OUT_FILE = path.join(PM_ROOT, PATHS.monitor, &#39;DASHBOARD.html&#39;);\r\n\r\n// PM corpus scan map (PRD §10.1). Missing dirs are skipped silently.\r\n// v1.1 — `inbox` added for the Capture tab + Now-page pending-action widget (ADR-0048).\r\nconst SCAN_DIRS = {\r\n  strategy: PATHS.strategy,\r\n  inbox:    PATHS.inbox,\r\n  backlog:  PATHS.backlog,\r\n  release:  PATHS.releases,\r\n  retro:    PATHS.retros,\r\n  epic:     PATHS.epics,\r\n  feature:  PATHS.features,\r\n  story:    PATHS.stories,\r\n  testplan: PATHS.testplans,\r\n  bug:      PATHS.bugs,\r\n  adr:      PATHS.decisions,\r\n};\r\n\r\n// Closed status enum. Order drives filter pill stack and row sort.\r\n// `active` is allowed only on strategy artefacts (ADR-0003 escape hatch).\r\nconst STATUS_ORDER = [\r\n  &#39;in-progress&#39;, &#39;in-review&#39;, &#39;ready&#39;, &#39;blocked&#39;, &#39;active&#39;,\r\n  &#39;not-started&#39;, &#39;done&#39;, &#39;wontfix&#39;, &#39;duplicate&#39;, &#39;archived&#39;,\r\n];\r\n\r\nconst AI_KINDS = [&#39;skill&#39;, &#39;agent&#39;, &#39;command&#39;, &#39;plugin&#39;];\r\n\r\nconst HOME_CLAUDE = path.join(os.homedir(), &#39;.claude&#39;);\r\nconst PROJ_CLAUDE = path.join(REPO_ROOT, &#39;.claude&#39;);\r\n\r\n// Built-in harness sub-agents that always exist regardless of disk state.\r\nconst HARNESS_AGENTS = [\r\n  {\r\n    name: &#39;Explore&#39;,\r\n    description: &#39;Fast read-only search agent for locating code by pattern or symbol. Use for &quot;where is X defined&quot; / &quot;which files reference Y&quot; questions.&#39;,\r\n    category: &#39;Search &amp; Planning&#39;,\r\n    source: &#39;harness&#39;,\r\n    builtIn: true,\r\n    tools: &#39;Read, Glob, Grep, Bash (read-only)&#39;,\r\n    body: &#39;Built-in Claude Code sub-agent. Read-only by design — cannot edit or write files. Best for narrow lookups; will miss content past its read window so do not delegate full reviews to it.&#39;,\r\n  },\r\n  {\r\n    name: &#39;general-purpose&#39;,\r\n    description: &#39;Catch-all research agent for multi-step exploration when the target is not yet known.&#39;,\r\n    category: &#39;Search &amp; Planning&#39;,\r\n    source: &#39;harness&#39;,\r\n    builtIn: true,\r\n    tools: &#39;All tools&#39;,\r\n    body: &#39;Built-in Claude Code sub-agent. Use for open-ended research that may require several rounds of globbing/grepping. Prefer Explore for read-only lookups; reach for general-purpose when synthesis is required.&#39;,\r\n  },\r\n  {\r\n    name: &#39;Plan&#39;,\r\n    description: &#39;Software architect agent that produces implementation plans without writing code.&#39;,\r\n    category: &#39;Search &amp; Planning&#39;,\r\n    source: &#39;harness&#39;,\r\n    builtIn: true,\r\n    tools: &#39;All tools except Edit/Write&#39;,\r\n    body: &#39;Built-in Claude Code sub-agent. Returns step-by-step plans, identifies critical files, weighs trade-offs. Useful before non-trivial implementation; never lets the plan replace conversation alignment.&#39;,\r\n  },\r\n  {\r\n    name: &#39;claude&#39;,\r\n    description: &#39;Default catch-all agent when no more specific subagent name is typed.&#39;,\r\n    category: &#39;Search &amp; Planning&#39;,\r\n    source: &#39;harness&#39;,\r\n    builtIn: true,\r\n    tools: &#39;All tools&#39;,\r\n    body: &#39;Built-in Claude Code sub-agent. Equivalent to no subagent_type — runs with the full toolbelt and no domain bias.&#39;,\r\n  },\r\n];\r\n\r\n// Category rules (PRD §11.4). First match wins. Items that match nothing land in &quot;Other&quot;.\r\nconst CATEGORY_RULES = [\r\n  [/^(Explore|general-purpose|Plan|claude)$/i, &#39;Search &amp; Planning&#39;],\r\n  [/^anti-drift|writing-plans|concise-planning|create-plan|^plan(ner|ning)?$/i, &#39;Planning &amp; Anti-Drift&#39;],\r\n  [/^power-bi-/i, &#39;Power BI&#39;],\r\n  [/^power-platform/i, &#39;Power Platform&#39;],\r\n  [/^react|frontend-developer|web-vitals|web-accessibility/i, &#39;Frontend &amp; Web&#39;],\r\n  [/^javascript|^js-|fullstack-developer|^typescript/i, &#39;Languages&#39;],\r\n  [/design-taste|brandkit|imagegen|impeccable|industrial-brutalist|minimalist-ui|emil-design|gpt-taste|high-end-visual|redesign-existing|stitch-design|image-to-code|ui-designer|ui-ux-designer|figma|draw-io|mermaid-diagrams|diagram-architect/i, &#39;Design &amp; UX&#39;],\r\n  [/prompt-engineer|^llm-|^ai-|^mcp-|claude-code-guide|claude-api/i, &#39;AI &amp; Prompting&#39;],\r\n  [/test|playwright|coverage|jest|spec/i, &#39;Testing&#39;],\r\n  [/debug|error|find-bugs|systematic-debug|error-resolver|error-detective/i, &#39;Debugging&#39;],\r\n  [/security|secrets|vulnerab/i, &#39;Security&#39;],\r\n  [/seo/i, &#39;SEO&#39;],\r\n  [/refactor|clean-code|code-simplifier|unused-code/i, &#39;Refactoring&#39;],\r\n  [/code-review|review|find-bugs/i, &#39;Code Review&#39;],\r\n  [/commit|git-|github|pr-|create-pr|push|branch/i, &#39;Git &amp; GitHub&#39;],\r\n  [/deploy|build-engineer|deployment/i, &#39;Build &amp; Deploy&#39;],\r\n  [/documentation|technical-writer|content-marketer|product-manager/i, &#39;Docs &amp; Content&#39;],\r\n  [/obsidian|notion/i, &#39;Knowledge Base&#39;],\r\n  [/powershell|bash|shell|terminal/i, &#39;Shell &amp; Scripting&#39;],\r\n  [/performance|web-vitals|react-performance/i, &#39;Performance&#39;],\r\n  [/Tandem:|pm-kit|project-management/i, &#39;PM Kit&#39;],\r\n  [/^verify|verification-before-completion/i, &#39;Verification&#39;],\r\n  [/best-practices|standards/i, &#39;Best Practices&#39;],\r\n];\r\n\r\n// Glossary entries (PRD Appendix C, condensed for the AI · Glossary sub-tab).\r\nconst GLOSSARY = [\r\n  [&#39;ADR&#39;, &#39;Architecture Decision Record. A short note explaining a load-bearing choice and the alternatives rejected. Stored under &lt;code&gt;40-Decisions/&lt;/code&gt;.&#39;],\r\n  [&#39;AI catalogue&#39;, &#39;The tab group that scans &lt;code&gt;~/.claude/&lt;/code&gt; and &lt;code&gt;.claude/&lt;/code&gt; for skills, sub-agents, slash commands and plugins.&#39;],\r\n  [&#39;DoD&#39;, &#39;Definition of Done. The checklist a story must pass before flipping to &lt;code&gt;status: done&lt;/code&gt;.&#39;],\r\n  [&#39;DoR&#39;, &#39;Definition of Ready. The checklist a story must pass before flipping to &lt;code&gt;status: in-progress&lt;/code&gt;.&#39;],\r\n  [&#39;Drawer&#39;, &#39;The right-side panel that opens when you click a row. Shows the rendered markdown body and cross-references.&#39;],\r\n  [&#39;Epic&#39;, &#39;Top-level unit of work. Identifier: &lt;code&gt;EPIC-NN&lt;/code&gt;.&#39;],\r\n  [&#39;Feature&#39;, &#39;A slice of an epic. Identifier: &lt;code&gt;FEAT-NN.M&lt;/code&gt;.&#39;],\r\n  [&#39;Frontmatter&#39;, &#39;The YAML block at the top of every markdown file, between two &lt;code&gt;---&lt;/code&gt; lines, holding the artefact\\&#39;s metadata.&#39;],\r\n  [&#39;Hat protocol&#39;, &#39;The convention that one operator switches roles explicitly: Founder, PM, Dev, QA.&#39;],\r\n  [&#39;KR&#39;, &#39;Key Result. A measurable target under an Objective. Part of OKR.&#39;],\r\n  [&#39;MONITOR&#39;, &#39;&lt;code&gt;42-Monitor/MONITOR.md&lt;/code&gt;. The single board updated weekly and on every story close-out.&#39;],\r\n  [&#39;OKR&#39;, &#39;Objectives and Key Results. The goal-setting framework. Lives under &lt;code&gt;00-Strategy/&lt;/code&gt;.&#39;],\r\n  [&#39;PM kit&#39;, &#39;The folder system, templates, hooks and scripts under &lt;code&gt;_00-Project-Management/&lt;/code&gt;.&#39;],\r\n  [&#39;PRD&#39;, &#39;Product Requirements Docume</code></pre>","href":""},{"id":"generate-docs","title":"generate-docs","file":"_00-Project-Management/93-Scripts/generate-docs.js","ext":"js","bodyHtml":"<pre><code class=\"lang-js\">#!/usr/bin/env node\r\n/**\r\n * generate-docs.js\r\n *\r\n * Renders each documentation/*.md to a sibling documentation/*.html.\r\n *\r\n * Contract:\r\n *   - Reads every *.md from the documentation/ folder at project root.\r\n *   - Writes a self-contained *.html (same basename) beside each *.md.\r\n *   - HTML inlines the kit&#39;s brand tokens / design system (no external CSS).\r\n *   - Dependency-free: Node.js stdlib only (fs, path).\r\n *   - Idempotent: same input → same HTML (generated-at appears only in an\r\n *     HTML comment, not in the styled body, so the body is always stable).\r\n *   - Degrades gracefully if documentation/ is missing or empty.\r\n *\r\n * Usage:\r\n *   node _00-Project-Management/93-Scripts/generate-docs.js\r\n *   npm run pm:docs\r\n *\r\n * Override the documentation folder via DOC_ROOT env var (useful for testing):\r\n *   DOC_ROOT=/tmp/my-docs node _00-Project-Management/93-Scripts/generate-docs.js\r\n */\r\n\r\n&#39;use strict&#39;;\r\n\r\nconst fs   = require(&#39;fs&#39;);\r\nconst path = require(&#39;path&#39;);\r\n\r\n/* ============================================================\r\n * Paths\r\n * ============================================================ */\r\n\r\n// Script lives at _00-Project-Management/93-Scripts/generate-docs.js.\r\n// Project root is two levels up.\r\nconst REPO_ROOT = path.resolve(__dirname, &#39;..&#39;, &#39;..&#39;);\r\n\r\n// Allow override via env for test isolation — default to documentation/ at project root.\r\nconst DOC_ROOT = process.env.DOC_ROOT\r\n  ? path.resolve(process.env.DOC_ROOT)\r\n  : path.join(REPO_ROOT, &#39;documentation&#39;);\r\n\r\n/* ============================================================\r\n * Helpers\r\n * ============================================================ */\r\n\r\nfunction existsDir(p) {\r\n  try { return fs.statSync(p).isDirectory(); } catch { return false; }\r\n}\r\n\r\nfunction readFileSafe(p) {\r\n  try { return fs.readFileSync(p, &#39;utf8&#39;); } catch { return null; }\r\n}\r\n\r\nfunction escapeHtml(s) {\r\n  if (s == null) return &#39;&#39;;\r\n  return String(s)\r\n    .replace(/&amp;/g, &#39;&amp;amp;&#39;)\r\n    .replace(/&lt;/g, &#39;&amp;lt;&#39;)\r\n    .replace(/&gt;/g, &#39;&amp;gt;&#39;)\r\n    .replace(/&quot;/g, &#39;&amp;quot;&#39;)\r\n    .replace(/&#39;/g, &#39;&amp;#39;&#39;);\r\n}\r\n\r\n/* ============================================================\r\n * Markdown → HTML  (minimal, stdlib-only)\r\n * Handles: headings, paragraphs, fenced code, inline code,\r\n *          ul/ol lists, blockquotes, tables, links, bold/italic, hr.\r\n * ============================================================ */\r\n\r\nfunction mdToHtml(md) {\r\n  if (!md) return &#39;&#39;;\r\n  const lines = md.split(/\\r?\\n/);\r\n  let out = &#39;&#39;;\r\n  let inCode = false;\r\n  let codeBuf = [];\r\n  let codeLang = &#39;&#39;;\r\n  let inList = false;\r\n  let listType = null;\r\n  let para = [];\r\n  let table = null;\r\n  let blockquote = [];\r\n\r\n  function inline(s) {\r\n    s = escapeHtml(s);\r\n    // Inline code (must come first, before bold/italic so backtick content is left alone)\r\n    s = s.replace(/`([^`]+)`/g, &#39;&lt;code&gt;$1&lt;/code&gt;&#39;);\r\n    // Bold\r\n    s = s.replace(/\\*\\*([^*]+)\\*\\*/g, &#39;&lt;strong&gt;$1&lt;/strong&gt;&#39;);\r\n    // Italic (underscore form, word-boundary aware)\r\n    s = s.replace(/(^|\\s|\\()_([^_\\n]+)_(?=$|\\s|[.,;:!?\\)])/g, &#39;$1&lt;em&gt;$2&lt;/em&gt;&#39;);\r\n    // Links\r\n    s = s.replace(/\\[([^\\]]+)\\]\\(([^)]+)\\)/g, function (_, txt, href) {\r\n      const safe = /^(https?:|mailto:|#|\\.\\.?\\/)/.test(href)
