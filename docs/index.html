uth/oauth.link.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; an oauth_identities row links to the existing user; no second users row created.</li>\n<li><strong>Result:</strong> PASS</li>\n</ul>\n<h3>TC-04 · Invalid state rejected</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-4</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- auth/oauth.state.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; a mismatched/absent state parameter is rejected with 400.</li>\n<li><strong>Result:</strong> PASS</li>\n</ul>\n<h2>Code review checklist</h2>\n<ul>\n<li>[x] Every story AC implemented</li>\n<li>[x] No security regressions</li>\n<li>[x] No performance regressions</li>\n<li>[x] Lint clean</li>\n<li>[x] Build clean</li>\n<li>[x] Tests green</li>\n<li>[x] No suppressed lint rules without justification</li>\n<li>[x] Error paths covered (not just happy path)</li>\n<li>[x] Logging / observability hooks added where exceptions can fire</li>\n<li>[x] Documentation updated if behaviour contract changed</li>\n</ul>\n<h2>Risks / edge cases</h2>\n<ul>\n<li>Linking to an unverified existing email (must refuse).</li>\n<li>Provider returning an email with different casing.</li>\n</ul>\n<h2>Sign-off</h2>\n<ul>\n<li>Code review: PASS</li>\n<li>All tests passed: PASS</li>\n<li>Date completed: &#39;2026-04-11&#39;</li>\n</ul>\n","ageDays":59,"cycleDays":1},{"type":"testplan","id":"TESTPLAN-02.1.01","title":"Test Plan — WebSocket gateway & board rooms","status":"done","epic":"EPIC-02","feature":"FEAT-02.1","story":"STORY-02.1.01","testplan":null,"estimate":null,"priority":null,"severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-06T09:00:00+01:00","started_at":"2026-05-13T09:00:00+01:00","completed_at":"2026-05-14T16:00:00+01:00","version":null,"ai_review":null,"file":"_00-Project-Management/33-Testplans/EPIC-02/FEAT-02.1/TESTPLAN-02.1.01-websocket-gateway-board-rooms.md","bodyHtml":"<h1>TESTPLAN-02.1.01 · WebSocket gateway &amp; board rooms</h1>\n<h2>Source story</h2>\n<p><code>_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.01-websocket-gateway-board-rooms.md</code></p>\n<h2>Scope</h2>\n<p>Verifies authenticated WebSocket connect, board-scoped room subscription, rejection of unauthenticated connections, and room isolation of messages.</p>\n<h2>Preconditions</h2>\n<ul>\n<li>Repo at project root, branch <code>main</code>.</li>\n<li>Runtime: Node 20.</li>\n<li>Required services running: Redis, the realtime gateway.</li>\n<li>Required env vars: <code>REDIS_URL</code>, <code>WS_PORT</code>.</li>\n<li>Test data / fixtures: two authenticated test sessions, one board id.</li>\n</ul>\n<h2>Acceptance criteria → Test case map</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>#</th><th>Acceptance criterion (verbatim from story)</th><th>Test case</th></tr></thead><tbody><tr><td>AC-1</td><td>An authenticated client can open a WebSocket connection to the gateway.</td><td>TC-01</td></tr><tr><td>AC-2</td><td>Opening a board subscribes the connection to a room keyed by board id.</td><td>TC-02</td></tr><tr><td>AC-3</td><td>Unauthenticated connections are rejected before joining any room.</td><td>TC-03</td></tr><tr><td>AC-4</td><td>Messages published to a board room reach only clients in that room.</td><td>TC-04</td></tr></tbody></table></div>\n<h2>Test cases</h2>\n<h3>TC-01 · Authenticated connect succeeds</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-1</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/gateway.connect.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; a session-bearing client completes the WebSocket upgrade.</li>\n<li><strong>Result:</strong> PASS</li>\n</ul>\n<h3>TC-02 · Open board joins the room</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-2</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/gateway.join-room.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the connection appears in the room set for that board id.</li>\n<li><strong>Result:</strong> PASS</li>\n</ul>\n<h3>TC-03 · Unauthenticated connect rejected</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-3</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/gateway.reject-anon.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the upgrade is refused with 401 and no room membership is created.</li>\n<li><strong>Result:</strong> PASS</li>\n</ul>\n<h3>TC-04 · Room isolation</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-4</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/gateway.room-isolation.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; a message to board A is not received by a client in board B.</li>\n<li><strong>Result:</strong> PASS</li>\n</ul>\n<h2>Code review checklist</h2>\n<ul>\n<li>[x] Every story AC implemented</li>\n<li>[x] No security regressions</li>\n<li>[x] No performance regressions</li>\n<li>[x] Lint clean</li>\n<li>[x] Build clean</li>\n<li>[x] Tests green</li>\n<li>[x] No suppressed lint rules without justification</li>\n<li>[x] Error paths covered (not just happy path)</li>\n<li>[x] Logging / observability hooks added where exceptions can fire</li>\n<li>[x] Documentation updated if behaviour contract changed</li>\n</ul>\n<h2>Risks / edge cases</h2>\n<ul>\n<li>Auth happening after upgrade would leak a brief connected window.</li>\n<li>Redis pub/sub channel naming collisions.</li>\n</ul>\n<h2>Sign-off</h2>\n<ul>\n<li>Code review: PASS</li>\n<li>All tests passed: PASS</li>\n<li>Date completed: &#39;2026-05-14&#39;</li>\n</ul>\n","ageDays":19,"cycleDays":1}],"bug":[],"adr":[{"type":"adr","id":"ADR-0001","title":"Use WebSockets over SSE for presence","status":"done","epic":null,"feature":null,"story":null,"testplan":null,"estimate":null,"priority":null,"severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":"accepted","type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":"STORY-02.1.01","discovered_in":null,"captured_from":null,"created_at":"2026-05-06T11:00:00+01:00","started_at":"2026-05-06T11:00:00+01:00","completed_at":"2026-05-06T12:30:00+01:00","version":null,"ai_review":null,"file":"_00-Project-Management/40-Decisions/ADR-0001-use-websockets-over-sse-for-presence.md","bodyHtml":"<h1>ADR-0001 · Use WebSockets over SSE for presence</h1>\n<h2>Context</h2>\n<p>TaskFlow&#39;s realtime collaboration epic needs a bidirectional channel: the server pushes presence and cursor updates, and clients push their own cursor movements and heartbeats. We evaluated transports while building the gateway in STORY-02.1.01. The choice is load-bearing because cursor throttling, reconnect, and fan-out all build on it.</p>\n<h2>Decision</h2>\n<p>Use WebSockets as the realtime transport for board sessions. A single duplex connection per client carries presence, cursor frames, and heartbeats, multiplexed by board room.</p>\n<h2>Alternatives considered</h2>\n<ol>\n<li><strong>Server-Sent Events (SSE)</strong> — simple and HTTP-native, but unidirectional; client-to-server cursor frames would need a separate POST channel, doubling the moving parts.</li>\n<li><strong>Long-polling</strong> — universally compatible but high overhead and poor latency for 20 cursor frames/second.</li>\n<li><strong>WebTransport</strong> — promising for low-latency datagrams, but browser and infrastructure support is not yet broad enough to depend on for the beta.</li>\n</ol>\n<h2>Consequences</h2>\n<p><strong>Positive:</strong></p>\n<ul>\n<li>One bidirectional channel covers presence, cursors, and heartbeats.</li>\n<li>Low per-message overhead suits high-frequency cursor frames.</li>\n</ul>\n<p><strong>Negative / trade-offs:</strong></p>\n<ul>\n<li>Requires sticky routing or a shared pub/sub layer (Redis) for horizontal scale.</li>\n<li>Connection lifecycle (reconnect, heartbeat, TTL) must be managed explicitly.</li>\n</ul>\n<p><strong>Neutral:</strong></p>\n<ul>\n<li>Load balancers must be configured for WebSocket upgrades.</li>\n</ul>\n<h2>Review trigger</h2>\n<ul>\n<li>Revisit if WebTransport reaches broad support and our cursor volume justifies datagram delivery.</li>\n<li>Revisit if connection count per node exceeds the gateway&#39;s tested ceiling.</li>\n</ul>\n<h2>Links</h2>\n<ul>\n<li><strong>Originating story:</strong> STORY-02.1.01</li>\n<li><strong>Related ADRs:</strong> —</li>\n<li><strong>External references:</strong> WebSocket and SSE protocol specifications.</li>\n</ul>\n","ageDays":19,"cycleDays":0},{"type":"adr","id":"ADR-0002","title":"Store sessions in Redis","status":"done","epic":null,"feature":null,"story":null,"testplan":null,"estimate":null,"priority":null,"severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":"accepted","type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":"STORY-01.1.01","discovered_in":null,"captured_from":null,"created_at":"2026-03-06T10:00:00+01:00","started_at":"2026-03-06T10:00:00+01:00","completed_at":"2026-03-06T11:15:00+01:00","version":null,"ai_review":null,"file":"_00-Project-Management/40-Decisions/ADR-0002-store-sessions-in-redis.md","bodyHtml":"<h1>ADR-0002 · Store sessions in Redis</h1>\n<h2>Context</h2>\n<p>Building account creation in STORY-01.1.01 forced a decision about where TaskFlow keeps authenticated session state. Sessions must be server-validated (no client-trusted auth), revocable on sign-out or password change, and shared across multiple stateless app instances. The same store will later back realtime presence, so a fast in-memory option is attractive.</p>\n<h2>Decision</h2>\n<p>Store sessions server-side in Redis, keyed by an opaque session id delivered to the client in an HttpOnly, Secure cookie. The id is rotated on privilege change to mitigate fixation.</p>\n<h2>Alternatives considered</h2>\n<ol>\n<li><strong>Signed stateless JWT cookies</strong> — no server lookup, but revocation is hard (requires a denylist that reintroduces server state) and token bloat grows with claims.</li>\n<li><strong>Postgres-backed sessions</strong> — durable and transactional, but adds read load to the primary database on every request and is slower than Redis for this hot path.</li>\n<li><strong>In-process memory sessions</strong> — fastest, but does not survive restarts and breaks across multiple app instances.</li>\n</ol>\n<h2>Consequences</h2>\n<p><strong>Positive:</strong></p>\n<ul>\n<li>Instant revocation by deleting the key.</li>\n<li>Fast lookups on the auth hot path; the same Redis backs presence later.</li>\n</ul>\n<p><strong>Negative / trade-offs:</strong></p>\n<ul>\n<li>Redis becomes a critical dependency for authentication availability.</li>\n<li>Requires a persistence/eviction policy so sessions are not lost on a cold restart.</li>\n</ul>\n<p><strong>Neutral:</strong></p>\n<ul>\n<li>Session TTL and rotation policy must be documented for operators.</li>\n</ul>\n<h2>Review trigger</h2>\n<ul>\n<li>Revisit if Redis availability becomes the dominant auth incident cause.</li>\n<li>Revisit if a multi-region deployment needs session replication semantics Redis cannot meet simply.</li>\n</ul>\n<h2>Links</h2>\n<ul>\n<li><strong>Originating story:</strong> STORY-01.1.01</li>\n<li><strong>Related ADRs:</strong> ADR-0001 (shares the Redis dependency for presence)</li>\n<li><strong>External references:</strong> OWASP Session Management Cheat Sheet.</li>\n</ul>\n","ageDays":80,"cycleDays":0}],"generatedAt":"2026-05-25T10:59:42.040Z","monitor":{"found":true,"entries":[{"date":"2026-05-18","title":"STORY-02.1.02 (presence join/leave & heartbeat) started.","summary":"Pulled the next FEAT-02.1 story to `in-progress`; presence membership on join is passing, leave/heartbeat/broadcast TCs still pending. STORY-02.1.05 (cursor throttling) flagged `blocked` until the cursor message schema is finalised by STORY-02.1.03. EPIC-02 now 1/5 shipped."},{"date":"2026-05-14","title":"🟢 STORY-02.1.01 (WebSocket gateway & board rooms) shipped `done`.","summary":"First realtime story closed: authenticated upgrade, board-scoped rooms, anon rejection, and room isolation all PASS (4/4 TC). Built on ADR-0001 (WebSockets over SSE). EPIC-02 is now in motion (1/5)."},{"date":"2026-04-11","title":"🟢 EPIC-01 COMPLETE (3/3).","summary":"STORY-01.2.01 (Google OAuth sign-in) closed `done` with account linking and state validation verified; FEAT-01.2 and the whole authentication epic are now shipped. Activation funnel instrumentation enabled for the OKR-2026-Q2-1 readout."}],"wip":{"in-progress":{"current":1,"limit":2},"in-review":{"current":0,"limit":3},"blocked":{"current":1,"limit":5}},"lastUpdated":null,"bodyHtml":"<h1>Project Monitor — TaskFlow</h1>\n<p>Single board for TaskFlow, a team task &amp; project collaboration SaaS. Updated weekly (Friday PM-hat session) and on every story close-out. Authentication shipped; realtime collaboration is in flight.</p>\n<p><strong>Status legend:</strong> 🟦 Planned · 🟧 In progress · 🟢 Shipped · 🔴 Blocked</p>\n<hr>\n<h2>Overall progress</h2>\n<p>&lt;!-- pm:monitor:overall:begin (generated by pm:monitor — do not edit by hand) --&gt;</p>\n<pre><code class=\"lang-\">ALL  [███████░░░]   4 / 8 stories (50.0%)</code></pre>\n<p>&lt;!-- pm:monitor:overall:end --&gt;</p>\n<p>EPIC-01 (Onboard xt FEAT-02.1 story to <code>in-progress</code>; presence membership on join is passing, leave/heartbeat/broadcast TCs still pending. STORY-02.1.05 (cursor throttling) flagged <code>blocked</code> until the cursor message schema is finalised by STORY-02.1.03. EPIC-02 now 1/5 shipped.</p>\n<p><strong>2026-05-14 — 🟢 STORY-02.1.01 (WebSocket gateway &amp; board rooms) shipped <code>done</code>.</strong> First realtime story closed: authenticated upgrade, board-scoped rooms, anon rejection, and room isolation all PASS (4/4 TC). Built on ADR-0001 (WebSockets over SSE). EPIC-02 is now in motion (1/5).</p>\n<p><strong>2026-04-11 — 🟢 EPIC-01 COMPLETE (3/3).</strong> STORY-01.2.01 (Google OAuth sign-in) closed <code>done</code> with account linking and state validation verified; FEAT-01.2 and the whole authentication epic are now shipped. Activation funnel instrumentation enabled for the OKR-2026-Q2-1 readout.</p>\n","file":"_00-Project-Management/42-Monitor/MONITOR.md"},"counts":{"strategy":{"total":2,"byStatus":{"active":2}},"backlog":{"total":3,"byStatus":{"not-started":3}},"release":{"total":1,"byStatus":{"done":1}},"retro":{"total":1,"byStatus":{"done":1}},"epic":{"total":2,"byStatus":{"in-progress":1,"done":1}},"feature":{"total":3,"byStatus":{"in-progress":1,"done":2}},"story":{"total":8,"byStatus":{"in-progress":1,"ready":1,"blocked":1,"not-started":1,"done":4}},"testplan":{"total":8,"byStatus":{"in-progress":1,"ready":1,"blocked":1,"not-started":1,"done":4}},"bug":{"total":0,"byStatus":{}},"adr":{"total":2,"byStatus":{"done":2}}},"ai":{"skills":[],"agents":[],"commands":[],"plugins":[],"marketplaces":[],"overlayCounts":{"skills":0,"agents":0,"commands":0,"plugins":0},"scanRoots":{"user":"~/.claude","project":"./.claude"},"counts":{"skills":0,"agents":0,"commands":0,"plugins":0}},"plan":{"byEpic":[{"epic":{"type":"epic","id":"EPIC-02","title":"Realtime collaboration","status":"in-progress","epic":null,"feature":null,"story":null,"testplan":null,"estimate":"XL","priority":"P0","severity":null,"okr":"OKR-2026-Q2-1","prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-04-20T10:00:00+01:00","started_at":"2026-05-04T09:15:00+01:00","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/30-Epics/EPIC-02-realtime-collaboration.md","bodyHtml":"<h1>EPIC-02 · Realtime collaboration</h1>\n<h2>Goal</h2>\n<p>Make a TaskFlow board feel alive when a team works on it together: people see each other&#39;s cursors, know who is online, and watch cards move in real time without refreshing. The first slice delivers live cursors and presence so the collaborative feel is established before deeper co-editing lands.</p>\n<h2>Strategic linkage</h2>\n<ul>\n<li><strong>OKR:</strong> OKR-2026-Q2-1 — &quot;Increase weekly active collaboration.&quot; Realtime presence is the headline differentiator that turns a solo tool into a team tool.</li>\n<li><strong>Why now:</strong> Authentication shipped, so teams now exist; the next retention lever is making shared boards feel collaborative rather than static.</li>\n<li><strong>Business outcome:</strong> Raise the share of boards with 2+ concurrent editors per week from 12% to 30%.</li>\n</ul>\n<h2>In scope</h2>\n<ul>\n<li>A realtime transport layer for board sessions.</li>\n<li>Live cursors with per-user colour and label.</li>\n<li>Presence (who is currently viewing a board).</li>\n<li>Reconnect handling on transient network loss.</li>\n</ul>\n<h2>Out of scope</h2>\n<ul>\n<li>Conflict-free co-editing of card text (a later feature).</li>\n<li>Voice/video presence.</li>\n<li>Offline edit queueing.</li>\n</ul>\n<h2>Success criteria</h2>\n<ul>\n<li>Two users on the same board see each other&#39;s cursors within 200ms median.</li>\n<li>Presence list updates within 1s of a user joining or leaving.</li>\n<li>A dropped connection re-establishes presence automatically within 5s.</li>\n</ul>\n<h2>Features</h2>\n<ul>\n<li><a href=\"../31-Features/EPIC-02/FEAT-02.1-live-cursors-presence.md\">FEAT-02.1 — Live cursors &amp; presence</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li><strong>Other epics:</strong> EPIC-01 (authenticated sessions identify each presence participant).</li>\n<li><strong>Infrastructure:</strong> WebSocket gateway; Redis pub/sub for fan-out.</li>\n<li><strong>External:</strong> none</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> users, boards, sessions</li>\n<li><strong>Writes:</strong> presence (ephemeral, Redis), board_activity</li>\n<li><strong>New schema:</strong> presence channels in Redis; board_activity append log</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li><strong>Fan-out cost at scale</strong> — mitigation: room-scoped pub/sub, throttle cursor frames to 20/s.</li>\n<li><strong>Stale presence after ungraceful disconnect</strong> — mitigation: heartbeat + TTL eviction.</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../40-Decisions/ADR-0001-use-websockets-over-sse-for-presence.md\">ADR-0001 — Use WebSockets over SSE for presence</a></li>\n</ul>\n","ageDays":35,"cycleDays":null},"features":[{"feature":{"type":"feature","id":"FEAT-02.1","title":"Live cursors & presence","status":"in-progress","epic":"EPIC-02","feature":null,"story":null,"testplan":null,"estimate":"L","priority":null,"severity":null,"okr":null,"prd_section":null,"prd_refs":"—","mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-04T09:15:00+01:00","started_at":"2026-05-06T09:00:00+01:00","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/31-Features/EPIC-02/FEAT-02.1-live-cursors-presence.md","bodyHtml":"<h1>FEAT-02.1 · Live cursors &amp; presence</h1>\n<h2>Goal</h2>\n<p>Establish the realtime foundation for TaskFlow boards: a WebSocket session per board that broadcasts who is present and where their cursor is, with graceful reconnect.</p>\n<h2>User value</h2>\n<p>When teammates open the same board, they immediately see who else is here and where they are pointing — the board feels shared, not solo.</p>\n<h2>Scope</h2>\n<ul>\n<li>WebSocket gateway and per-board rooms.</li>\n<li>Presence join/leave with heartbeat and TTL eviction.</li>\n<li>Cursor position broadcast with per-user colour and label.</li>\n<li>Reconnect that restores presence without a page refresh.</li>\n<li>Blocked: cursor smoothing depends on a transport decision still being finalised.</li>\n</ul>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] Opening a board joins a WebSocket room scoped to that board.</li>\n<li>[ ] The presence list shows every connected user and updates within 1s of join/leave.</li>\n<li>[ ] Remote cursors render with the owner&#39;s colour and label within 200ms median.</li>\n<li>[ ] A dropped socket reconnects and restores presence within 5s.</li>\n<li>[ ] Cursor frames are throttled to at most 20 per second per user.</li>\n</ul>\n<h2>Stories</h2>\n<ul>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.01-websocket-gateway-board-rooms.md\">STORY-02.1.01 — WebSocket gateway &amp; board rooms</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.02-presence-join-leave-heartbeat.md\">STORY-02.1.02 — Presence join/leave &amp; heartbeat</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.03-cursor-broadcast-rendering.md\">STORY-02.1.03 — Cursor broadcast &amp; rendering</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.04-reconnect-handling.md\">STORY-02.1.04 — Reconnect handling</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.05-cursor-frame-throttling.md\">STORY-02.1.05 — Cursor frame throttling</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>Authenticated sessions from EPIC-01 (presence participants are identified users).</li>\n<li>WebSocket transport decision (ADR-0001).</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> users, boards, sessions</li>\n<li><strong>Writes:</strong> presence (Redis, ephemeral), board_activity</li>\n<li><strong>New schema / migration:</strong> none (presence is ephemeral in Redis)</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li>Cursor frame volume could overwhelm the gateway — mitigation: server-side throttle (STORY-02.1.05).</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../../40-Decisions/ADR-0001-use-websockets-over-sse-for-presence.md\">ADR-0001 — Use WebSockets over SSE for presence</a></li>\n</ul>\n","ageDays":21,"cycleDays":null},"stories":[{"type":"story","id":"STORY-02.1.02","title":"Presence join/leave & heartbeat","status":"in-progress","epic":"EPIC-02","feature":"FEAT-02.1","story":null,"testplan":null,"estimate":"M","priority":"P0","severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"backend","decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-14T09:00:00+01:00","started_at":"2026-05-18T09:30:00+01:00","completed_at":"","version":null,"ai_review":"pending","file":"_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.02-presence-join-leave-heartbeat.md","bodyHtml":"<h1>STORY-02.1.02 · Presence join/leave &amp; heartbeat</h1>\n<h2>As</h2>\n<p>a TaskFlow user on a shared board</p>\n<h2>I want</h2>\n<p>to see who else is currently viewing the board</p>\n<h2>So that</h2>\n<p>I know which teammates are online before I make changes</p>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] Joining a board adds the user to the board&#39;s presence set.</li>\n<li>[ ] Leaving or disconnecting removes the user within 1s.</li>\n<li>[ ] A heartbeat keeps presence alive; a missed heartbeat evicts the user via TTL.</li>\n<li>[ ] The presence set is broadcast to the room on every change.</li>\n</ul>\n<h2>Technical notes</h2>\n<ul>\n<li><strong>Files touched:</strong> presence service, heartbeat scheduler, Redis presence keys.</li>\n<li><strong>Libraries:</strong> Redis client (sorted sets with TTL).</li>\n<li><strong>Pattern:</strong> reuse — builds on the gateway from STORY-02.1.01.</li>\n<li><strong>Gotchas:</strong> ungraceful disconnects must not leave stale presence; rely on TTL, not just leave events.</li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>STORY-02.1.01 (gateway and rooms).</li>\n</ul>\n<h2>References</h2>\n<ul>\n<li><strong>Feature:</strong> FEAT-02.1</li>\n<li><strong>PRD:</strong> —</li>\n<li><strong>Mockup:</strong> —</li>\n<li><strong>Related ADRs:</strong> ADR-0001</li>\n</ul>\n<h2>DoR checklist</h2>\n<ul>\n<li>[x] Paired TESTPLAN exists with every AC mapped to a TC</li>\n<li>[x] Every TC has a runnable <code>Command:</code> Claude can execute unattended</li>\n<li>[x] Dependencies done or scheduled</li>\n<li>[x] Estimate set</li>\n<li>[x] Risks section populated below</li>\n</ul>\n<h2>Risks / unknowns</h2>\n<ul>\n<li>Heartbeat interval vs eviction TTL tuning; under evaluation.</li>\n</ul>\n<h2>DoD checklist</h2>\n<ul>\n<li>[ ] All AC ticked above</li>\n<li>[ ] Paired TESTPLAN run; all TCs PASS (or FAIL linked to BUG)</li>\n<li>[ ] Project quality gates pass (lint / typecheck / tests / build)</li>\n<li>[ ] No new runtime errors on smoke</li>\n<li>[ ] If UI: visual contract tests green</li>\n<li>[ ] <strong>AI-code review</strong> complete</li>\n<li>[ ] Frontmatter updated: <code>status: done</code>, <code>completed_at</code> set</li>\n<li>[ ] <code>42-Monitor/MONITOR.md</code> updated</li>\n<li>[ ] ADRs created for any non-obvious decisions</li>\n<li>[ ] BACKLOG entry created for any new tech debt</li>\n</ul>\n","ageDays":11,"cycleDays":null},{"type":"story","id":"STORY-02.1.03","title":"Cursor broadcast & rendering","status":"ready","epic":"EPIC-02","feature":"FEAT-02.1","story":null,"testplan":null,"estimate":"M","priority":"P1","severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"frontend","decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-14T09:10:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":"pending","file":"_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.03-cursor-broadcast-rendering.md","bodyHtml":"<h1>STORY-02.1.03 · Cursor broadcast &amp; rendering</h1>\n<h2>As</h2>\n<p>a TaskFlow user on a shared board</p>\n<h2>I want</h2>\n<p>to see other people&#39;s cursors move in real time</p>\n<h2>So that</h2>\n<p>I can follow what my teammates are pointing at</p>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] Local cursor movement is published to the board room.</li>\n<li>[ ] Remote cursors render at the broadcast position with the owner&#39;s colour and label.</li>\n<li>[ ] A remote cursor disappears when its owner leaves the board.</li>\n<li>[ ] Cursor rendering stays smooth with up to 10 concurrent users.</li>\n</ul>\n<h2>Technical notes</h2>\n<ul>\n<li><strong>Files touched:</strong> board canvas client, cursor layer component, cursor message handler.</li>\n<li><strong>Libraries:</strong> none new.</li>\n<li><strong>Pattern:</strong> reuse — consumes the presence/room channel.</li>\n<li><strong>Gotchas:</strong> interpolate between frames so cursors do not jump.</li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>STORY-02.1.02 (presence identifies cursor owners).</li>\n</ul>\n<h2>References</h2>\n<ul>\n<li><strong>Feature:</strong> FEAT-02.1</li>\n<li><strong>PRD:</strong> —</li>\n<li><strong>Mockup:</strong> —</li>\n<li><strong>Related ADRs:</strong> ADR-0001</li>\n</ul>\n<h2>DoR checklist</h2>\n<ul>\n<li>[x] Paired TESTPLAN exists with every AC mapped to a TC</li>\n<li>[x] Every TC has a runnable <code>Command:</code> Claude can execute unattended</li>\n<li>[x] Dependencies done or scheduled</li>\n<li>[x] Estimate set</li>\n<li>[x] Risks section populated below</li>\n</ul>\n<h2>Risks / unknowns</h2>\n<ul>\n<li>Frame interpolation could feel laggy on slow connections; reviewed 2026-05-14.</li>\n</ul>\n<h2>DoD checklist</h2>\n<ul>\n<li>[ ] All AC ticked above</li>\n<li>[ ] Paired TESTPLAN run; all TCs PASS (or FAIL linked to BUG)</li>\n<li>[ ] Project quality gates pass (lint / typecheck / tests / build)</li>\n<li>[ ] No new runtime errors on smoke</li>\n<li>[ ] If UI: visual contract tests green</li>\n<li>[ ] <strong>AI-code review</strong> complete</li>\n<li>[ ] Frontmatter updated: <code>status: done</code>, <code>completed_at</code> set</li>\n<li>[ ] <code>42-Monitor/MONITOR.md</code> updated</li>\n<li>[ ] ADRs created for any non-obvious decisions</li>\n<li>[ ] BACKLOG entry created for any new tech debt</li>\n</ul>\n","ageDays":11,"cycleDays":null},{"type":"story","id":"STORY-02.1.05","title":"Cursor frame throttling","status":"blocked","epic":"EPIC-02","feature":"FEAT-02.1","story":null,"testplan":null,"estimate":"S","priority":"P2","severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"backend","decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-14T09:30:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":"pending","file":"_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.05-cursor-frame-throttling.md","bodyHtml":"<h1>STORY-02.1.05 · Cursor frame throttling</h1>\n<h2>As</h2>\n<p>the TaskFlow platform team</p>\n<h2>I want</h2>\n<p>to cap how many cursor frames a client can broadcast per second</p>\n<h2>So that</h2>\n<p>a single noisy client cannot overwhelm the gateway</p>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] Cursor frames from a client are throttled to at most 20 per second server-side.</li>\n<li>[ ] Excess frames are coalesced to the latest position, not dropped silently to a stale one.</li>\n<li>[ ] Throttling adds no more than 50ms of perceived cursor latency.</li>\n</ul>\n<h2>Technical notes</h2>\n<ul>\n<li><strong>Files touched:</strong> gateway message ingress, per-connection rate limiter.</li>\n<li><strong>Libraries:</strong> none new.</li>\n<li><strong>Pattern:</strong> reuse — extends the gateway ingress path.</li>\n<li><strong>Gotchas:</strong> <strong>Blocked</strong> — the cursor message schema is not final until STORY-02.1.03 lands, so the throttle key cannot be defined yet.</li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>STORY-02.1.03 (cursor message schema must be finalised first). This dependency is why the story is <code>blocked</code>.</li>\n</ul>\n<h2>References</h2>\n<ul>\n<li><strong>Feature:</strong> FEAT-02.1</li>\n<li><strong>PRD:</strong> —</li>\n<li><strong>Mockup:</strong> —</li>\n<li><strong>Related ADRs:</strong> ADR-0001</li>\n</ul>\n<h2>DoR checklist</h2>\n<ul>\n<li>[x] Paired TESTPLAN exists with every AC mapped to a TC</li>\n<li>[x] Every TC has a runnable <code>Command:</code> Claude can execute unattended</li>\n<li>[ ] Dependencies done or scheduled</li>\n<li>[x] Estimate set</li>\n<li>[x] Risks section populated below</li>\n</ul>\n<h2>Risks / unknowns</h2>\n<ul>\n<li>Coalescing logic could mask dropped updates if the schema changes; blocked pending STORY-02.1.03.</li>\n</ul>\n<h2>DoD checklist</h2>\n<ul>\n<li>[ ] All AC ticked above</li>\n<li>[ ] Paired TESTPLAN run; all TCs PASS (or FAIL linked to BUG)</li>\n<li>[ ] Project quality gates pass (lint / typecheck / tests / build)</li>\n<li>[ ] No new runtime errors on smoke</li>\n<li>[ ] If UI: visual contract tests green</li>\n<li>[ ] <strong>AI-code review</strong> complete</li>\n<li>[ ] Frontmatter updated: <code>status: done</code>, <code>completed_at</code> set</li>\n<li>[ ] <code>42-Monitor/MONITOR.md</code> updated</li>\n<li>[ ] ADRs created for any non-obvious decisions</li>\n<li>[ ] BACKLOG entry created for any new tech debt</li>\n</ul>\n","ageDays":11,"cycleDays":null},{"type":"story","id":"STORY-02.1.04","title":"Reconnect handling","status":"not-started","epic":"EPIC-02","feature":"FEAT-02.1","story":null,"testplan":null,"estimate":"S","priority":"P1","severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"frontend","decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-14T09:20:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":"pending","file":"_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.04-reconnect-handling.md","bodyHtml":"<h1>STORY-02.1.04 · Reconnect handling</h1>\n<h2>As</h2>\n<p>a TaskFlow user on a flaky network</p>\n<h2>I want</h2>\n<p>my presence to recover automatically after a brief disconnect</p>\n<h2>So that</h2>\n<p>I do not appear offline or have to refresh the board</p>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] A dropped WebSocket reconnects automatically with exponential backoff.</li>\n<li>[ ] Presence is re-established within 5s of reconnecting.</li>\n<li>[ ] Cursor state resyncs after reconnect without duplicate cursors.</li>\n</ul>\n<h2>Technical notes</h2>\n<ul>\n<li><strong>Files touched:</strong> websocket client wrapper, reconnect controller.</li>\n<li><strong>Libraries:</strong> none new.</li>\n<li><strong>Pattern:</strong> reuse — wraps the existing client transport.</li>\n<li><strong>Gotchas:</strong> avoid a reconnect storm; cap backoff and jitter it.</li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>STORY-02.1.02 (presence must exist to re-establish).</li>\n</ul>\n<h2>References</h2>\n<ul>\n<li><strong>Feature:</strong> FEAT-02.1</li>\n<li><strong>PRD:</strong> —</li>\n<li><strong>Mockup:</strong> —</li>\n<li><strong>Related ADRs:</strong> ADR-0001</li>\n</ul>\n<h2>DoR checklist</h2>\n<ul>\n<li>[x] Paired TESTPLAN exists with every AC mapped to a TC</li>\n<li>[x] Every TC has a runnable <code>Command:</code> Claude can execute unattended</li>\n<li>[ ] Dependencies done or scheduled</li>\n<li>[x] Estimate set</li>\n<li>[x] Risks section populated below</li>\n</ul>\n<h2>Risks / unknowns</h2>\n<ul>\n<li>Reconnect storms under a server restart; needs load consideration.</li>\n</ul>\n<h2>DoD checklist</h2>\n<ul>\n<li>[ ] All AC ticked above</li>\n<li>[ ] Paired TESTPLAN run; all TCs PASS (or FAIL linked to BUG)</li>\n<li>[ ] Project quality gates pass (lint / typecheck / tests / build)</li>\n<li>[ ] No new runtime errors on smoke</li>\n<li>[ ] If UI: visual contract tests green</li>\n<li>[ ] <strong>AI-code review</strong> complete</li>\n<li>[ ] Frontmatter updated: <code>status: done</code>, <code>completed_at</code> set</li>\n<li>[ ] <code>42-Monitor/MONITOR.md</code> updated</li>\n<li>[ ] ADRs created for any non-obvious decisions</li>\n<li>[ ] BACKLOG entry created for any new tech debt</li>\n</ul>\n","ageDays":11,"cycleDays":null},{"type":"story","id":"STORY-02.1.01","title":"WebSocket gateway & board rooms","status":"done","epic":"EPIC-02","feature":"FEAT-02.1","story":null,"testplan":null,"estimate":"L","priority":"P0","severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"backend","decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-06T09:00:00+01:00","started_at":"2026-05-06T10:00:00+01:00","completed_at":"2026-05-14T16:00:00+01:00","version":null,"ai_review":"completed-2026-05-14","file":"_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.01-websocket-gateway-board-rooms.md","bodyHtml":"<h1>STORY-02.1.01 · WebSocket gateway &amp; board rooms</h1>\n<h2>As</h2>\n<p>a TaskFlow user opening a board</p>\n<h2>I want</h2>\n<p>my client to join a realtime channel scoped to that board</p>\n<h2>So that</h2>\n<p>I can receive live updates only for the board I am viewing</p>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[x] An authenticated client can open a WebSocket connection to the gateway.</li>\n<li>[x] Opening a board subscribes the connection to a room keyed by board id.</li>\n<li>[x] Unauthenticated connections are rejected before joining any room.</li>\n<li>[x] Messages published to a board room reach only clients in that room.</li>\n</ul>\n<h2>Technical notes</h2>\n<ul>\n<li><strong>Files touched:</strong> websocket gateway, room manager, Redis pub/sub adapter.</li>\n<li><strong>Libraries:</strong> ws; Redis client.</li>\n<li><strong>Pattern:</strong> new — first realtime service.</li>\n<li><strong>Gotchas:</strong> authenticate the socket on the upgrade request, not after.</li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>Transport decision (ADR-0001).</li>\n</ul>\n<h2>References</h2>\n<ul>\n<li><strong>Feature:</strong> FEAT-02.1</li>\n<li><strong>PRD:</strong> —</li>\n<li><strong>Mockup:</strong> —</li>\n<li><strong>Related ADRs:</strong> ADR-0001</li>\n</ul>\n<h2>DoR checklist</h2>\n<ul>\n<li>[x] Paired TESTPLAN exists with every AC mapped to a TC</li>\n<li>[x] Every TC has a runnable <code>Command:</code> Claude can execute unattended</li>\n<li>[x] Dependencies done or scheduled</li>\n<li>[x] Estimate set</li>\n<li>[x] Risks section populated below</li>\n</ul>\n<h2>Risks / unknowns</h2>\n<ul>\n<li>Room cardinality at scale; reviewed 2026-05-06.</li>\n</ul>\n<h2>DoD checklist</h2>\n<ul>\n<li>[x] All AC ticked above</li>\n<li>[x] Paired TESTPLAN run; all TCs PASS (or FAIL linked to BUG)</li>\n<li>[x] Project quality gates pass (lint / typecheck / tests / build)</li>\n<li>[x] No new runtime errors on smoke</li>\n<li>[x] If UI: visual contract tests green</li>\n<li>[x] <strong>AI-code review</strong> complete: <code>ai_review</code> flipped to <code>completed-2026-05-14</code></li>\n<li>[x] Frontmatter updated: <code>status: done</code>, <code>completed_at</code> set</li>\n<li>[x] <code>42-Monitor/MONITOR.md</code> updated</li>\n<li>[x] ADRs created for any non-obvious decisions</li>\n<li>[x] BACKLOG entry created for any new tech debt</li>\n</ul>\n","ageDays":19,"cycleDays":8}]}]},{"epic":{"type":"epic","id":"EPIC-01","title":"Onboarding & Authentication","status":"done","epic":null,"feature":null,"story":null,"testplan":null,"estimate":"L","priority":"P0","severity":null,"okr":"OKR-2026-Q2-1","prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-03-02T09:00:00+01:00","started_at":"2026-03-04T09:30:00+01:00","completed_at":"2026-04-11T16:20:00+01:00","version":null,"ai_review":null,"file":"_00-Project-Management/30-Epics/EPIC-01-onboarding-authentication.md","bodyHtml":"<h1>EPIC-01 · Onboarding &amp; Authentication</h1>\n<h2>Goal</h2>\n<p>Let a new team sign up for TaskFlow, verify their identity, and reach an empty workspace in under two minutes. Authentication must be secure by default and support both email/password and federated sign-in so the smallest hurdle to adoption is removed.</p>\n<h2>Strategic linkage</h2>\n<ul>\n<li><strong>OKR:</strong> OKR-2026-Q2-1 — &quot;Reduce time-to-first-board for new TaskFlow teams.&quot; Authentication is the first gate every new user hits.</li>\n<li><strong>Why now:</strong> TaskFlow&#39;s private beta showed signup drop-off was the single largest funnel leak; collaboration features cannot be evaluated by users who never get an account.</li>\n<li><strong>Business outcome:</strong> Lift activation (signup → first board created) from 41% to 65%, and cut median signup completion time to under 120 seconds.</li>\n</ul>\n<h2>In scope</h2>\n<ul>\n<li>Email and password signup with verification.</li>\n<li>Secure session management.</li>\n<li>OAuth (Google) and enterprise SSO (SAML) sign-in.</li>\n<li>Password reset flow.</li>\n</ul>\n<h2>Out of scope</h2>\n<ul>\n<li>Multi-factor authentication (deferred to a later epic).</li>\n<li>Per-organisation role-based access control beyond owner/member.</li>\n<li>Social providers other than Google.</li>\n</ul>\n<h2>Success criteria</h2>\n<ul>\n<li>A new user can create an account and land in an empty workspace in under 120 seconds.</li>\n<li>100% of sessions are server-validated; no client-trusted auth state.</li>\n<li>OAuth and SAML sign-in both succeed end-to-end in staging.</li>\n</ul>\n<h2>Features</h2>\n<ul>\n<li><a href=\"../31-Features/EPIC-01/FEAT-01.1-email-password-signup.md\">FEAT-01.1 — Email &amp; password signup</a></li>\n<li><a href=\"../31-Features/EPIC-01/FEAT-01.2-oauth-sso.md\">FEAT-01.2 — OAuth &amp; SSO</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li><strong>Other epics:</strong> none</li>\n<li><strong>Infrastructure:</strong> Redis session store; transactional email provider.</li>\n<li><strong>External:</strong> Google OAuth client credentials; SAML metadata from pilot enterprise customer.</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> users, sessions</li>\n<li><strong>Writes:</strong> users, sessions, email_verifications</li>\n<li><strong>New schema:</strong> users, sessions, email_verifications, oauth_identities</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li><strong>Session fixation / hijacking</strong> — mitigation: server-side sessions in Redis, rotate session id on privilege change (see ADR-0002).</li>\n<li><strong>Email deliverability</strong> — mitigation: verified sending domain + retry queue.</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../40-Decisions/ADR-0002-store-sessions-in-redis.md\">ADR-0002 — Store sessions in Redis</a></li>\n</ul>\n","ageDays":84,"cycleDays":38},"features":[{"feature":{"type":"feature","id":"FEAT-01.1","title":"Email & password signup","status":"done","epic":"EPIC-01","feature":null,"story":null,"testplan":null,"estimate":"M","priority":null,"severity":null,"okr":null,"prd_section":null,"prd_refs":"—","mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"d gn in with Google and reach their workspace.</li>\n<li>[x] A SAML assertion from a configured IdP signs the user in.</li>\n<li>[x] An OAuth login matching an existing verified email links rather than duplicates the account.</li>\n</ul>\n<h2>Stories</h2>\n<ul>\n<li><a href=\"../../32-Stories/EPIC-01/FEAT-01.2/STORY-01.2.01-google-oauth-signin.md\">STORY-01.2.01 — Google OAuth sign-in</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>Google OAuth client credentials provisioned.</li>\n<li>Sessions issued via the shared session store (ADR-0002).</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> users, oauth_identities</li>\n<li><strong>Writes:</strong> users, oauth_identities, sessions</li>\n<li><strong>New schema / migration:</strong> oauth_identities</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li>IdP metadata drift could break SAML — mitigation: scheduled metadata refresh.</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../../40-Decisions/ADR-0002-store-sessions-in-redis.md\">ADR-0002 — Store sessions in Redis</a></li>\n</ul>\n","ageDays":59,"cycleDays":15},"stories":[{"type":"story","id":"STORY-01.2.01","title":"Google OAuth sign-in","status":"done","epic":"EPIC-01","feature":"FEAT-01.2","story":null,"testplan":null,"estimate":"M","priority":"P0","severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"backend","decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-03-27T09:00:00+01:00","started_at":"2026-03-30T09:00:00+01:00","completed_at":"2026-04-11T16:20:00+01:00","version":null,"ai_review":"completed-2026-04-11","file":"_00-Project-Management/32-Stories/EPIC-01/FEAT-01.2/STORY-01.2.01-google-oauth-signin.md","bodyHtml":"<h1>STORY-01.2.01 · Google OAuth sign-in</h1>\n<h2>As</h2>\n<p>a TaskFlow user with a Google account</p>\n<h2>I want</h2>\n<p>to sign in with Google</p>\n<h2>So that</h2>\n<p>I can access my workspace without creating another password</p>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[x] The sign-in page offers a &quot;Continue with Google&quot; option.</li>\n<li>[x] A successful Google authorization-code exchange issues a TaskFlow session.</li>\n<li>[x] A Google email matching an existing verified account links to it rather than creating a duplicate.</li>\n<li>[x] The OAuth state parameter is validated to prevent CSRF.</li>\n</ul>\n<h2>Technical notes</h2>\n<ul>\n<li><strong>Files touched:</strong> oauth callback handler, oauth_identities repository, sign-in page.</li>\n<li><strong>Libraries:</strong> standard OAuth 2.0 client.</li>\n<li><strong>Pattern:</strong> new — first federated provider.</li>\n<li><strong>Gotchas:</strong> validate the <code>state</code> parameter; only link to verified existing emails.</li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>STORY-01.1.01 (user records must exist to link against).</li>\n</ul>\n<h2>References</h2>\n<ul>\n<li><strong>Feature:</strong> FEAT-01.2</li>\n<li><strong>PRD:</strong> —</li>\n<li><strong>Mockup:</strong> —</li>\n<li><strong>Related ADRs:</strong> ADR-0002</li>\n</ul>\n<h2>DoR checklist</h2>\n<ul>\n<li>[x] Paired TESTPLAN exists with every AC mapped to a TC</li>\n<li>[x] Every TC has a runnable <code>Command:</code> Claude can execute unattended</li>\n<li>[x] Dependencies done or scheduled</li>\n<li>[x] Estimate set</li>\n<li>[x] Risks section populated below</li>\n</ul>\n<h2>Risks / unknowns</h2>\n<ul>\n<li>Account-linking edge cases (unverified existing email) need careful handling; reviewed 2026-03-30.</li>\n</ul>\n<h2>DoD checklist</h2>\n<ul>\n<li>[x] All AC ticked above</li>\n<li>[x] Paired TESTPLAN run; all TCs PASS (or FAIL linked to BUG)</li>\n<li>[x] Project quality gates pass (lint / typecheck / tests / build)</li>\n<li>[x] No new runtime errors on smoke</li>\n<li>[x] If UI: visual contract tests green</li>\n<li>[x] <strong>AI-code review</strong> complete: <code>ai_review</code> flipped to <code>complete ptance criterion (verbatim from story)</th><th>Test case</th></tr></thead><tbody><tr><td>AC-1</td><td>Joining a board adds the user to the board&#39;s presence set.</td><td>TC-01</td></tr><tr><td>AC-2</td><td>Leaving or disconnecting removes the user within 1s.</td><td>TC-02</td></tr><tr><td>AC-3</td><td>A heartbeat keeps presence alive; a missed heartbeat evicts the user via TTL.</td><td>TC-03</td></tr><tr><td>AC-4</td><td>The presence set is broadcast to the room on every change.</td><td>TC-04</td></tr></tbody></table></div>\n<h2>Test cases</h2>\n<h3>TC-01 · Join adds to presence set</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-1</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/presence.join.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the user id appears in the board presence set after join.</li>\n<li><strong>Result:</strong> PASS</li>\n</ul>\n<h3>TC-02 · Leave/disconnect removes within 1s</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-2</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/presence.leave.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the user is gone from the set within 1s of disconnect.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-03 · Heartbeat keep-alive and TTL eviction</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-3</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/presence.heartbeat.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; presence persists while heartbeats arrive and is evicted after a missed interval.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-04 · Presence set broadcast on change</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-4</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/presence.broadcast.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; every membership change emits an updated presence list to the room.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h2>Code review checklist</h2>\n<ul>\n<li>[ ] Every story AC implemented</li>\n<li>[ ] No security regressions</li>\n<li>[ ] No performance regressions</li>\n<li>[ ] Lint clean</li>\n<li>[ ] Build clean</li>\n<li>[ ] Tests green</li>\n<li>[ ] No suppressed lint rules without justification</li>\n<li>[ ] Error paths covered (not just happy path)</li>\n<li>[ ] Logging / observability hooks added where exceptions can fire</li>\n<li>[ ] Documentation updated if behaviour contract changed</li>\n</ul>\n<h2>Risks / edge cases</h2>\n<ul>\n<li>Ungraceful disconnect leaving stale presence if TTL is too long.</li>\n<li>Heartbeat flooding under many tabs from one user.</li>\n</ul>\n<h2>Sign-off</h2>\n<ul>\n<li>Code review: <em>pending</em></li>\n<li>All tests passed: <em>pending</em></li>\n<li>Date completed: &#39;&#39;</li>\n</ul>\n","ageDays":11,"cycleDays":null},"STORY-02.1.03":{"type":"testplan","id":"TESTPLAN-02.1.03","title":"Test Plan — Cursor broadcast & rendering","status":"ready","epic":"EPIC-02","feature":"FEAT-02.1","story":"STORY-02.1.03","testplan":null,"estimate":null,"priority":null,"severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-14T09:10:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/33-Testplans/EPIC-02/FEAT-02.1/TESTPLAN-02.1.03-cursor-broadcast-rendering.md","bodyHtml":"<h1>TESTPLAN-02.1.03 · Cursor broadcast &amp; rendering</h1>\n<h2>Source story</h2>\n<p><code>_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.03-cursor-broadcast-rendering.md</code></p>\n<h2>Scope</h2>\n<p>Verifies that local cursor movement is published, remote cursors render with the owner&#39;s colour/label, remote cursors disappear on leave, and rendering stays smooth with up to 10 concurrent users.</p>\n<h2>Preconditions</h2>\n<ul>\n<li>Repo at project root, branch <code>main</code>.</li>\n<li>Runtime: Node 20; headless browser for e2e.</li>\n<li>Required services running: Redis, the realtime gateway, the web app.</li>\n<li>Required env vars: <code>REDIS_URL</code>, <code>WS_PORT</code>, <code>APP_URL</code>.</li>\n<li>Test data / fixtures: a shared board with two or more sessions.</li>\n</ul>\n<h2>Acceptance criteria → Test case map</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>#</th><th>Acceptance criterion (verbatim from story)</th><th>Test case</th></tr></thead><tbody><tr><td>AC-1</td><td>Local cursor movement is published to the board room.</td><td>TC-01</td></tr><tr><td>AC-2</td><td>Remote cursors render at the broadcast position with the owner&#39;s colour and label.</td><td>TC-02</td></tr><tr><td>AC-3</td><td>A remote cursor disappears when its owner leaves the board.</td><td>TC-03</td></tr><tr><td>AC-4</td><td>Cursor rendering stays smooth with up to 10 concurrent users.</td><td>TC-04</td></tr></tbody></table></div>\n<h2>Test cases</h2>\n<h3>TC-01 · Local movement publishes</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-1</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/cursor.publish.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; cursor-move events are published to the board room.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-02 · Remote cursor renders with owner identity</h3>\n<ul>\n<li><strong>Type:</strong> e2e</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-2</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/cursor.render.e2e.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; a remote cursor appears at the sent position with the owner&#39;s colour and label.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-03 · Remote cursor removed on leave</h3>\n<ul>\n<li><strong>Type:</strong> e2e</li>\n<li><strong>Priority:</strong> P2</li>\n<li><strong>Maps to:</strong> AC-3</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/cursor.leave.e2e.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the remote cursor is removed within 1s of the owner leaving.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-04 · Smooth with 10 concurrent users</h3>\n<ul>\n<li><strong>Type:</strong> e2e</li>\n<li><strong>Priority:</strong> P2</li>\n<li><strong>Maps to:</strong> AC-4</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/cursor.scale.e2e.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; frame timing stays under budget with 10 simulated cursors.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h2>Code review checklist</h2>\n<ul>\n<li>[ ] Every story AC implemented</li>\n<li>[ ] No security regressions</li>\n<li>[ ] No performance regressions</li>\n<li>[ ] Lint clean</li>\n<li>[ ] Build clean</li>\n<li>[ ] Tests green</li>\n<li>[ ] No suppressed lint rules without justification</li>\n<li>[ ] Error paths covered (not just happy path)</li>\n<li>[ ] Logging / observability hooks added where exceptions can fire</li>\n<li>[ ] Documentation updated if behaviour contract changed</li>\n</ul>\n<h2>Risks / edge cases</h2>\n<ul>\n<li>Interpolation jitter on high-latency links.</li>\n<li>Colour collisions when many users share a board.</li>\n</ul>\n<h2>Sign-off</h2>\n<ul>\n<li>Code review: <em>pending</em></li>\n<li>All tests passed: <em>pending</em></li>\n<li>Date completed: &#39;&#39;</li>\n</ul>\n","ageDays":11,"cycleDays":null},"STORY-02.1.05":{"type":"testplan","id":"TESTPLAN-02.1.05","title":"Test Plan — Cursor frame throttling","status":"blocked","epic":"EPIC-02","feature":"FEAT-02.1","story":"STORY-02.1.05","testplan":null,"estimate":null,"priority":null,"severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-14T09:30:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/33-Testplans/EPIC-02/FEAT-02.1/TESTPLAN-02.1.05-cursor-frame-throttling.md","bodyHtml":"<h1>TESTPLAN-02.1.05 · Cursor frame throttling</h1>\n<h2>Source story</h2>\n<p><code>_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.05-cursor-frame-throttling.md</code></p>\n<h2>Scope</h2>\n<p>Verifies server-side throttling of cursor frames to 20/s per client, coalescing of excess frames to the latest position, and that added latency stays under 50ms. Blocked until the cursor message schema is finalised by STORY-02.1.03.</p>\n<h2>Preconditions</h2>\n<ul>\n<li>Repo at project root, branch <code>main</code>.</li>\n<li>Runtime: Node 20.</li>\n<li>Required services running: Redis, the realtime gateway.</li>\n<li>Required env vars: <code>REDIS_URL</code>, <code>WS_PORT</code>, <code>CURSOR_RATE_LIMIT</code>.</li>\n<li>Test data / fixtures: a high-rate cursor frame generator.</li>\n</ul>\n<h2>Acceptance criteria → Test case map</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>#</th><th>Acceptance criterion (verbatim from story)</th><th>Test case</th></tr></thead><tbody><tr><td>AC-1</td><td>Cursor frames from a client are throttled to at most 20 per second server-side.</td><td>TC-01</td></tr><tr><td>AC-2</td><td>Excess frames are coalesced to the latest position, not dropped to a stale one.</td><td>TC-02</td></tr><tr><td>AC-3</td><td>Throttling adds no more than 50ms of perceived cursor latency.</td><td>TC-03</td></tr></tbody></table></div>\n<h2>Test cases</h2>\n<h3>TC-01 · Throttle caps at 20/s</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-1</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/throttle.rate.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; no more than 20 frames per second are forwarded per client.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-02 · Excess frames coalesce to latest</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-2</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/throttle.coalesce.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the forwarded frame is the most recent position, not an older one.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-03 · Added latency under 50ms</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P2</li>\n<li><strong>Maps to:</strong> AC-3</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/throttle.latency.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; measured added latency stays under 50ms at the cap.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h2>Code review checklist</h2>\n<ul>\n<li>[ ] Every story AC implemented</li>\n<li>[ ] No security regressions</li>\n<li>[ ] No performance regressions</li>\n<li>[ ] Lint clean</li>\n<li>[ ] Build clean</li>\n<li>[ ] Tests green</li>\n<li>[ ] No suppressed lint rules without justification</li>\n<li>[ ] Error paths covered (not just happy path)</li>\n<li>[ ] Logging / observability hooks added where exceptions can fire</li>\n<li>[ ] Documentation updated if behaviour contract changed</li>\n</ul>\n<h2>Risks / edge cases</h2>\n<ul>\n<li>Coalescing could mask a meaningful intermediate position.</li>\n<li>Throttle key depends on the final cursor schema (blocked on STORY-02.1.03).</li>\n</ul>\n<h2>Sign-off</h2>\n<ul>\n<li>Code review: <em>pending</em></li>\n<li>All tests passed: <em>pending</em></li>\n<li>Date completed: &#39;&#39;</li>\n</ul>\n","ageDays":11,"cycleDays":null},"STORY-02.1.04":{"type":"testplan","id":"TESTPLAN-02.1.04","title":"Test Plan — Reconnect handling","status":"not-started","epic":"EPIC-02","feature":"FEAT-02.1","story":"STORY-02.1.04","testplan":null,"estimate":null,"priority":null,"severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-14T09:20:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/33-Testplans/EPIC-02/FEAT-02.1/TESTPLAN-02.1.04-reconnect-handling.md","bodyHtml":"<h1>TESTPLAN-02.1.04 · Reconnect handling</h1>\n<h2>Source story</h2>\n<p><code>_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.04-reconnect-handling.md</code></p>\n<h2>Scope</h2>\n<p>Verifies automatic reconnection with backoff, presence re-establishment within 5s, and cursor resync without duplicate cursors.</p>\n<h2>Preconditions</h2>\n<ul>\n<li>Repo at project root, branch <code>main</code>.</li>\n<li>Runtime: Node 20; headless browser for e2e.</li>\n<li>Required services running: Redis, the realtime gateway, the web app.</li>\n<li>Required env vars: <code>REDIS_URL</code>, <code>WS_PORT</code>, <code>APP_URL</code>.</li>\n<li>Test data / fixtures: a board session and a network-fault injector.</li>\n</ul>\n<h2>Acceptance criteria → Test case map</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>#</th><th>Acceptance criterion (verbatim from story)</th><th>Test case</th></tr></thead><tbody><tr><td>AC-1</td><td>A dropped WebSocket reconnects automatically with exponential backoff.</td><td>TC-01</td></tr><tr><td>AC-2</td><td>Presence is re-established within 5s of reconnecting.</td><td>TC-02</td></tr><tr><td>AC-3</td><td>Cursor state resyncs after reconnect without duplicate cursors.</td><td>TC-03</td></tr></tbody></table></div>\n<h2>Test cases</h2>\n<h3>TC-01 · Auto-reconnect with backoff</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-1</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/reconnect.backoff.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the client retries with increasing, jittered intervals after a drop.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-02 · Presence re-established within 5s</h3>\n<ul>\n<li><strong>Type:</strong> e2e</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-2</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/reconnect.presence.e2e.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the user reappears in presence within 5s of the connection restoring.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-03 · No duplicate cursors after resync</h3>\n<ul>\n<li><strong>Type:</strong> e2e</li>\n<li><strong>Priority:</strong> P2</li>\n<li><strong>Maps to:</strong> AC-3</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/reconnect.cursor-resync.e2e.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; exactly one cursor per remote user after reconnect.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h2>Code review checklist< reconditions</h2>\n<ul>\n<li>Repo at project root, branch <code>main</code>.</li>\n<li>Runtime: Node 20.</li>\n<li>Dev URL / port: see <code>PROJECT-CONTEXT.md</code>.</li>\n<li>Required services running: Postgres, Redis.</li>\n<li>Required env vars: <code>DATABASE_URL</code>, <code>REDIS_URL</code>.</li>\n<li>Test data / fixtures: a seeded existing user <code>taken@taskflow.test</code>.</li>\n</ul>\n<h2>Acceptance criteria → Test case map</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>#</th><th>Acceptance criterion (verbatim from story)</th><th>Test case</th></tr></thead><tbody><tr><td>AC-1</td><td>A valid email and strong password creates an account record with a hashed password.</td><td>TC-01</td></tr><tr><td>AC-2</td><td>The password is never stored or logged in plaintext.</td><td>TC-02</td></tr><tr><td>AC-3</td><td>A duplicate email returns a generic error that does not reveal account existence.</td><td>TC-03</td></tr><tr><td>AC-4</td><td>A weak password is rejected with a clear message.</td><td>TC-04</td></tr></tbody></table></div>\n<h2>Test cases</h2>\n<h3>TC-01 · Valid signup creates hashed account</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-1</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- auth/signup.create.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; a users row exists with an argon2 hash, not the raw password.</li>\n<li><strong>Result:</strong> PASS</li>\n</ul>\n<h3>TC-02 · Password never persisted in plaintext</h3>\n<ul>\n<li><strong>Type:</strong> static-analysis</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-2</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- auth/signup.no-plaintext.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the stored hash does not equal the input and logs contain no raw password.</li>\n<li><strong>R ay-board-rooms.md</code></p>\n<h2>Scope</h2>\n<p>Verifies authenticated WebSocket connect, board-scoped room subscription, rejection of unauthenticated connections, and room isolation of messages.</p>\n<h2>Preconditions</h2>\n<ul>\n<li>Repo at project root, branch <code>main</code>.</li>\n<li>Runtime: Node 20.</li>\n<li>Required services running: Redis, the realtime gateway.</li>\n<li>Required env vars: <code>REDIS_URL</code>, <code>WS_PORT</code>.</li>\n<li>Test data / fixtures: two authenticated test sessions, one board id.</li>\n</ul>\n<h2>Acceptance criteria → Test case map</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>#</th><th>Acceptance criterion (verbatim from story)</th><th>Test case</th></tr></thead><tbody><tr><td>AC-1</td><td>An authenticated client can open a WebSocket connection to the gateway.</td><td>TC-01</td></tr><tr><td>AC-2</td><td>Opening a board subscribes the connection to a room keyed by board id.</td><td>TC-02</td></tr><tr><td>AC-3</td><td>Unauthenticated connections are rejected before joining any room.</td><td>TC-03</td></tr><tr><td>AC-4</td><td>Messages published to a board room reach only clients in that room.</td><td>TC-04</td></tr></tbody></table></div>\n<h2>Test cases</h2>\n<h3>TC-01 · Authenticated connect succeeds</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-1</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/gateway.connect.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; a session-bearing client completes the WebSocket upgrade.</li>\n<li><strong>Result:</strong> PASS</li>\n</ul>\n<h3>TC-02 · Open board joins the room</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-2</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/gateway.join-room.test.js   </code>``</p>\n<   if(type==="story"){ var tpId = String(item.id).replace(/^STORY-/, "TESTPLAN-"); if(D.testplan && D.testplan.some(function(t){return t.id===tpId;})) xref.push({type:"testplan", id:tpId, label:tpId}); }
  // For testplans, link to paired story
  if(type==="testplan"){ var stId = String(item.id).replace(/^TESTPLAN-/, "STORY-"); if(D.story && D.story.some(function(s){return s.id===stId;})) xref.push({type:"story", id:stId, label:stId}); }
  var xrefHtml = "";
  if(xref.length){
    xrefHtml = '<div class="drawer-section"><h3>Cross-references</h3><div class="xref">' + xref.map(function(x){ return '<button type="button" class="xref-pill" data-xref-type="' + escHtml(x.type) + '" data-xref-id="' + escHtml(x.id) + '">' + escHtml(x.label) + '</button>'; }).join("") + '</div></div>';
  }
  // Source path
  var srcHtml = "";
  if(item.file){
    srcHtml = '<div class="drawer-section"><h3>Source</h3><code style="font-size:0.78rem; word-break:break-all;">' + escHtml(item.file) + '</code></div>';
  }
  body.innerHTML = sections + xrefHtml + srcHtml;
  wireDrawerLinks(body);
}
function wireDrawerLinks(body){
  $$(".xref-pill", body).forEach(function(b){ b.addEventListener("click", function(){ openDrawer(b.dataset.xrefType, b.dataset.xrefId); }); });
  $$("[data-sub-skill]", body).forEach(function(elm){ var go=function(){ openSkillSubItem(elm.dataset.subSkill, elm.dataset.subSlug); }; elm.addEventListener("click", go); elm.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(); } }); });
  $$("[data-bundled-plugin]", body).forEach(function(elm){ var go=function(){ openBundledItem(elm.dataset.bundledPlugin, elm.dataset.bundledKind, elm.dataset.bundledName); }; elm.addEventListener("click", go); elm.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(); } }); });
}
function openSkillSubItem(skillName, slug){
  var skill = (D.ai.skills||[]).find(function(s){return s.name===skillName;});
  if(!skill) return;
  var sub = (skill.subItems||[]).find(function(s){return s.slug===slug;});
  if(!sub) return;
  DRAWER_STACK.push({ render: function(){ renderSubItemDrawer(skill, sub); } });
  renderSubItemDrawer(skill, sub);
  showDrawerPanel();
}
function renderSubItemDrawer(skill, sub){
  var t = $("#drawer .drawer-titles");
  t.querySelector(".drawer-id").textContent = skill.name + " · sub-command";
  t.querySelector(".drawer-title").textContent = "/" + skill.name + " " + sub.slug + (sub.title && sub.title!==sub.slug ? " — " + sub.title : "");
  t.querySelector(".drawer-meta").innerHTML = '<span class="tag source">' + escHtml(skill.source||"") + '</span><span class="tag">sub-command</span>';
  var sec = "";
  if(sub.desc) sec += '<h3>Summary</h3><p class="drawer-ai-desc">' + escHtml(sub.desc) + '</p>';
  if(sub.bodyHtml) sec += '<h3>Reference</h3>' + sub.bodyHtml;
  if(skill.file) sec += '<div class="drawer-section"><h3>Source</h3><code style="font-size:0.78rem; word-break:break-all;">' + escHtml(skill.file + "/reference/" + sub.slug + ".md") + '</code></div>';
  var bd = $("#drawer .drawer-body"); bd.innerHTML = sec; wireDrawerLinks(bd);
}
function openBundledItem(pluginName, kind, name){
  var listKey = kind + "s";
  var list = (D.ai && D.ai[listKey]) || [];
  var found = list.filter(function(x){ return x.pluginName===pluginName; }).find(function(x){ return x.name===name || x.name===pluginName+":"+name; });
  if(!found) found = list.find(function(x){ return x.name===name; });
  if(found){ openDrawer("ai-"+kind, found.name); return; }
  var plugin = (D.ai.plugins||[]).find(function(p){return p.name===pluginName;});
  var arr = plugin && plugin.bundles ? (plugin.bundles[listKey]||[]) : [];
  var stub = arr.find(function(s){return s.name===name;});
  if(!stub) return;
  DRAWER_STACK.push({ render: function(){ renderBundleStub(pluginName, kind, stub); } });
  renderBundleStub(pluginName, kind, stub);
  showDrawerPanel();
}
function renderBundleStub(pluginName, kind, stub){
  var t = $("#drawer .drawer-titles");
  t.querySelector(".drawer-id").textContent = pluginName + " · bundled " + kind;
  t.querySelector(".drawer-title").textContent = stub.name;
  t.querySelector(".drawer-meta").innerHTML = '<span class="tag source">plugin:' + escHtml(pluginName) + '</span><span class="tag">' + escHtml(kind) + '</span>';
  $("#drawer .drawer-body").innerHTML = stub.description ? '<p class="drawer-ai-desc">' + escHtml(stub.description) + '</p>' : '<p style="color:var(--ink-faint);">No description.</p>';
}
function renderSessionFlow(){
  var sf = D.sessionFlow;
  if(!sf) return "";
  var rows = sf.spine.map(function(s){ return '<div class="flow-row ' + escHtml(s.kind) + '"><span class="flow-label">' + escHtml(s.label) + '</span><span class="flow-detail">' + s.detail + '</span></div>'; }).join("");
  var aside = sf.aside ? '<div class="flow-aside"><div class="head">' + escHtml(sf.aside.label) + '</div>' + sf.aside.items.map(function(s){ return '<div class="flow-row ' + escHtml(s.kind) + '"><span class="flow-label">' + escHtml(s.label) + '</span><span class="flow-detail">' + s.detail + '</span></div>'; }).join("") + '</div>' : "";
  return '<h3>Session flow</h3><div class="flow">' + rows + '</div>' + aside;
}
function bindRows(root){
  $$(".row, .story-row", root).forEach(function(r){ if(r.__bound) return; r.__bound=true; r.addEventListener("click", function(){ openDrawer(r.dataset.type, r.dataset.id); }); });
}
function bindControls(root){
  $$(".search", root).forEach(function(inp){ if(inp.__bound) return; inp.__bound=true; inp.addEventListener("input", function(){ var s = inp.dataset.scope; STATE.search[s] = inp.value; renderActive(); inp.focus(); }); });
  $$(".pill.filterable", root).forEach(function(p){ if(p.__bound) return; p.__bound=true; p.addEventListener("click", function(){ var s = (STATE.group==="work"?"work:":STATE.group==="decisions"?"decisions:":STATE.group+":") + STATE.sub; STATE.statusFilter[s] = STATE.statusFilter[s] || {}; var st = p.dataset.status; STATE.statusFilter[s][st] = !STATE.statusFilter[s][st]; renderActive(); }); });
}
function setupRevealObserver(){
  if(!("IntersectionObserver" in window)) { $$(".reveal").forEach(function(e){ e.classList.add("visible"); }); return; }
  var ob = new IntersectionObserver(function(entries){ entries.forEach(function(en){ if(en.isIntersecting){ en.target.classList.add("visible"); ob.unobserve(en.target); } }); }, { rootMargin:"-30px 0px -20px 0px" });
  var watcher = new MutationObserver(function(){ $$(".reveal:not(.visible)").forEach(function(e){ ob.observe(e); }); });
  watcher.observe(document.body, { childList:true, subtree:true });
  $$(".reveal").forEach(function(e){ ob.observe(e); });
}
function init(){
  renderGroupNav();
  // Hash routing
  var h = readHash();
  if(h.group && SUB_TABS[h.group] != null){ setGroup(h.group, { sub: h.sub }); } else { setGroup("overview"); }
  // Mask + close
  $("#mask").addEventListener("click", closeDrawer);
  $(".drawer-close").addEventListener("click", closeDrawer);
  $(".drawer-back").addEventListener("click", popDrawer);
  document.addEventListener("keydown", function(e){ if(e.key==="Escape") { if($("#drawer").classList.contains("open")) closeDrawer(); } else if(e.key==="/" && !/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName)){ e.preventDefault(); var s = $(".search"); if(s) s.focus(); } });
  $("#theme-toggle").addEventListener("click", function(){ applyTheme(document.documentElement.getAttribute("data-theme")==="dark" ? "light" : "dark"); });
  window.addEventListener("hashchange", function(){ var h=readHash(); if(h.group && h.group!==STATE.group){ setGroup(h.group, { sub:h.sub }); } else if(h.sub && h.sub!==STATE.sub){ setSub(h.sub); } });
  setupRevealObserver();
  // Diagnostics link clicks
  $$("#diag a[data-path]").forEach(function(a){ a.addEventListener("click", function(e){ e.preventDefault(); /* read-only — show path */ }); });
}
if(document.readyState==="loading"){ document.addEventListener("DOMContentLoaded", init); } else { init(); }
})();
</script>
</body>
</html>
