<!DOCTYPE html>

<style>
:root {
  /* Foundation */
  --cream:#F5F0E8; --cream-2:#EBE5D8;
  --surface:#FAF8F4; --surface-2:#F1ECE3;
  --ink:#1A1714; --ink-2:#3D3831; --ink-3:#6B6358; --ink-faint:#9E9589;
  --border:#DDD6C8; --line:#DDD6C8;

  /* Brand accents */
  --red:#D63031; --red-soft:#F8E0E0;
  --yellow:#F0B429; --yellow-soft:#FAE9C0;
  --blue:#2D6CDF; --blue-soft:#DCE7F8;
  --teal:#0D9488; --teal-soft:#CFEAE6;

  /* Semantic */
  --olive:var(--red);
  --success:var(--teal); --success-soft:var(--teal-soft);
  --warn:var(--yellow); --warn-soft:var(--yellow-soft);
  --danger:var(--red); --danger-soft:var(--red-soft);
  --info:var(--blue); --info-soft:var(--blue-soft);

  /* Shape */
  --r:12px; --r-sm:10px; --r-lg:16px; --r-pill:100px;

  /* Shadow */
  --shadow-sm:0 1px 2px rgba(26,23,20,0.06);
  --shadow:0 4px 14px rgba(26,23,20,0.08);
  --shadow-lg:0 18px 40px rgba(26,23,20,0.16);

  /* Type */
  --serif:'Instrument Serif', Georgia, 'Times New Roman', serif;
  --sans:'Manrope', -apple-system, 'Segoe UI', system-ui, sans-serif;
  --mono:'JetBrains Mono', Consolas, ui-monospace, monospace;

  /* Motion */
  --ease:cubic-bezier(0.16, 1, 0.3, 1);
  --dur-fast:160ms;
  --dur:320ms;
  --dur-slow:520ms;

  /* Focus */
  --focus-ring:rgba(214,48,49,0.45);

  /* Scrollbar */
  --sb-thumb:#CFC6B7;
}

html[data-theme="dark"] {
  --cream:#15120F; --cream-2:#1C1814;
  --surface:#1A1612; --surface-2:#221D17;
  --ink:#F1ECE3; --ink-2:#D8CFC0; --ink-3:#9E9589; --ink-faint:#6B6358;
  --border:#312A22; --line:#312A22;
  --red:#E25558; --red-soft:rgba(226,85,88,0.16);
  --yellow:#F2C24A; --yellow-soft:rgba(242,194,74,0.16);
  --blue:#5B8DE8; --blue-soft:rgba(91,141,232,0.18);
  --teal:#2BB3A6; --teal-soft:rgba(43,179,166,0.18);
  --shadow-sm:0 1px 2px rgba(0,0,0,0.35);
  --shadow:0 6px 18px rgba(0,0,0,0.45);
  --shadow-lg:0 26px 50px rgba(0,0,0,0.55);
  --focus-ring:rgba(226,85,88,0.5);
  --sb-thumb:#2E2820;
}

* { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { font-family:var(--sans); color:var(--ink); background:var(--cream); line-height:1.55; font-size:14.5px; -webkit-font-smoothing:antialiased; transition:background var(--dur) var(--ease), color var(--dur) var(--ease); }

::selection { background:var(--yellow); color:var(--ink); }
:focus-visible { outline:none; box-shadow:0 0 0 3px var(--focus-ring); border-radius:var(--r-sm); }

/* Scrollbar */
* { scrollbar-width:thin; scrollbar-color:var(--sb-thumb) transparent; }
*::-webkit-scrollbar { width:10px; height:10px; }
*::-webkit-scrollbar-track { background:transparent; }
*::-webkit-scrollbar-thumb { background:var(--sb-thumb); border-radius:var(--r-pill); }
*::-webkit-scrollbar-button { display:none; }
.nohscroll::-webkit-scrollbar { display:none; }
.nohscroll { scrollbar-width:none; -ms-overflow-style:none; }

/* Skip link */
.skip { position:absolute; left:-9999px; top:0; background:var(--ink); color:var(--cream); padding:0.5rem 0.85rem; border-radius:var(--r-sm); z-index:100; }
.skip:focus { left:1rem; top:1rem; }

/* Header */
header.app-header { background:var(--surface); border-bottom:1px solid var(--border); padding:1.5rem 0 1.25rem; position:relative; z-index:50; }
.app-header-inner { max-width:1500px; margin:0 auto; padding:0 1.75rem; display:flex; align-items:center; justify-content:space-between; gap:1.5rem; flex-wrap:wrap; }
.brand-wrap { display:flex; align-items:center; gap:0.85rem; }
.brand-mark { display:flex; gap:6px; align-items:center; }
.brand-dot { width:14px; height:14px; border-radius:50%; }
.brand-dot.r { background:var(--red); }
.brand-dot.y { background:var(--yellow); }
.brand-dot.b { background:var(--blue); }
.app-title { font-family:var(--serif); font-size:2.05rem; font-weight:400; line-height:1; letter-spacing:-0.01em; color:var(--ink); }
.app-title em { color:var(--red); font-style:italic; }
.app-sub { display:block; font-family:var(--sans); font-size:0.72rem; font-weight:500; color:var(--ink-3); margin-top:0.3rem; letter-spacing:0.14em; text-transform:uppercase; }
.app-tools { display:flex; align-items:center; gap:0.75rem; }
.icon-btn { background:transparent; border:1px solid var(--border); color:var(--ink-2); width:38px; height:38px; border-radius:50%; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:all var(--dur-fast) var(--ease); }
.icon-btn:hover { background:var(--surface-2); color:var(--ink); border-color:var(--ink-faint); }
.icon-btn svg { width:18px; height:18px; }
.app-meta { font-size:0.7rem; color:var(--ink-3); font-family:var(--mono); }

/* Diagnostics banner */
.diag { max-width:1500px; margin:0 auto; padding:0.65rem 1.75rem; }
.diag-inner { background:var(--red-soft); border:1px solid var(--red); border-radius:var(--r); padding:0.75rem 1rem; color:var(--ink); font-size:0.85rem; display:flex; gap:0.85rem; align-items:flex-start; }
.diag-inner strong { color:var(--red); }
.diag-inner ul { margin:0.35rem 0 0 1.1rem; padding:0; }
.diag-inner code { font-family:var(--mono); font-size:0.78rem; }

/* Two-row navigation */
nav.group-nav { background:var(--cream); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:40; }
.group-inner { max-width:1500px; margin:0 auto; padding:0 1.75rem; display:flex; gap:0; overflow-x:auto; }
.gtab { background:transparent; border:none; padding:1.05rem 1.25rem 0.95rem; cursor:pointer; font-family:var(--sans); font-size:0.95rem; color:var(--ink-2); border-bottom:2px solid transparent; white-space:nowrap; font-weight:500; transition:color var(--dur-fast) var(--ease), border-color var(--dur) var(--ease); position:relative; }
.gtab:hover { color:var(--ink); }
.gtab.active { color:var(--red); border-bottom-color:var(--red); }
.gtab-count { display:inline-block; background:var(--surface-2); color:var(--ink-2); font-size:0.66rem; padding:0.08rem 0.45rem; border-radius:var(--r-pill); margin-left:0.4rem; font-family:var(--mono); font-weight:500; vertical-align:1px; }
.gtab.active .gtab-count { background:var(--red); color:#fff; }

nav.sub-nav { background:var(--surface); border-bottom:1px solid var(--border); }
.sub-inner { max-width:1500px; margin:0 auto; padding:0 1.75rem; display:flex; gap:0; overflow-x:auto; align-items:center; min-height:42px; }
.stab { background:transparent; border:none; padding:0.55rem 1rem; cursor:pointer; font-family:var(--sans); font-size:0.82rem; color:var(--ink-3); white-space:nowrap; font-weight:500; transition:color var(--dur-fast) var(--ease); border-bottom:2px solid transparent; }
.stab:hover { color:var(--ink); }
.stab.active { color:var(--ink); border-bottom-color:var(--ink); }
.stab-count { display:inline-block; font-size:0.65rem; padding:0 0.4rem; color:var(--ink-faint); font-family:var(--mono); margin-left:0.25rem; }
.sub-inner:empty { display:none; }
nav.sub-nav:has(.sub-inner:empty), nav.sub-nav.hidden { display:none; }

/* Main */
main { max-width:1500px; margin:0 auto; padding:1.5rem 1.75rem 4rem; }
section.tab-section { display:none; }
section.tab-section.active { display:block; }

.controls { display:flex; gap:0.75rem; margin-bottom:1.25rem; align-items:center; flex-wrap:wrap; padding:0.85rem 1rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); }
.search { flex:1; min-width:220px; padding:0.55rem 0.9rem; border:1px solid var(--border); border-radius:var(--r-sm); background:var(--cream); font-family:var(--sans); font-size:0.9rem; color:var(--ink); transition:all var(--dur-fast) var(--ease); }
.search:focus { outline:none; border-color:var(--red); background:var(--surface); }
.filter-group { display:flex; gap:0.35rem; flex-wrap:wrap; align-items:center; }
.filter-label { font-size:0.66rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink-faint); margin-right:0.25rem; font-weight:600; }

/* Pills */
.pill { display:inline-block; padding:0.18rem 0.65rem; border-radius:var(--r-pill); font-size:0.7rem; font-family:var(--mono); font-weight:500; letter-spacing:0.02em; white-space:nowrap; user-select:none; line-height:1.55; }
.pill.filterable { cursor:pointer; transition:all var(--dur-fast) var(--ease); }
.pill.filterable.off { opacity:0.32; }
.pill.filterable:hover { transform:translateY(-1px); }
.pill[data-status="not-started"] { background:var(--surface-2); color:var(--ink-2); }
.pill[data-status="ready"]       { background:var(--info-soft);    color:var(--info); }
.pill[data-status="in-progress"] { background:var(--warn-soft);    color:var(--ink); border:1px solid var(--yellow); }
.pill[data-status="in-review"]   { background:var(--blue-soft);    color:var(--blue); }
.pill[data-status="done"]        { background:var(--success-soft); color:var(--success); }
.pill[data-status="blocked"]     { background:var(--danger-soft);  color:var(--red); border:1px solid var(--red); }
.pill[data-status="active"]      { background:var(--success-soft); color:var(--success); }
.pill[data-status="wontfix"]     { background:var(--surface-2);    color:var(--ink-faint); text-decoration:line-through; }
.pill[data-status="duplicate"]   { background:var(--surface-2);    color:var(--ink-faint); }
.pill[data-status="archived"]    { background:var(--surface-2);    color:var(--ink-faint); opacity:0.7; }

.sev { display:inline-block; padding:0.1rem 0.55rem; border-radius:var(--r-sm); font-size:0.68rem; font-family:var(--mono); font-weight:600; letter-spacing:0.04em; text-transform:uppercase; }
.sev.critical { background:var(--red); color:#fff; }
.sev.high     { background:var(--red-soft); color:var(--red); border:1px solid var(--red); }
.sev.medium   { background:var(--yellow-soft); color:var(--ink); border:1px solid var(--yellow); }
.sev.low      { background:var(--surface-2); color:var(--ink-2); }

.tag { display:inline-block; padding:0.1rem 0.55rem; border-radius:var(--r-pill); font-size:0.66rem; font-family:var(--mono); background:var(--surface-2); color:var(--ink-2); white-space:nowrap; }
.tag.star { background:var(--yellow-soft); color:#7a5a00; border:1px solid var(--yellow); }
.tag.must { background:var(--red); color:#fff; }
.tag.source { background:transparent; border:1px solid var(--border); color:var(--ink-3); }
.tag.cat.exclusive { cursor:pointer; transition:all var(--dur-fast) var(--ease); }
.tag.cat.exclusive:hover { background:var(--ink); color:var(--cream); }
.tag.cat.exclusive.active { background:var(--ink); color:var(--cream); }

/* Cards */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:1.2rem 1.3rem; box-shadow:var(--shadow-sm); transition:box-shadow var(--dur) var(--ease), transform var(--dur) var(--ease), border-color var(--dur) var(--ease); }
.card.hover { cursor:pointer; }
.card.hover:hover { box-shadow:var(--shadow); transform:translateY(-1px); border-color:var(--ink-faint); }

.card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:1rem; }
.card-grid.tight { grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); }
.metric { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:1.1rem 1.2rem; box-shadow:var(--shadow-sm); }
.metric-val { font-family:var(--serif); font-size:2.4rem; font-weight:400; color:var(--ink); line-height:1; letter-spacing:-0.02em; }
.metric-lab { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.14em; color:var(--ink-faint); margin-top:0.5rem; font-weight:600; }
.metric-sub { font-size:0.78rem; color:var(--ink-3); margin-top:0.45rem; font-family:var(--mono); }

.progress { height:6px; background:var(--surface-2); border-radius:var(--r-pill); overflow:hidden; margin-top:0.6rem; }
.progress > span { display:block; height:100%; background:linear-gradient(90deg, var(--teal), var(--blue)); border-radius:var(--r-pill); transition:width var(--dur-slow) var(--ease); }
.progress.danger > span { background:linear-gradient(90deg, var(--red), var(--yellow)); }

/* Rows (tables) */
.rows { display:flex; flex-direction:column; gap:0.45rem; }
.row { display:grid; grid-template-columns:130px 1fr auto; gap:0.85rem; align-items:center; padding:0.75rem 1rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); cursor:pointer; transition:all var(--dur-fast) var(--ease); }
.row:hover { border-color:var(--ink-faint); background:var(--surface-2); transform:translateX(2px); }
.row-id { font-family:var(--mono); font-size:0.78rem; color:var(--ink-2); font-weight:500; white-space:nowrap; }
.row-title { font-size:0.92rem; color:var(--ink); font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.row-title .meta { color:var(--ink-3); font-size:0.78rem; font-weight:400; margin-left:0.5rem; }
.row-extra { display:flex; gap:0.4rem; align-items:center; }

/* Plan tree */
.plan-toolbar { display:flex; gap:0.5rem; margin-bottom:1rem; }
.plan-toolbar button { background:transparent; border:1px solid var(--border); color:var(--ink-2); padding:0.45rem 0.85rem; border-radius:var(--r-pill); font-size:0.78rem; font-family:var(--sans); cursor:pointer; transition:all var(--dur-fast) var(--ease); }
.plan-toolbar button:hover { background:var(--surface-2); border-color:var(--ink-faint); }
.epic-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); margin-bottom:0.85rem; overflow:hidden; transition:box-shadow var(--dur) var(--ease); }
.epic-card.open { box-shadow:var(--shadow); }
.epic-head { display:grid; grid-template-columns:36px 110px 1fr auto auto; gap:0.85rem; padding:1rem 1.2rem; cursor:pointer; align-items:center; user-select:none; }
.epic-head:hover { background:var(--surface-2); }
.disclose { width:22px; height:22px; display:inline-flex; align-items:center; justify-content:center; color:var(--ink-3); transition:transform var(--dur) var(--ease); }
.epic-card.open .disclose { transform:rotate(90deg); }
.epic-id { font-family:var(--mono); font-size:0.85rem; color:var(--ink-2); }
.epic-title { font-family:var(--serif); font-size:1.25rem; color:var(--ink); font-weight:400; letter-spacing:-0.01em; }
.epic-badges { display:flex; gap:0.35rem; }
.epic-progress { display:flex; align-items:center; gap:0.6rem; min-width:160px; }
.epic-progress .progress { flex:1; margin-top:0; }
.epic-progress .ratio { font-family:var(--mono); font-size:0.74rem; color:var(--ink-3); white-space:nowrap; }
.epic-body { display:none; padding:0.4rem 1.2rem 1.2rem; border-top:1px solid var(--border); }
.epic-card.open .epic-body { display:block; }
.feat-card { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r-sm); margin:0.65rem 0; }
.feat-head { display:grid; grid-template-columns:24px 130px 1fr auto; gap:0.65rem; padding:0.65rem 0.85rem; cursor:pointer; align-items:center; }
.feat-head:hover { background:var(--cream-2); }
.feat-id { font-family:var(--mono); font-size:0.78rem; color:var(--ink-2); }
.feat-title { font-size:0.95rem; color:var(--ink); font-weight:500; }
.feat-body { display:none; padding:0.2rem 0.85rem 0.85rem; }
.feat-card.open .feat-body { display:block; }
.feat-card.open .disclose { transform:rotate(90deg); }
.story-row { display:grid; grid-template-columns:24px 150px 1fr auto auto; gap:0.55rem; padding:0.5rem 0.7rem; align-items:center; border-radius:var(--r-sm); cursor:pointer; transition:background var(--dur-fast) var(--ease); }
.story-row:hover { background:var(--cream); }
.story-row .story-id { font-family:var(--mono); font-size:0.74rem; color:var(--ink-3); }
.story-row .story-title { font-size:0.88rem; color:var(--ink); }
.story-row .tp-link { font-family:var(--mono); font-size:0.7rem; color:var(--blue); }
.empty { color:var(--ink-faint); font-size:0.85rem; padding:0.5rem 0; font-style:italic; }

/* Overview */
.overview-hero { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:1rem; margin-bottom:1.5rem; }
.overview-panels { display:grid; grid-template-columns:1.4fr 1fr; gap:1rem; margin-bottom:1.5rem; }
@media (max-width:920px) { .overview-panels { grid-template-columns:1fr; } }
.panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:1.15rem 1.25rem; }
.panel h3 { font-family:var(--serif); font-size:1.3rem; font-weight:400; margin-bottom:0.85rem; color:var(--ink); letter-spacing:-0.01em; }
.panel h3 .count-bubble { font-family:var(--mono); font-size:0.72rem; background:var(--surface-2); color:var(--ink-3); padding:0.1rem 0.55rem; border-radius:var(--r-pill); margin-left:0.5rem; vertical-align:2px; }
.kv { display:grid; grid-template-columns:auto 1fr; gap:0.3rem 0.85rem; font-size:0.86rem; color:var(--ink-2); }
.kv dt { color:var(--ink-faint); font-size:0.74rem; text-transform:uppercase; letter-spacing:0.1em; font-weight:600; align-self:center; }
.kv dd { font-family:var(--mono); color:var(--ink); }

/* AI catalogue cards */
.ai-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:1rem 1.1rem; cursor:pointer; transition:all var(--dur-fast) var(--ease); display:flex; flex-direction:column; gap:0.55rem; }
.ai-card:hover { border-color:var(--ink-faint); box-shadow:var(--shadow); transform:translateY(-2px); }
.ai-card .name { font-family:var(--serif); font-size:1.15rem; color:var(--ink); letter-spacing:-0.01em; line-height:1.2; }
.ai-card .desc { font-size:0.82rem; color:var(--ink-2); line-height:1.5; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.ai-card .footer { display:flex; gap:0.35rem; flex-wrap:wrap; align-items:center; margin-top:auto; }
.ai-card.curated { border-color:var(--yellow); }

/* Drawer */
.mask { display:none; position:fixed; inset:0; background:rgba(26,23,20,0.5); z-index:80; backdrop-filter:blur(4px); }
.mask.open { display:block; animation:fade var(--dur) var(--ease); }
aside.drawer { position:fixed; top:0; right:0; bottom:0; width:min(820px, 96vw); background:var(--cream); border-left:1px solid var(--border); box-shadow:var(--shadow-lg); z-index:90; transform:translateX(105%); transition:transform var(--dur) var(--ease); overflow-y:auto; display:flex; flex-direction:column; }
aside.drawer.open { transform:translateX(0); }
.drawer-head { padding:1.25rem 1.5rem 0.95rem; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:0; z-index:2; display:flex; gap:1rem; align-items:flex-start; }
.drawer-head .titles { flex:1; min-width:0; }
.drawer-back { background:transparent; border:1px solid var(--border); width:34px; height:34px; border-radius:50%; cursor:pointer; color:var(--ink-2); display:none; align-items:center; justify-content:center; }
.drawer-back.show { display:inline-flex; }
.drawer-close { background:transparent; border:1px solid var(--border); width:34px; height:34px; border-radius:50%; cursor:pointer; color:var(--ink-2); display:inline-flex; align-items:center; justify-content:center; }
.drawer-close:hover, .drawer-back:hover { background:var(--surface-2); }
.drawer-id { font-family:var(--mono); font-size:0.78rem; color:var(--ink-3); }
.drawer-title { font-family:var(--serif); font-size:1.6rem; color:var(--ink); margin-top:0.3rem; font-weight:400; letter-spacing:-0.01em; line-height:1.2; }
.drawer-meta { display:flex; gap:0.4rem; flex-wrap:wrap; margin-top:0.75rem; }
.drawer-body { padding:1.25rem 1.5rem 2.5rem; flex:1; }
.drawer-body h1 { font-family:var(--serif); font-size:1.6rem; margin:1.4rem 0 0.7rem; font-weight:400; letter-spacing:-0.01em; }
.drawer-body h2 { font-family:var(--serif); font-size:1.35rem; margin:1.25rem 0 0.55rem; font-weight:400; }
.drawer-body h3 { font-family:var(--sans); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink-faint); margin:1.2rem 0 0.45rem; font-weight:600; }
.drawer-body h4 { font-size:0.95rem; margin:0.85rem 0 0.35rem; color:var(--ink); }

\n<li>Gantt charts and dependency graphs.</li>\n<li>Per-field custom workflows.</li>\n<li>A marketplace of third-party plugins.</li>\n</ul>\n<h2>The 18-month bet</h2>\n<p>If teams that adopt a shared, live board retain at 2x the rate of solo users, then doubling down on realtime collaboration (not feature breadth) is the path to durable growth. Every quarter&#39;s OKRs should ladder up to raising WACT.</p>\n","ageDays":137,"cycleDays":null},{"type":"strategy","id":"OKR-2026-Q2","title":"OKRs — 2026 Q2","status":"active","epic":null,"feature":null,"story":null,"testplan":null,"estimate":null,"priority":null,"severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-03-28T10:00:00+01:00","started_at":"2026-04-01T09:00:00+01:00","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/00-Strategy/OKR-2026-Q2.md","bodyHtml":"<h1>OKRs · 2026 Q2</h1>\n<p><strong>Theme:</strong> Turn the solo tool into a team tool. Everything this quarter ladders into the North Star metric — Weekly Active Collaborating Teams (WACT).</p>\n<h2>Objective 1 — Make shared boards feel alive</h2>\n<p>*Realtime collaboration is the headline differentiator. If the board feels co-located, teams stay.*</p>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>Key Result</th><th>Baseline</th><th>Target</th><th>Linked work</th></tr></thead><tbody><tr><td>OKR-2026-Q2-1 — Raise share of boards with 2+ concurrent weekly editors</td><td>12%</td><td>30%</td><td>EPIC-02 (Realtime collaboration)</td></tr><tr><td>OKR-2026-Q2-2 — Cursor round-trip latency (median) under load</td><td>480ms</td><td>&lt; 200ms</td><td>STORY-02.1.03, STORY-02.1.05</td></tr><tr><td>OKR-2026-Q2-3 — Presence accuracy after a dropped connection</td><td>71%</td><td>&gt; 95%</td><td>STORY-02.1.04</td></tr></tbody></table></div>\n<h2>Objective 2 — Remove onboarding friction</h2>\n<p>*A team cannot collaborate until everyone is in. Auth must be invisible.*</p>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>Key Result</th><th>Baseline</th><th>Target</th><th>Linked work</th></tr></thead><tbody><tr><td>OKR-2026-Q2-4 — Median time-to-first-shared-board</td><td>11 min</td><td>&lt; 5 min</td><td>EPIC-01 (done)</td></tr><tr><td>OKR-2026-Q2-5 — Signup→verified conversion</td><td>68%</td><td>&gt; 85%</td><td>STORY-01.1.02</td></tr><tr><td>OKR-2026-Q2-6 — Share of signups using SSO</td><td>0%</td><td>&gt; 40%</td><td>FEAT-01.2</td></tr></tbody></table></div>\n<h2>Confidence &amp; check-ins</h2>\n<ul>\n<li><strong>Mid-quarter check:</strong> 2026-05-15 — Objective 1 on track (EPIC-02 in progress); Objective 2 largely met (EPIC-01 shipped).</li>\n<li><strong>Confidence:</strong> O1 0.6, O2 0.8.</li>\n<li><strong>Risk to watch:</strong> fan-out cost at scale could cap latency gains; tracked in EPIC-02 risks and ADR-0001.</li>\n</ul>\n<h2>How this ladders up</h2>\n<p>Both objectives feed WACT: O2 gets teams in the door, O1 keeps them collaborating once they arrive.</p>\n","ageDays":58,"cycleDays":null}],"backlog":[{"type":"backlog","id":"BACKLOG-0001","title":"Stack presence avatars when a board gets crowded","status":"not-started","epic":null,"feature":null,"story":null,"testplan":null,"estimate":"S","priority":"P2","severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"frontend","decisions":[],"related":["STORY-02.1.02","EPIC-02"],"decision":null,"context_story":null,"discovered_in":null,"captured_from":"STORY-02.1.02 — presence list grows unbounded in the header","created_at":"2026-05-12T14:20:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/11-Backlog/BACKLOG-0001-presence-avatar-stacking.md","bodyHtml":"<h1>BACKLOG-0001 · Stack presence avatars when a board gets crowded</h1>\n<h2>Why this exists</h2>\n<p>The presence header renders one avatar per online user in a flat row. On a busy board with 8+ people the row overflows and pushes the board title off-screen. Today it wraps awkwardly; the better behaviour is a stacked &quot;+3&quot; overflow chip like every modern collaboration tool.</p>\n<h2>Why backlog (not blocker)</h2>\n<p>Boards rarely exceed 6 concurrent editors today, so the overflow is cosmetic for now. It only bites at the scale we are *trying* to reach, which is why it is worth tracking but not urgent.</p>\n<h2>Work tranches</h2>\n<h3>Tranche A — Overflow chip (estimate: S)</h3>\n<ul>\n<li>[ ] Cap visible avatars at 5; render remaining as a &quot;+N&quot; chip.</li>\n<li>[ ] Hover/focus on the chip lists the hidden users.</li>\n</ul>\n<h3>Tranche B — Density polish (estimate: S)</h3>\n<ul>\n<li>[ ] Animate avatars in/out as presence changes.</li>\n<li>[ ] Respect prefers-reduced-motion.</li>\n</ul>\n<h2>Acceptance — when this can be marked done</h2>\n<ul>\n<li>Header never overflows regardless of concurrent user count.</li>\n<li>Hidden users are discoverable via the overflow chip.</li>\n</ul>\n<h2>Promotion criteria</h2>\n<ul>\n<li>When a board regularly sees 6+ concurrent editors, or before public launch.</li>\n</ul>\n<h2>Related</h2>\n<ul>\n<li>STORY-02.1.02, EPIC-02</li>\n</ul>\n","ageDays":12,"cycleDays":null},{"type":"backlog","id":"BACKLOG-0002","title":"Define retention policy for the board_activity log","status":"not-started","epic":null,"feature":null,"story":null,"testplan":null,"estimate":"M","priority":"P1","severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"data","decisions":[],"related":["EPIC-02","ADR-0002"],"decision":null,"context_story":null,"discovered_in":null,"captured_from":"ADR-0002 — sessions in Redis raised the question of activity-log growth","created_at":"2026-05-16T11:05:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/11-Backlog/BACKLOG-0002-board-activity-retention.md","bodyHtml":"<h1>BACKLOG-0002 · Define retention policy for the board_activity log</h1>\n<h2>Why this exists</h2>\n<p>EPIC-02 appends every join/leave and card move to a <code>board_activity</code> log. There is no pruning, so the table grows without bound. Today storage is cheap and volume is low; the better behaviour is a defined retention window with a rollup for older data.</p>\n<h2>Why backlog (not blocker)</h2>\n<p>At current volume the table will take months to become a problem. The risk is acceptable while we validate which activity events teams actually care about — pruning the wrong thing now would be premature.</p>\n<h2>Work tranches</h2>\n<h3>Tranche A — Decide the policy (estimate: S)</h3>\n<ul>\n<li>[ ] Choose a retention window (proposed: 90 days hot, rollup after).</li>\n<li>[ ] File an ADR for the choice.</li>\n</ul>\n<h3>Tranche B — Implement pruning (estimate: M)</h3>\n<ul>\n<li>[ ] Nightly job that archives rows past the window.</li>\n<li>[ ] Rollup table for activity counts per board per day.</li>\n</ul>\n<h2>Acceptance — when this can be marked done</h2>\n<ul>\n<li>A documented, enforced retention window exists.</li>\n<li>The hot table size is bounded and predictable.</li>\n</ul>\n<h2>Promotion criteria</h2>\n<ul>\n<li>When <code>board_activity</code> row count crosses ~5M, or before the first paid plan ships.</li>\n</ul>\n<h2>Related</h2>\n<ul>\n<li>EPIC-02, ADR-0002</li>\n</ul>\n","ageDays":9,"cycleDays":null},{"type":"backlog","id":"BACKLOG-0003","title":"Auto-provision team membership from SSO groups","status":"not-started","epic":null,"feature":null,"story":null,"testplan":null,"estimate":"L","priority":"P3","severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"backend","decisions":[],"related":["FEAT-01.2","EPIC-01"],"decision":null,"context_story":null,"discovered_in":null,"captured_from":"FEAT-01.2 OAuth/SSO — customers asked for group sync","created_at":"2026-05-20T16:40:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/11-Backlog/BACKLOG-0003-sso-group-provisioning.md","bodyHtml":"<h1>BACKLOG-0003 · Auto-provision team membership from SSO groups</h1>\n<h2>Why this exists</h2>\n<p>Teams using Google Workspace SSO have to invite each member manually after the org connects. Two early customers asked whether membership could follow their existing directory groups. Today it is fully manual; the better behaviour is that joining a mapped SSO group grants the matching TaskFlow board access.</p>\n<h2>Why backlog (not blocker)</h2>\n<p>SSO sign-in itself works (FEAT-01.2). Group provisioning is a convenience for larger teams, and only two customers have asked. It is squarely a growth feature, not a launch blocker.</p>\n<h2>Work tranches</h2>\n<h3>Tranche A — Group read (estimate: M)</h3>\n<ul>\n<li>[ ] Read group membership from the SSO provider during sign-in.</li>\n<li>[ ] Map provider groups to TaskFlow teams via admin config.</li>\n</ul>\n<h3>Tranche B — Sync &amp; revocation (estimate: L)</h3>\n<ul>\n<li>[ ] Add members on first sign-in via a mapped group.</li>\n<li>[ ] Revoke access when a user leaves the mapped group.</li>\n</ul>\n<h2>Acceptance — when this can be marked done</h2>\n<ul>\n<li>An admin can map an SSO group to a team once and have membership stay in sync.</li>\n</ul>\n<h2>Promotion criteria</h2>\n<ul>\n<li>When 3+ paying teams request directory sync, or when we pursue mid-market deals.</li>\n</ul>\n<h2>Related</h2>\n<ul>\n<li>FEAT-01.2, EPIC-01</li>\n</ul>\n","ageDays":4,"cycleDays":null}],"release":[{"type":"release","id":"RELEASE-v1.0","title":"Foundations — accounts, auth & SSO","status":"done","epic":null,"feature":null,"story":null,"testplan":null,"estimate":null,"priority":null,"severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-04-11T15:00:00+01:00","started_at":"2026-04-11T15:00:00+01:00","completed_at":"2026-04-12T10:30:00+01:00","version":"v1.0.0","ai_review":null,"file":"_00-Project-Management/13-Releases/RELEASE-v1.0-foundations.md","bodyHtml":"<h1>RELEASE-v1.0 · Foundations — accounts, auth &amp; SSO</h1>\n<h2>Summary</h2>\n<p>The first public release of TaskFlow. It delivers everything a team needs to get in the door: email/password signup with verification, and Google OAuth single sign-on. This is the foundation the realtime collaboration work (EPIC-02) builds on — teams must exist before boards can be shared.</p>\n<h2>Stories included</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>Story</th><th>Title</th><th>Status</th></tr></thead><tbody><tr><td>STORY-01.1.01</td><td>Signup form and account creation</td><td>done</td></tr><tr><td>STORY-01.1.02</td><td>Email verification flow</td><td>done</td></tr><tr><td>STORY-01.2.01</td><td>Google OAuth sign-in</td><td>done</td></tr></tbody></table></div>\n<h2>Bugs fixed</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>Bug</th><th>Summary</th></tr></thead><tbody><tr><td>—</td><td>No release-blocking bugs at ship time.</td></tr></tbody></table></div>\n<h2>Decisions ratified</h2>\n<ul>\n<li>ADR-0002 — Store sessions in Redis</li>\n</ul>\n<h2>Migration / breaking changes</h2>\n<ul>\n<li>First release — no migration required.</li>\n<li>New env vars: <code>REDIS_URL</code>, <code>OAUTH_GOOGLE_CLIENT_ID</code>, <code>OAUTH_GOOGLE_CLIENT_SECRET</code>.</li>\n</ul>\n<h2>Smoke-test checklist</h2>\n<p>Run these after deploy to confirm the release works in production.</p>\n<ul>\n<li>[x] New user can sign up and receives a verification email</li>\n<li>[x] Verification link activates the account</li>\n<li>[x] Google SSO sign-in creates/links an account</li>\n<li>[x] Error tracker shows no new errors after 15 minutes</li>\n<li>[x] p95 sign-in latency within budget (&lt; 400ms)</li>\n</ul>\n<h2>Rollback plan</h2>\n<p>Roll back if the smoke checklist fails or error rate exceeds 1%.</p>\n<ol>\n<li><code>flyctl deploy --image taskflow/web:v0.9.4</code></li>\n<li>Confirm health checks green, then announce the rollback.</li>\n</ol>\n<p><strong>Time budget for rollback:</strong> must be able to revert within 10 minutes.</p>\n<h2>Communication</h2>\n<ul>\n<li>[x] Internal notes posted (where: #releases)</li>\n<li>[x] External release notes drafted</li>\n<li>[x] Stakeholders notified</li>\n</ul>\n<h2>Metrics to watch (post-deploy)</h2>\n<ul>\n<li>Signup→verified conversion — target &gt; 85%.</li>\n<li>Median time-to-first-shared-board — target &lt; 5 min.</li>\n</ul>\n<h2>Retro hook</h2>\n<p>This release will be discussed in <code>RETRO-2026-04.md</code>. Items to surface there:</p>\n<ul>\n<li>Verification email deliverability tuning.</li>\n<li>Whether SSO-first onboarding should be the default.</li>\n</ul>\n","ageDays":43,"cycleDays":0}],"retro":[{"type":"retro","id":"RETRO-2026-04","title":"Retrospective — April 2026","status":"done","epic":null,"feature":null,"story":null,"testplan":null,"estimate":null,"priority":null,"severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-04-30T16:00:00+01:00","started_at":"2026-04-30T16:00:00+01:00","completed_at":"2026-04-30T17:15:00+01:00","version":null,"ai_review":null,"file":"_00-Project-Management/14-Retros/RETRO-2026-04.md","bodyHtml":"<h1>RETRO-2026-04 · April 2026</h1>\n<h2>Period</h2>\n<ul>\n<li>From: 2026-04-01</li>\n<li>To: 2026-04-30</li>\n</ul>\n<h2>Metrics</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>Metric</th><th>This period</th><th>Last period</th><th>Δ</th></tr></thead><tbody><tr><td>Stories shipped</td><td>3</td><td>2</td><td>+1</td></tr><tr><td>Bugs filed</td><td>4</td><td>6</td><td>-2</td></tr><tr><td>Bugs fixed</td><td>4</td><td>5</td><td>-1</td></tr><tr><td>ADRs created</td><td>1</td><td>1</td><td>0</td></tr><tr><td>Average story cycle time</td><td>6 days</td><td>8 days</td><td>-2</td></tr><tr><td>Time in <code>blocked</code></td><td>1 day</td><td>4 days</td><td>-3</td></tr></tbody></table></div>\n<h2>What worked</h2>\n<ul>\n<li>Shipping EPIC-01 as one tight release (RELEASE-v1.0) instead of dribbling auth out story by story meant we smoke-tested the whole onboarding path once, not three times.</li>\n<li>Filing ADR-0002 the moment we picked Redis for sessions saved a re-litigation when EPIC-02 wanted the same store for presence.</li>\n<li>Pairing every story with its testplan up front kept &quot;done&quot; honest — no story closed with an empty TC.</li>\n</ul>\n<h2>What hurt</h2>\n<ul>\n<li>The verification email landed in spam for two test domains before we tuned SPF/DKIM; we found out late because no story owned deliverability explicitly.</li>\n<li>We started EPIC-02 design while EPIC-01 still had an open verification bug, which split attention for half a week.</li>\n</ul>\n<h2>Surprises</h2>\n<ul>\n<li>SSO interest was higher than expected — two of the first five teams asked for directory group sync (now BACKLOG-0003).</li>\n<li>Time-to-first-shared-board dropped below 5 minutes faster than forecast once the signup form auto-created a starter board.</li>\n</ul>\n<h2>Action from last retro — did it happen?</h2>\n<ul>\n<li><strong>Last retro&#39;s change:</strong> &quot;Pair every story with a runnable testplan before pulling it.&quot;</li>\n<li><strong>Outcome:</strong> Yes — held for all of April. Carry forward as standing practice.</li>\n</ul>\n<h2>One change for next period</h2>\n<ul>\n<li><strong>The change:</strong> Give realtime latency its own measured KR (cursor round-trip) before writing more cursor stories, so we optimise against a number, not a feeling.</li>\n<li><strong>Owner:</strong> PM</li>\n<li><strong>Done when:</strong> OKR-2026-Q2-2 has a live dashboard number.</li>\n<li><strong>Review:</strong> in next month&#39;s retro</li>\n</ul>\n<h2>Strategic check</h2>\n<ul>\n<li><strong>Drift detected?</strong> No</li>\n<li><strong>If yes — what&#39;s drifting:</strong> —</li>\n</ul>\n","ageDays":24,"cycleDays":0}],"epic":[{"type":"epic","id":"EPIC-02","title":"Realtime collaboration","status":"in-progress","epic":null,"feature":null,"story":null,"testplan":null,"estimate":"XL","priority":"P0","severity":null,"okr":"OKR-2026-Q2-1","prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-04-20T10:00:00+01:00","started_at":"2026-05-04T09:15:00+01:00","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/30-Epics/EPIC-02-realtime-collaboration.md","bodyHtml":"<h1>EPIC-02 · Realtime collaboration</h1>\n<h2>Goal</h2>\n<p>Make a TaskFlow board feel alive when a team works on it together: people see each other&#39;s cursors, know who is online, and watch cards move in real time without refreshing. The first slice delivers live cursors and presence so the collaborative feel is established before deeper co-editing lands.</p>\n<h2>Strategic linkage</h2>\n<ul>\n<li><strong>OKR:</strong> OKR-2026-Q2-1 — &quot;Increase weekly active collaboration.&quot; Realtime presence is the headline differentiator that turns a solo tool into a team tool.</li>\n<li><strong>Why now:</strong> Authentication shipped, so teams now exist; the next retention lever is making shared boards feel collaborative rather than static.</li>\n<li><strong>Business outcome:</strong> Raise the share of boards with 2+ concurrent editors per week from 12% to 30%.</li>\n</ul>\n<h2>In scope</h2>\n<ul>\n<li>A realtime transport layer for board sessions.</li>\n<li>Live cursors with per-user colour and label.</li>\n<li>Presence (who is currently viewing a board).</li>\n<li>Reconnect handling on transient network loss.</li>\n</ul>\n<h2>Out of scope</h2>\n<ul>\n<li>Conflict-free co-editing of card text (a later feature).</li>\n<li>Voice/video presence.</li>\n<li>Offline edit queueing.</li>\n</ul>\n<h2>Success criteria</h2>\n<ul>\n<li>Two users on the same board see each other&#39;s cursors within 200ms median.</li>\n<li>Presence list updates within 1s of a user joining or leaving.</li>\n<li>A dropped connection re-establishes presence automatically within 5s.</li>\n</ul>\n<h2>Features</h2>\n<ul>\n<li><a href=\"../31-Features/EPIC-02/FEAT-02.1-live-cursors-presence.md\">FEAT-02.1 — Live cursors &amp; presence</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li><strong>Other epics:</strong> EPIC-01 (authenticated sessions identify each presence participant).</li>\n<li><strong>Infrastructure:</strong> WebSocket gateway; Redis pub/sub for fan-out.</li>\n<li><strong>External:</strong> none</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> users, boards, sessions</li>\n<li><strong>Writes:</strong> presence (ephemeral, Redis), board_activity</li>\n<li><strong>New schema:</strong> presence channels in Redis; board_activity append log</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li><strong>Fan-out cost at scale</strong> — mitigation: room-scoped pub/sub, throttle cursor frames to 20/s.</li>\n<li><strong>Stale presence after ungraceful disconnect</strong> — mitigation: heartbeat + TTL eviction.</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../40-Decisions/ADR-0001-use-websockets-over-sse-for-presence.md\">ADR-0001 — Use WebSockets over SSE for presence</a></li>\n</ul>\n","ageDays":35,"cycleDays":null},{"type":"epic","id":"EPIC-01","title":"Onboarding & Authentication","status":"done","epic":null,"feature":null,"story":null,"testplan":null,"estimate":"L","priority":"P0","severity":null,"okr":"OKR-2026-Q2-1","prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-03-02T09:00:00+01:00","started_at":"2026-03-04T09:30:00+01:00","completed_at":"2026-04-11T16:20:00+01:00","version":null,"ai_review":null,"file":"_00-Project-Management/30-Epics/EPIC-01-onboarding-authentication.md","bodyHtml":"<h1>EPIC-01 · Onboarding &amp; Authentication</h1>\n<h2>Goal</h2>\n<p>Let a new team sign up for TaskFlow, verify their identity, and reach an empty workspace in under two minutes. Authentication must be secure by default and support both email/password and federated sign-in so the smallest hurdle to adoption is removed.</p>\n<h2>Strategic linkage</h2>\n<ul>\n<li><strong>OKR:</strong> OKR-2026-Q2-1 — &quot;Reduce time-to-first-board for new TaskFlow teams.&quot; Authentication is the first gate every new user hits.</li>\n<li><strong>Why now:</strong> TaskFlow&#39;s private beta showed signup drop-off was the single largest funnel leak; collaboration features cannot be evaluated by users who never get an account.</li>\n<li><strong>Business outcome:</strong> Lift activation (signup → first board created) from 41% to 65%, and cut median signup completion time to under 120 seconds.</li>\n</ul>\n<h2>In scope</h2>\n<ul>\n<li>Email and password signup with verification.</li>\n<li>Secure session management.</li>\n<li>OAuth (Google) and enterprise SSO (SAML) sign-in.</li>\n<li>Password reset flow.</li>\n</ul>\n<h2>Out of scope</h2>\n<ul>\n<li>Multi-factor authentication (deferred to a later epic).</li>\n<li>Per-organisation role-based access control beyond owner/member.</li>\n<li>Social providers other than Google.</li>\n</ul>\n<h2>Success criteria</h2>\n<ul>\n<li>A new user can create an account and land in an empty workspace in under 120 seconds.</li>\n<li>100% of sessions are server-validated; no client-trusted auth state.</li>\n<li>OAuth and SAML sign-in both succeed end-to-end in staging.</li>\n</ul>\n<h2>Features</h2>\n<ul>\n<li><a href=\"../31-Features/EPIC-01/FEAT-01.1-email-password-signup.md\">FEAT-01.1 — Email &amp; password signup</a></li>\n<li><a href=\"../31-Features/EPIC-01/FEAT-01.2-oauth-sso.md\">FEAT-01.2 — OAuth &amp; SSO</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li><strong>Other epics:</strong> none</li>\n<li><strong>Infrastructure:</strong> Redis session store; transactional email provider.</li>\n<li><strong>External:</strong> Google OAuth client credentials; SAML metadata from pilot enterprise customer.</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> users, sessions</li>\n<li><strong>Writes:</strong> users, sessions, email_verifications</li>\n<li><strong>New schema:</strong> users, sessions, email_verifications, oauth_identities</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li><strong>Session fixation / hijacking</strong> — mitigation: server-side sessions in Redis, rotate session id on privilege change (see ADR-0002).</li>\n<li><strong>Email deliverability</strong> — mitigation: verified sending domain + retry queue.</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../40-Decisions/ADR-0002-store-sessions-in-redis.md\">ADR-0002 — Store sessions in Redis</a></li>\n</ul>\n","ageDays":84,"cycleDays":38}],"feature":[{"type":"feature","id":"FEAT-02.1","title":"Live cursors & presence","status":"in-progress","epic":"EPIC-02","feature":null,"story":null,"testplan":null,"estimate":"L","priority":null,"severity":null,"okr":null,"prd_section":null,"prd_refs":"—","mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-04T09:15:00+01:00","started_at":"2026-05-06T09:00:00+01:00","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/31-Features/EPIC-02/FEAT-02.1-live-cursors-presence.md","bodyHtml":"<h1>FEAT-02.1 · Live cursors &amp; presence</h1>\n<h2>Goal</h2>\n<p>Establish the realtime foundation for TaskFlow boards: a WebSocket session per board that broadcasts who is present and where their cursor is, with graceful reconnect.</p>\n<h2>User value</h2>\n<p>When teammates open the same board, they immediately see who else is here and where they are pointing — the board feels shared, not solo.</p>\n<h2>Scope</h2>\n<ul>\n<li>WebSocket gateway and per-board rooms.</li>\n<li>Presence join/leave with heartbeat and TTL eviction.</li>\n<li>Cursor position broadcast with per-user colour and label.</li>\n<li>Reconnect that restores presence without a page refresh.</li>\n<li>Blocked: cursor smoothing depends on a transport decision still being finalised.</li>\n</ul>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] Opening a board joins a WebSocket room scoped to that board.</li>\n<li>[ ] The presence list shows every connected user and updates within 1s of join/leave.</li>\n<li>[ ] Remote cursors render with the owner&#39;s colour and label within 200ms median.</li>\n<li>[ ] A dropped socket reconnects and restores presence within 5s.</li>\n<li>[ ] Cursor frames are throttled to at most 20 per second per user.</li>\n</ul>\n<h2>Stories</h2>\n<ul>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.01-websocket-gateway-board-rooms.md\">STORY-02.1.01 — WebSocket gateway &amp; board rooms</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.02-presence-join-leave-heartbeat.md\">STORY-02.1.02 — Presence join/leave &amp; heartbeat</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.03-cursor-broadcast-rendering.md\">STORY-02.1.03 — Cursor broadcast &amp; rendering</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.04-reconnect-handling.md\">STORY-02.1.04 — Reconnect handling</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.05-cursor-frame-throttling.md\">STORY-02.1.05 — Cursor frame throttling</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>Authenticated sessions from EPIC-01 (presence participants are identified users).</li>\n<li>WebSocket transport decision (ADR-0001).</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> users, boards, sessions</li>\n<li><strong>Writes:</strong> presence (Redis, ephemeral), board_activity</li>\n<li><strong>New schema / migration:</strong> none (presence is ephemeral in Redis)</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li>Cursor frame volume could overwhelm the gateway — mitigation: server-side throttle (STORY-02.1.05).</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../../40-Decisions/ADR-0001-use-websockets-over-sse-for-presence.md\">ADR-0001 — Use WebSockets over SSE for presence</a></li>\n</ul>\n","ageDays":21,"cycleDays":null},{"type":"feature","id":"FEAT-01.1","title":"Email & password signup","status":"done","epic":"EPIC-01","feature":null,"story":null,"testplan":null,"estimate":"M","priority":null,"severity":null,"okr":null,"prd_section":null,"prd_refs":"—","mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-03-04T09:30:00+01:00","started_at":"2026-03-05T09:00:00+01:00","completed_at":"2026-03-26T15:40:00+01:00","version":null,"ai_review":null,"file":"_00-Project-Management/31-Features/EPIC-01/FEAT-01.1-email-password-signup.md","bodyHtml":"<h1>FEAT-01.1 · Email &amp; password signup</h1>\n<h2>Goal</h2>\n<p>Deliver the baseline signup path for TaskFlow: a person enters an email and password, receives a verification email, confirms, and lands in a fresh workspace with a valid session.</p>\n<h2>User value</h2>\n<p>A new user can self-serve an account in under a minute without waiting on an invite or an admin.</p>\n<h2>Scope</h2>\n<ul>\n<li>Signup form with client and server validation.</li>\n<li>Password hashing and strength rules.</li>\n<li>Email verification with a single-use token.</li>\n<li>Session issued on verified signup.</li>\n</ul>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[x] A valid email + strong password creates an unverified account and sends a verification email.</li>\n<li>[x] Clicking the verification link activates the account and starts a session.</li>\n<li>[x] Weak or reused-format passwords are rejected with a clear message.</li>\n<li>[x] Duplicate email signups are rejected without leaking whether the email exists.</li>\n</ul>\n<h2>Stories</h2>\n<ul>\n<li><a href=\"../../32-Stories/EPIC-01/FEAT-01.1/STORY-01.1.01-signup-form-account-creation.md\">STORY-01.1.01 — Signup form and account creation</a></li>\n<li><a href=\"../../32-Stories/EPIC-01/FEAT-01.1/STORY-01.1.02-email-verification-flow.md\">STORY-01.1.02 — Email verification flow</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>Transactional email provider configured.</li>\n<li>Session store available (see ADR-0002).</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> users</li>\n<li><strong>Writes:</strong> users, email_verifications, sessions</li>\n<li><strong>New schema / migration:</strong> users, email_verifications</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li>Email deliverability delays could strand users mid-signup — mitigation: resend control and clear pending state.</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../../40-Decisions/ADR-0002-store-sessions-in-redis.md\">ADR-0002 — Store sessions in Redis</a></li>\n</ul>\n","ageDays":82,"cycleDays":21},{"type":"feature","id":"FEAT-01.2","title":"OAuth & SSO","status":"done","epic":"EPIC-01","feature":null,"story":null,"testplan":null,"estimate":"M","priority":null,"severity":null,"okr":null,"prd_section":null,"prd_refs":"—","mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-03-26T16:00:00+01:00","started_at":"2026-03-27T09:00:00+01:00","completed_at":"2026-04-11T16:20:00+01:00","version":null,"ai_review":null,"file":"_00-Project-Management/31-Features/EPIC-01/FEAT-01.2-oauth-sso.md","bodyHtml":"<h1>FEAT-01.2 · OAuth &amp; SSO</h1>\n<h2>Goal</h2>\n<p>Let users sign in with Google OAuth and let enterprise teams sign in via SAML SSO, so adoption is not gated on creating yet another password.</p>\n<h2>User value</h2>\n<p>A user can join their team&#39;s TaskFlow workspace with the identity they already use, and enterprise admins can enforce their own SSO policy.</p>\n<h2>Scope</h2>\n<ul>\n<li>Google OAuth 2.0 authorization-code sign-in.</li>\n<li>SAML 2.0 SP-initiated SSO for enterprise tenants.</li>\n<li>Account linking when an OAuth email matches an existing account.</li>\n</ul>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[x] A user can sign in with Google and reach their workspace.</li>\n<li>[x] A SAML assertion from a configured IdP signs the user in.</li>\n<li>[x] An OAuth login matching an existing verified email links rather than duplicates the account.</li>\n</ul>\n<h2>Stories</h2>\n<ul>\n<li><a href=\"../../32-Stories/EPIC-01/FEAT-01.2/STORY-01.2.01-google-oauth-signin.md\">STORY-01.2.01 — Google OAuth sign-in</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>Google OAuth client credentials provisioned.</li>\n<li>Sessions issued via the shared session store (ADR-0002).</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> users, oauth_identities</li>\n<li><strong>Writes:</strong> users, oauth_identities, sessions</li>\n<li><strong>New schema / migration:</strong> oauth_identities</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li>IdP metadata drift could break SAML — mitigation: scheduled metadata refresh.</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../../40-Decisions/ADR-0002-store-sessions-in-redis.md\">ADR-0002 — Store sessions in Redis</a></li>\n</ul>\n","ageDays":59,"cycleDays":15}],"story":[{"type":"story","id":"STORY-02.1.02","title":"Presence join/leave & heartbeat","status":"in-progress","epic":"EPIC-02","feature":"FEAT-02.1","story":null,"testplan":null,"estimate":"M","priority":"P0","severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"backend","decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-14T09:00:00+01:00","started_at":"2026-05-18T09:30:00+01:00","completed_at":"","version":null,"ai_review":"pending","file":"_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.02-presence-join-leave-heartbeat.md","bodyHtml":"<h1>STORY-02.1.02 · Presence join/leave &amp; heartbeat</h1>\n<h2>As</h2>\n<p>a TaskFlow user on a shared board</p>\n<h2>I want</h2>\n<p>to see who else is currently viewing the board</p>\n<h2>So that</h2>\n<p>I know which teammates are online before I make changes</p>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] Joining a board adds the user to the board&#39;s presence set.</li>\n<li>[ ] Leaving or disconnecting removes the user within 1s.</li>\n<li>[ ] A heartbeat keeps presence alive; a missed heartbeat evicts the user via TTL.</li>\n<li>[ ] The presence set is broadcast to the room on every change.</li>\n</ul>\n<h2>Technical notes</h2>\n<ul>\n<li><strong>Files touched:</strong> presence service, heartbeat scheduler, Redis presence keys.</li>\n<li><strong>Libraries:</strong> Redis client (sorted sets with TTL).</li>\n<li><strong>Pattern:</strong> reuse — builds on the gateway from STORY-02.1.01.</li>\n<li><strong>Gotchas:</strong> ungraceful disconnects must not leave stale presence; rely on TTL, not just leave events.</li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>STORY-02.1.01 (gateway and rooms).</li>\n</ul>\n<h2>References</h2>\n<ul>\n<li><strong>Feature:</strong> FEAT-02.1</li>\n<li><strong>PRD:</strong> —</li>\n<li><strong>Mockup:</strong> —</li>\n<li><strong>Related ADRs:</strong> ADR-0001</li>\n</ul>\n<h2>DoR checklist</h2>\n<ul>\n<li>[x] Paired TESTPLAN exists with every AC mapped to a TC</li>\n<li>[x] Every TC has a runnable <code>Command:</code> Claude can execute unattended</li>\n<li>[x] Dependencies done or scheduled</li>\n<li>[x] Estimate set</li>\n<li>[x] Risks section populated below</li>\n</ul>\n<h2>Risks / unknowns</h2>\n<ul>\n<li>Heartbeat interval vs eviction TTL tuning; under evaluation.</li>\n</ul>\n<h2>DoD checklist</h2>\n<ul>\n<li>[ ] All AC ticked above</li>\n<li>[ ] Paired TESTPLAN run; all TCs PASS (or FAIL linked to BUG)</li>\n<li>[ ] Project quality gates pass (lint / typecheck / tests / build)</li>\n<li>[ ] No new runtime errors on smoke</li>\n<li>[ ] If UI: visual contract tests green</li>\n<li>[ ] <strong>AI-code review</strong> complete</li>\n<li>[ ] Frontmatter updated: <code>status: done</code>, <code>completed_at</code> set</li>\n<li>[ ] <code>42-Monitor/MONITOR.md</code> updated</li>\n<li>[ ] ADRs created for any non-obvious decisions</li>\n<li>[ ] BACKLOG entry created for any new tech debt</li>\n</ul>\n","ageDays":11,"cycleDays":null},{"type":"story","id":"STORY-02.1.03","title":"Cursor broadcast & rendering","status":"ready","epic":"EPIC-02","feature":"FEAT-02.1","story":null,"testplan":null,"estimate":"M","priority":"P1","severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"frontend","decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-14T09:10:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":"pending","file":"_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.03-cursor-broadcast-rendering.md","bodyHtml":"<h1>STORY-02.1.03 · Cursor broadcast &amp; rendering</h1>\n<h2>As</h2>\n<p>a TaskFlow user on a shared board</p>\n<h2>I want</h2>\n<p>to see other people&#39;s cursors move in real time</p>\n<h2>So that</h2>\n<p>I can follow what my teammates are pointing at</p>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] Local cursor movement is published to the board room.</li>\n<li>[ ] Remote cursors render at the broadcast position with the owner&#39;s colour and label.</li>\n<li>[ ] A remote cursor disappears when its owner leaves the board.</li>\n<li>[ ] Cursor rendering stays smooth with up to 10 concurrent users.</li>\n</ul>\n<h2>Technical notes</h2>\n<ul>\n<li><strong>Files touched:</strong> board canvas client, cursor layer component, cursor message handler.</li>\n<li><strong>Libraries:</strong> none new.</li>\n<li><strong>Pattern:</strong> reuse — consumes the presence/room channel.</li>\n<li><strong>Gotchas:</strong> interpolate between frames so cursors do not jump.</li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>STORY-02.1.02 (presence identifies cursor owners).</li>\n</ul>\n<h2>References</h2>\n<ul>\n<li><strong>Feature:</strong> FEAT-02.1</li>\n<li><strong>PRD:</strong> —</li>\n<li><strong>Mockup:</strong> —</li>\n<li><strong>Related ADRs:</strong> ADR-0001</li>\n</ul>\n<h2>DoR checklist</h2>\n<ul>\n<li>[x] Paired TESTPLAN exists with every AC mapped to a TC</li>\n<li>[x] Every TC has a runnable <code>Command:</code> Claude can execute unattended</li>\n<li>[x] Dependencies done or scheduled</li>\n<li>[x] Estimate set</li>\n<li>[x] Risks section populated below</li>\n</ul>\n<h2>Risks / unknowns</h2>\n<ul>\n<li>Frame interpolation could feel laggy on slow connections; reviewed 2026-05-14.</li>\n</ul>\n<h2>DoD checklist</h2>\n<ul>\n<li>[ ] All AC ticked above</li>\n<li>[ ] Paired TESTPLAN run; all TCs PASS (or FAIL linked to BUG)</li>\n<li>[ ] Project quality gates pass (lint / typecheck / tests / build)</li>\n<li>[ ] No new runtime errors on smoke</li>\n<li>[ ] If UI: visual contract tests green</li>\n<li>[ ] <strong>AI-code review</strong> complete</li>\n<li>[ ] Frontmatter updated: <code>status: done</code>, <code>completed_at</code> set</li>\n<li>[ ] <code>42-Monitor/MONITOR.md</code> updated</li>\n<li>[ ] ADRs created for any non-obvious decisions</li>\n<li>[ ] BACKLOG entry created for any new tech debt</li>\n</ul>\n","ageDays":11,"cycleDays":null},{"type":"story","id":"STORY-02.1.05","title":"Cursor frame throttling","status":"blocked","epic":"EPIC-02","feature":"FEAT-02.1","story":null,"testplan":null,"estimate":"S","priority":"P2","severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"backend","decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-14T09:30:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":"pending","file":"_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.05-cursor-frame-throttling.md","bodyHtml":"<h1>STORY-02.1.05 · Cursor frame throttling</h1>\n<h2>As</h2>\n<p>the TaskFlow platform team</p>\n<h2>I want</h2>\n<p>to cap how many cursor frames a client can broadcast per second</p>\n<h2>So that</h2>\n<p>a single noisy client cannot overwhelm the gateway</p>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] Cursor frames from a client are throttled to at most 20 per second server-side.</li>\n<li>[ ] Excess frames are coalesced to the latest position, not dropped silently to a stale one.</li>\n<li>[ ] Throttling adds no more than 50ms of perceived cursor latency.</li>\n</ul>\n<h2>Technical notes</h2>\n<ul>\n<li><strong>Files touched:</strong> gateway message ingress, per-connection rate limiter.</li>\n<li><strong>Libraries:</strong> none new.</li>\n<li><strong>Pattern:</strong> reuse — extends the gateway ingress path.</li>\n<li><strong>Gotchas:</strong> <strong>Blocked</strong> — the cursor message schema is not final until STORY-02.1.03 lands, so the throttle key cannot be defined yet.</li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>STORY-02.1.03 (cursor message schema must be finalised first). This dependency is why the story is <code>blocked</code>.</li>\n</ul>\n<h2>References</h2>\n<ul>\n<li><strong>Feature:</strong> FEAT-02.1</li>\n<li><strong>PRD:</s nge.</p>\n<h2>Preconditions</h2>\n<ul>\n<li>Repo at project root, branch <code>main</code>.</li>\n<li>Runtime: Node 20.</li>\n<li>Required services running: Redis, the realtime gateway.</li>\n<li>Required env vars: <code>REDIS_URL</code>, <code>WS_PORT</code>, <code>PRESENCE_TTL_MS</code>.</li>\n<li>Test data / fixtures: two authenticated sessions on one board.</li>\n</ul>\n<h2>Acceptance criteria → Test case map</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>#</th><th>Acceptance criterion (verbatim from story)</th><th>Test case</th></tr></thead><tbody><tr><td>AC-1</td><td>Joining a board adds the user to the board&#39;s presence set.</td><td>TC-01</td></tr><tr><td>AC-2</td><td>Leaving or disconnecting removes the user within 1s.</td><td>TC-02</td></tr><tr><td>AC-3</td><td>A heartbeat keeps presence alive; a missed heartbeat evicts the user via TTL.</td><td>TC-03</td></tr><tr><td>AC-4</td><td>The presence set is broadcast to the room on every change.</td><td>TC-04</td></tr></tbody></table></div>\n<h2>Test cases</h2>\n<h3>TC-01 · Join adds to presence set</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-1</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/presence.join.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the user id appears in the board presence set after join.</li>\n<li><strong>Result:</strong> PASS</li>\n</ul>\n<h3>TC-02 · Leave/disconnect removes within 1s</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-2</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/presence.leave.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the user is gone from the set within 1s of disconnect.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-03 · Heartbeat keep-alive and TTL eviction</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-3</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/presence.heartbeat.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; presence persists while heartbeats arrive and is evicted after a missed interval.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-04 · Presence set broadcast on change</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-4</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/presence.broadcast.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; every membership change emits an updated presence list to the room.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h2>Code review checklist</h2>\n<ul>\n<li>[ ] Every story AC implemented</li>\n<li>[ ] No security regressions</li>\n<li>[ ] No performance regressions</li>\n<li>[ ] Lint clean</li>\n<li>[ ] Build clean</li>\n<li>[ ] Tests green</li>\n<li>[ ] No suppressed lint rules without justification</li>\n<li>[ ] Error paths covered (not just happy path)</li>\n<li>[ ] Logging / observability hooks added where exceptions can fire</li>\n<li>[ ] Documentation updated if behaviour contract changed</li>\n</ul>\n<h2>Risks / edge cases</h2>\n<ul>\n<li>Ungraceful disconnect leaving stale presence if TTL is too long.</li>\n<li>Heartbeat flooding under many tabs from one user.</li>\n</ul>\n<h2>Sign-off</h2>\n<ul>\n<li>Code review: <em>pending</em></li>\n<li>All tests passed: <em>pending</em></li>\n<li>Date completed: &#39;&#39;</li>\n</ul>\n","ageDays":11,"cycleDays":null},{"type":"testplan","id":"TESTPLAN-02.1.03","title":"Test Plan — Cursor broadcast & rendering","status":"ready","epic":"EPIC-02","feature":"FEAT-02.1","story":"STORY-02.1.03","testplan":null,"estimate ursor resync without duplicate cursors.</p>\n<h2>Preconditions</h2>\n<ul>\n<li>Repo at project root, branch <code>main</code>.</li>\n<li>Runtime: Node 20; headless browser for e2e.</li>\n<li>Required services running: Redis, the realtime gateway, the web app.</li>\n<li>Required env vars: <code>REDIS_URL</code>, <code>WS_PORT</code>, <code>APP_URL</code>.</li>\n<li>Test data / fixtures: a board session and a network-fault injector.</li>\n</ul>\n<h2>Acceptance criteria → Test case map</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>#</th><th>Acceptance criterion (verbatim from story)</th><th>Test case</th></tr></thead><tbody><tr><td>AC-1</td><td>A dropped WebSocket reconnects automatically with exponential backoff.</td><td>TC-01</td></tr><tr><td>AC-2</td><td>Presence is re-established within 5s of reconnecting.</td><td>TC-02</td></tr><tr><td>AC-3</td><td>Cursor state resyncs after reconnect without duplicate cursors.</td><td>TC-03</td></tr></tbody></table></div>\n<h2>Test cases</h2>\n<h3>TC-01 · Auto-reconnect with backoff</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-1</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/reconnect.backoff.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the client retries with increasing, jittered intervals after a drop.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-02 · Presence re-established within 5s</h3>\n<ul>\n<li><strong>Type:</strong> e2e</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-2</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/reconnect.presence.e2e.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the user reappears in presence within 5s of the connection restoring.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-03 · No duplicate cursors after resync</h3>\n<ul>\n<li><strong>Type:</strong> e2e</li>\n<li><strong>Priority:</strong> P2</li>\n<li><strong>Maps to:</strong> AC-3</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- realtime/reconnect.cursor-resync.e2e.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; exactly one cursor per remote user after reconnect.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h2>Code review checklist</h2>\n<ul>\n<li>[ ] Every story AC implemented</li>\n<li>[ ] No security regressions</li>\n<li>[ ] No performance regressions</li>\n<li>[ ] Lint clean</li>\n<li>[ ] Build clean</li>\n<li>[ ] Tests green</li>\n<li>[ ] No suppressed lint rules without justification</li>\n<li>[ ] Error paths covered (not just happy path)</li>\n<li>[ ] Logging / observability hooks added where exceptions can fire</li>\n<li>[ ] Documentation updated if behaviour contract changed</li>\n</ul>\n<h2>Risks / edge cases</h2>\n<ul>\n<li>Reconnect storm on a server restart.</li>\n<li>Duplicate presence entries if the old socket evicts late.</li>\n</ul>\n<h2>Sign-off</h2>\n<ul>\n<li>Code review: <em>pending</em></li>\n<li>All tests passed: <em>pending</em></li>\n<li>Date completed: &#39;&#39;</li>\n</ul>\n","ageDays":11,"cycleDays":null},{"type":"testplan","id":"TESTPLAN-01.1.01","title":"Test Plan — Signup form and account creation","status":"done","epic":"EPIC-01","feature":"FEAT-01.1","story":"STORY-01.1.01","testplan":null,"estimate":null,"priority":null,"severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-03-05T09:00:00+01:00","started_at":"2026-03-11T09:00:00+01:00","completed_at":"2026-03-12T17:00:00+01:00","version":null,"ai_review":null,"file":"_00-Project-Management/33-Testplans/EPIC-01/FEAT-01.1/TESTPLAN-01.1.01-signup-form-account-creation.md","bodyHtml":"<h1>TESTPLAN-01.1.01 · Signup form and account creation</h1>\n<h2>Source story</h2>\n<p><code>_00-Project-Management/32-Stories/EPIC-01/FEAT-01.1/STORY-01.1.01-signup-form-account-creation.md</code></p>\n<h2>Scope</h2>\n<p>Verifies that the signup endpoint creates accounts with hashed passwords, rejects duplicates without enumeration, and enforces password strength. Does not cover email verification (TESTPLAN-01.1.02).</p>\n<h2>Preconditions</h2>\n<ul>\n<li>Repo at project root, branch <code>main</code>.</li>\n<li>Runtime: Node 20.</li>\n<li>Dev URL / port: see <code>PROJECT-CONTEXT.md</code>.</li>\n<li>Required services running: Postgres, Redis.</li>\n<li>Required env vars: <code>DATABASE_URL</code>, <code>REDIS_URL</code>.</li>\n<li>Test data / fixtures: a seeded existing user <code>taken@taskflow.test</code>.</li>\n</ul>\n<h2>Acceptance criteria → Test case map</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>#</th><th>Acceptance criterion (verbatim from story)</th><th>Test case</th></tr></thead><tbody><tr><td>AC-1</td><td>A valid email and strong password creates an account record with a hashed password.</td><td>TC-01</td></tr><tr><td>AC-2</td><td>The password is never stored or logged in plaintext.</td><td>TC-02</td></tr><tr><td>AC-3</td><td>A duplicate email returns a generic error that does not reveal account existence.</td><td>TC-03</td></tr><tr><td>AC-4</td><td>A weak password is rejected with a clear message.</td><td>TC-04</td></tr></tbody></table></div>\n<h2>Test cases</h2>\n<h3>TC-01 · Valid signup creates hashed account</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-1</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- auth/signup.create.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; a users row exists with an argon2 hash, not the raw password.</li>\n<li><strong>Result:</strong> PASS</li>\n</ul>\n plicate and success paths could enable enumeration.</li>\n<li>Unicode normalisation in email comparison.</li>\n</ul>\n<h2>Sign-off</h2>\n<ul>\n<li>Code review: PASS</li>\n<li>All tests passed: PASS</li>\n<li>Date completed: &#39;2026-03-12&#39;</li>\n</ul>\n","ageDays":81,"cycleDays":1},{"type":"testplan","id":"TESTPLAN-01.1.02","title":"Test Plan — Email verification flow","status":"done","epic":"EPIC-01","feature":"FEAT-01.1","story":"STORY-01.1.02","testplan":null,"estimate":null,"priority":null,"severity":null,"okr":null,"prd_section":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-03-12T09:00:00+01:00","started_at":"2026-03-25T09:00:00+01:00","completed_at":"2026-03-26T15:40:00+01:00","version":null,"ai_review":null,"file":"_00-Project-Management/33-Testplans/EPIC-01/FEAT-01.1/TESTPLAN-01.1.02-email-verification-flow.md","bodyHtml":"<h1>TESTPLAN-01.1.02 · Email verification flow</h1>\n<h2>Source story</h2>\n<p><code>_00-Project-Management/32-Stories/EPIC-01/FEAT-01.1/STORY-01.1.02-email-verification-flow.md</code></p>\n<h2>Scope</h2>\n<p>Verifies that verification tokens are sent, single-use, and activate the account on use, and that expired or reused tokens are handled gracefully.</p>\n<h2>Preconditions</h2>\n<ul>\n<li>Repo at project root, branch <code>main</code>.</li>\n<li>Runtime: Node 20.</li>\n<li>Required services running: Postgres, Redis, a mock mailer.</li>\n<li>Required env vars: <code>DATABASE_URL</code>, <code>REDIS_URL</code>, <code>MAILER_URL</code>.</li>\n<li>Test data / fixtures: an unverified account from signup.</li>\n</ul>\n<h2>Acceptance criteria → Test case map</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>#</th><th>Acceptance criterion (verbatim from story)</th><th>Test case</th></tr></thead><tbody><tr><td>AC-1</td><td>Account creation sends a verification email containing a single-use token.</td><td>TC-01</td></tr><tr><td>AC-2</td><td>Visiting a valid token activates the account and issues a session.</td><td>TC-02</td></tr><tr><td>AC-3</td><td>An expired or already-used token returns a clear error and offers to resend.</td><td>TC-03</td></tr></tbody></table></div>\n<h2>Test cases</h2>\n<h3>TC-01 · Verification email contains a single-use token</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-1</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- auth/verify.email-sent.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the mock mailer received one message with a token that exists in <code>email_verifications</code>.</li>\n<li><strong>Result:</strong> PASS</li>\n</ul>\n<h3>TC-02 · Valid token activates and starts a session</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-2</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- auth/verify.activate.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; account becomes verified and a session cookie is set.</li>\n<li><strong>Result:</strong> PASS</li>\n</ul>\n<h3>TC-03 · Expired/reused token rejected with resend</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-3</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   npm test -- auth/verify.expired.test.js   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; reused or expired token returns 410 with a resend option.</li>\n<li><strong>Result:</strong> PASS</li>\n</ul>\n<h2>Code review checklist</h2>\n<ul>\n<li>[x] Every story AC implemented</li>\n<li>[x] No security regressions</li>\n<li>[x] No performance regressions</li>\n<li>[x] Lint clean</li>\n<li>[x] Build clean</li>\n<li>[x] Tests green</li>\n<li>[x] No supp
