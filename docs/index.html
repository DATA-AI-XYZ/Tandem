lifecycle stages that are skill-driven from 50% to 100%, and cut the rate of stories that fail Definition of Ready on first check.</li>\n</ul>\n<h2>In scope</h2>\n<ul>\n<li>Strategy skills: draft OKRs from the North Star, draft a PRD from an OKR or notes.</li>\n<li>Decomposition skills: split an epic into features, split a feature into stories.</li>\n<li>Pairing rule: every story created with its same-id testplan in the same step.</li>\n<li>Execution and close-out skills that enforce DoR on entry and DoD on exit.</li>\n</ul>\n<h2>Out of scope</h2>\n<ul>\n<li>The Command Center dashboard and its rendering (EPIC-02).</li>\n<li>The public release pipeline and its scrub gate (EPIC-02).</li>\n<li>Multi-project portfolio roll-ups.</li>\n</ul>\n<h2>Success criteria</h2>\n<ul>\n<li>Every lifecycle stage from North Star to Done is reachable by invoking a skill.</li>\n<li>A story can never be created without its paired testplan.</li>\n<li>A status flip is rejected when the matching gate (DoR/DoD) is not satisfied.</li>\n</ul>\n<h2>Features</h2>\n<ul>\n<li><a href=\"../31-Features/EPIC-01/FEAT-01.1-strategy-decomposition-skills.md\">FEAT-01.1 — Strategy &amp; decomposition skills</a></li>\n<li><a href=\"../31-Features/EPIC-01/FEAT-01.2-story-testplan-pairing-gates.md\">FEAT-01.2 — Story-testplan pairing &amp; gates</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li><strong>Other epics:</strong> none</li>\n<li><strong>Infrastructure:</strong> the artefact templates and the frontmatter contract the skills write against.</li>\n<li><strong>External:</strong> none.</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> strategy artefacts, templates</li>\n<li><strong>Writes:</strong> epics, features, stories, testplans</li>\n<li><strong>New schema:</strong> the closed-set status enum and frontmatter relationship fields the skills populate</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li><strong>Skills drift from the templates</strong> — mitigation: skills write from the canonical template, and the frontmatter validator enforces the contract (see ADR-0002).</li>\n<li><strong>A story is created without a testplan</strong> — mitigation: the split-into-stories skill aborts unless it can emit both artefacts in one response.</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../40-Decisions/ADR-0002-enforce-story-testplan-pairing.md\">ADR-0002 — Story-testplan pairing is enforced at creation</a></li>\n</ul>\n","ageDays":100,"cycleDays":38},"features":[{"feature":{"type":"feature","id":"FEAT-01.1","title":"Strategy & decomposition skills","status":"done","epic":"EPIC-01","feature":null,"story":null,"testplan":null,"estimate":"M","priority":null,"severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":"—","mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-03-04T09:30:00+01:00","started_at":"2026-03-05T09:00:00+01:00","completed_at":"2026-03-26T15:40:00+01:00","version":null,"ai_review":null,"file":"_00-Project-Management/31-Features/EPIC-01/FEAT-01.1-strategy-decomposition-skills.md","bodyHtml":"<h1>FEAT-01.1 · Strategy &amp; decomposition skills</h1>\n<h2>Goal</h2>\n<p>Deliver the top of Tandem&#39;s lifecycle as runnable skills: draft quarterly OKRs from the North Star, then decompose an epic into features. A builder turns strategy into a structured plan by invoking a command, with strategic linkage carried in frontmatter so nothing floats free of an objective.</p>\n<h2>User value</h2>\n<p>A builder can go from a North Star to a linked OKR set and a decomposed epic in minutes, without copying a template or hand-wiring the OKR → Epic → Feature references.</p>\n<h2>Scope</h2>\n<ul>\n<li>A draft-OKRs skill that reads the North Star and writes a linked OKR set.</li>\n<li>A split-into-features skill that reads an epic and writes feature files under it.</li>\n<li>Mandatory strategic linkage (<code>okr:</code> / <code>prd_section:</code>) enforced on every epic.</li>\n<li>Cross-reference integrity: features point back at their epic.</li>\n</ul>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[x] Invoking the draft-OKRs skill produces an OKR set linked to the North Star.</li>\n<li>[x] Invoking the split-into-features skill writes feature files that reference their parent epic.</li>\n<li>[x] An epic without <code>okr:</code> or <code>prd_section:</code> is rejected by the validator.</li>\n<li>[x] Every generated feature carries a valid <code>epic:</code> field that resolves to an existing epic.</li>\n</ul>\n<h2>Stories</h2>\n<ul>\n<li><a href=\"../../32-Stories/EPIC-01/FEAT-01.1/STORY-01.1.01-draft-okrs-skill.md\">STORY-01.1.01 — Draft OKRs skill</a></li>\n<li><a href=\"../../32-Stories/EPIC-01/FEAT-01.1/STORY-01.1.02-split-into-features-skill.md\">STORY-01.1.02 — Split-into-features skill</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>The artefact templates the skills write from.</li>\n<li>The frontmatter validator that enforces strategic linkage.</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> North Star, epics, templates</li>\n<li><strong>Writes:</strong> OKR sets, feature files</li>\n<li><strong>New schema / migration:</strong> the <code>okr:</code> / <code>prd_section:</code> linkage contract</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li>A skill could emit a feature that references a non-existent epic — mitigation: validator rule R12 fails the build on a dangling <code>epic:</code>.</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../../40-Decisions/ADR-0002-enforce-story-testplan-pairing.md\">ADR-0002 — Story-testplan pairing is enforced at creation</a></li>\n</ul>\n","ageDays":98,"cycleDays":21},"stories":[{"type":"story","id":"STORY-01.1.01","title":"Draft OKRs skill","status":"done","epic":"EPIC-01","feature":"FEAT-01.1","story":null,"testplan":null,"estimate":"M","priority":"P0","severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_ cceptance criteria</h2>\n<ul>\n<li>[x] Creating a story always produces a testplan with the matching id in the same step.</li>\n<li>[x] A story cannot enter in-progress until its DoR checklist passes.</li>\n<li>[x] A story cannot enter done until its paired testplan is run and DoD passes.</li>\n<li>[x] The validator flags any story whose paired testplan is missing.</li>\n</ul>\n<h2>Stories</h2>\n<ul>\n<li><a href=\"../../32-Stories/EPIC-01/FEAT-01.2/STORY-01.2.01-split-into-stories-paired-testplan.md\">STORY-01.2.01 — Split-into-stories skill with paired testplan</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>The story and testplan templates.</li>\n<li>The frontmatter validator (pairing rule R6).</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> features, stories, testplans</li>\n<li><strong>Writes:</strong> stories, testplans</li>\n<li><strong>New schema / migration:</strong> the Story↔Testplan id-pairing contract</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li>A renamed story file could orphan its testplan — mitigation: validator R6 resolves the testplan at the mirrored path by id, independent of slug.</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../../40-Decisions/ADR-0002-enforce-story-testplan-pairing.md\">ADR-0002 — Story-testplan pairing is enforced at creation</a></li>\n</ul>\n","ageDays":76,"cycleDays":15},"stories":[{"type":"story","id":"STORY-01.2.01","title":"Split-into-stories skill with paired testplan","status":"done","epic":"EPIC-01","feature":"FEAT-01.2","story":null,"testplan":null,"estimate":"M","priority":"P0","severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"automation","decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-03-27T09:00:00+01:00","started_at":"2026-03-30T09:00:00+01:00","completed_at":"2026-04-11T16:20:00+01:00","version":null,"ai_review":"completed-2026-04-11 erences</h2>\n<ul>\n<li><strong>Feature:</strong> FEAT-02.1</li>\n<li><strong>PRD:</strong> —</li>\n<li><strong>Mockup:</strong> —</li>\n<li><strong>Related ADRs:</strong> ADR-0001</li>\n</ul>\n<h2>DoR checklist</h2>\n<ul>\n<li>[x] Paired TESTPLAN exists with every AC mapped to a TC</li>\n<li>[x] Every TC has a runnable <code>Command:</code> Claude can execute unattended</li>\n<li>[ ] Dependencies done or scheduled</li>\n<li>[x] Estimate set</li>\n<li>[x] Risks section populated below</li>\n</ul>\n<h2>Risks / unknowns</h2>\n<ul>\n<li>An over-tight allowlist could block legitimate content; the scrub report must make false positives easy to spot. Blocked pending STORY-02.1.03.</li>\n</ul>\n<h2>DoD checklist</h2>\n<ul>\n<li>[ ] All AC ticked above</li>\n<li>[ ] Paired TESTPLAN run; all TCs PASS (or FAIL linked to BUG)</li>\n<li>[ ] Project quality gates pass (lint / tests / build)</li>\n<li>[ ] No new runtime errors on smoke</li>\n<li>[ ] If UI: visual contract tests green</li>\n<li>[ ] <strong>AI-code review</strong> complete</li>\n<li>[ ] Frontmatter updated: <code>status: done</code>, <code>completed_at</code> set</li>\n<li>[ ] <code>42-Monitor/MONITOR.md</code> updated</li>\n<li>[ ] ADRs created for any non-obvious decisions</li>\n<li>[ ] BACKLOG entry created for any new tech debt</li>\n</ul>\n","ageDays":27,"cycleDays":null,"_type":"story"}],"stale":[{"type":"epic","id":"EPIC-02","title":"Command Center & governance gates","status":"in-progress","epic":null,"feature":null,"story":null,"testplan":null,"estimate":"XL","priority":"P0","severity":null,"okr":"OKR-2026-Q2-1","prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-04-20T10:00:00+01:00","started_at":"2026-05-04T09:15:00+01:00","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/30-Epics/EPIC-02-command-center-governance.md","bodyHtml":"<h1>EPIC-02 · Command Center &amp; governance gates</h1>\n<h2>Goal</h2>\n<p>Give the builder one always-current board — the Command Center — rendered directly from the lifecycle artefacts, plus the governance gates that keep that board honest: closed-set status, an allowlist release scrub for the public build, and a dashboard that regenerates on every status change. The first slice delivers the dashboard generator and the scrub-gated public release so the plan can never drift and can be shown in public safely.</p>\n<h2>Strategic linkage</h2>\n<ul>\n<li><strong>OKR:</strong> OKR-2026-Q2-1 — &quot;Raise the share of work that closes the full lifecycle loop with all gates green.&quot; A board you cannot trust breaks the loop; governance gates make the loop verifiable.</li>\n<li><strong>Why now:</strong> the lifecycle skills shipped (EPIC-01), so artefacts now flow; the next lever is making the rolled-up view trustworthy and the public demo safe to publish.</li>\n<li><strong>Business outcome:</strong> lift the share of loops that close with all gates green from 35% to 70%, and drive dashboard-to-artefact drift incidents to zero.</li>\n</ul>\n<h2>In scope</h2>\n<ul>\n<li>A dashboard generator that renders the Command Center from the artefacts.</li>\n<li>Regeneration of the board on every status change so it never goes stale.</li>\n<li>An allowlist-first release scrub that gates the public build.</li>\n<li>Internally-consistent rollups and counts on the board.</li>\n</ul>\n<h2>Out of scope</h2>\n<ul>\n<li>Editing artefacts from inside the dashboard (the dashboard is read-only).</li>\n<li>Multi-project portfolio views.</li>\n<li>Real-time multi-user board collaboration.</li>\n</ul>\n<h2>Success criteria</h2>\n<ul>\n<li>The Command Center matches the artefacts on disk with zero drift after any status change.</li>\n<li>The board regenerates within 10 seconds of a status flip.</li>\n<li>The public release build fails closed if any denylisted token survives the scrub.</li>\n</ul>\n<h2>Features</h2>\n<ul>\n<li><a href=\"../31-Features/EPIC-02/FEAT-02.1-command-center-public-release.md\">FEAT-02.1 — Command Center &amp; public release scrub</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li><strong>Other epics:</strong> EPIC-01 (the lifecycle skills produce the artefacts the board renders).</li>\n<li><strong>Infrastructure:</strong> the dashboard generator script; the public release pipeline.</li>\n<li><strong>External:</strong> none.</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> epics, features, stories, testplans, decisions</li>\n<li><strong>Writes:</strong> the rendered Command Center HTML; the public release output</li>\n<li><strong>New schema:</strong> the rollup/counts contract the generator computes from artefacts</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li><strong>Over-aggressive scrub</strong> — mitigation: allowlist-first design with an explicit, reviewable token list (see ADR-0001).</li>\n<li><strong>Stale board after a status change</strong> — mitigation: regenerate the dashboard in the same step as the status flip.</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../40-Decisions/ADR-0001-allowlist-not-denylist-release-scrub.md\">ADR-0001 — Allowlist, not denylist, for the public release scrub</a></li>\n</ul>\n","ageDays":51,"cycleDays":null,"_type":"epic","_ageDays":37},{"type":"feature","id":"FEAT-02.1","title":"Command Center & public release scrub","status":"in-progress","epic":"EPIC-02","feature":null,"story":null,"testplan":null,"estimate":"L","priority":null,"severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":"—","mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-04T09:15:00+01:00","started_at":"2026-05-06T09:00:00+01:00","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/31-Features/EPIC-02/FEAT-02.1-command-center-public-release.md","bodyHtml":"<h1>FEAT-02.1 · Command Center &amp; public release scrub</h1>\n<h2>Goal</h2>\n<p>Establish the trustworthy-board foundation for Tandem: a dashboard generator that renders the Command Center from the lifecycle artefacts, regeneration on every status change so it never goes stale, and an allowlist-first scrub that gates the public release build so the demo can be shown safely.</p>\n<h2>User value</h2>\n<p>The builder opens one board that is always true to the artefacts, and can publish a public demo of it without leaking any internal detail.</p>\n<h2>Scope</h2>\n<ul>\n<li>A dashboard generator that walks the artefacts and renders the Command Center.</li>\n<li>Rollup and counts computed from the artefacts, kept internally consistent.</li>\n<li>Regeneration hooked to every status change.</li>\n<li>An allowlist-first release scrub that fails the build on any denylisted token.</li>\n<li>A path-free external-root render mode for the public demo.</li>\n<li>Blocked: the public AI-catalogue tab depends on a catalogue contract still being finalised.</li>\n</ul>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] The generator renders the Command Center from the artefacts with zero drift.</li>\n<li>[ ] Rollup and counts on the board match the underlying artefacts exactly.</li>\n<li>[ ] A status change regenerates the board within 10 seconds.</li>\n<li>[ ] The public build fails closed if any denylisted token survives the scrub.</li>\n<li>[ ] External-root render mode produces a path-free public demo.</li>\n</ul>\n<h2>Stories</h2>\n<ul>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.01-dashboard-generator-renders-board.md\">STORY-02.1.01 — Dashboard generator renders the board</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.02-regenerate-on-status-change.md\">STORY-02.1.02 — Regenerate on status change</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.03-consistent-rollup-counts.md\">STORY-02.1.03 — Internally consistent rollup &amp; counts</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.04-external-root-render-mode.md\">STORY-02.1.04 — External-root render mode for the public demo</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.05-allowlist-release-scrub-gate.md\">STORY-02.1.05 — Allowlist release scrub gate</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>The lifecycle artefacts produced by EPIC-01 (the board renders from them).</li>\n<li>The release-scrub policy decision (ADR-0001).</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> epics, features, stories, testplans, decisions</li>\n<li><strong>Writes:</strong> the rendered Command Center HTML; the public release output</li>\n<li><strong>New schema / migration:</strong> none (the board is derived from existing artefacts)</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li>A denylisted token could survive to the public build — mitigation: allowlist-first scrub that fails closed (STORY-02.1.05).</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../../40-Decisions/ADR-0001-allowlist-not-denylist-release-scrub.md\">ADR-0001 — Allowlist, not denylist, for the public release scrub</a></li>\n</ul>\n","ageDays":37,"cycleDays":null,"_type":"feature","_ageDays":35},{"type":"backlog","id":"BACKLOG-0001","title":"Collapse completed epics on the Command Center when the board gets long","status":"not-started","epic":null,"feature":null,"story":null,"testplan":null,"estimate":"S","priority":"P2","severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"automation","decisions":[],"related":["STORY-02.1.01","EPIC-02"],"decision":null,"context_story":null,"discovered_in":null,"captured_from":"STORY-02.1.01 — the board grows unbounded as epics accumulate","created_at":"2026-05-12T14:20:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/11-Backlog/BACKLOG-0001-dashboard-epic-collapse.md","bodyHtml":"<h1>BACKLOG-0001 · Collapse completed epics on the Command Center when the board gets long</h1>\n<h2>Why this exists</h2>\n<p>The Command Center renders every epic in full, in order. Once several epics are <code>done</code>, the board scrolls a long way before reaching active work. Today it renders flat; the better behaviour is to collapse fully-shipped epics into a one-line summary the reader can expand.</p>\n<h2>Why backlog (not blocker)</h2>\n<p>Projects rarely have more than a handful of epics today, so the long board is mildly annoying, not blocking. It only bites at the scale we are *trying* to reach, which is why it is worth tracking but not urgent.</p>\n<h2>Work tranches</h2>\n<h3>Tranche A — Collapse rule (estimate: S)</h3>\n<ul>\n<li>[ ] Render fully-shipped epics as a collapsed one-line summary.</li>\n<li>[ ] Keep in-progress and blocked epics expanded by default.</li>\n</ul>\n<h3>Tranche B — Expand control (estimate: S)</h3>\n<ul>\n<li>[ ] Add an expand/collapse control per epic in the rendered board.</li>\n<li>[ ] Remember the chosen state across regenerations where the renderer allows.</li>\n</ul>\n<h2>Acceptance — when this can be marked done</h2>\n<ul>\n<li>The board stays scannable regardless of how many epics have shipped.</li>\n<li>Completed epics remain fully reachable via expand.</li>\n</ul>\n<h2>Promotion criteria</h2>\n<ul>\n<li>When a project regularly carries 6+ epics, or before the public demo ships.</li>\n</ul>\n<h2>Related</h2>\n<ul>\n<li>STORY-02.1.01, EPIC-02</li>\n</ul>\n","ageDays":29,"cycleDays":null,"_type":"backlog","_ageDays":29},{"type":"story","id":"STORY-02.1.03","title":"Internally consistent rollup & counts","status":"ready","epic":"EPIC-02","feature":"FEAT-02.1","story":null,"testplan":null,"estimate":"M","priority":"P1","severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"automation","decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-14T09:10:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":"pending","file":"_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.03-consistent-rollup-counts.md","bodyHtml":"<h1>STORY-02.1.03 · Internally consistent rollup &amp; counts</h1>\n<h2>As</h2>\n<p>a builder scanning the Command Center</p>\n<h2>I want</h2>\n<p>the per-epic rollup and the counts snapshot to agree with each other</p>\n<h2>So that</h2>\n<p>I can trust a single glance at the board to tell me where the work stands</p>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] Per-epic shipped/total counts are computed from the stories, not entered by hand.</li>\n<li>[ ] The counts snapshot totals equal the sum of the per-epic rollup rows.</li>\n<li>[ ] The overall progress bar matches the shipped/total story count exactly.</li>\n<li>[ ] A story in any status is counted in exactly one bucket.</li>\n</ul>\n<h2>Technical notes</h2>\n<ul>\n<li><strong>Files touched:</strong> the rollup computation in the generator, the counts renderer.</li>\n<li><strong>Libraries:</strong> none new.</li>\n<li><strong>Pattern:</strong> reuse — consumes the artefact walk from STORY-02.1.01.</li>\n<li><strong>Gotchas:</strong> a story counted in two buckets (e.g. both &quot;open&quot; and &quot;blocked&quot;) would make totals disagree; bucket assignment must be exclusive.</li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>STORY-02.1.01 (the artefact walk produces the data the rollup aggregates).</li>\n</ul>\n<h2>References</h2>\n<ul>\n<li><strong>Feature:</strong> FEAT-02.1</li>\n<li><strong>PRD:</strong> —</li>\n<li><strong>Mockup:</strong> —</li>\n<li><strong>Related ADRs:</strong> ADR-0001</li>\n</ul>\n<h2>DoR checklist</h2>\n<ul>\n<li>[x] Paired TESTPLAN exists with every AC mapped to a TC</li>\n<li>[x] Every TC has a runnable <code>Command:</code> Claude can execute unattended</li>\n<li>[x] Dependencies done or scheduled</li>\n<li>[x] Estimate set</li>\n<li>[x] Risks section populated below</li>\n</ul>\n<h2>Risks / unknowns</h2>\n<ul>\n<li>Bucket definitions could drift from the status enum if the enum grows; reviewed 2026-05-14.</li>\n</ul>\n<h2>DoD checklist</h2>\n<ul>\n<li>[ ] All AC ticked above</li>\n<li>[ ] Paired TESTPLAN run; all TCs PASS (or FAIL linked to BUG)</li>\n<li>[ ] Project quality gates pass (lint / tests / build)</li>\n<li>[ ] No new runtime errors on smoke</li>\n<li>[ ] If UI: visual contract tests green</li>\n<li>[ ] <strong>AI-code review</strong> complete</li>\n<li>[ ] Frontmatter updated: <code>status: done</code>, <code>completed_at</code> set</li>\n<li>[ ] <code>42-Monitor/MONITOR.md</code> updated</li>\n<li>[ ] ADRs created for any non-obvious decisions</li>\n<li>[ ] BACKLOG entry created for any new tech debt</li>\n</ul>\n","ageDays":27,"cycleDays":null,"_type":"story","_ageDays":27},{"type":"story","id":"STORY-02.1.05","title":"Allowlist release scrub gate","status":"blocked","epic":"EPIC-02","feature":"FEAT-02.1","story":null,"testplan":null,"estimate":"S","priority":"P2","severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"infra","decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-14T09:30:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":"pending","file":"_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.05-allowlist-release-scrub-gate.md","bodyHtml":"<h1>STORY-02.1.05 · Allowlist release scrub gate</h1>\n<h2>As</h2>\n<p>the maintainer of the public Tandem release</p>\n<h2>I want</h2>\n<p>the release build to fail closed when any denylisted token survives the scrub</p>\n<h2>So that</h2>\n<p>no internal detail can ever ship to the public demo</p>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] The r at leaks the host environment fails the public scrub later; strip them at render, not after.</li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>STORY-02.1.01 (the generator must exist to add a mode to).</li>\n</ul>\n<h2>References</h2>\n<ul>\n<li><strong>Feature:</strong> FEAT-02.1</li>\n<li><strong>PRD:</strong> —</li>\n<li><strong>Mockup:</strong> —</li>\n<li><strong>Related ADRs:</strong> ADR-0001</li>\n</ul>\n<h2>DoR checklist</h2>\n<ul>\n<li>[x] Paired TESTPLAN exists with every AC mapped to a TC</li>\n<li>[x] Every TC has a runnable <code>Command:</code> Claude can execute unattended</li>\n<li>[ ] Dependencies done or scheduled</li>\n<li>[x] Estimate set</li>\n<li>[x] Risks section populated below</li>\n</ul>\n<h2>Risks / unknowns</h2>\n<ul>\n<li>The catalogue contract for the public AI tab is still being finalised; the path-free behaviour here must not assume it.</li>\n</ul>\n<h2>DoD checklist</h2>\n<ul>\n<li>[ ] All AC ticked above</li>\n<li>[ ] Paired TESTPLAN run; all TCs PASS (or FAIL linked to BUG)</li>\n<li>[ ] Project quality gates pass (lint / tests / build)</li>\n<li>[ ] No new runtime errors on smoke</li>\n<li>[ ] If UI: visual contract tests green</li>\n<li>[ ] <strong>AI-code review</strong> complete</li>\n<li>[ ] Frontmatter updated: <code>status: done</code>, <code>completed_at</code> set</li>\n<li>[ ] <code>42-Monitor/MONITOR.md</code> updated</li>\n<li>[ ] ADRs created for any non-obvious decisions</li>\n<li>[ ] BACKLOG entry created for any new tech debt</li>\n</ul>\n","ageDays":27,"cycleDays":null,"_type":"story","_ageDays":27},{"type":"backlog","id":"BACKLOG-0002","title":"Define a retention policy for archived artefacts in the corpus","status":"not-started","epic":null,"feature":null,"story":null,"testplan":null,"estimate":"M","priority":"P1","severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"docs","decisions":[],"related":["EPIC-02","ADR-0002"],"decision":null,"context_story":null,"discovered_in":null,"captured_from":"ADR-0002 — the growing corpus raised the question of archived-artefact volume","created_at":"2026-05-16T11:05:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/11-Backlog/BACKLOG-0002-archived-artefact-retention.md","bodyHtml":"<h1>BACKLOG-0002 · Define a retention policy for archived artefacts in the corpus</h1>\n<h2>Why this exists</h2>\n<p>Every closed and archived story, testplan, and ADR stays in the corpus forever. There is no pruning or summarisation, so the Command Center walk and the validator scan grow with project age. Today the corpus is small; the better behaviour is a defined retention/summarisation policy for terminal artefacts.</p>\n<h2>Why backlog (not blocker)</h2>\n<p>At current volume the walk and scan are fast. The risk is acceptable while we learn which historical artefacts builders actually revisit — archiving the wrong thing now would be premature.</p>\n<h2>Work tranches</h2>\n<h3>Tranche A — Decide the policy (estimate: S)</h3>\n<ul>\n<li>[ ] Choose what &quot;archived&quot; means for the board (hidden vs summarised).</li>\n<li>[ ] File an ADR for the choice.</li>\n</ul>\n<h3>Tranche B — Implement summarisation (estimate: M)</h3>\n<ul>\n<li>[ ] Summarise archived epics into a compact history section.</li>\n<li>[ ] Keep full artefacts on disk; only the rendered board changes.</li>\n</ul>\n<h2>Acceptance — when this can be marked done</h2>\n<ul>\n<li>A documented, enforced retention/summarisation policy exists.</li>\n<li>The board and scan stay fast as the corpus grows.</li>\n</ul>\n<h2>Promotion criteria</h2>\n<ul>\n<li>When the corpus crosses a few hundred artefacts, or before the public demo ships.</li>\n</ul>\n<h2>Related</h2>\n<ul>\n<li>EPIC-02, ADR-0002</li>\n</ul>\n","ageDays":25,"cycleDays":null,"_type":"backlog","_ageDays":25},{"type":"story","id":"STORY-02.1.02","title":"Regenerate on status change","status":"in-progress","epic":"EPIC-02","feature":"FEAT-02.1","story":null,"testplan":null,"estimate":"M","priority":"P0","severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"automation","decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-14T09:00:00+01:00","started_at":"2026-05-18T09:30:00+01:00","completed_at":"","version":null,"ai_review":"pending","file":"_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.02-regenerate-on-status-change.md","bodyHtml":"<h1>STORY-02.1.02 · Regenerate on status change</h1>\n<h2>As</h2>\n<p>a builder who just moved a story&#39;s status</p>\n<h2>I want</h2>\n<p>the Command Center to regenerate automatically</p>\n<h2>So that</h2>\n<p>the board never lags behind the artefacts I just edited</p>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] A status flip in any artefact triggers a board regeneration.</li>\n<li>[ ] The regenerated board reflects the new status within 10 seconds.</li>\n<li>[ ] Regeneration is idempotent — re-running on the same state changes nothing.</li>\n<li>[ ] A failed regeneration surfaces an error rather than leaving a stale board silently.</li>\n</ul>\n<h2>Technical notes</h2>\n<ul>\n<li><strong>Files touched:</strong> the regeneration hook, the generator entry point.</li>\n<li><strong>Libraries:</strong> none new.</li>\n<li><strong>Pattern:</strong> reuse — wraps the generator from STORY-02.1.01.</li>\n<li><strong>Gotchas:</strong> debounce rapid successive status changes so a batch of flips triggers one render, not many.</li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>STORY-02.1.01 (the generator must exist to be re-invoked).</li>\n</ul>\n<h2>References</h2>\n<ul>\n<li><strong>Feature:</strong> FEAT-02.1</li>\n<li><strong>PRD:</strong> —</li>\n<li><strong>Mockup:</strong> —</li>\n<li><strong>Related ADRs:</strong> ADR-0001</li>\n</ul>\n<h2>DoR checklist</h2>\n<ul>\n<li>[x] Paired TESTPLAN exists with every AC mapped to a TC</li>\n<li>[x] Every TC has a runnable <code>Command:</code> Claude can execute unattended</li>\n<li>[x] Dependencies done or scheduled</li>\n<li>[x] Estimate set</li>\n<li>[x] Risks section populated below</li>\n</ul>\n<h2>Risks / unknowns</h2>\n<ul>\n<li>Debounce window vs perceived freshness tuning; under evaluation.</li>\n</ul>\n<h2>DoD checklist</h2>\n<ul>\n<li>[ ] All AC ticked above</li>\n<li>[ ] Paired TESTPLAN run; all TCs PASS (or FAIL linked to BUG)</li>\n<li>[ ] Project quality gates pass (lint / tests / build)</li>\n<li>[ ] No new runtime errors on smoke</li>\n<li>[ ] If UI: visual contract tests green</li>\n<li>[ ] <strong>AI-code review</strong> complete</li>\n<li>[ ] Frontmatter updated: <code>status: done</code>, <code>completed_at</code> set</li>\n<li>[ ] <code>42-Monitor/MONITOR.md</code> updated</li>\n<li>[ ] ADRs created for any non-obvious decisions</li>\n<li>[ ] BACKLOG entry created for any new tech debt</li>\n</ul>\n","ageDays":27,"cycleDays":null,"_type":"story","_ageDays":23},{"type":"backlog","id":"BACKLOG-0003","title":"Publish a scrub-gated public demo of Tandem dogfooding itself","status":"not-started","epic":null,"feature":null,"story":null,"testplan":null,"estimate":"L","priority":"P3","severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"infra","decisions":[],"related":["FEAT-02.1","EPIC-02"],"decision":null,"context_story":null,"discovered_in":null,"captured_from":"RETRO-2026-04 — viewers asked to see Tandem running its own lifecycle in public","created_at":"2026-05-20T16:40:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/11-Backlog/BACKLOG-0003-public-demo-dogfood.md","bodyHtml":"<h1>BACKLOG-0003 · Publish a scrub-gated public demo of Tandem dogfooding itself</h1>\n<h2>Why this exists</h2>\n<p>Early viewers asked to see Tandem running its own product lifecycle in the open — the same board the team uses, published as a public demo. Today the Command Center is internal only; the better behaviour is a public, path-free demo that doubles as product storytelling, gated by the allowlist release scrub so nothing internal leaks.</p>\n<h2>Why backlog (not blocker)</h2>\n<p>The Command Center and the scrub gate (FEAT-02.1) come first. A public demo is a growth and storytelling lever, not a launch blocker, and it depends on the external-root render mode and the scrub landing.</p>\n<h2>Work tranches</h2>\n<h3>Tranche A — Public render (estimate: M)</h3>\n<ul>\n<li>[ ] Render the demo in external-root mode (path-free).</li>\n<li>[ ] Confirm the rendered demo reads as Tandem describing itself.</li>\n</ul>\n<h3>Tranche B — Scrub-gated publish (estimate: L)</h3>\n<ul>\n<li>[ ] Run the allowlist scrub over the public build and fail closed on any hit.</li>\n<li>[ ] Automate the publish step once the scrub passes.</li>\n</ul>\n<h2>Acceptance — when this can be marked done</h2>\n<ul>\n<li>A public demo of the Command Center is published, path-free and denylist-free.</li>\n<li>The publish path fails closed on any scrub violation.</li>\n</ul>\n<h2>Promotion criteria</h2>\n<ul>\n<li>When the Command Center and the allowlist scrub gate have both shipped.</li>\n</ul>\n<h2>Related</h2>\n<ul>\n<li>FEAT-02.1, EPIC-02</li>\n</ul>\n","ageDays":21,"cycleDays":null,"_type":"backlog","_ageDays":21}],"thisWeek":[],"diagnostics":{"unparseable":[],"warnings":[]},"glossary":[["ADR","Architecture Decision Record. A short note explaining a load-bearing choice and the alternatives rejected. Stored under <code>40-Decisions/</code>."],["AI Catalogue","The tab group that scans <code>~/.claude/</code> and <code>.claude/</code> for skills, sub-agents, slash commands and plugins."],["BUG","A defect filed under <code>34-Bugs/EPIC-NN/FEAT-NN.M/</code>. Auto-raised when a testplan TC fails or a defect is found in exploration. Sequential ID per day: <code>BUG-YYYYMMDD-NN</code>."],["Context-load cost (context tax)","An estimate of how many tokens an AI artefact (skill, sub-agent, command or plugin) costs to LOAD into the context window when it is read — the kit context tax. Shown as <code>~N tok</code> on each AI-catalogue card, summed per kind, plus a plugin total. Computed as roughly <code>chars / 4</code>; it is not a per-invocation <strong>completion cost</strong> (the dollar price a model charges to run a request) — it measures context weight, not money. See the <a href=\"../../documentation/context-economics.html\" target=\"_blank\" rel=\"noopener\" title=\"Forward reference — authored in FEAT-11.4\">context-economics doc</a> (FEAT-11.4) for the full definition."],["DoD","Definition of Done. The checklist a story must pass before flipping to <code>status: done</code>."],["DoR","Definition of Ready. The checklist a story must pass before flipping to <code>status: in-progress</code>."],["Drawer","The right-side panel that opens when you click a row. Shows the rendered markdown body and cross-references."],["Epic","Top-level unit of work. Identifier: <code>EPIC-NN</code>."],["Feature","A slice of an epic. Identifier: <code>FEAT-NN.M</code>."],["Frontmatter","The YAML block at the top of every markdown file, between two <code>---</code> lines, holding the artefact's metadata."],["Hat protocol","The convention that one operator switches roles explicitly: Founder, PM, Dev, QA."],["KR","Key Result. A measurable target under an Objective. Part of OKR."],["MONITOR","<code>42-Monitor/MONITOR.md</code>. The single board updated weekly and on every story close-out."],["OKR","Objectives and Key Results. The goal-setting framework. Lives under <code>00-Strategy/</code>."],["phase/<id>","A short-lived feature branch cut off <code>main</code> to run one batched chat (ADR-0045). Opened with <code>/start-phase</code>, closed back to <code>main</code> with <code>/close-phase</code>."],["PM kit","The folder system, templates, hooks and scripts under <code>_00-Project-Management/</code>."],["PRD","Product Requirements Document."],["Retro","Retrospective. A monthly review under <code>14-Retros/</code>."],["Scrub gate","The pre-publish blocklist that strips private artefacts before the public Tandem build ships. Refuses to publish if any binary, symlink, or private-path leak slips through."],["SOP","Standard Operating Procedure. <code>90-Standards/SOP.md</code>."],["Status enum","The closed set of 9 values <code>status:</code> may take: <code>not-started</code>, <code>ready</code>, <code>in-progress</code>, <code>in-review</code>, <code>done</code>, <code>blocked</code>, <code>wontfix</code>, <code>duplicate</code>, <code>archived</code>. Invented values are rejected by <code>pm:lint</code>."],["Story","The unit of executable work. Identifier: <code>STORY-NN.M.PP</code>. Paired with a TESTPLAN."],["Sub-agent","A focused Claude agent dispatched by an orchestrating skill — e.g. technical-writer for docs, frontend-developer for UI code. Listed in a story's <code>suggested_agents:</code> frontmatter."],["Sub-tab","A second-row tab nested inside a group tab."],["Tandem","The public-facing release pipeline that builds the plugin from this repo and publishes it (ADR-0028). Triggered by <code>npm run build:tandem</code> with a scrub gate."],["TESTPLAN","The test plan paired 1:1 with a story. Lives at the mirrored path under <code>33-Testplans/</code>."],["WCAG","Web Content Accessibility Guidelines. The accessibility standard targeted at AA."],["WIP","Work In Progress. The set of items currently in <code>in-progress</code>, <code>in-review</code> or <code>blocked</code>."],["WIP limit","SOP §5: at most 2 stories <code>in-progress</code> simultaneously. Forces sequential execution within a chat and prevents context-thrashing across parallel tracks."],["YAML","Yet Another Markup Language. The frontmatter format."]],"sessionFlow":{"spine":[{"kind":"lifecycle","label":"chat-open","detail":"Operator opens a Claude function tileList(items, typeOrFn, opts){
  opts = opts || {};

  return '<div class="tile-grid stagger">' + items.map(function(it){

      var cls = it._ageDays >= 30 ? "danger" : "warn";

    if(opts.showExt && it.ext){
      extra += ' <span class="ext-badge ' + escHtml(it.ext) + '">' + escHtml(it.ext) + '</span>';
    }
    var sub = "";
    if(opts.showType && it._type) sub = '<span class="meta">' + escHtml(it._type) + '</span>';
    var idTxt = it.id || it.name || "";

  if(aiKind==="agent"){
    if(item.tools) sections += '<h3>Tools</h3><p><code>' + escHtml(item.tools) + '</code></p>';
    if(item.examples && item.examples.length){
      sections += '<h3>Trigger examples · ' + item.examples.length + '</h3>';
      sections += item.examples.map(function(ex){ return '<div class="drawer-example">' + (ex.context ? '<div class="ex-label">Context</div><div class="ex-body">' + escHtml(ex.context) + '</div>' : "") + (ex.user ? '<div class="ex-label">User says</div><div class="ex-body ex-user">' + escHtml(ex.user) + '</div>' : "") + (ex.commentary ? '<div class="ex-label">Why it fits</div><div class="ex-body">' + escHtml(ex.commentary) + '</div>' : "") + '</div>'; }).join("");
    }
  }
  // Slash command: argument hint + allowed tools
  if(aiKind==="command"){
    if(item.argumentHint) sections += '<h3>Arguments</h3><p><code>' + escHtml(item.argumentHint) + '</code></p>';
    if(item.allowedTools) sections += '<h3>Allowed tools</h3><p><code>' + escHtml(item.allowedTools) + '</code></p>';
  }
  // Plugin: grouped, clickable inventory of what it bundles
  if(aiKind==="plugin" && item.bundles){
    var b = item.bundles;
    if((b.skills&&b.skills.length)||(b.agents&&b.agents.length)||(b.commands&&b.commands.length)||(b.hooks&&b.hooks.length)) sections += '<h3>What this plugin bundles</h3>';
    var bundleGroup = function(label, arr, kind){ if(!arr||!arr.length) return ""; return '<div class="bundle-group"><div class="bundle-title">' + label + ' · ' + arr.length + '</div><div class="subitems">' + arr.map(function(s){ return '<div class="subitem" tabindex="0" role="button" data-bundled-plugin="' + escHtml(item.name) + '" data-bundled-kind="' + kind + '" data-bundled-name="' + escHtml(s.name) + '"><div class="subitem-name">' + escHtml(s.name) + '</div>' + (s.description ? '<div class="subitem-desc">' + escHtml(s.description) + '</div>' : "") + '<div class="subitem-cta">Open detail →</div></div>'; }).join("") + '</div></div>'; };
    sections += bundleGroup("Skills", b.skills, "skill");
    sections += bundleGroup("Subagents", b.agents, "agent");
    sections += bundleGroup("Slash commands", b.commands, "command");
    if(b.hooks && b.hooks.length) sections += '<div class="bundle-group"><div class="bundle-title">Hooks · ' + b.hooks.length + '</div><p>' + b.hooks.map(function(h){ return '<code>' + escHtml(h) + '</code>'; }).join(" ") + '</p></div>';
    var pkv = "";
    if(item.author) pkv += '<dt>Author</dt><dd>' + escHtml(item.author) + '</dd>';
    if(item.homepage) pkv += '<dt>Homepage</dt><dd><a href="' + escHtml(item.homepage) + '" target="_blank" rel="noopener">' + escHtml(item.homepage) + '</a></dd>';
    if(item.license) pkv += '<dt>License</dt><dd>' + escHtml(item.license) + '</dd>';
    if(item.installPath) pkv += '<dt>Install path</dt><dd><code style="word-break:break-all;">' + escHtml(item.installPath) + '</code></dd>';
    if(pkv) sections += '<dl class="kv" style="margin-top:1rem;">' + pkv + '</dl>';
  }
  // Body / reference
  if(aiKind==="skill" || aiKind==="agent" || aiKind==="command"){ if(item.bodyHtml && item.bodyHtml.trim()){ sections += '<h3>Reference body</h3>' + item.bodyHtml; } }
  else if(item.bodyHtml){ sections += item.bodyHtml; }
  else if(item.readmeHtml){ sections += item.readmeHtml; }
  else if(!isAi){ sections += '<p style="color:var(--ink-faint);">No body content.</p>'; }
  // Cross-references
  var xref = [];
  if(item.epic && type!=="epic") xref.push({type:"epic", id:item.epic, label:item.epic});
  if(item.feature && type!=="feature") xref.push({type:"feature", id:item.feature, label:item.feature});
  if(item.story && type!=="story") xref.push({type:"story", id:item.story, label:item.story});
  if(item.testplan && type!=="testplan") xref.push({type:"testplan", id:item.testplan, label:item.testplan});
  if(item.decisions && item.decisions.length) item.decisions.forEach(function(a){ if(a) xref.push({type:"adr", id:a, label:a}); });
  if(item.context_story) xref.push({type: /^STORY-/.test(item.context_story)?"story":/^BACKLOG-/.test(item.context_story)?"backlog":"feature", id:item.context_story, label:item.context_story});
  // For stories, link to paired testplan
  if(type==="story"){ var tpId = String(item.id).replace(/^STORY-/, "TESTPLAN-"); if(D.testplan && D.testplan.some(function(t){return t.id===tpId;})) xref.push({type:"testplan", id:tpId, label:tpId}); }
  // For testplans, link to paired story
  if(type==="testplan"){ var stId = String(item.id).replace(/^TESTPLAN-/, "STORY-"); if(D.story && D.story.some(function(s){return s.id===stId;})) xref.push({type:"story", id:stId, label:stId}); }
  var xrefHtml = "";
  if(xref.length){
    xrefHtml = '<div class="drawer-section"><h3>Cross-references</h3><div class="xref">' + xref.map(function(x){ return '<button type="button" class="xref-pill" data-xref-type="' + escHtml(x.type) + '" data-xref-id="' + escHtml(x.id) + '">' + escHtml(x.label) + '</button>'; }).join("") + '</div></div>';
  }
  // Source path
  var srcHtml = "";
  if(item.file){
    srcHtml = '<div class="drawer-section"><h3>Source</h3><code style="font-size:0.78rem; word-break:break-all;">' + escHtml(item.file) + '</code></div>';
  }
  body.innerHTML = sections + xrefHtml + srcHtml;
  wireDrawerLinks(body);
}
function wireDrawerLinks(body){
  $$(".xref-pill", body).forEach(function(b){ b.addEventListener("click", function(){ openDrawer(b.dataset.xrefType, b.dataset.xrefId); }); });
  $$("[data-sub-skill]", body).forEach(function(elm){ var go=function(){ openSkillSubItem(elm.dataset.subSkill, elm.dataset.subSlug); }; elm.addEventListener("click", go); elm.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(); } }); });
  $$("[data-bundled-plugin]", body).forEach(function(elm){ var go=function(){ openBundledItem(elm.dataset.bundledPlugin, elm.dataset.bundledKind, elm.dataset.bundledName); }; elm.addEventListener("click", go); elm.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(); } }); });
}
function openSkillSubItem(skillName, slug){
  var skill = (D.ai.skills||[]).find(function(s){return s.name===skillName;});
  if(!skill) return;
  var sub = (skill.subItems||[]).find(function(s){return s.slug===slug;});
  if(!sub) return;
  DRAWER_STACK.push({ render: function(){ renderSubItemDrawer(skill, sub); } });
  renderSubItemDrawer(skill, sub);
  showDrawerPanel();
}
function renderSubItemDrawer(skill, sub){
  var t = $("#drawer .drawer-titles");
  t.querySelector(".drawer-id").textContent = skill.name + " · sub-command";
  t.querySelector(".drawer-title").textContent = "/" + skill.name + " " + sub.slug + (sub.title && sub.title!==sub.slug ? " — " + sub.title : "");
  t.querySelector(".drawer-meta").innerHTML = '<span class="tag source">' + escHtml(skill.source||"") + '</span><span class="tag">sub-command</span>';
  var sec = "";
  if(sub.desc) sec += '<h3>Summary</h3><p class="drawer-ai-desc">' + escHtml(sub.desc) + '</p>';
  if(sub.bodyHtml) sec += '<h3>Reference</h3>' + sub.bodyHtml;
  if(skill.file) sec += '<div class="drawer-section"><h3>Source</h3><code style="font-size:0.78rem; word-break:break-all;">' + escHtml(skill.file + "/reference/" + sub.slug + ".md") + '</code></div>';
  var bd = $("#drawer .drawer-body"); bd.innerHTML = sec; wireDrawerLinks(bd);
}
function openBundledItem(pluginName, kind, name){
  var listKey = kind + "s";
  var list = (D.ai && D.ai[listKey]) || [];
  var found = list.filter(function(x){ return x.pluginName===pluginName; }).find(function(x){ return x.name===name || x.name===pluginName+":"+name; });
  if(!found) found = list.find(function(x){ return x.name===name; });
  if(found){ openDrawer("ai-"+kind, found.name); return; }
  var plugin = (D.ai.plugins||[]).find(function(p){return p.name===pluginName;});
  var arr = plugin && plugin.bundles ? (plugin.bundles[listKey]||[]) : [];
  var stub = arr.find(function(s){return s.name===name;});
  if(!stub) return;
  DRAWER_STACK.push({ render: function(){ renderBundleStub(pluginName, kind, stub); } });
  renderBundleStub(pluginName, kind, stub);
  showDrawerPanel();
}
function renderBundleStub(pluginName, kind, stub){
  var t = $("#drawer .drawer-titles");
  t.querySelector(".drawer-id").textContent = pluginName + " · bundled " + kind;
  t.querySelector(".drawer-title").textContent = stub.name;
  t.querySelector(".drawer-meta").innerHTML = '<span class="tag source">plugin:' + escHtml(pluginName) + '</span><span class="tag">' + escHtml(kind) + '</span>';
  $("#drawer .drawer-body").innerHTML = stub.description ? '<p class="drawer-ai-desc">' + escHtml(stub.description) + '</p>' : '<p style="color:var(--ink-faint);">No description.</p>';
}
function renderSessionFlow(){
  var sf = D.sessionFlow;
  if(!sf) return "";
  var rows = sf.spine.map(function(s){ return '<div class="flow-row ' + escHtml(s.kind) + '"><span class="flow-label">' + escHtml(s.label) + '</span><span class="flow-detail">' + s.detail + '</span></div>'; }).join("");
  var aside = sf.aside ? '<div class="flow-aside"><div class="head">' + escHtml(sf.aside.label) + '</div>' + sf.aside.items.map(function(s){ return '<div class="flow-row ' + escHtml(s.kind) + '"><span class="flow-label">' + escHtml(s.label) + '</span><span class="flow-detail">' + s.detail + '</span></div>'; }).join("") + '</div>' : "";
  return '<h3>Session flow</h3><div class="flow">' + rows + '</div>' + aside;
}
function renderCommandFlow(opts){
  opts = opts || {};
  var scope  = opts.scope  || "sop";
  var prefix = opts.prefix || "";
  var title  = opts.title  || "Tandem · command process flow";
  var sub    = opts.sub    || "click any /command to open its skill reference";
  var cf = D.commandFlow;
  if(!cf || !cf.phases) return "";
  var view = (STATE.cmdFlowView && STATE.cmdFlowView[scope]) || "e2e";
  var members = CMD_FLOW_VIEW_MEMBERS[view] || null; // null means show all
  function inView(c){ return !members || members.indexOf(c.name) !== -1; }
  function pillHtml(c){
    var note = c.note ? '<span class="cmd-pill-note">' + escHtml(c.note) + '</span>' : "";
    var when = c.when ? '<span class="cmd-pill-when">' + escHtml(c.when) + '</span>' : "";
    var adv  = c.advisory ? ' data-advisory="1"' : "";
    var amb  = c.ambient  ? ' data-ambient="1"'  : "";
    return '<button type="button" class="cmd-pill" data-cmd-skill="' + escHtml(c.name) + '"' + adv + amb + '><span class="cmd-pill-name">/' + escHtml(prefix) + escHtml(c.name) + '</span>' + when + note + '</button>';
  }
  // Per-view command counts for the tab badges.
  function countForView(v){
    var mem = CMD_FLOW_VIEW_MEMBERS[v];
    var n = 0;
    (cf.phases||[]).forEach(function(p){ (p.commands||[]).forEach(function(c){ if(!mem || mem.indexOf(c.name)!==-1) n++; }); });
    if(cf.cadence) (cf.cadence.commands||[]).forEach(function(c){ if(!mem || mem.indexOf(c.name)!==-1) n++; });
    return n;
  }
  var tabsHtml = '<div class="cmd-view-tabs" role="tablist">' + CMD_FLOW_VIEWS.map(function(v){
    var active = (view === v[0]);
    return '<button type="button" class="cmd-view-tab' + (active?" active":"") + '" role="tab" aria-selected="' + (active?"true":"false") + '" data-cmd-view-scope="' + scope + '" data-cmd-view-key="' + v[0] + '">' + escHtml(v[1]) + ' Session' + '<span class="cmd-view-tab-count">' + countForView(v[0]) + '</span></button>';
  }).join("") + '</div>';
  var phaseHtml = cf.phases.map(function(p){
    var visible = (p.commands||[]).filter(inView);
    if(!visible.length) return ""; // hide empty phases for the active view
    var gate = p.gate ? '<span class="cmd-phase-gate">' + escHtml(p.gate) + ' gate</span>' : "";
    var pills = visible.map(pillHtml).join("");
    return '<div class="cmd-phase" data-phase="' + escHtml(p.key) + '">' +
      '<div class="cmd-phase-head">' +
        '<div class="cmd-phase-top"><span class="cmd-phase-label">' + escHtml(p.label) + '</span><span class="cmd-phase-hat">' + escHtml(p.hat||"") + '</span>' + gate + '</div>' +
        '<div class="cmd-phase-desc">' + escHtml(p.desc||"") + '</div>' +
      '</div>' +
      '<div class="cmd-phase-pills">' + pills + '</div>' +
    '</div>';
  }).filter(function(s){ return !!s; });
  // Inject arrows between visible phases only.
  var phasesWithArrows = phaseHtml.length ? phaseHtml.join('<div class="cmd-phase-arrow">→</div>') : '<div class="empty">No commands in this view.</div>';
  var rail = "";
  if(cf.cadence){
    var railVisible = (cf.cadence.commands||[]).filter(inView);
    if(railVisible.length){
      var railPills = railVisible.map(pillHtml).join("");
      rail = '<div class="cmd-rail">' +
        '<div class="cmd-rail-head">' +
          '<span class="cmd-rail-label">↻ ' + escHtml(cf.cadence.label) + '</span>' +
          '<span class="cmd-rail-desc">' + escHtml(cf.cadence.desc||"") + '</span>' +
        '</div>' +
        '<div class="cmd-rail-pills">' + railPills + '</div>' +
      '</div>';
    }
  }
  return '<div class="cmd-flow-panel reveal" data-cmd-flow-scope="' + scope + '">' +
    '<div class="cmd-flow-head">' +
      '<span class="cmd-flow-title">' + escHtml(title) + '</span>' +
      '<span class="cmd-flow-sub">' + escHtml(sub) + '</span>' +
    '</div>' +
    tabsHtml +
    '<div class="cmd-flow-phases">' + phasesWithArrows + '</div>' +
    rail +
  '</div>';
}
function bindRows(root){
  $$(".tile, .stream-line", root).forEach(function(r){ if(r.__bound) return; r.__bound=true; r.addEventListener("click", function(){ openDrawer(r.dataset.type, r.dataset.id); }); });
}
function bindControls(root){
  $$(".search", root).forEach(function(inp){ if(inp.__bound) return; inp.__bound=true; inp.addEventListener("input", function(){ var s = inp.dataset.scope; STATE.search[s] = inp.value; renderActive(); inp.focus(); }); });
  $$(".pill.filterable", root).forEach(function(p){ if(p.__bound) return; p.__bound=true; p.addEventListener("click", function(){ var s = (STATE.group==="work"?"work:":STATE.group==="decisions"?"decisions:":STATE.group+":") + STATE.sub; STATE.statusFilter[s] = STATE.statusFilter[s] || {}; var st = p.dataset.status; STATE.statusFilter[s][st] = !STATE.statusFilter[s][st]; renderActive(); }); });
}
function bindCmdFlowTabs(root){
  $$(".cmd-view-tab[data-cmd-view-scope]", root).forEach(function(b){
    if(b.__bound) return; b.__bound = true;
    b.addEventListener("click", function(){
      var scope = b.dataset.cmdViewScope;
      var key   = b.dataset.cmdViewKey;
      STATE.cmdFlowView = STATE.cmdFlowView || {};
      STATE.cmdFlowView[scope] = key;
      renderActive();
    });
  });
}
function setupRevealObserver(){
  if(!("IntersectionObserver" in window)) { $$(".reveal").forEach(function(e){ e.classList.add("visible"); }); return; }
  var ob = new IntersectionObserver(function(entries){ entries.forEach(function(en){ if(en.isIntersecting){ en.target.classList.add("visible"); ob.unobserve(en.target); } }); }, { rootMargin:"-30px 0px -20px 0px" });
  var watcher = new MutationObserver(function(){ $$(".reveal:not(.visible)").forEach(function(e){ ob.observe(e); }); });
  watcher.observe(document.body, { childList:true, subtree:true });
  $$(".reveal").forEach(function(e){ ob.observe(e); });
}
function init(){
  renderGroupNav();
  // Hash routing
  var h = readHash();
  var r = applyLegacy(h.group, h.sub);
  if(r.group && SUB_TABS[r.group] != null){ setGroup(r.group, { sub: r.sub }); } else { setGroup("now"); }
  // Mask + close
  $("#mask").addEventListener("click", closeDrawer);
  $(".drawer-close").addEventListener("click", closeDrawer);
  $(".drawer-back").addEventListener("click", popDrawer);
  document.addEventListener("keydown", function(e){
    if((e.metaKey || e.ctrlKey) && (e.key === "k" || e.key === "K")){ e.preventDefault(); openPalette(); return; }
    if(e.key === "Escape"){ if(STATE.palette){ closePalette(); return; } if($("#drawer").classList.contains("open")) closeDrawer(); return; }
    if(e.key === "/" && !/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName)){ e.preventDefault(); openPalette(); }
  });
  $("#theme-toggle").addEventListener("click", function(){ applyTheme(document.documentElement.getAttribute("data-theme")==="dark" ? "light" : "dark"); });
  window.addEventListener("hashchange", function(){ var h=readHash(); var r=applyLegacy(h.group, h.sub); if(r.group && r.group!==STATE.group){ setGroup(r.group, { sub:r.sub }); } else if(r.sub && r.sub!==STATE.sub){ setSub(r.sub); } });
  setupRevealObserver();
  // Diagnostics link clicks
  $$("#diag a[data-path]").forEach(function(a){ a.addEventListener("click", function(e){ e.preventDefault(); /* read-only — show path */ }); });
}
if(document.readyState==="loading"){ document.addEventListener("DOMContentLoaded", init); } else { init(); }
})();
</script>
</body>
