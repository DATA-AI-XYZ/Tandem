<script>window.__DATA = {"strategy":[{"type":"strategy","id":"NORTH-STAR","title":"North Star — Tandem","status":"active","epic":null,"feature":null,"story":null,"testplan":null,"estimate":null,"priority":null,"severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-01-08T09:00:00+01:00","started_at":"2026-01-08T09:00:00+01:00","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/00-Strategy/NORTH-STAR.md","bodyHtml":"<h1>North Star · Tandem</h1>\n<h2>The one sentence</h2>\n<p>Tandem lets a solo builder run a full product lifecycle — strategy, planning, execution, and review — through AI-driven skills and one always-current Command Center, without the ceremony of a heavyweight project tool or a team of project managers.</p>\n<h2>North Star metric</h2>\n<p><strong>Lifecycle Loops Closed (LLC)</strong> — the number of pieces of work that travel the whole loop (North Star → OKR → Epic → Feature → Story → Testplan → Done) inside Tandem, with every governance gate satisfied, in a 7-day window.</p>\n<p>We chose a *closed-loop* metric over raw artefact count because Tandem only creates value when work actually finishes the lifecycle. A backlog of half-written stories is noise; a story that passes its Definition of Ready, gets executed, runs its paired testplan, and clears Definition of Done is the product working.</p>\n<h2>Who it is for</h2>\n<ul>\n<li><strong>Primary:</strong> solo builders and tiny teams who want disciplined product process (OKRs, ADRs, testplans, retros) but cannot afford a full-time PM and refuse Jira-class overhead.</li>\n<li><strong>Not for (yet):</strong> large orgs needing portfolio roll-ups across many programmes, fine-grained role-based permissions, or enterprise audit/compliance certifications.</li>\n</ul>\n<h2>How we win</h2>\n<ol>\n<li><strong>The lifecycle is a set of skills, not a manual.</strong> Each stage — draft OKRs, draft a PRD, split an epic, pair a story with a testplan, close a story — is a skill the builder invokes, so process happens by running a command, not by remembering a template (EPIC-01).</li>\n<li><strong>One board that is always true.</strong> The Command Center renders the plan from the artefacts themselves, so the dashboard can never drift from reality (EPIC-02).</li>\n<li><strong>Governance is enforced, not advised.</strong> Closed-set status, Story↔Testplan pairing, DoR/DoD gates, and an allowlist release scrub are checked by tooling, so quality is a gate the work must pass, not a habit the builder must keep.</li>\n</ol>\n<h2>What we deliberately will not do</h2>\n<ul>\n<li>Replace human judgement on *what* to build — Tandem governs *how* work moves, not whether an idea is worth pursuing.</li>\n<li>Become a generic note-taking or wiki tool.</li>\n<li>Ship a denylist-based privacy model; the public release scrub is allowlist-first by design.</li>\n</ul>\n<h2>The 18-month bet</h2>\n<p>If a disciplined, AI-run lifecycle lets one builder ship at the cadence and quality that previously needed a small team, then doubling down on lifecycle skills and enforced governance (not feature breadth) is the path to durable adoption. Every quarter&#39;s OKRs should ladder up to raising Lifecycle Loops Closed (LLC).</p>\n","ageDays":153,"cycleDays":null},{"type":"strategy","id":"OKR-2026-Q2","title":"OKRs — 2026 Q2","status":"active","epic":null,"feature":null,"story":null,"testplan":null,"estimate":null,"priority":null,"severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-03-28T10:00:00+01:00","started_at":"2026-04-01T09:00:00+01:00","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/00-Strategy/OKR-2026-Q2.md","bodyHtml":"<h1>OKRs · 2026 Q2</h1>\n<p><strong>Theme:</strong> Make the lifecycle trustworthy enough to show in public. Everything this quarter ladders into the North Star metric — Lifecycle Loops Closed (LLC).</p>\n<h2>Objective 1 — Make the plan impossible to misread</h2>\n<p>*A builder only trusts Tandem if the board never lies. If the Command Center always reflects the artefacts, the loop stays honest.*</p>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>Key Result</th><th>Baseline</th><th>Target</th><th>Linked work</th></tr></thead><tbody><tr><td>OKR-2026-Q2-1 — Raise share of work items that close the full lifecycle loop with all gates green</td><td>35%</td><td>70%</td><td>EPIC-02 (Command Center &amp; governance gates)</td></tr><tr><td>OKR-2026-Q2-2 — Dashboard-to-artefact drift incidents per month</td><td>6</td><td>0</td><td>STORY-02.1.01, STORY-02.1.03</td></tr><tr><td>OKR-2026-Q2-3 — Median time to regenerate the Command Center after a status change</td><td>40s</td><td>&lt; 10s</td><td>STORY-02.1.02</td></tr></tbody></table></div>\n<h2>Objective 2 — Make the lifecycle self-serve</h2>\n<p>*A solo builder cannot keep a process alive by hand. Each lifecycle stage must be a skill, not a template to remember.*</p>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>Key Result</th><th>Baseline</th><th>Target</th><th>Linked work</th></tr></thead><tbody><tr><td>OKR-2026-Q2-4 — Share of lifecycle stages reachable by invoking a skill</td><td>50%</td><td>100%</td><td>EPIC-01 (done)</td></tr><tr><td>OKR-2026-Q2-5 — Stories that pass Definition of Ready on first check</td><td>61%</td><td>&gt; 90%</td><td>STORY-01.1.02</td></tr><tr><td>OKR-2026-Q2-6 — Stories paired with a same-id testplan at creation</td><td>0%</td><td>100%</td><td>FEAT-01.2</td></tr></tbody></table></div>\n<h2>Confidence &amp; check-ins</h2>\n<ul>\n<li><strong>Mid-quarter check:</strong> 2026-05-15 — Objective 1 on track (EPIC-02 in progress); Objective 2 largely met (EPIC-01 shipped, the skill suite is live).</li>\n<li><strong>Confidence:</strong> O1 0.6, O2 0.8.</li>\n<li><strong>Risk to watch:</strong> the public release scrub could over-block legitimate content if the allowlist is too tight; tracked in EPIC-02 risks and ADR-0001.</li>\n</ul>\n<h2>How this ladders up</h2>\n<p>Both objectives feed LLC: O2 makes each lifecycle stage runnable so loops can start, and O1 keeps the board honest so loops can be trusted to finish.</p>\n","ageDays":74,"cycleDays":null}],"inbox":[],"backlog":[{"type":"backlog","id":"BACKLOG-0001","title":"Collapse completed epics on the Command Center when the board gets long","status":"not-started","epic":null,"feature":null,"story":null,"testplan":null,"estimate":"S","priority":"P2","severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"automation","decisions":[],"related":["STORY-02.1.01","EPIC-02"],"decision":null,"context_story":null,"discovered_in":null,"captured_from":"STORY-02.1.01 — the board grows unbounded as epics accumulate","created_at":"2026-05-12T14:20:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/11-Backlog/BACKLOG-0001-dashboard-epic-collapse.md","bodyHtml":"<h1>BACKLOG-0001 · Collapse completed epics on the Command Center when the board gets long</h1>\n<h2>Why this exists</h2>\n<p>The Command Center renders every epic in full, in order. Once several epics are <code>done</code>, the board scrolls a long way before reaching active work. Today it renders flat; the better behaviour is to collapse fully-shipped epics into a one-line summary the reader can expand.</p>\n<h2>Why backlog (not blocker)</h2>\n<p>Projects rarely have more than a handful of epics today, so the long board is mildly annoying, not blocking. It only bites at the scale we are *trying* to reach, which is why it is worth tracking but not urgent.</p>\n<h2>Work tranches</h2>\n<h3>Tranche A — Collapse rule (estimate: S)</h3>\n<ul>\n<li>[ ] Render fully-shipped epics as a collapsed one-line summary.</li>\n<li>[ ] Keep in-progress and blocked epics expanded by default.</li>\n</ul>\n<h3>Tranche B — Expand control (estimate: S)</h3>\n<ul>\n<li>[ ] Add an expand/collapse control per epic in the rendered board.</li>\n<li>[ ] Remember the chosen state across regenerations where the renderer allows.</li>\n</ul>\n<h2>Acceptance — when this can be marked done</h2>\n<ul>\n<li>The board stays scannable regardless of how many epics have shipped.</li>\n<li>Completed epics remain fully reachable via expand.</li>\n</ul>\n<h2>Promotion criteria</h2>\n<ul>\n<li>When a project regularly carries 6+ epics, or before the public demo ships.</li>\n</ul>\n<h2>Related</h2>\n<ul>\n<li>STORY-02.1.01, EPIC-02</li>\n</ul>\n","ageDays":29,"cycleDays":null},{"type":"backlog","id":"BACKLOG-0002","title":"Define a retention policy for archived artefacts in the corpus","status":"not-started","epic":null,"feature":null,"story":null,"testplan":null,"estimate":"M","priority":"P1","severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"docs","decisions":[],"related":["EPIC-02","ADR-0002"],"decision":null,"context_story":null,"discovered_in":null,"captured_from":"ADR-0002 — the growing corpus raised the question of archived-artefact volume","created_at":"2026-05-16T11:05:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/11-Backlog/BACKLOG-0002-archived-artefact-retention.md","bodyHtml":"<h1>BACKLOG-0002 · Define a retention policy for archived artefacts in the corpus</h1>\n<h2>Why this exists</h2>\n<p>Every closed and archived story, testplan, and ADR stays in the corpus forever. There is no pruning or summarisation, so the Command Center walk and the validator scan grow with project age. Today the corpus is small; the better behaviour is a defined retention/summarisation policy for terminal artefacts.</p>\n<h2>Why backlog (not blocker)</h2>\n<p>At current volume the walk and scan are fast. The risk is acceptable while we learn which historical artefacts builders actually revisit — archiving the wrong thing now would be premature.</p>\n<h2>Work tranches</h2>\n<h3>Tranche A — Decide the policy (estimate: S)</h3>\n<ul>\n<li>[ ] Choose what &quot;archived&quot; means for the board (hidden vs summarised).</li>\n<li>[ ] File an ADR for the choice.</li>\n</ul>\n<h3>Tranche B — Implement summarisation (estimate: M)</h3>\n<ul>\n<li>[ ] Summarise archived epics into a compact history section.</li>\n<li>[ ] Keep full artefacts on disk; only the rendered board changes.</li>\n</ul>\n<h2>Acceptance — when this can be marked done</h2>\n<ul>\n<li>A documented, enforced retention/summarisation policy exists.</li>\n<li>The board and scan stay fast as the corpus grows.</li>\n</ul>\n<h2>Promotion criteria</h2>\n<ul>\n<li>When the corpus crosses a few hundred artefacts, or before the public demo ships.</li>\n</ul>\n<h2>Related</h2>\n<ul>\n<li>EPIC-02, ADR-0002</li>\n</ul>\n","ageDays":25,"cycleDays":null},{"type":"backlog","id":"BACKLOG-0003","title":"Publish a scrub-gated public demo of Tandem dogfooding itself","status":"not-started","epic":null,"feature":null,"story":null,"testplan":null,"estimate":"L","priority":"P3","severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"infra","decisions":[],"related":["FEAT-02.1","EPIC-02"],"decision":null,"context_story":null,"discovered_in":null,"captured_from":"RETRO-2026-04 — viewers asked to see Tandem running its own lifecycle in public","created_at":"2026-05-20T16:40:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/11-Backlog/BACKLOG-0003-public-demo-dogfood.md","bodyHtml":"<h1>BACKLOG-0003 · Publish a scrub-gated public demo of Tandem dogfooding itself</h1>\n<h2>Why this exists</h2>\n<p>Early viewers asked to see Tandem running its own product lifecycle in the open — the same board the team uses, published as a public demo. Today the Command Center is internal only; the better behaviour is a public, path-free demo that doubles as product storytelling, gated by the allowlist release scrub so nothing internal leaks.</p>\n<h2>Why backlog (not blocker)</h2>\n<p>The Command Center and the scrub gate (FEAT-02.1) come first. A public demo is a growth and storytelling lever, not a launch blocker, and it depends on the external-root render mode and the scrub landing.</p>\n<h2>Work tranches</h2>\n<h3>Tranche A — Public render (estimate: M)</h3>\n<ul>\n<li>[ ] Render the demo in external-root mode (path-free).</li>\n<li>[ ] Confirm the rendered demo reads as Tandem describing itself.</li>\n</ul>\n<h3>Tranche B — Scrub-gated publish (estimate: L)</h3>\n<ul>\n<li>[ ] Run the allowlist scrub over the public build and fail closed on any hit.</li>\n<li>[ ] Automate the publish step once the scrub passes.</li>\n</ul>\n<h2>Acceptance — when this can be marked done</h2>\n<ul>\n<li>A public demo of the Command Center is published, path-free and denylist-free.</li>\n<li>The publish path fails closed on any scrub violation.</li>\n</ul>\n<h2>Promotion criteria</h2>\n<ul>\n<li>When the Command Center and the allowlist scrub gate have both shipped.</li>\n</ul>\n<h2>Related</h2>\n<ul>\n<li>FEAT-02.1, EPIC-02</li>\n</ul>\n","ageDays":21,"cycleDays":null}],"release":[{"type":"release","id":"RELEASE-v1.0","title":"Foundations — the lifecycle skill suite","status":"done","epic":null,"feature":null,"story":null,"testplan":null,"estimate":null,"priority":null,"severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-04-11T15:00:00+01:00","started_at":"2026-04-11T15:00:00+01:00","completed_at":"2026-04-12T10:30:00+01:00","version":"v1.0.0","ai_review":null,"file":"_00-Project-Management/13-Releases/RELEASE-v1.0-foundations.md","bodyHtml":"<h1>RELEASE-v1.0 · Foundations — the lifecycle skill suite</h1>\n<h2>Summary</h2>\n<p>The first release of Tandem. It delivers the lifecycle skill suite: draft OKRs from the North Star, split an epic into features, and split a feature into stories paired one-to-one with testplans — with the Definition of Ready and Definition of Done gates enforced on status changes. This is the foundation the Command Center work (EPIC-02) builds on — artefacts must flow before a board can render them.</p>\n<h2>Stories included</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>Story</th><th>Title</th><th>Status</th></tr></thead><tbody><tr><td>STORY-01.1.01</td><td>Draft OKRs skill</td><td>done</td></tr><tr><td>STORY-01.1.02</td><td>Split-into-features skill</td><td>done</td></tr><tr><td>STORY-01.2.01</td><td>Split-into-stories skill with paired testplan</td><td>done</td></tr></tbody></table></div>\n<h2>Bugs fixed</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>Bug</th><th>Summary</th></tr></thead><tbody><tr><td>—</td><td>No release-blocking bugs at ship time.</td></tr></tbody></table></div>\n<h2>Decisions ratified</h2>\n<ul>\n<li>ADR-0002 — Story-testplan pairing is enforced at creation</li>\n</ul>\n<h2>Migration / breaking changes</h2>\n<ul>\n<li>First release — no migration required.</li>\n<li>New artefact contract: every story must carry a same-id testplan at the mirrored path.</li>\n</ul>\n<h2>Smoke-test checklist</h2>\n<p>Run these after release to confirm the skill suite works end-to-end.</p>\n<ul>\n<li>[x] Draft-OKRs skill produces a linked OKR set from the North Star</li>\n<li>[x] Split-into-features skill writes epic-linked feature files</li>\n<li>[x] Split-into-stories skill emits a story and its same-id testplan together</li>\n<li>[x] The validator flags a story with a missing testplan</li>\n<li>[x] A status flip is rejected when its gate (DoR/DoD) is not satisfied</li>\n</ul>\n<h2>Rollback plan</h2>\n<p>Roll back if the smoke checklist fails or the validator reports new violations on the corpus.</p>\n<ol>\n<li>Revert the skill suite to the previous tagged release.</li>\n<li>Re-run the validator to confirm the corpus is clean, then announce the rollback.</li>\n</ol>\n<p><strong>Time budget for rollback:</strong> must be able to revert within 10 minutes.</p>\n<h2>Communication</h2>\n<ul>\n<li>[x] Internal notes posted (where: release log)</li>\n<li>[x] External release notes drafted</li>\n<li>[x] Stakeholders notified</li>\n</ul>\n<h2>Metrics to watch (post-release)</h2>\n<ul>\n<li>Share of lifecycle stages reachable by invoking a skill — target 100%.</li>\n<li>Stories that pass Definition of Ready on first check — target &gt; 90%.</li>\n</ul>\n<h2>Retro hook</h2>\n<p>This release will be discussed in <code>RETRO-2026-04.md</code>. Items to surface there:</p>\n<ul>\n<li>Whether the all-or-nothing pairing abort ever blocked a legitimate workflow.</li>\n<li>Whether the DoR gate should pre-fill more of its checklist automatically.</li>\n</ul>\n","ageDays":60,"cycleDays":0}],"retro":[{"type":"retro","id":"RETRO-2026-04","title":"Retrospective — April 2026","status":"done","epic":null,"feature":null,"story":null,"testplan":null,"estimate":null,"priority":null,"severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-04-30T16:00:00+01:00","started_at":"2026-04-30T16:00:00+01:00","completed_at":"2026-04-30T17:15:00+01:00","version":null,"ai_review":null,"file":"_00-Project-Management/14-Retros/RETRO-2026-04.md","bodyHtml":"<h1>RETRO-2026-04 · April 2026</h1>\n<h2>Period</h2>\n<ul>\n<li>From: 2026-04-01</li>\n<li>To: 2026-04-30</li>\n</ul>\n<h2>Metrics</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>Metric</th><th>This period</th><th>Last period</th><th>Δ</th></tr></thead><tbody><tr><td>Stories shipped</td><td>3</td><td>2</td><td>+1</td></tr><tr><td>Bugs filed</td><td>4</td><td>6</td><td>-2</td></tr><tr><td>Bugs fixed</td><td>4</td><td>5</td><td>-1</td></tr><tr><td>ADRs created</td><td>1</td><td>1</td><td>0</td></tr><tr><td>Average story cycle time</td><td>6 days</td><td>8 days</td><td>-2</td></tr><tr><td>Time in <code>blocked</code></td><td>1 day</td><td>4 days</td><td>-3</td></tr></tbody></table></div>\n<h2>What worked</h2>\n<ul>\n<li>Shipping the lifecycle skill suite as one tight release (RELEASE-v1.0) instead of dribbling skills out one at a time meant we smoke-tested the whole North Star → Story → Testplan path once, not three times.</li>\n<li>Filing ADR-0002 the moment we made pairing mandatory saved a re-litigation when the Command Center wanted to rely on the mirrored-path pairing to render the board.</li>\n<li>Enforcing Story↔Testplan pairing at creation kept &quot;done&quot; honest — no story closed with an empty testplan.</li>\n</ul>\n<h2>What hurt</h2>\n<ul>\n<li>The first cut of the split-into-stories skill left an orphan testplan once when a run was interrupted mid-write; we tightened it to all-or-nothing before release.</li>\n<li>We started Command Center design while the pairing rule still had an open edge case, which split attention for half a week.</li>\n</ul>\n<h2>Surprises</h2>\n<ul>\n<li>Interest in the public demo was higher than expected — early viewers asked to see Tandem dogfooding itself, which sharpened the case for the scrub-gated public build (now BACKLOG-0003).</li>\n<li>The share of stories passing Definition of Ready on first check climbed faster than forecast once the skill pre-populated the checklist.</li>\n</ul>\n<h2>Action from last retro — did it happen?</h2>\n<ul>\n<li><strong>Last retro&#39;s change:</strong> &quot;Pair every story with a runnable testplan before pulling it.&quot;</li>\n<li><strong>Outcome:</strong> Yes — now enforced by the validator (ADR-0002), not just by habit. Carry forward as a structural guarantee.</li>\n</ul>\n<h2>One change for next period</h2>\n<ul>\n<li><strong>The change:</strong> Give board-trust its own measured KR (dashboard-to-artefact drift incidents) before writing more Command Center stories, so we optimise against a number, not a feeling.</li>\n<li><strong>Owner:</strong> PM</li>\n<li><strong>Done when:</strong> OKR-2026-Q2-2 has a live tracked number.</li>\n<li><strong>Review:</strong> in next month&#39;s retro</li>\n</ul>\n<h2>Strategic check</h2>\n<ul>\n<li><strong>Drift detected?</strong> No</li>\n<li><strong>If yes — what&#39;s drifting:</strong> —</li>\n</ul>\n","ageDays":41,"cycleDays":0}],"epic":[{"type":"epic","id":"EPIC-02","title":"Command Center & governance gates","status":"in-progress","epic":null,"feature":null,"story":null,"testplan":null,"estimate":"XL","priority":"P0","severity":null,"okr":"OKR-2026-Q2-1","prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-04-20T10:00:00+01:00","started_at":"2026-05-04T09:15:00+01:00","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/30-Epics/EPIC-02-command-center-governance.md","bodyHtml":"<h1>EPIC-02 · Command Center &amp; governance gates</h1>\n<h2>Goal</h2>\n<p>Give the builder one always-current board — the Command Center — rendered directly from the lifecycle artefacts, plus the governance gates that keep that board honest: closed-set status, an allowlist release scrub for the public build, and a dashboard that regenerates on every status change. The first slice delivers the dashboard generator and the scrub-gated public release so the plan can never drift and can be shown in public safely.</p>\n<h2>Strategic linkage</h2>\n<ul>\n<li><strong>OKR:</strong> OKR-2026-Q2-1 — &quot;Raise the share of work that closes the full lifecycle loop with all gates green.&quot; A board you cannot trust breaks the loop; governance gates make the loop verifiable.</li>\n<li><strong>Why now:</strong> the lifecycle skills shipped (EPIC-01), so artefacts now flow; the next lever is making the rolled-up view trustworthy and the public demo safe to publish.</li>\n<li><strong>Business outcome:</strong> lift the share of loops that close with all gates green from 35% to 70%, and drive dashboard-to-artefact drift incidents to zero.</li>\n</ul>\n<h2>In scope</h2>\n<ul>\n<li>A dashboard generator that renders the Command Center from the artefacts.</li>\n<li>Regeneration of the board on every status change so it never goes stale.</li>\n<li>An allowlist-first release scrub that gates the public build.</li>\n<li>Internally-consistent rollups and counts on the board.</li>\n</ul>\n<h2>Out of scope</h2>\n<ul>\n<li>Editing artefacts from inside the dashboard (the dashboard is read-only).</li>\n<li>Multi-project portfolio views.</li>\n<li>Real-time multi-user board collaboration.</li>\n</ul>\n<h2>Success criteria</h2>\n<ul>\n<li>The Command Center matches the artefacts on disk with zero drift after any status change.</li>\n<li>The board regenerates within 10 seconds of a status flip.</li>\n<li>The public release build fails closed if any denylisted token survives the scrub.</li>\n</ul>\n<h2>Features</h2>\n<ul>\n<li><a href=\"../31-Features/EPIC-02/FEAT-02.1-command-center-public-release.md\">FEAT-02.1 — Command Center &amp; public release scrub</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li><strong>Other epics:</strong> EPIC-01 (the lifecycle skills produce the artefacts the board renders).</li>\n<li><strong>Infrastructure:</strong> the dashboard generator script; the public release pipeline.</li>\n<li><strong>External:</strong> none.</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> epics, features, stories, testplans, decisions</li>\n<li><strong>Writes:</strong> the rendered Command Center HTML; the public release output</li>\n<li><strong>New schema:</strong> the rollup/counts contract the generator computes from artefacts</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li><strong>Over-aggressive scrub</strong> — mitigation: allowlist-first design with an explicit, reviewable token list (see ADR-0001).</li>\n<li><strong>Stale board after a status change</strong> — mitigation: regenerate the dashboard in the same step as the status flip.</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../40-Decisions/ADR-0001-allowlist-not-denylist-release-scrub.md\">ADR-0001 — Allowlist, not denylist, for the public release scrub</a></li>\n</ul>\n","ageDays":51,"cycleDays":null},{"type":"epic","id":"EPIC-01","title":"Lifecycle skills","status":"done","epic":null,"feature":null,"story":null,"testplan":null,"estimate":"L","priority":"P0","severity":null,"okr":"OKR-2026-Q2-4","prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-03-02T09:00:00+01:00","started_at":"2026-03-04T09:30:00+01:00","completed_at":"2026-04-11T16:20:00+01:00","version":null,"ai_review":null,"file":"_00-Project-Management/30-Epics/EPIC-01-lifecycle-skills.md","bodyHtml":"<h1>EPIC-01 · Lifecycle skills</h1>\n<h2>Goal</h2>\n<p>Make every stage of Tandem&#39;s product lifecycle runnable as a skill: a builder invokes a command to draft OKRs, draft a PRD, split an epic into features, split a feature into stories, and close a story through its gate — instead of copying a template and filling it by hand. The lifecycle becomes a thing you *run*, not a process you have to remember.</p>\n<h2>Strategic linkage</h2>\n<ul>\n<li><strong>OKR:</strong> OKR-2026-Q2-4 — &quot;Make every lifecycle stage reachable by invoking a skill.&quot; The skill suite is the first thing a builder touches; without it, nothing else in Tandem can flow.</li>\n<li><strong>Why now:</strong> early dogfooding showed the biggest leak was abandoned half-written artefacts — builders forgot the template, skipped the gate, and the loop never closed. Skills turn each stage into a single, governed command.</li>\n<li><strong>Business outcome:</strong> lift the share of lifecycle stages that are skill-driven from 50% to 100%, and cut the rate of stories that fail Definition of Ready on first check.</li>\n</ul>\n<h2>In scope</h2>\n<ul>\n<li>Strategy skills: draft OKRs from the North Star, draft a PRD from an OKR or notes.</li>\n<li>Decomposition skills: split an epic into features, split a feature into stories.</li>\n<li>Pairing rule: every story created with its same-id testplan in the same step.</li>\n<li>Execution and close-out skills that enforce DoR on entry and DoD on exit.</li>\n</ul>\n<h2>Out of scope</h2>\n<ul>\n<li>The Command Center dashboard and its rendering (EPIC-02).</li>\n<li>The public release pipeline and its scrub gate (EPIC-02).</li>\n<li>Multi-project portfolio roll-ups.</li>\n</ul>\n<h2>Success criteria</h2>\n<ul>\n<li>Every lifecycle stage from North Star to Done is reachable by invoking a skill.</li>\n<li>A story can never be created without its paired testplan.</li>\n<li>A status flip is rejected when the matching gate (DoR/DoD) is not satisfied.</li>\n</ul>\n<h2>Features</h2>\n<ul>\n<li><a href=\"../31-Features/EPIC-01/FEAT-01.1-strategy-decomposition-skills.md\">FEAT-01.1 — Strategy &amp; decomposition skills</a></li>\n<li><a href=\"../31-Features/EPIC-01/FEAT-01.2-story-testplan-pairing-gates.md\">FEAT-01.2 — Story-testplan pairing &amp; gates</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li><strong>Other epics:</strong> none</li>\n<li><strong>Infrastructure:</strong> the artefact templates and the frontmatter contract the skills write against.</li>\n<li><strong>External:</strong> none.</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> strategy artefacts, templates</li>\n<li><strong>Writes:</strong> epics, features, stories, testplans</li>\n<li><strong>New schema:</strong> the closed-set status enum and frontmatter relationship fields the skills populate</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li><strong>Skills drift from the templates</strong> — mitigation: skills write from the canonical template, and the frontmatter validator enforces the contract (see ADR-0002).</li>\n<li><strong>A story is created without a testplan</strong> — mitigation: the split-into-stories skill aborts unless it can emit both artefacts in one response.</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../40-Decisions/ADR-0002-enforce-story-testplan-pairing.md\">ADR-0002 — Story-testplan pairing is enforced at creation</a></li>\n</ul>\n","ageDays":100,"cycleDays":38}],"feature":[{"type":"feature","id":"FEAT-02.1","title":"Command Center & public release scrub","status":"in-progress","epic":"EPIC-02","feature":null,"story":null,"testplan":null,"estimate":"L","priority":null,"severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":"—","mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-04T09:15:00+01:00","started_at":"2026-05-06T09:00:00+01:00","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/31-Features/EPIC-02/FEAT-02.1-command-center-public-release.md","bodyHtml":"<h1>FEAT-02.1 · Command Center &amp; public release scrub</h1>\n<h2>Goal</h2>\n<p>Establish the trustworthy-board foundation for Tandem: a dashboard generator that renders the Command Center from the lifecycle artefacts, regeneration on every status change so it never goes stale, and an allowlist-first scrub that gates the public release build so the demo can be shown safely.</p>\n<h2>User value</h2>\n<p>The builder opens one board that is always true to the artefacts, and can publish a public demo of it without leaking any internal detail.</p>\n<h2>Scope</h2>\n<ul>\n<li>A dashboard generator that walks the artefacts and renders the Command Center.</li>\n<li>Rollup and counts computed from the artefacts, kept internally consistent.</li>\n<li>Regeneration hooked to every status change.</li>\n<li>An allowlist-first release scrub that fails the build on any denylisted token.</li>\n<li>A path-free external-root render mode for the public demo.</li>\n<li>Blocked: the public AI-catalogue tab depends on a catalogue contract still being finalised.</li>\n</ul>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] The generator renders the Command Center from the artefacts with zero drift.</li>\n<li>[ ] Rollup and counts on the board match the underlying artefacts exactly.</li>\n<li>[ ] A status change regenerates the board within 10 seconds.</li>\n<li>[ ] The public build fails closed if any denylisted token survives the scrub.</li>\n<li>[ ] External-root render mode produces a path-free public demo.</li>\n</ul>\n<h2>Stories</h2>\n<ul>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.01-dashboard-generator-renders-board.md\">STORY-02.1.01 — Dashboard generator renders the board</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.02-regenerate-on-status-change.md\">STORY-02.1.02 — Regenerate on status change</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.03-consistent-rollup-counts.md\">STORY-02.1.03 — Internally consistent rollup &amp; counts</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.04-external-root-render-mode.md\">STORY-02.1.04 — External-root render mode for the public demo</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.05-allowlist-release-scrub-gate.md\">STORY-02.1.05 — Allowlist release scrub gate</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>The lifecycle artefacts produced by EPIC-01 (the board renders from them).</li>\n<li>The release-scrub policy decision (ADR-0001).</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> epics, features, stories, testplans, decisions</li>\n<li><strong>Writes:</strong> the rendered Command Center HTML; the public release output</li>\n<li><strong>New schema / migration:</strong> none (the board is derived from existing artefacts)</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li>A denylisted token could survive to the public build — mitigation: allowlist-first scrub that fails closed (STORY-02.1.05).</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../../40-Decisions/ADR-0001-allowlist-not-denylist-release-scrub.md\">ADR-0001 — Allowlist, not denylist, for the public release scrub</a></li>\n</ul>\n","ageDays":37,"cycleDays":null},{"type":"feature","id":"FEAT-01.1","title":"Strategy & decomposition skills","status":"done","epic":"EPIC-01","feature":null,"story":null,"testplan":null,"estimate":"M","priority":null,"severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":"—","mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-03-04T09:30:00+01:00","started_at":"2026-03-05T09:00:00+01:00","completed_at":"2026-03-26T15:40:00+01:00","version":null,"ai_review":null,"file":"_00-Project-Management/31-Features/EPIC-01/FEAT-01.1-strategy-decomposition-skills.md","bodyHtml":"<h1>FEAT-01.1 · Strategy &amp; decomposition skills</h1>\n<h2>Goal</h2>\n<p>Deliver the top of Tandem&#39;s lifecycle as runnable skills: draft quarterly OKRs from the North Star, then decompose an epic into features. A builder turns strategy into a structured plan by invoking a command, with strategic linkage carried in frontmatter so nothing floats free of an objective.</p>\n<h2>User value</h2>\n<p>A builder can go from a North Star to a linked OKR set and a decomposed epic in minutes, without copying a template or hand-wiring the OKR → Epic → Feature references.</p>\n<h2>Scope</h2>\n<ul>\n<li>A draft-OKRs skill that reads the North Star and writes a linked OKR set.</li>\n<li>A split-into-features skill that reads an epic and writes feature files under it.</li>\n<li>Mandatory strategic linkage (<code>okr:</code> / <code>prd_section:</code>) enforced on every epic.</li>\n<li>Cross-reference integrity: features point back at their epic.</li>\n</ul>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[x] Invoking the draft-OKRs skill produces an OKR set linked to the North Star.</li>\n<li>[x] Invoking the split-into-features skill writes feature files that reference their parent epic.</li>\n<li>[x] An epic without <code>okr:</code> or <code>prd_section:</code> is rejected by the validator.</li>\n<li>[x] Every generated feature carries a valid <code>epic:</code> field that resolves to an existing epic.</li>\n</ul>\n<h2>Stories</h2>\n<ul>\n<li><a href=\"../../32-Stories/EPIC-01/FEAT-01.1/STORY-01.1.01-draft-okrs-skill.md\">STORY-01.1.01 — Draft OKRs skill</a></li>\n<li><a href=\"../../32-Stories/EPIC-01/FEAT-01.1/STORY-01.1.02-split-into-features-skill.md\">STORY-01.1.02 — Split-into-features skill</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>The artefact templates the skills write from.</li>\n<li>The frontmatter validator that enforces strategic linkage.</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> North Star, epics, templates</li>\n<li><strong>Writes:</strong> OKR sets, feature files</li>\n<li><strong>New schema / migration:</strong> the <code>okr:</code> / <code>prd_section:</code> linkage contract</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li>A skill could emit a feature that references a non-existent epic — mitigation: validator rule R12 fails the build on a dangling <code>epic:</code>.</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../../40-Decisions/ADR-0002-enforce-story-testplan-pairing.md\">ADR-0002 — Story-testplan pairing is enforced at creation</a></li>\n</ul>\n","ageDays":98,"cycleDays":21},{"type":"feature","id":"FEAT-01.2","title":"Story-testplan pairing & gates","status":"done","epic":"EPIC-01","feature":null,"story":null,"testplan":null,"estimate":"M","priority":null,"severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":"—","mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-03-26T16:00:00+01:00","started_at":"2026-03-27T09:00:00+01:00","completed_at":"2026-04-11T16:20:00+01:00","version":null,"ai_review":null,"file":"_00-Project-Management/31-Features/EPIC-01/FEAT-01.2-story-testplan-pairing-gates.md","bodyHtml":"<h1>FEAT-01.2 · Story-testplan pairing &amp; gates</h1>\n<h2>Goal</h2>\n<p>Make the bottom of the lifecycle safe: every story is born paired with a same-id testplan, and the Definition of Ready and Definition of Done gates are enforced when a story changes status. The builder cannot create unverifiable work, and cannot close work that has not passed its gate.</p>\n<h2>User value</h2>\n<p>A builder trusts that &quot;done&quot; means done — every closed story has a testplan that was run, and every started story cleared its readiness checklist first.</p>\n<h2>Scope</h2>\n<ul>\n<li>A split-into-stories skill that emits a story and its same-id testplan in one response.</li>\n<li>A DoR gate on the transition into in-progress.</li>\n<li>A DoD gate on the transition into done, including the testplan-passed check.</li>\n<li>Validator enforcement that a story has a paired testplan at the mirrored path.</li>\n</ul>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[x] Creating a story always produces a testplan with the matching id in the same step.</li>\n<li>[x] A story cannot enter in-progress until its DoR checklist passes.</li>\n<li>[x] A story cannot enter done until its paired testplan is run and DoD passes.</li>\n<li>[x] The validator flags any story whose paired testplan is missing.</li>\n</ul>\n<h2>Stories</h2>\n<ul>\n<li><a href=\"../../32-Stories/EPIC-01/FEAT-01.2/STORY-01.2.01-split-into-stories-paired-testplan.md\">STORY-01.2.01 — Split-into-stories skill with paired testplan</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>The story and testplan templates.</li>\n<li>The frontmatter validator (pairing rule R6).</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> features, stories, testplans</li>\n<li><strong>Writes:</strong> stories, testplans</li>\n<li><strong>New schema / migration:</strong> the Story↔Testplan id-pairing contract</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li>A renamed story file could orphan its testplan — mitigation: validator R6 resolves the testplan at the mirrored path by id, independent of slug.</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../../40-Decisions/ADR-0002-enforce-story-testplan-pairing.md\">ADR-0002 — Story-testplan pairing is enforced at creation</a></li>\n</ul>\n","ageDays":76,"cycleDays":15}],"story":[{"type":"story","id":"STORY-02.1.02","title":"Regenerate on status change","status":"in-progress","epic":"EPIC-02","feature":"FEAT-02.1","story":null,"testplan":null,"estimate":"M","priority":"P0","severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"automation","decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-14T09:00:00+01:00","started_at":"2026-05-18T09:30:00+01:00","completed_at":"","version":null,"ai_review":"pending","file":"_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.02-regenerate-on-status-change.md","bodyHtml":"<h1>STORY-02.1.02 · Regenerate on status change</h1>\n<h2>As</h2>\n<p>a builder who just moved a story&#39;s status</p>\n<h2>I want</h2>\n<p>the Command Center to regenerate automatically</p>\n<h2>So that</h2>\n<p>the board never lags behind the artefacts I just edited</p>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] A status flip in any artefact triggers a board regeneration.</li>\n<li>[ ] The regenerated board reflects the new status within 10 seconds.</li>\n<li>[ ] Regeneration is idempotent — re-running on the same state changes nothing.</li>\n<li>[ ] A failed regeneration surfaces an error rather than leaving a stale board silently.</li>\n</ul>\n<h2>Technical notes</h2>\n<ul>\n<li><strong>Files touched:</strong> the regeneration hook, the generator entry point.</li>\n<li><strong>Libraries:</strong> none new.</li>\n<li><strong>Pattern:</strong> reuse — wraps the generator from STORY-02.1.01.</li>\n<li><strong>Gotchas:</strong> debounce rapid successive status changes so a batch of flips triggers one render, not many.</li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>STORY-02.1.01 (the generator must exist to be re-invoked).</li>\n</ul>\n<h2>References</h2>\n<ul>\n<li><strong>Feature:</strong> FEAT-02.1</li>\n<li><strong>PRD:</strong> —</li>\n<li><strong>Mockup:</strong> —</li>\n<li><strong>Related ADRs:</strong> ADR-0001</li>\n</ul>\n<h2>DoR checklist</h2>\n<ul>\n<li>[x] Paired TESTPLAN exists with every AC mapped to a TC</li>\n<li>[x] Every TC has a runnable <code>Command:</code> Claude can execute unattended</li>\n<li>[x] Dependencies done or scheduled</li>\n<li>[x] Estimate set</li>\n<li>[x] Risks section populated below</li>\n</ul>\n<h2>Risks / unknowns</h2>\n<ul>\n<li>Debounce window vs perceived freshness tuning; under evaluation.</li>\n</ul>\n<h2>DoD checklist</h2>\n<ul>\n<li>[ ] All AC ticked above</li>\n<li>[ ] Paired TESTPLAN run; all TCs PASS (or FAIL linked to BUG)</li>\n<li>[ ] Project quality gates pass (lint / tests / build)</li>\n<li>[ ] No new runtime errors on smoke</li>\n<li>[ ] If UI: visual contract tests green</li>\n<li>[ ] <strong>AI-code review</strong> complete</li>\n<li>[ ] Fron li><strong>Result:</strong> PASS</li>\n</ul>\n<h3>TC-02 · New status visible within 10s</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-2</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   node scripts/dashboard/regenerate.test.js --case freshness   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the regenerated board shows the new status within the budget.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-03 · Idempotent regeneration</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-3</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   node scripts/dashboard/regenerate.test.js --case idempotent   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; regenerating on the same state leaves the board unchanged.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-04 · Failure surfaces, no stale board</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-4</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   node scripts/dashboard/regenerate.test.js --case fail-loud   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; a forced render failure raises an error rather than silently keeping the old board.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h2>Code review checklist</h2>\n<ul>\n<li>[ ] Every story AC implemented</li>\n<li>[ ] No security regressions (input validation / injection)</li>\n<li>[ ] No performance regressions</li>\n<li>[ ] Lint clean</li>\n<li>[ ] Build clean</li>\n<li>[ ] Tests green</li>\n<li>[ ] No suppressed lint rules without justification</li>\n<li>[ ] Error paths covered (not just happy path)</li>\n<li>[ ] Logging / observability hooks added where exceptions can fire</li>\n<li>[ ] Documentation updated if behaviour c head><tbody><tr><td>AC-1</td><td>Per-epic shipped/total counts are computed from the stories.</td><td>TC-01</td></tr><tr><td>AC-2</td><td>The counts snapshot totals equal the sum of the per-epic rollup rows.</td><td>TC-02</td></tr><tr><td>AC-3</td><td>The overall progress bar matches the shipped/total story count exactly.</td><td>TC-03</td></tr><tr><td>AC-4</td><td>A story in any status is counted in exactly one bucket.</td><td>TC-04</td></tr></tbody></table></div>\n<h2>Test cases</h2>\n<h3>TC-01 · Rollups computed from stories</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-1</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   node scripts/dashboard/rollup.test.js --case computed   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; per-epic shipped/total counts equal the story tally for that epic.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-02 · Counts equal sum of rollup rows</h3>\n<ul>\n<li><strong>Type:</strong> static-analysis</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-2</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   node scripts/dashboard/rollup.test.js --case totals-agree   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the counts snapshot totals equal the summed rollup rows.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-03 · Overall bar matches counts</h3>\n<ul>\n<li><strong>Type:</strong> static-analysis</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-3</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   node scripts/dashboard/rollup.test.js --case bar-matches   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the overall progress bar&#39;s shipped/total equals the counts snapshot.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-04 · Exclusive bucketing</h3>\n<ul>\n<li><strong>Type:</strong> unit</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-4</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   node scripts/dashboard/rollup.test.js --case exclusive-buckets   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; each story is counted in exactly one status bucket.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h2>Code review checklist</h2>\n<ul>\n<li>[ ] Every story AC implemented</li>\n<li>[ ] No security regressions (input validation / injection)</li>\n<li>[ ] No performance regressions</li>\n<li>[ ] Lint clean</li>\n<li>[ ] Build clean</li>\n<li>[ ] Tests green</li>\n<li>[ ] No suppressed lint rules without justification</li>\n<li>[ ] Error paths covered (not just happy path)</li>\n<li>[ ] Logging / observability hooks added where exceptions can fire</li>\n<li>[ ] Documentation updated if behaviour contract changed</li>\n</ul>\n<h2>Risks / edge cases</h2>\n<ul>\n<li>A new status value added to the enum must be assigned to a bucket, or totals will disagree.</li>\n<li>Off-by-one in the bar rounding could make the bar disagree with the counts.</li>\n</ul>\n<h2>Sign-off</h2>\n<ul>\n<li>Code review: <em>pending</em></li>\n<li>All tests passed: <em>pending</em></li>\n<li>Date completed: &#39;&#39;</li>\n</ul>\n","ageDays":27,"cycleDays":null},{"type":"testplan","id":"TESTPLAN-02.1.05","title":"Test Plan — Allowlist release scrub gate","status":"blocked","epic":"EPIC-02","feature":"FEAT-02.1","story":"STORY-02.1.05","testplan":null,"estimate":null,"priority":null,"severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-14T09:30:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/33-Testplans/EPIC-02/FEAT-02.1/TESTPLAN-02.1.05-allowlist-release-scrub-gate.md","bodyHtml":"<h1>TESTPLAN-02.1.05 · Allowlist release scrub gate</h1>\n<h2>Source story</h2>\n<p><code>_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.05-allowlist-release-scrub-gate.md</code></p>\n<h2>Scope</h2>\n<p>Verifies the release build runs an allowlist-first scrub, fails closed on any surviving denylisted token, reports each offending file and token, and emits a path-free, denylist-free output on a clean build. Blocked until the rendered-output contract is finalised by STORY-02.1.03.</p>\n<h2>Preconditions</h2>\n<ul>\n<li>Repo at project root.</li>\n<li>Runtime: Node 20.</li>\n<li>Required services running: none.</li>\n<li>Required env vars: none.</li>\n<li>Test data / fixtures: a build output seeded with one denylisted token, and a clean output.</li>\n</ul>\n<h2>Acceptance criteria → Test case map</h2>\n<div class=\"md-table-wrap\"><table class=\"md-table\"><thead><tr><th>#</th><th>Acceptance criterion (verbatim from story)</th><th>Test case</th></tr></thead><tbody><tr><td>AC-1</td><td>The release build runs an allowlist-first scrub over every output file.</td><td>TC-01</td></tr><tr><td>AC-2</td><td>A single surviving denylisted token fails the whole build.</td><td>TC-02</td></tr><tr><td>AC-3</td><td>The scrub report lists each offending file and token.</td><td>TC-03</td></tr><tr><td>AC-4</td><td>A clean build emits a path-free, denylist-free public output.</td><td>TC-04</td></tr></tbody></table></div>\n<h2>Test cases</h2>\n<h3>TC-01 · Scrub covers every output file</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-1</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   node scripts/release/scrub.test.js --case coverage   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the scrub visits every file in the build output.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-02 · One token fails the build</h3>\n<ul>\n<li><strong>Type:</strong> integration</li>\n<li><strong>Priority:</strong> P0</li>\n<li><strong>Maps to:</strong> AC-2</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   node scripts/release/scrub.test.js --case fail-closed   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; a seeded denylisted token causes the build to fail.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-03 · Report lists offenders</h3>\n<ul>\n<li><strong>Type:</strong> static-analysis</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-3</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   node scripts/release/scrub.test.js --case report   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the report names each offending file and token.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h3>TC-04 · Clean build is path-free and denylist-free</h3>\n<ul>\n<li><strong>Type:</strong> static-analysis</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-4</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   node scripts/release/scrub.test.js --case clean-output   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; a clean build&#39;s output carries no denylisted token and no host path.</li>\n<li><strong>Result:</strong> <em>pending</em></li>\n</ul>\n<h2>Code review checklist</h2>\n<ul>\n<li>[ ] Every story AC implemented</li>\n<li>[ ] No security regressions (input validation / injection)</li>\n<li>[ ] No performance regressions</li>\n<li>[ ] Lint clean</li>\n<li>[ ] Build clean</li>\n<li>[ ] Tests green</li>\n<li>[ ] No suppressed lint rules without justification</li>\n<li>[ ] Error paths covered (not just happy path)</li>\n<li>[ ] Logging / observability hooks added where exceptions can fire</li>\n<li>[ ] Documentation updated if behaviour contract changed</li>\n</ul>\n<h2>Risks / edge cases</h2>\n<ul>\n<li>An over-tight allowlist could fail a clean build on legitimate rong> P0</li>\n<li><strong>Maps to:</strong> AC-2</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   node scripts/skills/draft-okrs.test.js --case linked-work   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; each key result row carries a non-empty linked-work reference.</li>\n<li><strong>Result:</strong> PASS</li>\n</ul>\n<h3>TC-03 · Output matches the strategy template</h3>\n<ul>\n<li><strong>Type:</strong> static-analysis</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-3</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   node scripts/skills/draft-okrs.test.js --case template-shape   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the generated file&#39;s section headings match the strategy template.</li>\n<li><strong>Result:</strong> PASS</li>\n</ul>\n<h3>TC-04 · Refuses to run without a North Star</h3>\n<ul>\n<li><strong>Type:</strong> unit</li>\n<li><strong>Priority:</strong> P1</li>\n<li><strong>Maps to:</strong> AC-4</li>\n<li><strong>Command:</strong></li>\n<p>  ``<code>bash   node scripts/skills/draft-okrs.test.js --case no-north-star   </code>``</p>\n<li><strong>Expected:</strong> Exit 0; the skill aborts with a clear message and writes nothing.</li>\n<li><strong>Result:</strong> PASS</li>\n</ul>\n<h2>Code review checklist</h2>\n<ul>\n<li>[x] Every story AC implemented</li>\n<li>[x] No security regressions (input validation / injection)</li>\n<li>[x] No performance regressions</li>\n<li>[x] Lint clean</li>\n<li>[x] Build clean</li>\n<li>[x] Tests green</li>\n<li>[x] No suppressed lint rules without justification</li>\n<li>[x] Error paths covered (not just happy path)</li>\n<li>[x] Logging / observability hooks added where exceptions can fire</li>\n<li>[x] Documentation updated if behaviour contract changed</li>\n</ul>\n<h2>Risks / edge cases</h2>\n<ul>\n<li>A malformed North Star should abort, not emit a broken OKR set.</li>\n<li>Linked-work ids that do not yet exist are allowed (planned work cted:</strong> Exit 0; two renders of unchanged input are byte-identical.</li>\n<li><strong>Result:</strong> PASS</li>\n</ul>\n<h2>Code review checklist</h2>\n<ul>\n<li>[x] Every story AC implemented</li>\n<li>[x] No security regressions (input validation / injection)</li>\n<li>[x] No performance regressions</li>\n<li>[x] Lint clean</li>\n<li>[x] Build clean</li>\n<li>[x] Tests green</li>\n<li>[x] No suppressed lint rules without justification</li>\n<li>[x] Error paths covered (not just happy path)</li>\n<li>[x] Logging / observability hooks added where exceptions can fire</li>\n<li>[x] Documentation updated if behaviour contract changed</li>\n</ul>\n<h2>Risks / edge cases</h2>\n<ul>\n<li>A malformed artefact should be reported, not silently dropped from the board.</li>\n<li>Large trees must render within the time budget.</li>\n</ul>\n<h2>Sign-off</h2>\n<ul>\n<li>Code review: PASS</li>\n<li>All tests passed: PASS</li>\n<li>Date completed: &#39;2026-05-14&#39;</li>\n</ul>\n","ageDays":35,"cycleDays":1}],"bug":[],"adr":[{"type":"adr","id":"ADR-0001","title":"Allowlist, not denylist, for the public release scrub","status":"done","epic":null,"feature":null,"story":null,"testplan":null,"estimate":null,"priority":null,"severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":"accepted","type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":"STORY-02.1.01","discovered_in":null,"captured_from":null,"created_at":"2026-05-06T11:00:00+01:00","started_at":"2026-05-06T11:00:00+01:00","completed_at":"2026-05-06T12:30:00+01:00","version":null,"ai_review":null,"file":"_00-Project-Management/40-Decisions/ADR-0001-allowlist-not-denylist-release-scrub.md","bodyHtml":"<h1>ADR-0001 · Allowlist, not denylist, for the public release scrub</h1>\n<h2>Context</h2>\n<p>Tandem ships a public demo of its own Command Center. The build that produces that demo must guarantee no internal detail leaks. While building the dashboard generator in STORY-02.1.01 we had to decide how the release scrub determines what is safe to publish. The choice is load-bearing: every downstream public artefact passes through it, and a single miss is a leak.</p>\n<h2>Decision</h2>\n<p>Gate the public release on an allowlist, not a denylist. The build publishes only content that matches an explicit allowlist of safe, generic material, and fails closed on anything that is not positively known to be safe. A denylist of forbidden tokens is kept as a second, defence-in-depth check, but it is not the primary gate.</p>\n<h2>Alternatives considered</h2>\n<ol>\n<li><strong>Denylist only</strong> — block a fixed list of known-bad tokens. Simple, but it fails open: any internal term nobody thought to add slips straight through. The failure mode is silent and permanent.</li>\n<li><strong>Manual review before each release</strong> — a human reads the output. Does not scale, is error-prone on large outputs, and cannot run unattended in the build.</li>\n<li><strong>No scrub, rely on authoring discipline</strong> — assumes prose never drifts. One stray internal reference defeats it; unacceptable for a public artefact.</li>\n</ol>\n<h2>Consequences</h2>\n<p><strong>Positive:</strong></p>\n<ul>\n<li>Fails closed: unknown content is blocked by default, so a forgotten term cannot leak.</li>\n<li>The allowlist is explicit and reviewable, making &quot;what is publishable&quot; a documented contract.</li>\n</ul>\n<p><strong>Negative / trade-offs:</strong></p>\n<ul>\n<li>An over-tight allowlist can block legitimate content (a false positive), so the scrub must report exactly what it blocked and why.</li>\n<li>The allowlist needs maintenance as the public surface grows.</li>\n</ul>\n<p><strong>Neutral:</strong></p>\n<ul>\n<li>The build needs a clear, machine-readable allowlist source and a triage report.</li>\n</ul>\n<h2>Review trigger</h2>\n<ul>\n<li>Revisit if false positives become frequent enough that maintainers routinely override the gate.</li>\n<li>Revisit if the public surface grows large enough that an allowlist is impractical to maintain.</li>\n</ul>\n<h2>Links</h2>\n<ul>\n<li><strong>Originating story:</strong> STORY-02.1.01</li>\n<li><strong>Related ADRs:</strong> ADR-0002 (the pairing rule that keeps the artefacts the scrub publishes consistent)</li>\n<li><strong>External references:</strong> general secure-by-default / fail-closed design guidance.</li>\n</ul>\n","ageDays":35,"cycleDays":0},{"type":"adr","id":"ADR-0002","title":"Story-testplan pairing is enforced at creation","status":"done","epic":null,"feature":null,"story":null,"testplan":null,"estimate":null,"priority":null,"severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":"accepted","type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":"STORY-01.1.01","discovered_in":null,"captured_from":null,"created_at":"2026-03-06T10:00:00+01:00","started_at":"2026-03-06T10:00:00+01:00","completed_at":"2026-03-06T11:15:00+01:00","version":null,"ai_review":null,"file":"_00-Project-Management/40-Decisions/ADR-0002-enforce-story-testplan-pairing.md","bodyHtml":"<h1>ADR-0002 · Story-testplan pairing is enforced at creation</h1>\n<h2>Context</h2>\n<p>Building the lifecycle skills in STORY-01.1.01 forced a decision about when a story&#39;s testplan must exist. In early dogfooding, stories were created first and &quot;a testplan would follow&quot; — but it often did not, so stories closed as &quot;done&quot; with no verification behind them. We needed a rule that makes an unverifiable story structurally impossible, not merely discouraged.</p>\n<h2>Decision</h2>\n<p>Pair every story with a same-id testplan at the moment of creation. The split-into-stories skill emits both the STORY and its TESTPLAN in one response, with the testplan id mirroring the story id (STORY-NN.M.PP ↔ TESTPLAN-NN.M.PP). The frontmatter validator enforces the pairing: a story with no testplan at the mirrored path is a violation, and the skill aborts without writing anything if it cannot produce both.</p>\n<h2>Alternatives considered</h2>\n<ol>\n<li><strong>Create testplans lazily, before close-out</strong> — relies on memory and discipline; the exact failure we observed. Stories slipped to done with empty test coverage.</li>\n<li><strong>One combined story+testplan document</strong> — keeps them together but conflates planning and verification concerns and breaks the mirrored-path validation the dashboard relies on.</li>\n<li><strong>A nightly job that flags unpaired stories</strong> — catches the problem after the fact rather than preventing it, and lets bad states exist in between.</li>\n</ol>\n<h2>Consequences</h2>\n<p><strong>Positive:</strong></p>\n<ul>\n<li>An unverifiable story cannot exist: no story without a testplan, by construction.</li>\n<li>The mirrored id makes pairing checkable by tooling, independent of file slugs.</li>\n</ul>\n<p><strong>Negative / trade-offs:</strong></p>\n<ul>\n<li>Slightly more work at creation time (the testplan must be drafted up front).</li>\n<li>The all-or-nothing abort path must be correct so an interrupted run leaves no orphan.</li>\n</ul>\n<p><strong>Neutral:</strong></p>\n<ul>\n<li>The Definition of Done can now require &quot;paired testplan run&quot; as a hard gate.</li>\n</ul>\n<h2>Review trigger</h2>\n<ul>\n<li>Revisit if the pairing rule ever blocks a legitimate workflow that genuinely has no testable surface.</li>\n<li>Revisit if the validator&#39;s mirrored-path resolution proves too rigid for a future folder layout.</li>\n</ul>\n<h2>Links</h2>\n<ul>\n<li><strong>Originating story:</strong> STORY-01.1.01</li>\n<li><strong>Related ADRs:</strong> ADR-0001 (the release scrub publishes the artefacts this rule keeps consistent)</li>\n<li><strong>External references:</strong> the kit&#39;s Definition of Ready / Definition of Done standards.</li>\n</ul>\n","ageDays":96,"cycleDays":0}],"generatedAt":"2026-06 "pluginTotal":0,"totalCost":0,"scanRoots":{"user":"~/.claude","project":"./.claude"},"counts":{"skills":0,"agents":0,"commands":0,"plugins":0}},"plan":{"byEpic":[{"epic":{"type":"epic","id":"EPIC-02","title":"Command Center & governance gates","status":"in-progress","epic":null,"feature":null,"story":null,"testplan":null,"estimate":"XL","priority":"P0","severity":null,"okr":"OKR-2026-Q2-1","prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-04-20T10:00:00+01:00","started_at":"2026-05-04T09:15:00+01:00","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/30-Epics/EPIC-02-command-center-governance.md","bodyHtml":"<h1>EPIC-02 · Command Center &amp; governance gates</h1>\n<h2>Goal</h2>\n<p>Give the builder one always-current board — the Command Center — rendered directly from the lifecycle artefacts, plus the governance gates that keep that board honest: closed-set status, an allowlist release scrub for the public build, and a dashboard that regenerates on every status change. The first slice delivers the dashboard generator and the scrub-gated public release so the plan can never drift and can be shown in public safely.</p>\n<h2>Strategic linkage</h2>\n<ul>\n<li><strong>OKR:</strong> OKR-2026-Q2-1 — &quot;Raise the share of work that closes the full lifecycle loop with all gates green.&quot; A board you cannot trust breaks the loop; governance gates make the loop verifiable.</li>\n<li><strong>Why now:</strong> the lifecycle skills shipped (EPIC-01), so artefacts now flow; the next lever is making the rolled-up view trustworthy and the public demo safe to publish.</li>\n<li><strong>Business outcome:</strong> lift the share of loops that close with all gates green from 35% to 70%, and drive dashboard-to-artefact drift incidents to zero.</li>\n</ul>\n<h2>In scope</h2>\n<ul>\n<li>A dashboard generator that renders the Command Center from the artefacts.</li>\n<li>Regeneration of the board on every status change so it never goes stale.</li>\n<li>An allowlist-first release scrub that gates the public build.</li>\n<li>Internally-consistent rollups and counts on the board.</li>\n</ul>\n<h2>Out of scope</h2>\n<ul>\n<li>Editing artefacts from inside the dashboard (the dashboard is read-only).</li>\n<li>Multi-project portfolio views.</li>\n<li>Real-time multi-user board collaboration.</li>\n</ul>\n<h2>Success criteria</h2>\n<ul>\n<li>The Command Center matches the artefacts on disk with zero drift after any status change.</li>\n<li>The board regenerates within 10 seconds of a status flip.</li>\n<li>The public release build fails closed if any denylisted token survives the scrub.</li>\n</ul>\n<h2>Features</h2>\n<ul>\n<li><a href=\"../31-Features/EPIC-02/FEAT-02.1-command-center-public-release.md\">FEAT-02.1 — Command Center &amp; public release scrub</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li><strong>Other epics:</strong> EPIC-01 (the lifecycle skills produce the artefacts the board renders).</li>\n<li><strong>Infrastructure:</strong> the dashboard generator script; the public release pipeline.</li>\n<li><strong>External:</strong> none.</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> epics, features, stories, testplans, decisions</li>\n<li><strong>Writes:</strong> the rendered Command Center HTML; the public release output</li>\n<li><strong>New schema:</strong> the rollup/counts contract the generator computes from artefacts</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li><strong>Over-aggressive scrub</strong> — mitigation: allowlist-first design with an explicit, reviewable token list (see ADR-0001).</li>\n<li><strong>Stale board after a status change</strong> — mitigation: regenerate the dashboard in the same step as the status flip.</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../40-Decisions/ADR-0001-allowlist-not-denylist-release-scrub.md\">ADR-0001 — Allowlist, not denylist, for the public release scrub</a></li>\n</ul>\n","ageDays":51,"cycleDays":null},"features":[{"feature":{"type":"feature","id":"FEAT-02.1","title":"Command Center & public release scrub","status":"in-progress","epic":"EPIC-02","feature":null,"story":null,"testplan":null,"estimate":"L","priority":null,"severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":"—","mockup_refs":null,"adr_status":null,"type_of_work":null,"decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-04T09:15:00+01:00","started_at":"2026-05-06T09:00:00+01:00","completed_at":"","version":null,"ai_review":null,"file":"_00-Project-Management/31-Features/EPIC-02/FEAT-02.1-command-center-public-release.md","bodyHtml":"<h1>FEAT-02.1 · Command Center &amp; public release scrub</h1>\n<h2>Goal</h2>\n<p>Establish the trustworthy-board foundation for Tandem: a dashboard generator that renders the Command Center from the lifecycle artefacts, regeneration on every status change so it never goes stale, and an allowlist-first scrub that gates the public release build so the demo can be shown safely.</p>\n<h2>User value</h2>\n<p>The builder opens one board that is always true to the artefacts, and can publish a public demo of it without leaking any internal detail.</p>\n<h2>Scope</h2>\n<ul>\n<li>A dashboard generator that walks the artefacts and renders the Command Center.</li>\n<li>Rollup and counts computed from the artefacts, kept internally consistent.</li>\n<li>Regeneration hooked to every status change.</li>\n<li>An allowlist-first release scrub that fails the build on any denylisted token.</li>\n<li>A path-free external-root render mode for the public demo.</li>\n<li>Blocked: the public AI-catalogue tab depends on a catalogue contract still being finalised.</li>\n</ul>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] The generator renders the Command Center from the artefacts with zero drift.</li>\n<li>[ ] Rollup and counts on the board match the underlying artefacts exactly.</li>\n<li>[ ] A status change regenerates the board within 10 seconds.</li>\n<li>[ ] The public build fails closed if any denylisted token survives the scrub.</li>\n<li>[ ] External-root render mode produces a path-free public demo.</li>\n</ul>\n<h2>Stories</h2>\n<ul>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.01-dashboard-generator-renders-board.md\">STORY-02.1.01 — Dashboard generator renders the board</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.02-regenerate-on-status-change.md\">STORY-02.1.02 — Regenerate on status change</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.03-consistent-rollup-counts.md\">STORY-02.1.03 — Internally consistent rollup &amp; counts</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.04-external-root-render-mode.md\">STORY-02.1.04 — External-root render mode for the public demo</a></li>\n<li><a href=\"../../32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.05-allowlist-release-scrub-gate.md\">STORY-02.1.05 — Allowlist release scrub gate</a></li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>The lifecycle artefacts produced by EPIC-01 (the board renders from them).</li>\n<li>The release-scrub policy decision (ADR-0001).</li>\n</ul>\n<h2>Data touched</h2>\n<ul>\n<li><strong>Reads:</strong> epics, features, stories, testplans, decisions</li>\n<li><strong>Writes:</strong> the rendered Command Center HTML; the public release output</li>\n<li><strong>New schema / migration:</strong> none (the board is derived from existing artefacts)</li>\n</ul>\n<h2>Risks</h2>\n<ul>\n<li>A denylisted token could survive to the public build — mitigation: allowlist-first scrub that fails closed (STORY-02.1.05).</li>\n</ul>\n<h2>Decisions</h2>\n<ul>\n<li><a href=\"../../40-Decisions/ADR-0001-allowlist-not-denylist-release-scrub.md\">ADR-0001 — Allowlist, not denylist, for the public release scrub</a></li>\n</ul>\n","ageDays":37,"cycleDays":null},"stories":[{"type":"story","id":"STORY-02.1.02","title":"Regenerate on status change","status":"in-progress","epic":"EPIC-02","feature":"FEAT-02.1","story":null,"testplan":null,"estimate":"M","priority":"P0","severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"automation","decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-14T09:00:00+01:00","started_at":"2026-05-18T09:30:00+01:00","completed_at":"","version":null,"ai_review":"pending","file":"_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.02-regenerate-on-status-change.md","bodyHtml":"<h1>STORY-02.1.02 · Regenerate on status change</h1>\n<h2>As</h2>\n<p>a builder who just moved a story&#39;s status</p>\n<h2>I want</h2>\n<p>the Command Center to regenerate automatically</p>\n<h2>So that</h2>\n<p>the board never lags behind the artefacts I just edited</p>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] A status flip in any artefact triggers a board regeneration.</li>\n<li>[ ] The regenerated board reflects the new status within 10 seconds.</li>\n<li>[ ] Regeneration is idempotent — re-running on the same state changes nothing.</li>\n<li>[ ] A failed regeneration surfaces an error rather than leaving a stale board silently.</li>\n</ul>\n<h2>Technical notes</h2>\n<ul>\n<li><strong>Files touched:</strong> the regeneration hook, the generator entry point.</li>\n<li><strong>Libraries:</strong> none new.</li>\n<li><strong>Pattern:</strong> reuse — wraps the generator from STORY-02.1.01.</li>\n<li><strong>Gotchas:</strong> debounce rapid successive status changes so a batch of flips triggers one render, not many.</li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>STORY-02.1.01 (the generator must exist to be re-invoked).</li>\n</ul>\n<h2>References</h2>\n<ul>\n<li><strong>Feature:</strong> FEAT-02.1</li>\n<li><strong>PRD:</strong> —</li>\n<li><strong>Mockup:</strong> —</li>\n<li><strong>Related ADRs:</strong> ADR-0001</li>\n</ul>\n<h2>DoR checklist</h2>\n<ul>\n<li>[x] Paired TESTPLAN exists with every AC mapped to a TC</li>\n<li>[x] Every TC has a runnable <code>Command:</code> Claude can execute unattended</li>\n<li>[x] Dependencies done or scheduled</li>\n<li>[x] Estimate set</li>\n<li>[x] Risks section populated below</li>\n</ul>\n<h2>Risks / unknowns</h2>\n<ul>\n<li>Debounce window vs perceived freshness tuning; under evaluation.</li>\n</ul>\n<h2>DoD checklist</h2>\n<ul>\n<li>[ ] All AC ticked above</li>\n<li>[ ] Paired TESTPLAN run; all TCs PASS (or FAIL linked to BUG)</li>\n<li>[ ] Project quality gates pass (lint / tests / build)</li>\n<li>[ ] No new runtime errors on smoke</li>\n<li>[ ] If UI: visual contract tests green</li>\n<li>[ ] <strong>AI-code review</strong> complete</li>\n<li>[ ] Frontmatter updated: <code>status: done</code>, <code>completed_at</code> set</li>\n<li>[ ] <code>42-Monitor/MONITOR.md</code> updated</li>\n<li>[ ] ADRs created for any non-obvious decisions</li>\n<li>[ ] BACKLOG entry created for any new tech debt</li>\n</ul>\n","ageDays":27,"cycleDays":null},{"type":"story","id":"STORY-02.1.03","title":"Internally consistent rollup & counts","status":"ready","epic":"EPIC-02","feature":"FEAT-02.1","story":null,"testplan":null,"estimate":"M","priority":"P1","severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"automation","decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-14T09:10:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":"pending","file":"_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.03-consistent-rollup-counts.md","bodyHtml":"<h1>STORY-02.1.03 · Internally consistent rollup &amp; counts</h1>\n<h2>As</h2>\n<p>a builder scanning the Command Center</p>\n<h2>I want</h2>\n<p>the per-epic rollup and the counts snapshot to agree with each other</p>\n<h2>So that</h2>\n<p>I can trust a single glance at the board to tell me where the work stands</p>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] Per-epic shipped/total counts are computed from the stories, not entered by hand.</li>\n<li>[ ] The counts snapshot totals equal the sum of the per-epic rollup rows.</li>\n<li>[ ] The overall progress bar matches the shipped/total story count exactly.</li>\n<li>[ ] A story in any status is counted in exactly one bucket.</li>\n</ul>\n<h2>Technical notes</h2>\n<ul>\n<li><strong>Files touched:</strong> the rollup computation in the generator, the counts renderer.</li>\n<li><strong>Libraries:</strong> none new.</li>\n<li><strong>Pattern:</strong> reuse — consumes the artefact walk from STORY-02.1.01.</li>\n<li><strong>Gotchas:</strong> a story counted in two buckets (e.g. both &quot;open&quot; and &quot;blocked&quot;) would make totals disagree; bucket assignment must be exclusive.</li>\n</ul>\n<h2>Dependencies</h2>\n<ul>\n<li>STORY-02.1.01 (the artefact walk produces the data the rollup aggregates).</li>\n</ul>\n<h2>References</h2>\n<ul>\n<li><strong>Feature:</strong> FEAT-02.1</li>\n<li><strong>PRD:</strong> —</li>\n<li><strong>Mockup:</strong> —</li>\n<li><strong>Related ADRs:</strong> ADR-0001</li>\n</ul>\n<h2>DoR checklist</h2>\n<ul>\n<li>[x] Paired TESTPLAN exists with every AC mapped to a TC</li>\n<li>[x] Every TC has a runnable <code>Command:</code> Claude can execute unattended</li>\n<li>[x] Dependencies done or scheduled</li>\n<li>[x] Estimate set</li>\n<li>[x] Risks section populated below</li>\n</ul>\n<h2>Risks / unknowns</h2>\n<ul>\n<li>Bucket definitions could drift from the status enum if the enum grows; reviewed 2026-05-14.</li>\n</ul>\n<h2>DoD checklist</h2>\n<ul>\n<li>[ ] All AC ticked above</li>\n<li>[ ] Paired TESTPLAN run; all TCs PASS (or FAIL linked to BUG)</li>\n<li>[ ] Project quality gates pass (lint / tests / build)</li>\n<li>[ ] No new runtime errors on smoke</li>\n<li>[ ] If UI: visual contract tests green</li>\n<li>[ ] <strong>AI-code review</strong> complete</li>\n<li>[ ] Frontmatter updated: <code>status: done</code>, <code>completed_at</code> set</li>\n<li>[ ] <code>42-Monitor/MONITOR.md</code> updated</li>\n<li>[ ] ADRs created for any non-obvious decisions</li>\n<li>[ ] BACKLOG entry created for any new tech debt</li>\n</ul>\n","ageDays":27,"cycleDays":null},{"type":"story","id":"STORY-02.1.05","title":"Allowlist release scrub gate","status":"blocked","epic":"EPIC-02","feature":"FEAT-02.1","story":null,"testplan":null,"estimate":"S","priority":"P2","severity":null,"okr":null,"prd_section":null,"outcome":null,"prd_refs":null,"mockup_refs":null,"adr_status":null,"type_of_work":"infra","decisions":[],"related":[],"decision":null,"context_story":null,"discovered_in":null,"captured_from":null,"created_at":"2026-05-14T09:30:00+01:00","started_at":"","completed_at":"","version":null,"ai_review":"pending","file":"_00-Project-Management/32-Stories/EPIC-02/FEAT-02.1/STORY-02.1.05-allowlist-release-scrub-gate.md","bodyHtml":"<h1>STORY-02.1.05 · Allowlist release scrub gate</h1>\n<h2>As</h2>\n<p>the maintainer of the public Tandem release</p>\n<h2>I want</h2>\n<p>the release build to fail closed when any denylisted token survives the scrub</p>\n<h2>So that</h2>\n<p>no internal detail can ever ship to the public demo</p>\n<h2>Acceptance criteria</h2>\n<ul>\n<li>[ ] The release build runs an allowlist-first scrub over every output file.</li>\n<li>[ ] A single surviving denylisted token fails the whole build.</li>\n<li>[ ] The scrub report lists each offending file and token for triage.</li>\n<li>[ ] A clean build emits a path-free, denylist-free public output.</li>\n</ul>\n<h2>Technical notes</h2>\n<ul>\n<li><strong>Files touched:</strong> the release scrub step, the build entry point.</li>\n<li><strong>Libraries:</strong> none new.</li>\n<li><stro
